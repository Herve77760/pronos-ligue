<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pronos Ligue</title>
<style>
  :root{ --bg:#0b0e13; --panel:#151a22; --panel2:#1d2430; --border:#242b38; --ink:#e6e8ee;
    --muted:#8b93a3; --green:#4ade80; --red:#f87171; --gold:#fbbf24; --blue:#60a5fa; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .app{max-width:540px;margin:0 auto;padding:16px 16px 60px;}
  h1{font-size:22px;margin:0;letter-spacing:-.4px;}
  h2{font-size:16px;margin:18px 0 8px;}
  .sub{color:var(--muted);font-size:13px;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin:10px 0;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .muted{color:var(--muted);} .green{color:var(--green);} .red{color:var(--red);}
  .gold{color:var(--gold);} .blue{color:var(--blue);} .mini{font-size:12px;}
  .btn{background:var(--green);color:#07130b;font-weight:700;border:none;border-radius:12px;
    padding:13px;width:100%;font-size:15px;cursor:pointer;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--ink);}
  .btn.sm{width:auto;padding:8px 14px;font-size:13px;border-radius:10px;}
  input,select{background:var(--panel2);border:1px solid var(--border);color:var(--ink);
    border-radius:10px;padding:11px;font-size:15px;width:100%;}
  input[type=number]{width:84px;text-align:right;}
  label{font-size:13px;color:var(--muted);display:block;margin:10px 0 4px;}
  .chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted);}
  .chip.g{background:rgba(74,222,128,.14);border-color:rgba(74,222,128,.4);color:#8ff0b4;}
  .chip.b{background:rgba(96,165,250,.14);border-color:rgba(96,165,250,.4);color:#a9cbff;}
  .chip.gold{background:rgba(250,204,21,.15);border-color:rgba(250,204,21,.45);color:#fde68a;}
  .chip.red{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.4);color:#ffb4b4;}
  .sport{width:24px;height:24px;border-radius:6px;background:var(--panel2);display:inline-flex;
    align-items:center;justify-content:center;font-size:13px;flex:0 0 auto;}
  .odds{display:flex;gap:7px;margin-top:9px;}
  .odd{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:9px;
    padding:7px 2px;text-align:center;font-size:12px;cursor:pointer;line-height:1.25;}
  .odd b{display:block;font-size:13px;}
  .odd.sel{background:#123020;border-color:var(--green);color:#8ff0b4;}
  .gauge{height:8px;border-radius:6px;background:#232a35;overflow:hidden;margin-top:6px;}
  .gauge>i{display:block;height:100%;background:var(--green);}
  .gauge.over>i{background:var(--red);}
  .cap-tog{font-size:11px;border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;color:var(--muted);}
  .cap-tog.on{background:rgba(250,204,21,.16);border-color:var(--gold);color:var(--gold);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;}
  td.num{text-align:right;}
  .hide{display:none;}
  .code{font-size:30px;letter-spacing:7px;font-weight:800;color:var(--green);text-align:center;}
  .tag{font-size:10px;color:var(--muted);}
  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:22px;}
  .err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:#ffb4b4;
    border-radius:10px;padding:10px 12px;margin:10px 0;font-size:13px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:var(--panel2);
    border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:50;}
  a{color:var(--blue);}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div><h1>🎯 Pronos Ligue</h1><div class="sub" id="subtitle">Multijoueur en ligne</div></div>
    <button class="btn ghost sm hide" id="leaveBtn" onclick="leave()">Quitter</button>
  </div>
  <div id="err"></div>
  <div id="root"><div class="box">Chargement…</div></div>
  <div class="foot">Prototype de test · données sportives simulées · v0.3</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";
/* ============ CONFIG ============ */
const SB_URL = "https://mdqmhrorpdyrsjsbawdl.supabase.co";
const SB_KEY = "sb_publishable_1xe1X9iIPahncWpQpRkrdg_Hw49QXO0";
const db = window.supabase.createClient(SB_URL, SB_KEY);

/* ============ CONSTANTS ============ */
const EMOJIS=["👑","🦊","🐻","🦁","🐼","🐯","🦉","🐸","🐙","🦄"];
const SPORTS=[
 {ic:"⚽",draw:true, t:["PSG","OM","Lyon","Real","Barça","Bayern","Man City","Liverpool","Milan","Naples"]},
 {ic:"🎾",draw:false,t:["Alcaraz","Sinner","Djokovic","Zverev","Rune","Swiatek","Sabalenka","Gauff"]},
 {ic:"🏀",draw:false,t:["Lakers","Celtics","Warriors","Bucks","Nuggets","Heat","Suns","Mavs"]},
];
const GAGES=["Le plongeon givré 🩲","Karaoké imposé 🎤","Rando déguisé en poulet 🐔","Serveur d'un soir 🍽️","Danse TikTok publique 💃"];

/* ============ STATE ============ */
let S={ view:"home", leagueId:null, myId:null, code:null };
let L=null, players=[], duels=[], bets=[];
let poll=null, busy=false, resolving=false;

/* ============ utils ============ */
const $=id=>document.getElementById(id);
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=n=>(n>=0?"+":"")+Math.round(n);
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function showErr(m){ $("err").innerHTML = m?`<div class="err">${esc(m)}</div>`:""; }
function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function saveSession(){ localStorage.setItem("pl_session", JSON.stringify({leagueId:S.leagueId,myId:S.myId,code:S.code})); }
function loadSession(){ try{return JSON.parse(localStorage.getItem("pl_session"));}catch(e){return null;} }
function clearSession(){ localStorage.removeItem("pl_session"); }
async function q(p){ const {data,error}=await p; if(error) throw new Error(error.message); return data; }
function genCode(){ let s=""; const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; for(let i=0;i<5;i++) s+=A[Math.floor(Math.random()*A.length)]; return s; }

/* ============ schedule (double round robin, circle method) ============ */
function makeSchedule(n){
  let arr=[...Array(n).keys()]; const rounds=[];
  for(let r=0;r<n-1;r++){
    const pairs=[];
    for(let i=0;i<n/2;i++){ let a=arr[i],b=arr[n-1-i];
      if((r+i)%2===0) pairs.push([a,b]); else pairs.push([b,a]); }
    rounds.push(pairs);
    arr=[arr[0],arr[n-1],...arr.slice(1,n-1)];
  }
  const ret=rounds.map(rd=>rd.map(p=>[p[1],p[0]]));
  return [...rounds,...ret];
}

/* ============ fixtures ============ */
function genFixture(){
  const s=pick(SPORTS); const a=pick(s.t); let b=pick(s.t); while(b===a) b=pick(s.t);
  const f={sport:s.ic,draw:s.draw,home:a,away:b,oh:+rnd(1.4,3.2).toFixed(2),oa:+rnd(1.5,3.6).toFixed(2)};
  if(s.draw) f.od=+rnd(3.0,3.9).toFixed(2);
  return f;
}
function genPool(k){ return Array.from({length:k},genFixture); }
function oddOf(f,sel){ return sel==="1"?f.oh:sel==="2"?f.oa:f.od; }
function simResult(f){
  const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]];
  const inv=outs.map(o=>1/o[1]); const sum=inv.reduce((a,b)=>a+b,0);
  let r=Math.random(); for(let i=0;i<outs.length;i++){ r-=inv[i]/sum; if(r<=0) return outs[i][0]; }
  return outs[outs.length-1][0];
}

/* ============ data loading ============ */
async function refresh(){
  if(!S.leagueId) return;
  try{
    L = await q(db.from("leagues").select("*").eq("id",S.leagueId).single());
    players = await q(db.from("players").select("*").eq("league_id",S.leagueId).order("join_order"));
    duels = await q(db.from("duels").select("*").eq("league_id",S.leagueId).eq("day",L.current_day));
    bets = await q(db.from("bets").select("*").eq("league_id",S.leagueId).eq("day",L.current_day));
    showErr("");
    render();
  }catch(e){ showErr("Connexion : "+e.message); }
}
function me(){ return players.find(p=>p.id===S.myId); }
function myDuel(){ return duels.find(d=>d.home_id===S.myId||d.away_id===S.myId); }
function myBet(){ return bets.find(b=>b.player_id===S.myId); }
function pById(id){ return players.find(p=>p.id===id); }

/* ============ HOME ============ */
function viewHome(){
  const sess=loadSession();
  return `<div class="box">
      <button class="btn" onclick="go('create')">➕ Créer une ligue</button>
    </div>
    <div class="box">
      <label>Rejoindre avec un code</label>
      <input id="joinCode" placeholder="Ex : 7XK2P" maxlength="5" style="text-transform:uppercase">
      <div style="height:8px"></div>
      <button class="btn ghost" onclick="go('join')">Rejoindre →</button>
    </div>
    ${sess?`<div class="box mini"><div class="row"><span class="muted">Reprendre ta partie (${esc(sess.code)})</span>
      <button class="btn sm" onclick="resume()">Reprendre</button></div></div>`:""}`;
}
function go(v){
  if(v==="join"){ const c=($("joinCode").value||"").toUpperCase().trim(); if(c.length<3){showErr("Entre un code valide.");return;} joinLeague(c); return; }
  S.view=v; render();
}
function resume(){ const s=loadSession(); if(!s)return; S.leagueId=s.leagueId; S.myId=s.myId; S.code=s.code; S.view="game"; startPoll(); refresh(); }

/* ============ CREATE ============ */
function viewCreate(){
  return `<button class="btn ghost sm" onclick="S.view='home';render()">← Retour</button>
   <div class="box">
     <h2 style="margin-top:0">Créer la ligue</h2>
     <label>Ton prénom</label><input id="cName" placeholder="Hervé">
     <label>Nombre de joueurs humains (toi inclus)</label>
     <select id="cN">${[2,3,4,5,6,7,8].map(n=>`<option value="${n}">${n} joueurs</option>`).join("")}</select>
     <div class="mini muted" style="margin-top:8px">Si le total est impair, un 🤖 joueur IA est ajouté (il ne subit pas le gage).</div>
     <div style="height:12px"></div>
     <button class="btn" onclick="createLeague()">Créer et obtenir le code →</button>
   </div>`;
}
async function createLeague(){
  if(busy)return; const name=($("cName").value||"").trim(); const nH=+$("cN").value;
  if(!name){showErr("Entre ton prénom.");return;}
  busy=true; showErr("");
  try{
    const nP = nH%2===1 ? nH+1 : nH; // participants (with AI if odd)
    const code=genCode();
    const lg=await q(db.from("leagues").insert({code,name:"Ligue de "+name,status:"lobby",num_participants:nH,num_days:2*(nP-1),gage:pick(GAGES)}).select().single());
    const pl=await q(db.from("players").insert({league_id:lg.id,name,emoji:EMOJIS[0],is_organizer:true,join_order:0}).select().single());
    S.leagueId=lg.id; S.myId=pl.id; S.code=code; S.view="game"; saveSession();
    startPoll(); await refresh();
  }catch(e){ showErr("Création : "+e.message); }
  busy=false;
}

/* ============ JOIN ============ */
async function joinLeague(code){
  if(busy)return; busy=true; showErr("");
  try{
    const lg=await q(db.from("leagues").select("*").eq("code",code).single());
    if(lg.status!=="lobby"){ showErr("Cette ligue a déjà démarré."); busy=false; return; }
    const ps=await q(db.from("players").select("*").eq("league_id",lg.id).order("join_order"));
    const humans=ps.filter(p=>!p.is_ai);
    if(humans.length>=lg.num_participants){ showErr("La ligue est complète."); busy=false; return; }
    const name=prompt("Ton prénom ?"); if(!name){ busy=false; return; }
    const ord=humans.length;
    const pl=await q(db.from("players").insert({league_id:lg.id,name:name.trim(),emoji:EMOJIS[ord]||"🎮",join_order:ord}).select().single());
    S.leagueId=lg.id; S.myId=pl.id; S.code=code; S.view="game"; saveSession();
    startPoll(); await refresh();
  }catch(e){ showErr("Impossible de rejoindre : "+e.message); }
  busy=false;
}

/* ============ LOBBY + GAME dispatch ============ */
function viewGame(){
  if(!L) return `<div class="box">Chargement…</div>`;
  if(L.status==="lobby") return viewLobby();
  if(L.status==="done")  return viewEnd();
  return viewDay();
}
function viewLobby(){
  const humans=players.filter(p=>!p.is_ai);
  const full=humans.length>=L.num_participants;
  const org=me() && me().is_organizer;
  return `<div class="box" style="text-align:center">
      <div class="mini muted">CODE D'INVITATION</div><div class="code">${esc(L.code)}</div>
      <div style="margin-top:8px"><button class="btn sm" onclick="copyCode()">📋 Copier le code</button></div>
    </div>
    <h2>Joueurs · ${humans.length} / ${L.num_participants}</h2>
    ${players.map(p=>`<div class="box row"><div class="row" style="gap:9px">
        <span class="sport">${p.emoji}</span><b>${esc(p.name)}</b>
        ${p.is_organizer?'<span class="tag">organisateur</span>':''}${p.is_ai?'<span class="tag">IA</span>':''}
        ${p.id===S.myId?'<span class="chip b">toi</span>':''}</div>
        <span class="chip g">Prêt</span></div>`).join("")}
    ${(L.num_participants%2===1)?`<div class="box row" style="border-style:dashed"><div class="row" style="gap:9px"><span class="sport">🤖</span><b>Joueur IA</b></div><span class="chip b">au lancement</span></div>`:""}
    <div style="height:8px"></div>
    ${org?`<button class="btn" onclick="startLeague()" ${full?'':'disabled'}>${full?'Lancer le championnat →':'En attente des joueurs ('+humans.length+'/'+L.num_participants+')'}</button>`
        :`<div class="box mini muted" style="text-align:center">En attente que l'organisateur lance le championnat…</div>`}`;
}
function copyCode(){ navigator.clipboard?.writeText(L.code); toast("Code copié : "+L.code); }

async function startLeague(){
  if(busy)return; busy=true;
  try{
    // add AI if odd
    let ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    if(ps.length%2===1){
      await q(db.from("players").insert({league_id:L.id,name:"Joueur IA",emoji:"🤖",is_ai:true,join_order:ps.length}));
      ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    }
    const n=ps.length; const sched=makeSchedule(n);
    const rows=[];
    sched.forEach((pairs,day)=>pairs.forEach(pr=>rows.push({league_id:L.id,day,home_id:ps[pr[0]].id,away_id:ps[pr[1]].id,fixtures:null})));
    await q(db.from("duels").insert(rows));
    await q(db.from("leagues").update({status:"running",num_days:sched.length,current_day:0}).eq("id",L.id));
    await refresh();
  }catch(e){ showErr("Lancement : "+e.message); }
  busy=false;
}

/* ============ DAY ============ */
function viewDay(){
  const d=myDuel();
  const dayLbl=`Journée ${L.current_day+1} / ${L.num_days}`;
  if(!d) return `<div class="box">${dayLbl}<br><span class="muted mini">Aucun duel trouvé pour toi (repos).</span></div>${standingsBtn()}`;
  const iAmHome=d.home_id===S.myId;
  const opp=pById(iAmHome?d.away_id:d.home_id);
  // 1) home must pick fixtures
  if(!d.fixtures){
    if(iAmHome) return viewSelect(d,dayLbl,opp);
    return `<div class="box"><b>${dayLbl}</b><div class="mini muted" style="margin-top:6px">En attente que <b>${esc(opp.name)}</b> (à domicile) choisisse les 5 matchs…</div></div>${standingsBtn()}`;
  }
  // 2) my bet
  if(!myBet()) return viewBet(d,dayLbl,opp,iAmHome);
  // 3) waiting / resolve
  return viewWait(dayLbl);
}
function standingsBtn(){ return `<div style="height:8px"></div><button class="btn ghost" onclick="S.view='standings';render()">Voir le classement</button>`; }

/* --- selection (home) --- */
let selPool=null, selChosen=[];
function viewSelect(d,dayLbl,opp){
  if(!selPool){ selPool=genPool(9); selChosen=[]; }
  return `<div class="box"><div class="row"><b>${dayLbl}</b><span class="chip b">🏠 Domicile</span></div>
     <div class="mini muted" style="margin-top:6px">Choisis 5 rencontres (${selChosen.length}/5) — imposées à ${esc(opp.name)}.</div></div>
     ${selPool.map((f,i)=>{const on=selChosen.includes(i);return `<div class="box row" onclick="toggleSel(${i})" style="cursor:pointer;${on?'border-color:var(--green)':''}">
       <div class="row" style="gap:9px"><span class="sport">${f.sport}</span><div><b>${esc(f.home)} – ${esc(f.away)}</b>
       <div class="mini muted">${f.oh}${f.draw?' / '+f.od:''} / ${f.oa}</div></div></div>
       <span class="chip ${on?'g':''}">${on?'✓':'+'}</span></div>`;}).join("")}
     <div style="height:8px"></div>
     <button class="btn" ${selChosen.length===5?'':'disabled'} onclick="saveSelection()">Valider les 5 rencontres →</button>`;
}
function toggleSel(i){ const k=selChosen.indexOf(i); if(k>=0)selChosen.splice(k,1); else{ if(selChosen.length>=5)return; selChosen.push(i);} render(); }
async function saveSelection(){
  if(busy)return; busy=true;
  try{
    const fx=selChosen.map(i=>selPool[i]);
    const d=myDuel();
    await q(db.from("duels").update({fixtures:fx}).eq("id",d.id));
    selPool=null; selChosen=[];
    await refresh();
  }catch(e){ showErr("Sauvegarde matchs : "+e.message); }
  busy=false;
}

/* --- betting --- */
let bet={picks:null,captain:-1};
function viewBet(d,dayLbl,opp,iAmHome){
  const fx=d.fixtures;
  if(!bet.picks || bet.picks.length!==fx.length){ bet={picks:fx.map(f=>({sel:"1",stake:0})),captain:-1}; }
  const cap=me().capital, max=cap*0.5, tot=bet.picks.reduce((a,b)=>a+(+b.stake||0),0);
  const pct=Math.min(100, max>0?tot/max*100:0), over=tot>max+0.001;
  const ok = tot>0 && !over && bet.captain>=0;
  return `<div class="box"><div class="row"><b>${dayLbl}</b><span class="chip ${iAmHome?'b':''}">${iAmHome?'🏠 Domicile':'✈️ Extérieur'}</span></div>
    <div class="row mini" style="margin-top:8px"><span class="muted">Duel vs <b>${esc(opp.name)}</b></span><span class="muted">Capital <b>${Math.round(cap)}</b> €</span></div>
    <div class="row mini" style="margin-top:6px"><span class="muted">Misé <b id="tot">${Math.round(tot)}</b> € / ${Math.round(max)} € max</span><span class="muted">👑 = Capitaine ×2</span></div>
    <div class="gauge ${over?'over':''}"><i style="width:${pct}%"></i></div></div>
    ${fx.map((f,i)=>{const b=bet.picks[i];
      const o=(v,l)=>`<div class="odd ${b.sel===v?'sel':''}" onclick="setSel(${i},'${v}')">${esc(l)}<b>${oddOf(f,v)}</b></div>`;
      return `<div class="box"><div class="row"><div class="row" style="gap:8px"><span class="sport">${f.sport}</span><b>${esc(f.home)} – ${esc(f.away)}</b></div>
        <span class="cap-tog ${bet.captain===i?'on':''}" onclick="setCap(${i})">👑</span></div>
        <div class="odds">${o("1",f.home.slice(0,7))}${f.draw?o("N","Nul"):""}${o("2",f.away.slice(0,7))}</div>
        <div class="row" style="margin-top:9px"><span class="mini muted">Mise (€)</span>
          <input type="number" min="0" step="5" value="${b.stake}" oninput="setStake(${i},this.value)"></div></div>`;}).join("")}
    <button class="btn" ${ok?'':'disabled'} onclick="submitBet()">${bet.captain<0?'Choisis ton Capitaine 👑':(over?'Mise trop élevée':'Valider mes pronostics →')}</button>`;
}
function setSel(i,v){ bet.picks[i].sel=v; render(); }
function setStake(i,v){ bet.picks[i].stake=Math.max(0,+v||0); const d=myDuel(); const max=me().capital*0.5; const tot=bet.picks.reduce((a,b)=>a+(+b.stake||0),0);
  const t=$("tot"); if(t){t.textContent=Math.round(tot); const g=document.querySelector(".gauge"); if(g){g.querySelector("i").style.width=Math.min(100,max>0?tot/max*100:0)+"%"; g.classList.toggle("over",tot>max+0.001);} }
  // enable/disable button without full re-render to keep input focus
  const btn=document.querySelector("#root .btn:last-of-type"); if(btn){ const over=tot>max+0.001; const ok=tot>0&&!over&&bet.captain>=0; btn.disabled=!ok; btn.textContent=bet.captain<0?'Choisis ton Capitaine 👑':(over?'Mise trop élevée':'Valider mes pronostics →'); }
}
function setCap(i){ bet.captain=bet.captain===i?-1:i; render(); }
async function submitBet(){
  if(busy)return; busy=true;
  try{
    const d=myDuel();
    await q(db.from("bets").upsert({league_id:L.id,day:L.current_day,player_id:S.myId,duel_id:d.id,
      picks:bet.picks,captain:bet.captain,submitted:true},{onConflict:"player_id,day"}));
    bet={picks:null,captain:-1};
    await refresh();
  }catch(e){ showErr("Validation : "+e.message); }
  busy=false;
}

/* --- waiting / resolve --- */
function humansToSubmit(){
  // players (non-AI) of current day who haven't submitted
  const need=players.filter(p=>!p.is_ai);
  return need.filter(p=>!bets.find(b=>b.player_id===p.id));
}
function viewWait(dayLbl){
  const waiting=humansToSubmit();
  const org=me()&&me().is_organizer;
  const list=players.filter(p=>!p.is_ai).map(p=>{
    const done=!!bets.find(b=>b.player_id===p.id);
    return `<div class="box row"><div class="row" style="gap:9px"><span class="sport">${p.emoji}</span><b>${esc(p.name)}</b>${p.id===S.myId?' <span class="tag">(toi)</span>':''}</div>
      <span class="chip ${done?'g':''}">${done?'✓ validé':'en cours'}</span></div>`;}).join("");
  const canResolve = waiting.length===0;
  return `<div class="box"><b>${dayLbl}</b><div class="mini muted" style="margin-top:6px">Tes pronos sont validés ✓. On attend les autres.</div></div>
    ${list}
    ${canResolve?
      (org?`<button class="btn" onclick="resolveDay()">Résoudre la journée →</button>`
          :`<div class="box mini muted" style="text-align:center">Tous les pronos sont validés — l'organisateur va lancer les résultats.</div>`)
      :`<div class="box mini muted" style="text-align:center">En attente de ${waiting.length} joueur(s).</div>`}
    ${standingsBtn()}`;
}

/* ============ RESOLUTION (host = organizer clicks) ============ */
function settle(fx,picks,captain){
  let net=0,bestOdd=0;
  picks.forEach((b,i)=>{ const f=fx[i]; const win=b.sel===f.res; const odd=oddOf(f,b.sel);
    let g=win?(+b.stake)*(odd-1):-(+b.stake); if(i===captain) g*=2;
    if(win&&odd>bestOdd) bestOdd=odd; net+=g; });
  return {net,bestOdd};
}
function aiPicks(cap,fx){
  const budget=cap*0.5*rnd(0.6,1); const ws=fx.map(()=>rnd(0.5,1.5)); const sw=ws.reduce((a,b)=>a+b,0);
  const picks=fx.map((f,i)=>{ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]];
    outs.sort((a,b)=>a[1]-b[1]); const sel=Math.random()<0.7?outs[0][0]:pick(outs)[0];
    return {sel,stake:Math.round(budget*ws[i]/sw)}; });
  return {picks,captain:Math.floor(Math.random()*fx.length)};
}
async function resolveDay(){
  if(resolving)return; resolving=true; showErr("");
  try{
    const D=L.current_day;
    // fresh guard
    const fresh=await q(db.from("leagues").select("*").eq("id",L.id).single());
    if(fresh.current_day!==D || fresh.status!=="running"){ resolving=false; await refresh(); return; }
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const dz=await q(db.from("duels").select("*").eq("league_id",L.id).eq("day",D));
    const bz=await q(db.from("bets").select("*").eq("league_id",L.id).eq("day",D));
    const N=ps.length;
    const capOf={}; ps.forEach(p=>capOf[p.id]=p.capital);
    const dayNet={}, dayBest={}, betRows=[];
    for(const d of dz){
      // ensure fixtures + AI home selection
      let fx=d.fixtures; if(!fx){ fx=genPool(5); }
      fx.forEach(f=>{ if(!f.res) f.res=simResult(f); });
      await q(db.from("duels").update({fixtures:fx,resolved:true}).eq("id",d.id));
      for(const pid of [d.home_id,d.away_id]){
        let bt=bz.find(b=>b.player_id===pid);
        if(!bt){ const ai=aiPicks(capOf[pid],fx); bt={player_id:pid,picks:ai.picks,captain:ai.captain};
          betRows.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,submitted:true}); }
        const s=settle(fx,bt.picks,bt.captain);
        dayNet[pid]=s.net; dayBest[pid]=s.bestOdd;
      }
    }
    if(betRows.length) await q(db.from("bets").upsert(betRows,{onConflict:"player_id,day"}));
    // apply nets to bets rows (net column)
    for(const pid in dayNet){ await q(db.from("bets").update({net:dayNet[pid]}).eq("league_id",L.id).eq("day",D).eq("player_id",pid)); }
    // ranking points
    const order=[...ps].sort((a,b)=>(dayNet[b.id]||0)-(dayNet[a.id]||0));
    const addPts={}; order.forEach((p,i)=>addPts[p.id]=N-i);
    // duel bonus + streaks
    const upd={}; ps.forEach(p=>upd[p.id]={points:p.points+addPts[p.id],
      capital:Math.max(0,p.capital+(dayNet[p.id]||0)), streak_w:p.streak_w, streak_l:p.streak_l,
      duel_wins:p.duel_wins, best_day:Math.max(p.best_day,dayNet[p.id]||0), best_odd:Math.max(p.best_odd,dayBest[p.id]||0)});
    for(const d of dz){ const nh=dayNet[d.home_id]||0, na=dayNet[d.away_id]||0;
      let win=null,lose=null; if(nh>na){win=d.home_id;lose=d.away_id;} else if(na>nh){win=d.away_id;lose=d.home_id;}
      if(win){ upd[win].points+=1; upd[win].duel_wins+=1; upd[win].streak_w+=1; upd[win].streak_l=0;
        if(upd[win].streak_w===3) upd[win].capital*=1.02;
        upd[lose].streak_l+=1; upd[lose].streak_w=0; } }
    // persist players
    for(const p of ps){ const u=upd[p.id]; await q(db.from("players").update({points:u.points,capital:u.capital,
      streak_w:u.streak_w,streak_l:u.streak_l,duel_wins:u.duel_wins,best_day:u.best_day,best_odd:u.best_odd}).eq("id",p.id)); }
    // advance
    const next=D+1; const done=next>=fresh.num_days;
    await q(db.from("leagues").update({current_day:done?D:next,status:done?"done":"running"}).eq("id",L.id));
    resolving=false; await refresh();
    toast("Journée résolue ✓");
  }catch(e){ showErr("Résolution : "+e.message); resolving=false; }
}

/* ============ STANDINGS ============ */
function cmp(a,b){ return b.points-a.points || b.capital-a.capital || b.duel_wins-a.duel_wins || b.best_day-a.best_day || b.best_odd-a.best_odd; }
function viewStandings(){
  const ord=[...players].sort(cmp);
  const humans=ord.filter(p=>!p.is_ai); const lastH=humans[humans.length-1];
  return `<button class="btn ghost sm" onclick="S.view='game';render()">← Retour au jeu</button>
    <h2>Classement · J${Math.min(L.current_day+1,L.num_days)}/${L.num_days}</h2>
    <div class="box" style="padding:4px 10px"><table>
      <tr><th>#</th><th>Joueur</th><th style="text-align:right">Pts</th><th style="text-align:right">Capital</th><th style="text-align:right">Série</th></tr>
      ${ord.map((p,i)=>{const s=p.streak_w>0?'🔥'+p.streak_w:(p.streak_l>0?'❄️'+p.streak_l:'–');
        return `<tr><td>${p.is_ai?'🤖':i+1}</td><td>${p.emoji} ${esc(p.name)}${p.id===S.myId?' <span class="tag">(toi)</span>':''}${p.is_ai?' <span class="tag">hors gage</span>':''}</td>
        <td class="num"><b>${p.points}</b></td><td class="num muted">${Math.round(p.capital)}€</td><td class="num">${s}</td></tr>`;}).join("")}
    </table></div>
    <div class="box mini"><span class="muted">🎭 Gage (au dernier humain) :</span> <b>${esc(L.gage)}</b> → ${lastH.emoji} ${esc(lastH.name)}</div>`;
}

/* ============ END ============ */
function viewEnd(){
  const ord=[...players].sort(cmp); const champ=ord[0];
  const humans=ord.filter(p=>!p.is_ai); const last=humans[humans.length-1];
  return `<div style="text-align:center;margin:10px 0"><div style="font-size:46px">🏆</div>
     <div style="font-size:24px;font-weight:800" class="gold">${champ.emoji} ${esc(champ.name)}, Champion !</div>
     <div class="mini muted">${champ.points} pts · ${Math.round(champ.capital)} €</div></div>
   <div class="box" style="padding:4px 10px"><table>
     <tr><th>#</th><th>Joueur</th><th style="text-align:right">Pts</th><th style="text-align:right">Capital</th></tr>
     ${ord.map((p,i)=>`<tr><td>${i+1}</td><td>${p.emoji} ${esc(p.name)}${p.is_ai?' <span class="tag">hors gage</span>':''}</td>
       <td class="num"><b>${p.points}</b></td><td class="num muted">${Math.round(p.capital)}€</td></tr>`).join("")}
   </table></div>
   <div class="box" style="border-color:#5a2b2b"><div class="row"><b class="red">🎭 Gage</b><span class="chip red">${last.emoji} ${esc(last.name)}</span></div>
     <div class="mini muted" style="margin-top:6px">${esc(last.name)} doit réaliser : <b>${esc(L.gage)}</b>.</div></div>
   <button class="btn ghost" onclick="leave()">Quitter</button>`;
}

/* ============ render / poll ============ */
function render(){
  $("leaveBtn").classList.toggle("hide", S.view==="home"||S.view==="create");
  let html="";
  if(S.view==="home") html=viewHome();
  else if(S.view==="create") html=viewCreate();
  else if(S.view==="standings") html=viewStandings();
  else html=viewGame();
  $("root").innerHTML=html;
  $("subtitle").textContent = L? (L.status==="lobby"?"Salon · "+L.code : (L.status==="done"?"Terminé":"Journée "+(L.current_day+1)+"/"+L.num_days)) : "Multijoueur en ligne";
}
function startPoll(){ if(poll) clearInterval(poll); poll=setInterval(()=>{ if(S.view==="game"||S.view==="standings") refresh(); },4000); }
function leave(){ if(!confirm("Quitter cette partie sur cet appareil ?"))return; if(poll)clearInterval(poll); clearSession(); S={view:"home",leagueId:null,myId:null,code:null}; L=null; render(); }

/* ============ boot ============ */
(function boot(){
  if(!window.supabase){ showErr("Librairie Supabase non chargée (vérifie ta connexion Internet)."); return; }
  const s=loadSession();
  if(s&&s.leagueId){ S.leagueId=s.leagueId; S.myId=s.myId; S.code=s.code; S.view="game"; startPoll(); refresh(); }
  else { S.view="home"; render(); }
})();
</script>
