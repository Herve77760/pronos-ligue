<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Maestro League</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%2314b88a'/%3E%3Ccircle cx='20' cy='20' r='13' fill='%230d3b30'/%3E%3Cline x1='14.5' y1='25.5' x2='26' y2='14' stroke='%235fe3bf' stroke-width='2.4' stroke-linecap='round'/%3E%3Ccircle cx='14' cy='26' r='2.8' fill='%235fe3bf'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0e1220; --panel:#161c2b; --panel2:#1d2537; --border:#2a3350;
    --ink:#eef2fb; --muted:#93a0bd; --faint:#5f6d8c;
    --accent:#19c58c; --accent-ink:#052a1e;
    --green:#4bd07f; --red:#f36a60; --gold:#f2c451; --blue:#67a6f2;
    --r:16px; --shadow:0 1px 2px rgba(0,0,0,.28),0 8px 24px rgba(0,0,0,.30);
  }
  :root[data-theme="light"]{
    --bg:#eef1f6; --panel:#ffffff; --panel2:#f4f6fa; --border:#e3e8f1;
    --ink:#161d2b; --muted:#69748c; --faint:#9aa4b8;
    --accent:#0e9e70; --accent-ink:#ffffff;
    --green:#1f9d54; --red:#d83f36; --gold:#b9820f; --blue:#2f77d6;
    --shadow:0 1px 2px rgba(20,29,43,.05),0 8px 22px rgba(20,29,43,.07);
  }
  *{box-sizing:border-box}
  /* overflow-x sur html AUSSI : sur iOS, la regle posee seulement sur body ne bloque pas
     le defilement lateral — on pouvait faire glisser la page de quelques pixels. */
  html,body{overflow-x:hidden;}
  /* touch-action:manipulation → supprime le zoom au DOUBLE-TAP (signalé par Hervé) sans toucher au
     pinch-zoom volontaire, qui reste autorisé pour l'accessibilité (cf. note sur le <meta viewport>). */
  html{touch-action:manipulation;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    /* un pseudo ou un gage personnalise sans espace ne doit pas elargir la page */
    overflow-wrap:break-word;}
  .num,td.num,.big,.code{font-variant-numeric:tabular-nums;}
  .app{max-width:540px;margin:0 auto;padding:20px 16px 64px;}
  h1{font-size:21px;margin:0;letter-spacing:-.4px;font-weight:800;}
  h2{font-size:15px;margin:22px 4px 10px;letter-spacing:.01em;}
  .sub{color:var(--muted);font-size:12.5px;}
  .bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .topbtns{display:flex;gap:8px;width:100%;margin-top:2px;}
  .topbtns .btn{flex:1 1 0;min-width:0;padding-left:0;padding-right:0;text-align:center;}
  .box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:12px 0;box-shadow:var(--shadow);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  /* Sans ceci, un enfant de flex garde min-width:auto : il refuse de retrecir sous la largeur
     de son contenu et POUSSE la ligne hors de l'ecran (mesure : +190px avec un nom long). */
  .row>*{min-width:0;}
  .muted{color:var(--muted);} .green{color:var(--green);} .red{color:var(--red);}
  .gold{color:var(--gold);} .blue{color:var(--blue);} .mini{font-size:12px;}
  .btn{background:var(--accent);color:var(--accent-ink);font-weight:700;border:none;border-radius:12px;
    padding:14px;width:100%;font-size:15px;cursor:pointer;transition:opacity .15s,transform .05s;}
  .btn:active{transform:scale(.99);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--ink);}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px;}
  /* 16px MINIMUM sur tout champ saisissable — ce n'est pas un choix esthétique.
     iOS Safari ZOOME automatiquement la page quand on touche un champ dont la police fait moins de
     16px, et il ne dézoome pas ensuite. À 15px, saisir une mise suffisait à laisser la page à
     ×1,07 : la fenêtre visible passait à 366px pour une mise en page de 390px, d'où 24px hors
     écran et un défilement latéral permanent. Diagnostiqué le 19/07/2026 grâce au rapport 🐛
     d'Hervé (« Zoom ×1.07 · zone visible 366px » alors que « contenu 390px / fenêtre 390px (ok) »),
     après deux tentatives infructueuses côté mise en page — qui n'était pas en cause.
     Ne JAMAIS redescendre sous 16px ici, et ne pas « corriger » avec maximum-scale=1 dans le
     <meta viewport> : ça empêcherait aussi le zoom volontaire, au détriment de l'accessibilité. */
  input,select,textarea{font-size:16px;}
  input,select{background:var(--panel2);border:1px solid var(--border);color:var(--ink);
    border-radius:10px;padding:12px;width:100%;}
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  input[type=number]{width:84px;text-align:right;}
  label{font-size:13px;color:var(--muted);display:block;margin:10px 0 4px;}
  .chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
  .chip.g{background:color-mix(in srgb,var(--green) 15%,transparent);border-color:color-mix(in srgb,var(--green) 42%,transparent);color:var(--green);}
  .chip.b{background:color-mix(in srgb,var(--blue) 15%,transparent);border-color:color-mix(in srgb,var(--blue) 42%,transparent);color:var(--blue);}
  .chip.gold{background:color-mix(in srgb,var(--gold) 17%,transparent);border-color:color-mix(in srgb,var(--gold) 45%,transparent);color:var(--gold);}
  .chip.red{background:color-mix(in srgb,var(--red) 15%,transparent);border-color:color-mix(in srgb,var(--red) 42%,transparent);color:var(--red);}
  .ptpill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;
    background:color-mix(in srgb,var(--gold) 16%,transparent);color:var(--gold);}
  .ptpill.zero{background:color-mix(in srgb,var(--muted) 14%,transparent);color:var(--muted);}
  .sport{width:26px;height:26px;border-radius:8px;background:var(--panel2);display:inline-flex;
    align-items:center;justify-content:center;font-size:14px;flex:0 0 auto;}
  .odds{display:flex;gap:7px;margin-top:10px;}
  .odd{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:10px;
    padding:8px 2px;text-align:center;font-size:12px;cursor:pointer;line-height:1.3;}
  .odd b{display:block;font-size:13px;}
  .odd.sel{background:color-mix(in srgb,var(--green) 14%,transparent);border-color:var(--green);color:var(--green);}
  .gauge{height:8px;border-radius:6px;background:var(--panel2);overflow:hidden;margin-top:8px;}
  .gauge>i{display:block;height:100%;background:var(--green);}
  .gauge.over>i{background:var(--red);}
  .tog{font-size:11px;border:1px solid var(--border);border-radius:9px;padding:6px 9px;cursor:pointer;color:var(--muted);}
  .tog.cap.on{background:color-mix(in srgb,var(--gold) 16%,transparent);border-color:var(--gold);color:var(--gold);}
  .tog.tgt.on{background:color-mix(in srgb,var(--blue) 16%,transparent);border-color:var(--blue);color:var(--blue);}
  .cards{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .cardchip{border:1px solid var(--border);background:var(--panel2);border-radius:12px;padding:9px 11px;
    font-size:12px;cursor:pointer;text-align:center;min-width:76px;}
  .cardchip.on{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);color:var(--blue);}
  .cardchip .em{font-size:19px;display:block;margin-bottom:2px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  /* Les 6 tableaux vivent deja dans un conteneur `overflow-x:auto` : ils defilent CHEZ EUX et ne
     peuvent pas elargir la page. Donc surtout PAS de `overflow-wrap:anywhere` ici — ca coupait les
     mots n'importe ou dans des colonnes etroites (« DU/EL », « P/T/S », « 11 » sur deux lignes,
     « 109.7 / 1€ »). Entetes et nombres restent insecables. */
  /* Les nombres ne se coupent JAMAIS — dans un tableau comme ailleurs. Sans `.num` ici, une valeur
     placée dans une .row (dont les enfants peuvent rétrécir depuis la v4.53) se faisait couper par
     `overflow-wrap:break-word` : « 13 » s'affichait sur deux lignes (repéré par Hervé sur l'admin). */
  /* `flex-shrink:0` en plus du nowrap : dans une .row, c'est le LIBELLÉ qui doit céder de la place,
     jamais la valeur. Sans ça, le libellé long pousse et la valeur se fait comprimer sous sa propre
     largeur (les enfants de .row peuvent rétrécir depuis la v4.53). Inerte sur un <td>. */
  th,.num{white-space:nowrap;}
  .row>.num{flex:0 0 auto;}
  th,td{padding:9px 6px;border-bottom:1px solid var(--border);text-align:left;}
  tr:last-child td{border-bottom:none;}
  th{color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;}
  td.num{text-align:right;}
  .hide{display:none;}
  .code{font-size:30px;letter-spacing:7px;font-weight:800;color:var(--accent);text-align:center;}
  .tag{font-size:10px;color:var(--muted);}
  .foot{color:var(--faint);font-size:11px;text-align:center;margin-top:24px;}
  .err{background:color-mix(in srgb,var(--red) 12%,transparent);border:1px solid color-mix(in srgb,var(--red) 40%,transparent);
    color:var(--red);border-radius:10px;padding:10px 12px;margin:10px 0;font-size:13px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:var(--panel2);
    border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:50;box-shadow:var(--shadow);color:var(--ink);}
  @keyframes tradepulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:.5}}
  .tradebadge{display:inline-block;margin-left:1px;padding:0 5px;border-radius:9px;background:#e5484d;color:#fff;font-size:11px;font-weight:800;line-height:16px;vertical-align:super;animation:tradepulse 1s ease-in-out infinite;}
  @media (prefers-reduced-motion:reduce){.tradebadge{animation:none}}
  .prem{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.3px;padding:2px 7px;border-radius:999px;background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);white-space:nowrap;vertical-align:middle;cursor:pointer;}
  a{color:var(--blue);}
  .big{font-size:30px;font-weight:800;letter-spacing:-.5px;}
  .recaphero{border-radius:var(--r);padding:18px;border:1px solid var(--border);background:var(--panel);box-shadow:var(--shadow);margin:12px 0;}
  .recaphero.win{background:color-mix(in srgb,var(--green) 9%,var(--panel));border-color:color-mix(in srgb,var(--green) 45%,var(--border));}
  .recaphero.loss{background:color-mix(in srgb,var(--red) 9%,var(--panel));border-color:color-mix(in srgb,var(--red) 45%,var(--border));}
  .qbar{display:flex;gap:10px;overflow-x:auto;padding:2px 0 8px;margin:8px 0 2px;-webkit-overflow-scrolling:touch;}
  .qbtn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;width:64px;background:none;border:none;padding:0;cursor:pointer;}
  .qbtn .ic{width:52px;height:52px;border-radius:16px;background:var(--panel);border:1px solid var(--border);display:grid;place-items:center;font-size:22px;box-shadow:var(--shadow);}
  .qbtn .lb{font-size:11px;color:var(--muted);font-weight:600;text-align:center;line-height:1.15;}
  .qbtn:active .ic{transform:scale(.96);}
  .qbtn.on .ic{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,var(--panel));}
  .qbtn.on .lb{color:var(--ink);}
  .modal{position:fixed;inset:0;background:rgba(4,6,12,.62);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .mbox{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:22px;max-width:340px;width:100%;text-align:center;box-shadow:var(--shadow);}
  .clik{cursor:pointer;}
  .bem{font-size:1.35em;line-height:1;vertical-align:-2px;}
</style>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('pl_theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}</script>

  <div class="bar">
    <div><h1 style="display:flex;align-items:center;gap:8px"><svg viewBox="0 0 40 40" width="30" height="30" style="flex:0 0 auto" aria-hidden="true"><circle cx="20" cy="20" r="18" fill="#14b88a"/><circle cx="20" cy="20" r="18" fill="none" stroke="#5fe3bf" stroke-width="3.4" stroke-dasharray="4 5"/><circle cx="20" cy="20" r="12.3" fill="#0d3b30"/><line x1="15" y1="25" x2="25.6" y2="14.4" stroke="#5fe3bf" stroke-width="2.1" stroke-linecap="round"/><circle cx="14.4" cy="25.6" r="2.5" fill="#5fe3bf"/></svg><span>The <span style="color:var(--accent)">Maestro</span> League</span></h1><div class="sub" id="subtitle">Multijoueur en ligne</div></div>

</div>

<script>

/* ============ CONSTANTS ============ */
const EMOJIS=["👑","🎩","🕶️","🃏","🎲","🎯","🎱","♠️","♥️","♦️","♣️","💎","💰","💵","🤑","🏆","🏅","🥂","🍾","🔥","⚡","🚀","🐺","🦈","🦅","🐉","🦂","♟️","💣","🎰"];

const GAGES=[
 {t:"Le plongeon givré 🥶", d:"Se baigner en maillot dans une eau bien froide (mer, lac ou douche glacée), vidéo à l'appui."},
 {t:"Karaoké sauvage 🎤", s:1, d:"Chanter en public une chanson kitsch choisie par le groupe, sans se dégonfler."},

// Récompenses (enjeu "reward") : décernées au VAINQUEUR (au lieu d'un gage au dernier).
const REWARDS=[

function gageDescOf(t){ const n=s=>(s||'').replace(/[^\p{L}]/gu,'').toLowerCase(); const g=GAGES.concat(REWARDS).find(x=>n(x.t)===n(t)); return g?g.d:''; }
const CARDS={

 // Retiré du jeu (choix d'Hervé) : faisait double emploi avec 🩸 Sangsue. On le RETIRE au lieu de

  const p=await fetchRealPool(); poolCache=p; poolCacheAt=Date.now(); return p.slice();
}
const STALE_MATCH_H=24; // h après le coup d'envoi prévu → match non terminé réputé ANNULÉ (mises rendues)
// Récupère les résultats réels (scores) par compétition → map evId -> {completed, res(1/N/2)}.
async function fetchRealResults(sportKeys){
  const map={};
  for(const k of sportKeys){ try{ const r=await fetch(`${ODDS_BASE}/sports/${k}/scores/?apiKey=${ODDS_KEY}&daysFrom=3&dateFormat=iso`);
    if(!r.ok) continue; const arr=await r.json();
    arr.forEach(ev=>{ const done=!!ev.completed; let res=null;
      if(done && Array.isArray(ev.scores)){ const sc=n=>{ const o=ev.scores.find(x=>x.name===n); return o!=null?parseFloat(o.score):null; };
        const h=sc(ev.home_team), a=sc(ev.away_team);
        if(h!=null&&a!=null&&!isNaN(h)&&!isNaN(a)) res=(h>a?"1":(h<a?"2":"N")); }
      map[ev.id]={completed:done, res};
    });
  }catch(e){} }
  return map;
}
// Résout une journée en DONNÉES RÉELLES quand TOUS les vrais matchs sont terminés (throttle 10 min pour le quota).
async function resolveRealIfReady(){
  if(!L||L.data_mode!=="real"||L.status!=="running"||S.recap||resolving) return;
  const realDuels=duels.filter(d=>Array.isArray(d.fixtures)&&d.fixtures.some(f=>f&&f.evId));
  if(!realDuels.length) return;
  // Multi-duels : chaque duel a SES propres matchs → on attend que TOUS les duels aient leurs matchs
  // et que TOUS les matchs de la ligue soient terminés avant d'afficher/calculer quoi que ce soit.
  if(duels.some(d=>!Array.isArray(d.fixtures)||!d.fixtures.length)) return;
  const times=realDuels.flatMap(d=>d.fixtures).filter(f=>f&&f.commence).map(f=>new Date(f.commence).getTime());
  if(!times.length || Math.min.apply(null,times)>Date.now()) return; // aucun match commencé
  if(Date.now()-lastRealCheck < 1200000) return; lastRealCheck=Date.now(); // 20 min (était 10) — mitigation quota
  const keys=[...new Set(realDuels.flatMap(d=>d.fixtures).filter(f=>f&&f.evId).map(f=>f.sportKey))];
  const results=await fetchRealResults(keys);
  // ⏱️ AUTO-ANNULATION (v4.46) : un match toujours pas terminé plus de STALE_MATCH_H heures après son
  // coup d'envoi PRÉVU est réputé ANNULÉ (reporté / abandonné / jamais joué). Seuil très au-delà de la
  // durée d'un match (foot 2 h, tennis ≤ 5 h) et de tout retard de flux → aucun risque d'annuler un
  // match réellement joué. Rend le traitement AUTOMATIQUE : plus aucun geste de l'organisateur, qui
  // aurait pu s'avantager en annulant un match où il perdait.
  const nowT=Date.now();
  for(const d of realDuels){ let touched=false;
    const nf=(d.fixtures||[]).map(f=>{ if(!f||!f.evId||f.canceled) return f;
      const r=results[f.evId]; if(r&&r.completed) return f;
      const t0=f.commence?new Date(f.commence).getTime():NaN;
      if(!isNaN(t0) && nowT > t0 + STALE_MATCH_H*3600000){ touched=true; return Object.assign({},f,{canceled:true,res:null}); }
      return f; });
    if(touched){ try{ await q(db.from("duels").update({fixtures:nf}).eq("id",d.id)); d.fixtures=nf; }catch(e){} } }
  let allDone=true;
  // Un match ANNULÉ compte comme terminé : sinon une journée resterait bloquée indéfiniment.
  realDuels.forEach(d=>d.fixtures.forEach(f=>{ if(f&&f.evId&&!f.canceled){ const r=results[f.evId]; if(!r||!r.completed) allDone=false; } }));
  if(!allDone) return; // il reste des matchs en cours
  for(const d of realDuels){ const fx=d.fixtures.map(f=>{ if(f&&f.evId){ const r=results[f.evId]; if(r&&r.res) return Object.assign({},f,{res:r.res}); } return f; });
    try{ await q(db.from("duels").update({fixtures:fx}).eq("id",d.id)); }catch(e){} }
  resolveDay();
}
// Échéances du jour courant. sel = fin sélection ; bet = clôture des paris.
// Dès que tous les matchs sont choisis (bet_started_at), la clôture des paris = bet_started_at + delai (max 24h / 12h fast).
function dayTimes(){ const f=leagueFormula(); const t0=(L&&L.day_started_at)?new Date(L.day_started_at).getTime():0;
  if(!t0||isNaN(t0)) return {ok:false,sel:0,bet:0};
  const sel=t0+f.sel*3600000;
  const bs=(L&&L.bet_started_at)?new Date(L.bet_started_at).getTime():0;
  const bet=(bs&&!isNaN(bs))?(bs+f.bet*3600000):(t0+(f.sel+f.bet)*3600000);
  return {ok:true, sel, bet}; }
// La clôture des pronos est-elle passée ? (au-delà, on ne peut plus modifier et les pronos adverses sont révélés)
function deadlinePassed(){ const dt=dayTimes(); return !!(dt.ok && Date.now()>=dt.bet); }
// Simulé : les matchs fictifs doivent être « joués » (coup d'envoi + 2h) avant de publier les résultats — même
// déroulé qu'en réel (clôture → écran d'attente → résultats). Fixtures sans horaire (anciennes journées) = ignorées.
function simMatchesDone(){ const dz=duels||[]; if(!dz.length) return false; const now=Date.now();
  for(const d of dz){ for(const f of (d.fixtures||[])){ if(!f||f.evId) continue; const ts=fixtureKickoff(f);
    if(ts!=null && now < ts+2*3600000) return false; } }
  return true; }
function fmtWhen(ts){ if(!ts) return ""; const d=new Date(ts); const now=new Date(); const loc=lang==="en"?'en-GB':'fr-FR'; const hm=d.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'});
  const sameDay=d.toDateString()===now.toDateString(); const tomorrow=new Date(now.getTime()+86400000).toDateString()===d.toDateString();
  return (sameDay?t("aujourd'hui"):(tomorrow?t("demain"):d.toLocaleDateString(loc,{weekday:'short',day:'2-digit',month:'2-digit'})))+" "+hm; }
// Coup d'envoi d'un match : réel = f.commence (absolu) ; fictif = clôture des paris + f.ko heures. Renvoie un timestamp (ms) ou null.
function fixtureKickoff(f){ if(!f) return null;
  if(f.commence){ const ts=new Date(f.commence).getTime(); return isNaN(ts)?null:ts; }
  if(f.ko!=null){ const dt=dayTimes(); if(dt.ok&&dt.bet) return dt.bet + f.ko*3600000; }
  return null; }
// Étiquette « 🕐 demain 19:35 » (vide si l'heure est inconnue). Arrondi 5 min pour un rendu propre.
function koLabel(f){ let ts=fixtureKickoff(f); if(!ts) return ""; ts=Math.round(ts/300000)*300000; return `<span class="mini muted">🕐 ${esc(fmtWhen(ts))}</span>`; }
// Le match i porte-t-il le logo de la carte ? (gère les cartes à 2 cibles comme le Coup Double → logo sur les 2 matchs)
function cardOnMatch(card,i){ return !!(card&&card.id&&(card.target===i||(CARDS[card.id]&&CARDS[card.id].two&&card.target2===i))); }
function selLineHTML(){ const dt=dayTimes(); return dt.ok?`<div class="mini muted" style="margin-top:4px">⏳ ${t("Choix des matchs avant {a}",{a:'<b>'+fmtWhen(dt.sel)+'</b>'})} · ${leagueFormula().n}</div>`:''; }
function betLineHTML(){ const dt=dayTimes(); return dt.ok?`<div class="mini muted" style="margin-top:4px">⏳ ${t("Clôture des paris {a}",{a:'<b>'+fmtWhen(dt.bet)+'</b>'})} · ${leagueFormula().n}</div>`:''; }

  "Bien plus qu'un jeu de pronos : un <b>championnat entre amis</b> où la <b>stratégie</b> fait la différence. Tu gères un <b>capital</b>, tu remportes des <b>bonus</b> aux enchères (doubler une mise, siphonner l'adversaire, lui <b>voler</b> une carte…), et un seul coup peut provoquer un <b>retournement</b>. Sans argent réel — et à la fin, le <b>dernier fait un gage</b>, le <b>champion</b> soulève la coupe. 🎉":"Far more than a prediction game: a <b>championship among friends</b> where <b>strategy</b> makes the difference. You manage a <b>balance</b>, win <b>bonuses</b> at auction (double a stake, siphon your opponent, <b>steal</b> their card…), and a single move can trigger a <b>turnaround</b>. No real money — and at the end, the <b>last-placed player does a forfeit</b>, the <b>champion</b> lifts the cup. 🎉",

  "Pas besoin d'email : choisis un pseudo + un mot de passe. Ton compte te permet de <b>retrouver toutes tes ligues</b>, depuis n'importe quel appareil.":"No email needed: pick a username + a password. Your account lets you <b>find all your leagues</b>, from any device.",
  "📖 Découvrir le jeu (règles)":"📖 Discover the game (rules)", "Tu peux lire les règles avant de créer un compte.":"You can read the rules before creating an account.",
  // --- Mode solo contre l'IA ---
  "Le vainqueur du duel est celui au <b>meilleur résultat net</b> (gains − mises).<br>Points = <b>résultat</b> (victoire <b>2</b>, nul <b>1</b>, défaite <b>0</b>) <b>+ 1 pt</b> si ton net est positif.<br>• Victoire : <b>3 pts</b> (net positif) ou <b>2 pts</b>.<br>• Match nul : <b>2 pts</b> (net positif) ou <b>1 pt</b>.<br>• Défaite : <b>1 pt</b> (net positif) ou <b>0 pt</b>.<br>• Oubli des pronos : <b>−1 pt</b>.":"The duel is won by the <b>best net result</b> (winnings − stakes).<br>Points = <b>result</b> (win <b>2</b>, draw <b>1</b>, loss <b>0</b>) <b>+ 1 pt</b> if your net is positive.<br>• Win: <b>3 pts</b> (positive net) or <b>2 pts</b>.<br>• Draw: <b>2 pts</b> (positive net) or <b>1 pt</b>.<br>• Loss: <b>1 pt</b> (positive net) or <b>0 pt</b>.<br>• Missed picks: <b>−1 pt</b>.",
  "Pas de validation à temps → <b>aucun pari pris en compte</b> (pas de reprise des pronos adverses), <b>{b} pt</b> au classement et <b>−{a} % du capital</b>.":"No confirmation in time → <b>no bet counted</b> (your opponent's picks are not reused), <b>{b} pt</b> in the standings and <b>−{a} % of your balance</b>.",
  "Points : <b>résultat</b> (victoire <b>2</b>, nul <b>1</b>, défaite <b>0</b>) <b>+ 1 pt</b> si ton net est positif. Soit <b>3 pts</b> au mieux, <b>0</b> au pire.":"Points: <b>result</b> (win <b>2</b>, draw <b>1</b>, loss <b>0</b>) <b>+ 1 pt</b> if your net is positive. So <b>3 pts</b> at best, <b>0</b> at worst.",
  "Points = <b>résultat</b> (victoire <b>2</b>, nul <b>1</b>, défaite <b>0</b>) <b>+ 1 pt</b> si ton net est positif.<br>Soit : victoire <b>3</b> ou <b>2</b> · nul <b>2</b> ou <b>1</b> · défaite <b>1</b> ou <b>0</b>. ⚠️ Un net de <b>0 €</b> (par exemple si tous les matchs du jour sont annulés) ne donne <b>pas</b> le point de bonus.":"Points = <b>result</b> (win <b>2</b>, draw <b>1</b>, loss <b>0</b>) <b>+ 1 pt</b> if your net is positive.<br>So: win <b>3</b> or <b>2</b> · draw <b>2</b> or <b>1</b> · loss <b>1</b> or <b>0</b>. ⚠️ A net of <b>€0</b> (for example if every match of the day is cancelled) does <b>not</b> earn the bonus point.",
  "Ton adversaire, lui, <b>gagne le duel</b> — mais uniquement <b>3 pts</b> si son net est positif, <b>2 pts</b> sinon. Il ne peut pas perdre d'argent à cause de ton absence.":"Your opponent <b>wins the duel</b> — but only <b>3 pts</b> if their net is positive, <b>2 pts</b> otherwise. They cannot lose money because of your absence.",
  "Tu prends <b>{b} pt</b> au classement et tu perds <b>{a} %</b> de ton capital.":"You take <b>{b} pt</b> in the standings and lose <b>{a} %</b> of your balance.",
  "Chaque journée, le joueur au <b>meilleur gain net de toute la ligue</b> gagne <b>+1 point bonus</b> (en plus des points de duel). En cas d'égalité : on départage par le plus gros gain.":"Each day, the player with the <b>best net result in the whole league</b> earns a <b>+1 bonus point</b> (on top of the duel points). Ties are broken by the biggest winnings.",
  "<b>Départage au classement final</b> (à points égaux) : <b>cagnotte</b>, puis le <b>résultat des confrontations directes</b> entre les joueurs concernés, puis plus gros gain, puis plus grosse cote.":"<b>Final standings tie-break</b> (equal points): <b>balance</b>, then the <b>head-to-head record</b> between the players involved, then biggest win, then biggest odds.",
  "La liste proposée contient <b>{a} rencontres</b>, dont environ <b>{b} % de football</b> — le reste (tennis, basket, rugby) pour la variété. S'il n'y a pas assez de football disponible, le complément vient des autres sports. ⚽ étant le seul sport à <b>3 issues</b>, c'est lui qui rend la carte 🎲 Double Chance jouable.":"The list offers <b>{a} fixtures</b>, of which about <b>{b} % football</b> — the rest (tennis, basketball, rugby) for variety. If there isn't enough football available, the remainder comes from the other sports. ⚽ being the only sport with <b>3 outcomes</b>, it is what makes the 🎲 Double Chance card playable.",

  "<b>L'acheteur a déjà validé son pari du jour.</b> L'échange est donc bloqué jusqu'à la résolution.":"<b>The buyer has already confirmed today's bet.</b> The exchange is therefore blocked until the day is resolved.",
  "Un échange n'est possible qu'<b>entre deux journées</b> : tant qu'un pari du jour est validé, la carte pourrait encore être jouée le même jour — elle serait alors utilisée deux fois.":"An exchange is only possible <b>between two matchdays</b>: while a bet for the day is confirmed, the card could still be played that same day — it would then be used twice.",

  "Tu n'as pas validé tes pronos avant la clôture : <b>aucun pari</b> n'est pris en compte ce jour-là → <b>{b} pt</b> au classement et <b>−{a} %</b> de ton capital. Tu peux quand même suivre les paris des autres ci-dessous.":"You didn't confirm your picks before the deadline: <b>no bet</b> counts that day → <b>{b} pt</b> in the standings and <b>−{a} %</b> of your balance. You can still follow everyone else's bets below.",

  "🚫 Un match a été annulé ? (organisateur)":"🚫 A match was cancelled? (organiser)", "Un match a été annulé ?":"A match was cancelled?",
  "Aucun match à annuler.":"No match to cancel.",
  "Choisis le match annulé ou reporté. Les mises de tous les joueurs qui l'avaient joué seront <b>remboursées</b>, et le bonus qui le visait leur sera <b>rendu</b>.":"Pick the cancelled or postponed match. The stakes of every player who bet on it will be <b>refunded</b>, and the bonus that targeted it will be <b>given back</b>.",
  "Annuler ce match ? Les mises seront remboursées et les bonus qui le visaient rendus. Action irréversible.":"Cancel this match? Stakes will be refunded and the bonuses targeting it given back. This cannot be undone.",
  "Match annulé — mises remboursées.":"Match cancelled — stakes refunded.",
  "🚫 <b>Match annulé, reporté ou abandonné</b> : si un match n'est toujours pas terminé <b>{a} h</b> après son coup d'envoi prévu, il est <b>automatiquement</b> considéré comme annulé. La <b>mise est rendue</b> (ni gain ni perte, comme si le pari n'avait pas eu lieu) et le <b>bonus qui visait ce match t'est rendu</b>. C'est automatique : personne ne décide, donc personne ne peut en profiter.":"🚫 <b>Cancelled, postponed or abandoned match</b>: if a match still isn't finished <b>{a} h</b> after its scheduled kick-off, it is <b>automatically</b> treated as cancelled. The <b>stake is refunded</b> (no gain, no loss — as if the bet never happened) and the <b>bonus that targeted it is given back</b>. It's automatic: nobody decides, so nobody can take advantage of it.",
  "🚫 Si un match n'est toujours pas terminé <b>{a} h</b> après son coup d'envoi prévu, il est <b>automatiquement considéré comme annulé</b> : les mises sont rendues et le bonus qui le visait aussi. Aucune intervention nécessaire.":"🚫 If a match still isn't finished <b>{a} h</b> after its scheduled kick-off, it is <b>automatically treated as cancelled</b>: stakes are refunded, and so is the bonus that targeted it. No action needed.",
  "⚠️ <b>Conséquence assumée</b> : un match <b>reporté puis rejoué plus tard</b> (météo, terrain impraticable, décision de la fédération…) est lui aussi traité comme annulé. Il <b>ne comptera pas</b> dans la journée, même s'il finit par se jouer — le championnat n'attend pas.":"⚠️ <b>A deliberate trade-off</b>: a match that is <b>postponed and replayed later</b> (weather, unplayable pitch, federation decision…) is also treated as cancelled. It <b>will not count</b> for that day, even if it eventually gets played — the championship doesn't wait.",
  "🚫 Match non terminé <b>{a} h</b> après l'heure prévue (annulé, reporté, abandonné) : <b>mise rendue</b> et bonus rendu. Il ne compte pas, <b>même s'il est rejoué plus tard</b>.":"🚫 A match not finished <b>{a} h</b> after its scheduled time (cancelled, postponed, abandoned): <b>stake refunded</b> and bonus given back. It doesn't count, <b>even if it's replayed later</b>.",
  "Clôturer les inscriptions ? Plus personne ne pourra rejoindre, et la préparation (vote + enchères sur les bonus) commencera.":"Close registrations? Nobody else will be able to join, and the preparation (vote + bonus auction) will begin.",
  "Clôturer les inscriptions ? Plus personne ne pourra rejoindre. Vous êtes en nombre impair : un 🤖 joueur IA sera ajouté pour équilibrer, puis la préparation commencera.":"Close registrations? Nobody else will be able to join. You're an odd number: a 🤖 AI player will be added to balance things out, then the preparation will begin.",

  "En cours de championnat, tu peux proposer une somme à un adversaire pour lui <b>racheter une carte</b> qu'il a encore en main. Il accepte ou refuse ; s'il accepte, la carte est à toi et le montant lui est versé. Possible tant que tu n'as pas validé ton pari du jour, en gardant au moins <b>{a} €</b> pour continuer à parier.":"During the championship, you can offer an opponent a sum to <b>buy back a card</b> they still hold. They accept or decline; if they accept, the card is yours and the amount is paid to them. Possible as long as you haven't locked your bet for the day, keeping at least <b>€{a}</b> to keep betting.",
  "En cours de championnat, tu peux <b>racheter une carte bonus</b> à un adversaire, contre une somme de ton capital (monnaie virtuelle).":"During the championship, you can <b>buy back a bonus card</b> from an opponent, for a sum of your (virtual) capital.",
  "Tu proposes un prix ; l'autre est <b>libre d'accepter ou de refuser</b>. S'il accepte, la carte passe dans ta main et le montant lui est <b>transféré</b> — rien n'est créé, rien ne disparaît.":"You propose a price; the other player is <b>free to accept or decline</b>. If they accept, the card moves to your hand and the amount is <b>transferred</b> to them — nothing is created, nothing disappears.",
  "On ne rachète que des cartes <b>encore en main</b> : jamais une carte déjà jouée, ni une carte engagée pour la journée en cours.":"Only cards <b>still in hand</b> can be bought back: never an already-played card, nor a card committed for the current day.",
  "Tu peux aussi <b>vendre</b> une de tes cartes à un joueur (il paie, il la reçoit) — pratique pour te refaire du capital.":"You can also <b>sell</b> one of your cards to a player (they pay, they receive it) — handy to rebuild your capital.",
  "⏳ <b>Quand ?</b> Un échange n'est possible <b>qu'entre deux journées</b> : tant que <b>ni le vendeur ni l'acheteur</b> n'a validé son pari du jour. Dès qu'un pari est verrouillé, les échanges le concernant sont gelés jusqu'à la résolution (ça protège la règle du capital jamais négatif et évite qu'une carte soit vendue et jouée en même temps).":"⏳ <b>When?</b> A trade is only possible <b>between days</b>: as long as <b>neither the seller nor the buyer</b> has locked their bet for the day. Once a bet is locked, trades involving that player are frozen until resolution (this protects the never-negative-capital rule and prevents a card being sold and played at the same time).",
  "On n'échange que des cartes <b>encore en main</b>, et l'acheteur doit garder au moins <b>{a} €</b> pour pouvoir miser.":"Only cards <b>still in hand</b> can be traded, and the buyer must keep at least <b>€{a}</b> to be able to bet.",
  "Tu ne peux pas racheter <b>tant que ton pari du jour est validé</b> (cela protège la règle du capital jamais négatif), et le prix doit te laisser au moins <b>{a} €</b> pour pouvoir encore miser.":"You can't buy back <b>while your bet for the day is locked</b> (this protects the never-negative-capital rule), and the price must leave you at least <b>€{a}</b> to keep betting.",
  "Tu es <b>prévenu</b> quand ton offre est acceptée ou refusée, et le bouton 🤝 signale les offres qu'on t'a faites.":"You are <b>notified</b> when your offer is accepted or declined, and the 🤝 button flags the offers made to you.",

  "Joker":"Joker", "Un 2ᵉ pari devient Capitaine (gains et pertes doublés) en plus du tien.":"A 2nd bet becomes Captain (gains and losses doubled) on top of yours.",
  "Voleur":"Thief", "Tu prends le bonus que ton adversaire a joué ce jour-là : il ne s'applique pas, et la carte passe dans ta main pour une prochaine journée. ⚠️ Si ton adversaire ne joue aucun bonus ce jour-là, le Voleur ne sert à rien et est perdu. Sans intérêt non plus à la dernière journée : tu n'auras plus l'occasion de jouer ta prise.":"You take the bonus your opponent played that day: it doesn't apply, and the card moves into your hand for a future matchday. ⚠️ If your opponent plays no bonus that day, the Thief is wasted and lost. Pointless too on the last matchday: you'll never get to play what you took.",
  "Clone":"Clone", "Tu rejoues à l'identique le bonus que ton adversaire a joué ce jour-là — sur le même match s'il était ciblé. ⚠️ Si ton adversaire ne joue aucun bonus ce jour-là (ou joue le 🥷 Voleur, ou 📈 Investisseur), le Clone ne sert à rien et est perdu.":"You replay the exact bonus your opponent played that day — on the same match if it was targeted. ⚠️ If your opponent plays no bonus that day (or plays 🥷 Thief, or 📈 Investor), the Clone is wasted and lost.",
  "🥷 Bonus pris à {a} : son {b} n'a pas été appliqué, et la carte est passée dans ta main.":"🥷 Bonus taken from {a}: their {b} was not applied, and the card moved into your hand.",

  "🕵️ <b>L'opportuniste :</b> {N} a flairé les bons coups : <b>{w}</b> bonus sur {b} tenté{s}.":"🕵️ <b>The opportunist:</b> {N} sniffed out the good ones: <b>{w}</b> bonuses from {b} attempt{s}.",
  "🦈 <b>Le requin :</b> {N} a mordu <b>{w}</b> fois sur {b}. Les autres ont suivi le sang.":"🦈 <b>The shark:</b> {N} bit <b>{w}</b> times out of {b}. The others followed the blood.",
  "🤪 <b>Le plus fou :</b> {N} — <b>{mb}€</b> d'un coup sur {cl}. Le poker, ça le connaît.":"🤪 <b>The wildest:</b> {N} — <b>{mb}€</b> in one go on {cl}. Knows poker inside out.",
  "🔥 <b>Le flambeur :</b> {N} a balancé <b>{mb}€</b> sur {cl}. Tout ou rien !":"🔥 <b>The high roller:</b> {N} slammed <b>{mb}€</b> on {cl}. All or nothing!",
  "🎰 <b>Le parieur fou :</b> <b>{mb}€</b> d'un seul coup sur {cl} pour {N}. Respect (ou pas).":"🎰 <b>The mad bettor:</b> <b>{mb}€</b> in a single shot on {cl} for {N}. Respect (or not).",
  "💸 <b>Le mégalo :</b> {N} claque <b>{mb}€</b> sur {cl}. Y'a pas de petites économies… sauf là.":"💸 <b>The megalomaniac:</b> {N} blows <b>{mb}€</b> on {cl}. Every penny counts… except here.",
  "un bonus":"a bonus",
  // — Phase 4d : règles du jeu —
  "← Retour":"← Back", "📖 Règles du jeu":"📖 Game rules",
  "Signaler un bug":"Report a bug", "📋 Copier le rapport":"📋 Copy the report",
  "📋 Rapport copié — colle-le dans ton message.":"📋 Report copied — paste it into your message.",
  "Copie le rapport ci-dessous et envoie-le à l'organisateur (WhatsApp, SMS, mail — comme tu veux). Il contient le <b>contexte technique</b> de ton écran : c'est ce qui permet de retrouver le problème.":"Copy the report below and send it to the organiser (WhatsApp, SMS, email — whatever suits you). It carries the <b>technical context</b> of your screen: that's what makes the problem findable.",
  "⚠️ Pense à compléter les 3 lignes du bas : ce que tu faisais, ce que tu attendais, ce qui s'est passé.":"⚠️ Remember to fill in the 3 lines at the bottom: what you were doing, what you expected, what happened.",
  "La copie automatique n'a pas fonctionné. Sélectionne le texte ci-dessous et copie-le à la main.":"Automatic copying didn't work. Select the text below and copy it by hand.",
  "Envoyer un message":"Send a message", "Que veux-tu envoyer ?":"What do you want to send?",
  "Un bug":"A bug", "Une idée / un avis":"An idea / feedback", "Proposer une idée / un avis":"Suggest an idea / feedback", "📋 Copier":"📋 Copy",
  "Écris ton idée ou ton avis dans la dernière ligne, puis copie le tout et envoie-le à l'organisateur. Le <b>contexte technique</b> de ta page est joint automatiquement.":"Write your idea or feedback on the last line, then copy it all and send it to the organiser. The <b>technical context</b> of your page is attached automatically.",
  "⚠️ Complète la dernière ligne : ton idée ou ton avis.":"⚠️ Fill in the last line: your idea or feedback.",
  "<b>But :</b> championnat de pronostics entre amis, sur de vrais événements et de vraies cotes, <b>sans argent réel</b>. On démarre à <b>100 € virtuels</b> ; le vainqueur est celui qui a le plus de <b>points de championnat</b>.":"<b>Goal:</b> a prediction championship among friends, on real events and real odds, <b>no real money</b>. Everyone starts with <b>100 virtual €</b>; the winner is whoever has the most <b>championship points</b>.",
  "📚 Voir les règles détaillées →":"📚 See the detailed rules →", "📚 Règles détaillées":"📚 Detailed rules",
  "📚 Comment marche le jeu":"📚 How the game works",
  "Le fonctionnement complet, dans le détail : calendrier, mises, Capitaine, points, cartes bonus, enjeu final.":"How it all works, in detail: schedule, stakes, Captain, points, bonus cards, final stake.",
  "Le fonctionnement complet du jeu, dans le détail. Pour un aperçu rapide, vois plutôt <b>📖 Règles du jeu</b>.":"How the game works, in full detail. For a quick overview, see <b>📖 Game rules</b> instead.",
  "🎯 Le principe":"🎯 The principle",
  "Un championnat de pronostics entre amis. Chacun démarre avec <b>100 € virtuels</b> — <b>aucun argent réel</b> n'est en jeu et l'application n'encaisse rien. Chaque journée t'oppose à un adversaire en <b>duel</b> ; le vainqueur du duel marque des <b>points de championnat</b>. À la fin, c'est le total de <b>points</b> qui désigne le champion — pas le capital.":"A prediction championship among friends. Everyone starts with <b>100 virtual €</b> — <b>no real money</b> is involved and the app never collects anything. Each matchday pits you against one opponent in a <b>duel</b>; the duel winner scores <b>championship points</b>. At the end, the <b>points</b> total crowns the champion — not the balance.",
  "🗓️ Le calendrier":"🗓️ The schedule",
  "<b>Aller-retour intégral</b> : chacun rencontre chacun <b>exactement deux fois</b>, une fois à domicile et une fois à l'extérieur. Une ligue de <b>n</b> joueurs dure donc <b>2 × (n − 1) journées</b> (ex. 6 joueurs → 10 journées ; 12 joueurs → 22). Si le nombre d'humains est <b>impair</b>, un 🤖 <b>joueur IA</b> complète l'effectif pour équilibrer : il joue normalement mais ne subit ni gage ni récompense.":"<b>Full home-and-away</b>: everyone meets everyone <b>exactly twice</b>, once at home and once away. A league of <b>n</b> players therefore runs <b>2 × (n − 1) matchdays</b> (e.g. 6 players → 10 matchdays; 12 players → 22). If the number of humans is <b>odd</b>, a 🤖 <b>AI player</b> fills in to balance the draw: it plays normally but never takes a forfeit or a reward.",
  "⚽ Une journée, étape par étape":"⚽ A matchday, step by step",
  "Le joueur <b>à domicile</b> choisit les <b>5 rencontres</b> du duel. Elles s'imposent aux deux joueurs. S'il ne choisit pas avant l'échéance, elles sont tirées automatiquement — <b>son adversaire n'est jamais pénalisé</b> pour ça.":"The <b>home</b> player picks the duel's <b>5 fixtures</b>. They apply to both players. If they don't pick before the deadline, the fixtures are drawn automatically — <b>their opponent is never penalised</b> for it.",
  "Chacun pose ses <b>pronostics et ses mises</b>, en secret. Le total des mises ne peut pas dépasser <b>{a} % de ton capital</b> ({b} % avec la carte Investisseur).":"Each player places their <b>picks and stakes</b>, in secret. Total stakes can't exceed <b>{a}% of your balance</b> ({b}% with the Investor card).",
  "Tu désignes un <b>👑 Capitaine</b> : sur ce pari, ton <b>gain ET ta perte sont doublés</b>.":"You name a <b>👑 Captain</b>: on that bet, your <b>gain AND your loss are doubled</b>.",
  "Tu peux jouer <b>une carte bonus</b> (une seule par journée). Elle reste <b>secrète</b> jusqu'à la résolution.":"You may play <b>one bonus card</b> (only one per matchday). It stays <b>secret</b> until resolution.",
  "À la <b>clôture</b>, les pronos de tout le monde sont révélés. Les cartes, elles, restent cachées jusqu'aux résultats.":"At the <b>close</b>, everyone's picks are revealed. The cards stay hidden until the results.",
  "Une fois les matchs terminés, la journée est <b>résolue</b> : gains, points, classement.":"Once the matches are over, the matchday is <b>resolved</b>: winnings, points, standings.",
  "💰 Gains et pertes":"💰 Winnings and losses",
  "<b>Pari gagné</b> : tu empoches <b>mise × (cote − 1)</b>. <b>Pari perdu</b> : tu perds ta <b>mise</b>.":"<b>Bet won</b>: you pocket <b>stake × (odds − 1)</b>. <b>Bet lost</b>: you lose your <b>stake</b>.",
  "<b>🛟 Le filet de sécurité :</b> la <b>perte maximale possible</b> de la journée ne peut jamais dépasser ton capital. L'application refuse un pari qui pourrait te faire finir dans le négatif — si le bouton bloque, baisse la mise de ton Capitaine. <b>Ton capital ne descend jamais sous 0.</b>":"<b>🛟 The safety net:</b> the matchday's <b>maximum possible loss</b> can never exceed your balance. The app refuses a bet that could leave you negative — if the button is blocked, lower your Captain's stake. <b>Your balance never drops below 0.</b>",
  "<b>💸 Recapitalisation solidaire :</b> si un joueur tombe sous <b>{a} €</b> il ne peut plus miser. Dans ce cas <b>tout le monde</b> reçoit <b>+{b} €</b> — pas seulement lui — pour que personne ne soit distancé par un accident. Le joueur renfloué perd <b>1 point</b> de championnat.":"<b>💸 Solidarity top-up:</b> if a player falls below <b>€{a}</b> they can no longer bet. In that case <b>everyone</b> gets <b>+€{b}</b> — not just them — so nobody is left behind by one bad day. The topped-up player loses <b>1 championship point</b>.",
  "🏆 Points et classement":"🏆 Points and standings",
  "Le <b>vainqueur du duel</b> est celui au <b>meilleur résultat net</b> (gains − mises). Égalité → on départage par le plus gros <b>gain</b>, puis la plus grosse <b>mise</b> ; si tout est identique, c'est <b>match nul</b>.":"The <b>duel winner</b> is the one with the <b>best net result</b> (winnings − stakes). Tie → broken by the biggest <b>gain</b>, then the biggest <b>stake</b>; if everything matches, it's a <b>draw</b>.",
  "<b>Vainqueur</b> : <b>3 pts</b> si son net est positif, <b>1 pt</b> s'il est négatif. <b>Perdant</b> : <b>1 pt</b> si son net est positif, <b>0 pt</b> s'il est négatif. <b>Match nul</b> : <b>1 pt</b> chacun.":"<b>Winner</b>: <b>3 pts</b> if their net is positive, <b>1 pt</b> if negative. <b>Loser</b>: <b>1 pt</b> if their net is positive, <b>0 pt</b> if negative. <b>Draw</b>: <b>1 pt</b> each.",
  "<b>⭐ Meilleur pronostiqueur :</b> chaque journée, le joueur au plus gros net de <b>toute la ligue</b> gagne <b>+1 point</b> en plus.":"<b>⭐ Best forecaster:</b> each matchday, the player with the biggest net in the <b>whole league</b> gets <b>+1 point</b> on top.",
  "<b>Départage au classement final</b> (à points égaux) : capital, puis victoires en duel, puis plus gros gain, puis plus grosse cote.":"<b>Final standings tie-break</b> (equal points): balance, then duel wins, then biggest gain, then biggest odds.",
  "<b>🔥/❄️ La dynamique</b> (séries de victoires ou de défaites) est <b>purement indicative</b> : aucun bonus ni malus n'y est associé.":"<b>🔥/❄️ Momentum</b> (winning or losing streaks) is <b>purely indicative</b>: no bonus or penalty is attached to it.",
  "😴 Le pari non validé à temps":"😴 Picks not submitted in time",
  "Si tu ne valides pas avant la clôture : <b>aucun pari</b> n'est pris en compte (on ne reprend pas les pronos de l'adversaire).":"If you don't submit before the close: <b>no bet</b> is counted (your opponent's picks are not copied over).",
  "Tu prends <b>−2 pts</b> au classement et tu perds <b>{a} %</b> de ton capital.":"You take <b>−2 pts</b> in the standings and lose <b>{a}%</b> of your balance.",
  "Ton adversaire, lui, <b>gagne le duel</b> — mais uniquement <b>3 pts</b> si son net est positif, <b>1 pt</b> sinon. Il ne peut pas perdre d'argent à cause de ton absence.":"Your opponent <b>wins the duel</b> — but only <b>3 pts</b> if their net is positive, <b>1 pt</b> otherwise. They cannot lose money because of your absence.",
  "🃏 Les cartes bonus":"🃏 The bonus cards",
  "Au démarrage, chacun <b>mise en aveugle</b> sur les cartes qu'il veut. Chaque carte revient au <b>plus offrant</b> — en cas d'égalité, au <b>premier</b> à avoir misé ce montant. Les <b>non-gagnants ne paient rien</b>.":"At the start, everyone <b>bids blindly</b> on the cards they want. Each card goes to the <b>highest bidder</b> — on a tie, to the <b>first</b> to have bid that amount. <b>Losing bidders pay nothing</b>.",
  "Total des mises ≤ <b>{a} €</b>, et pas plus de cartes que de journées. <b>Ce que tu remportes est retiré de tes 100 € de départ</b> — ce que tu ne dépenses pas te reste comme capital.":"Total bids ≤ <b>€{a}</b>, and no more cards than there are matchdays. <b>What you win is deducted from your starting €100</b> — what you don't spend stays as your balance.",
  "<b>Une carte = un seul propriétaire</b> dans la ligue, et <b>une seule carte jouée par journée</b>. Une carte jouée est consommée.":"<b>One card = one owner</b> in the league, and <b>only one card played per matchday</b>. A played card is consumed.",
  "Les cartes <b>🎯 à cible</b> demandent de désigner un match au moment de parier. <b>💪 x/5</b> indique la force <i>indicative</i> d'une carte.":"<b>🎯 Targeted</b> cards require you to name a match when betting. <b>💪 x/5</b> shows a card's <i>indicative</i> strength.",
  "⚠️ Le <b>👑 Capitaine</b> et un bonus doivent être sur des <b>matchs différents</b> — sauf 💥 Coup Double, 🎁 Chérie c'est cadeau et 😏 Dans ta face.":"⚠️ The <b>👑 Captain</b> and a bonus must be on <b>different matches</b> — except 💥 Double Strike, 🎁 Honey I Got You a Gift and 😏 In Your Face.",
  "Les {a} cartes":"The {a} cards", "🎯 à cible":"🎯 targeted",
  "🎭 L'enjeu final":"🎭 The final stake",
  "À l'ouverture, l'organisateur choisit l'enjeu de la ligue : <b>gage</b> au dernier, <b>récompense</b> au champion, ou <b>les deux</b>.":"When opening the league, the organiser picks the stake: <b>forfeit</b> for the last-placed player, <b>reward</b> for the champion, or <b>both</b>.",
  "<b>La règle est unique : celui qui choisit n'est jamais le destinataire.</b>":"<b>One rule only: whoever chooses is never the one who receives.</b>",
  "🎭 Le <b>gage</b> est infligé au <b>dernier</b>, et c'est le <b>vainqueur</b> qui l'a voté.":"🎭 The <b>forfeit</b> goes to the <b>last-placed player</b>, and it's the <b>winner</b> who voted for it.",
  "🏆 La <b>récompense</b> revient au <b>champion</b>, et c'est le <b>dernier</b> qui l'a votée.":"🏆 The <b>reward</b> goes to the <b>champion</b>, and it's the <b>last-placed player</b> who voted for it.",
  "<i>Pourquoi ce sens :</i> un gage n'est subi que par une personne, alors qu'une récompense est offerte par <b>tous les autres</b>. Faire choisir la récompense par celui qui la paiera évite qu'un joueur impose une dépense au groupe.":"<i>Why this way round:</i> a forfeit is borne by one person, whereas a reward is given by <b>everyone else</b>. Letting the reward be chosen by whoever will pay for it stops one player imposing a cost on the group.",
  "Le vote a lieu à la <b>préparation</b>, avant la 1re journée : <b>personne ne sait où il finira</b>. Ton vote est donc un pari à l'aveugle, révélé à la fin — c'est ce qui tient le suspense.":"The vote happens at the <b>preparation</b> step, before matchday 1: <b>nobody knows where they'll finish</b>. Your vote is therefore a blind wish, revealed at the end — that's what keeps the suspense.",
  "Chacun peut proposer <b>son propre texte</b> (max {a} caractères) au lieu d'une option de la liste. <b>Le vote est obligatoire</b> pour valider sa préparation.":"Anyone can suggest <b>their own text</b> (max {a} characters) instead of an option from the list. <b>Voting is mandatory</b> to confirm your preparation.",
  "Si celui du pôle n'a pas voté : on prend le choix <b>strictement majoritaire</b> ; sinon on avance depuis ce pôle (2ᵉ, 3ᵉ…) jusqu'au premier votant.":"If the player at that end didn't vote: the <b>strict majority</b> choice applies; otherwise we move along from that end (2nd, 3rd…) to the first voter.",
  "⚠️ Gages et récompenses se règlent <b>entre vous, hors application</b> — elle ne gère aucun argent et n'encaisse rien.":"⚠️ Forfeits and rewards are settled <b>between you, outside the app</b> — it handles no money and collects nothing.",
  "🎛️ Les options de la ligue":"🎛️ League options",
  "Mode de jeu":"Game mode", "Formule de rythme":"Pace format", "Données":"Data",
  "• <b>🎮 Simulé</b> — matchs et cotes fictifs, résolution immédiate. Idéal pour tester.":"• <b>🎮 Simulated</b> — fictional matches and odds, instant resolution. Ideal for testing.",
  "• <b>📡 Données réelles</b> — vrais matchs, vraies cotes, vrais résultats. Une journée ne se résout qu'une fois <b>tous</b> les matchs réellement joués.":"• <b>📡 Real data</b> — real matches, real odds, real results. A matchday only resolves once <b>all</b> matches have actually been played.",
  "Une ligue accueille jusqu'à <b>{p} joueurs</b>. L'organisateur peut clôturer les inscriptions, la préparation ou les pronos à tout moment.":"A league holds up to <b>{p} players</b>. The organiser can close registrations, the preparation or the picks at any time.",
  "1 place":"1 spot", "{a} places":"{a} spots",
  "🗓️ Format":"🗓️ Format",
  "De <b>2 à {a} joueurs</b> — et la durée en découle : chacun affronte chacun aller-retour, soit <b>2 × (nombre de joueurs − 1) journées</b> (8 joueurs → 14 journées). Si le nombre d'humains est impair, un 🤖 joueur IA complète (il ne subit pas le gage). Chaque jour = une confrontation en duel.":"From <b>2 to {a} players</b> — and the length follows from it: everyone plays everyone home and away, i.e. <b>2 × (number of players − 1) matchdays</b> (8 players → 14 matchdays). If the number of humans is odd, a 🤖 AI player fills in (it isn't subject to the forfeit). Each day = one head-to-head duel.",
  "⚽ Une journée":"⚽ A matchday",
  "Le joueur <b>à domicile</b> choisit les <b>5 rencontres</b> (imposées aux deux).":"The <b>home</b> player picks the <b>5 fixtures</b> (imposed on both).",
  "Chacun fait ses <b>pronostics + mises</b>. Total des mises ≤ <b>{a} %</b> du capital ({b} % avec la carte Investisseur).":"Each makes their <b>predictions + stakes</b>. Total stakes ≤ <b>{a}%</b> of capital ({b}% with the Investor card).",
  "<b>👑 Pari du Capitaine</b> : un pari désigné secrètement — gain <b>et</b> perte <b>doublés</b>.":"<b>👑 Captain bet</b>: a secretly chosen bet — gain <b>and</b> loss <b>doubled</b>.",
  "Optionnel : <b>1 carte bonus</b> (voir plus bas), révélée à la résolution.":"Optional: <b>1 bonus card</b> (see below), revealed at settlement.",
  "Gain d'un pari = mise × (cote − 1) ; pari perdu = − mise. Le capital ne descend jamais sous 0.":"Bet gain = stake × (odds − 1); lost bet = − stake. Capital never drops below 0.",
  "🏆 Points & classement":"🏆 Points & standings",
  "Chaque journée, dans ton <b>duel</b>, le <b>vainqueur</b> est celui qui a le <b>meilleur résultat net</b> (gains − mises). Égalité → on départage par le plus gros <b>gain</b>, puis la plus grosse <b>mise</b> ; si tout est identique, c'est <b>match nul</b>.":"Each day, in your <b>duel</b>, the <b>winner</b> is whoever has the <b>best net result</b> (gains − stakes). Tie → broken by the biggest <b>gain</b>, then the biggest <b>stake</b>; if everything is identical, it's a <b>draw</b>.",
  "Points : <b>vainqueur</b> = <b>3 pts</b> si son net est positif, <b>1 pt</b> si son net est négatif ; <b>perdant</b> = <b>1 pt</b> si son net est positif, <b>0 pt</b> si son net est négatif ; <b>match nul</b> = <b>1 pt</b> chacun.":"Points: <b>winner</b> = <b>3 pts</b> if their net is positive, <b>1 pt</b> if negative; <b>loser</b> = <b>1 pt</b> if their net is positive, <b>0 pt</b> if negative; <b>draw</b> = <b>1 pt</b> each.",
  "Bonus : le <b>meilleur pronostiqueur</b> ⭐ (plus gros net parmi <b>tous</b> les joueurs) gagne <b>+1 point</b>.":"Bonus: the <b>best forecaster</b> ⭐ (biggest net among <b>all</b> players) earns <b>+1 point</b>.",
  "Départage au classement : capital, puis victoires en duel, plus gros gain, plus grosse cote.":"Standings tiebreakers: capital, then duel wins, biggest gain, biggest odds.",
  "🔥 Dynamique":"🔥 Momentum",
  "Une 🔥 flamme signale une <b>bonne dynamique</b> (victoires de duel qui s'enchaînent), un ❄️ flocon une <b>mauvaise passe</b>. C'est <b>purement indicatif</b> (visible au classement) : aucun bonus ni malus n'y est associé.":"A 🔥 flame marks a <b>good run</b> (consecutive duel wins), a ❄️ snowflake a <b>rough patch</b>. It's <b>purely indicative</b> (shown in the standings): no bonus or penalty attached.",
  "🃏 Cartes bonus (enchères)":"🃏 Bonus cards (auction)",
  "Au démarrage, phase de <b>préparation</b> : chacun vote pour le gage <b>et</b> mise en aveugle sur les bonus, sans attendre les autres. Chaque bonus revient au <b>plus offrant</b> (égalité → premier à avoir misé) ; les non-gagnants sont <b>remboursés</b>. Total des mises ≤ <b>{a} €</b>, jusqu'à autant de bonus que de journées. Les mises gagnantes sont retirées de ton <b>capital de départ</b>. 1 carte jouée max par journée. Certaines cartes sont <b>à cible</b> 🎯 : tu choisis toi-même le match concerné au moment de parier.":"At the start, a <b>preparation</b> phase: everyone votes for the forfeit <b>and</b> bids blind on the bonuses, without waiting for the others. Each bonus goes to the <b>highest bidder</b> (tie → first to bid); non-winners are <b>refunded</b>. Total bids ≤ <b>{a} €</b>, up to as many bonuses as there are matchdays. Winning bids are deducted from your <b>starting capital</b>. Max 1 card played per matchday. Some cards are <b>targeted</b> 🎯: you choose the match yourself when betting.",
  "😴 Oubli":"😴 Forgetting",
  "Pas de validation à temps → <b>aucun pari pris en compte</b> (pas de reprise des pronos adverses), <b>−2 pts</b> au classement et <b>−{a} % du capital</b>.":"No validation in time → <b>no bet counted</b> (opponent's picks are not copied), <b>−2 pts</b> in the standings and <b>−{a}% of capital</b>.",

function t(s,subs){ let out=(lang==="en"&&EN[s]!=null)?EN[s]:s; if(subs){ for(const k in subs) out=out.split("{"+k+"}").join(subs[k]); }
  // Espace INSÉCABLE entre un nombre et son unité : « 10 € » ne doit jamais se retrouver coupé en
  // fin de ligne (constaté à 320 px dans les règles). C'est aussi la typographie française correcte.
  // Fait ici plutôt que dans chaque chaîne : les montants sont injectés via {a}, donc l'espace ne
  // devient visible qu'après substitution.
  if(out.indexOf("€")>=0 || out.indexOf("%")>=0) out=out.replace(/(\d)\s+([€%])/g,"$1 $2");
  return out; }

/* ============ schedule ============ */
function makeSchedule(n){ let arr=[...Array(n).keys()]; const rounds=[];
  for(let r=0;r<n-1;r++){ const pairs=[];
    for(let i=0;i<n/2;i++){ let a=arr[i],b=arr[n-1-i]; if((r+i)%2===0) pairs.push([a,b]); else pairs.push([b,a]); }
    rounds.push(pairs); arr=[arr[0],arr[n-1],...arr.slice(1,n-1)]; }
  const ret=rounds.map(rd=>rd.map(p=>[p[1],p[0]])); return [...rounds,...ret]; }

/* ============ fixtures ============ */
// `pris` (facultatif) : équipes déjà engagées dans le tirage en cours. Comme dans un vrai calendrier,
// une équipe ne joue qu'un match par journée — sans ça la même affiche pouvait sortir plusieurs fois
// dans la même liste (signalé par Giulian : 3× Bayern–City). Repli sur l'effectif complet si les
// équipes libres viennent à manquer, pour ne jamais bloquer le tirage.
function genFixture(maxKo,sportImpose,pris){ const s=sportImpose||pick(SPORTS);
  const libres=pris?s.t.filter(x=>!pris.has(x)):s.t;
  const src=(libres.length>=2)?libres:s.t;
  const a=pick(src); const restants=src.filter(x=>x!==a); const b=restants.length?pick(restants):pick(s.t.filter(x=>x!==a));
  if(pris){ pris.add(a); pris.add(b); }
  // Cotes COHÉRENTES : on part de probabilités qui somment à 100 %, + une marge bookmaker (~5-9 %), puis cote = 1/(p×marge).
  const M=rnd(1.05,1.09); const odd=p=>Math.max(1.05,+(1/(p*M)).toFixed(2));
  // Horaire FICTIF : décalage (heures) après la clôture des paris. Comme en réel, le match se joue APRÈS la deadline
  // et dans le créneau de la formule (maxKo = 12h Fast / 24h Classique) → tous les matchs du jour sont groupés.
  const ko=+rnd(0.75,Math.max(2,(maxKo||24)-1)).toFixed(2);
  if(s.draw){ const pd=rnd(0.22,0.30); let ph=rnd(0.22,0.55); let pa=1-ph-pd; if(pa<0.12){pa=0.12;ph=1-pd-pa;} if(ph<0.12){ph=0.12;pa=1-pd-ph;}
    return {sport:s.ic,draw:true,home:a,away:b,oh:odd(ph),od:odd(pd),oa:odd(pa),ko}; }
  const ph=rnd(0.30,0.70); return {sport:s.ic,draw:false,home:a,away:b,oh:odd(ph),oa:odd(1-ph),ko}; }
// Même dosage qu'en données réelles : ~75 % de foot, le reste pour la variété (cf. socTarget dans
// fetchRealPool). Le mode simulé sert à répéter le vrai jeu — sans ce quota le sport était tiré
// UNIFORMÉMENT entre les 3 (≈33 % de foot), d'où des journées à un seul match de foot (signalé par
// Hervé sur XKWJ2). Effet de bord utile : le foot est le seul sport à 3 issues, donc c'est aussi lui
// qui rend la carte 🎲 Double Chance jouable.
const SPORT_FOOT=SPORTS.find(s=>s.draw)||SPORTS[0]; // ⚽ = le seul sport à 3 issues (draw:true)
function genPool(k,maxKo){
  const nFoot=Math.round(k*(POOL_FOOT/POOL_N));
  // Les places « variété » excluent le foot — comme en réel, où elles sont prises dans `oth`
  // (tout sauf Soccer). Sans cette exclusion elles retombaient parfois sur du foot : 83 % au lieu
  // de 75 %, soit une proportion qui ne correspondait ni à la règle ni au mode réel.
  const autres=SPORTS.filter(s=>s!==SPORT_FOOT);
  // Un seul jeu d'équipes engagées pour TOUT le tirage : chaque équipe/joueur n'apparaît qu'une fois,
  // donc aucune affiche ne peut se répéter. (Les noms sont uniques d'un sport à l'autre.)
  const pris=new Set();
  const out=[]; for(let i=0;i<k;i++) out.push(genFixture(maxKo, i<nFoot?SPORT_FOOT:pick(autres), pris));
  // Mélange (Fisher-Yates) : sinon les matchs de foot seraient toujours groupés en tête de liste.
  for(let i=out.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const tmp=out[i]; out[i]=out[j]; out[j]=tmp; }
  return out; }
function oddOf(f,sel){ return sel==="1"?f.oh:sel==="2"?f.oa:f.od; }
// Cote « double chance » : combinée de deux issues couvertes pour une seule mise.
function dcOdd(o1,o2){ return +(1/(1/o1+1/o2)).toFixed(2); } // (cote combinée « pondérée » — conservée pour référence, plus utilisée pour le gain)
// Double Chance : on gagne à la cote INITIALE du résultat qui sort (pas de cote combinée pondérée).
function dcWinOdd(f,sel,sel2){ return (f.res===sel||f.res===sel2) ? oddOf(f,f.res) : oddOf(f,sel); }
/* ---- Barème d'un duel ---- */
// gain (retour brut des paris gagnants, à la cote) et mise (total misé) d'un joueur.
// ⚠️ Match ANNULÉ (f.canceled) : la mise est RENDUE → le pari est ignoré (ni gain, ni mise comptée).
function gainMise(picks,fx){ let gain=0,mise=0; (picks||[]).forEach((b,i)=>{ const f=(fx||[])[i]; if(f&&f.canceled) return; const st=+b.stake||0; mise+=st; if(f&&b.sel===f.res) gain+=st*oddOf(f,b.sel); }); return {gain,mise}; }
// Nombre de paris gagnants d'un joueur (gère la Double Chance)
function winCount(bt,fx){ if(!bt||!bt.picks||!fx) return 0; const c=bt.card; let w=0; bt.picks.forEach((b,i)=>{ const f=fx[i]; if(!f||f.canceled)return; const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2; const win=isDC?(f.res===b.sel||f.res===c.sel2):(b.sel===f.res); if(win)w++; }); return w; }
// Compare deux joueurs {net,gain,mise} : vainqueur = meilleur net, puis gain, puis mise, sinon nul.
// v2 : RÉSULTAT (V=2, N=1, D=0) + 1 pt si net > 0.  ANCIEN : vainqueur 3 (net>0) ou 1 ; perdant
// 1 (net>0) ou 0 ; nul 1/1.  ⚠️ « net > 0 » strictement : un net de 0 (p. ex. tous les matchs du
// jour annulés) ne donne PAS le point de bonus.
function duelPts(h,a,v2){ const R=x=>Math.round((+x||0)*100)/100;
  if(v2){
    // v2 : le SEUL juge du duel est le NET. À net ÉGAL → MATCH NUL. On ne départage PAS par le gain
    // (ni la mise) : à net identique, un gain plus élevé signifie une mise plus élevée, donc plus de
    // risque pris — pas un meilleur jeu (signalé par Hervé, ligue CDRCJ). Barème : V=2, N=1, D=0, +1 si net>0.
    const c=R(h.net)-R(a.net); const bh=R(h.net)>0?1:0, ba=R(a.net)>0?1:0;
    if(c>0) return {h:2+bh, a:0+ba, win:'h'};
    if(c<0) return {h:0+bh, a:2+ba, win:'a'};
    return {h:1+bh, a:1+ba, win:null};
  }
  // ANCIEN barème (ligues antérieures à SCORING2) : départage net, puis gain, puis mise. Inchangé.
  const c=(R(h.net)-R(a.net)) || (R(h.gain)-R(a.gain)) || (R(h.mise)-R(a.mise));
  if(c>0) return {h:R(h.net)>0?3:1, a:R(a.net)>0?1:0, win:'h'};
  if(c<0) return {h:R(h.net)>0?1:0, a:R(a.net)>0?3:1, win:'a'};
  return {h:1,a:1,win:null}; }
// Duel avec FORFAIT : un joueur qui n'a pas validé ses pronos à temps ne marque AUCUN point de duel
// (sinon son net de 0 lui ferait « battre » un adversaire négatif) ; l'adversaire gagne le duel d'office.
// Barème du vainqueur : v2 → 2 + 1 si net>0 (soit 3 ou 2) ; ancien → 3 si net>0, 1 sinon.
// Le 0 rendu ici n'est PAS la sanction complète : la pénalité d'oubli (−1 pt en v2, −2 avant) est
// ajoutée séparément par resolveDay / recapBody / computeStandHist.
function duelPtsF(H,A,hForgot,aForgot,v2){
  const gagne=X=>{ const n=(+X.net||0); return v2 ? (2+(n>0?1:0)) : (n>0?3:1); };
  if(hForgot&&aForgot) return {h:0,a:0,win:null};
  if(hForgot) return {h:0, a:gagne(A), win:'a'};
  if(aForgot) return {h:gagne(H), a:0, win:'h'};
  return duelPts(H,A,v2); }
// Meilleur pronostiqueur du jour (un SEUL joueur de toute la ligue) : net, puis gain, puis 1er inscrit.
// La mise a été retirée du départage en v2 (même raison que pour le duel). Ici l'étoile doit
// désigner UN seul joueur : le rang d'inscription reste le dernier recours, donc le résultat
// demeure déterministe sans elle.
function dayStar(rows,v2){ const R=x=>Math.round((+x||0)*100)/100; let best=null;
  for(const r of rows){ if(!best){ best=r; continue; }
    const c=(R(r.net)-R(best.net))||(R(r.gain)-R(best.gain))||(v2?0:(R(r.mise)-R(best.mise)))||((best.order||0)-(r.order||0));
    if(c>0) best=r; }
  return best?best.id:null; }
function simResult(f){ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]];
  const inv=outs.map(o=>1/o[1]); const sum=inv.reduce((a,b)=>a+b,0);
  let r=Math.random(); for(let i=0;i<outs.length;i++){ r-=inv[i]/sum; if(r<=0) return outs[i][0]; } return outs[outs.length-1][0]; }

/* ============ data ============ */
async function refresh(){
  // On CAPTURE la ligue visée au départ. `refresh()` est asynchrone (polling / boot) : pendant ses
  // `await`, l'utilisateur peut revenir à « Mes ligues » (backToLeagues met S.leagueId et L à null).
  // Sans garde, le refresh déjà en vol continuait avec des valeurs nulles → « null is not an object
  // (L.status) » et « invalid input syntax for uuid: null » (signalés par Hervé). On utilise `lid`
  // partout (jamais S.leagueId, qui peut passer à null en cours de route) et on abandonne dès que la
  // ligue courante a changé — `stale()`.
  const lid=S.leagueId; if(!lid) return;
  const stale=()=> S.leagueId!==lid;
  try{
    L = await q(db.from("leagues").select("*").eq("id",lid).maybeSingle());  // maybeSingle : renvoie null (pas une erreur) si la ligue a été supprimée
    if(stale()) return;                       // l'utilisateur a quitté la ligue pendant le chargement
    if(!L){ // ligue introuvable (supprimée) : on nettoie et on retourne à l'accueil au lieu de planter
      if(S.leagueId===lid){ if(poll)clearInterval(poll); localStorage.removeItem("pl_last"); S.leagueId=null; S.myId=null; S.view="leagues"; loadMyLeagues(); }
      return; }
    players = await q(db.from("players").select("*").eq("league_id",lid).order("join_order"));
    if(stale()) return;
    try{ trades = await q(db.from("trades").select("*").eq("league_id",lid).eq("status","pending")); }catch(e){ trades=[]; } // rachats en attente (badge 🤝 + écran)
    try{ myResolvedOut = await q(db.from("trades").select("*").eq("league_id",lid).eq("from_player",S.myId).in("status",["accepted","refused"]).order("resolved_at",{ascending:false}).limit(20)); }catch(e){ myResolvedOut=[]; } // réponses à MES offres (acheteur prévenu)
    if(stale()) return;
    // fin de préparation AUTOMATIQUE : dès que tous ont validé (ou délai écoulé), on démarre sans clic
    if(L.status==="prep" && !resolving){
      const humans=players.filter(p=>!p.is_ai); const allDone=humans.length>=1 && humans.every(p=>p.shop_done); // >=1 : le SOLO doit pouvoir démarrer
      const st=prepState(); const dlPassed=st.deadline && new Date(st.deadline).getTime()<=Date.now();
      if(allDone||dlPassed){ resolvePrep(); return; }
    }
    S.recap = L.status!=="lobby" && (L.current_day>getSeen()) && (L.current_day>=1);
    const dispDay = S.recap ? L.current_day-1 : Math.min(L.current_day, Math.max(0,(L.num_days||1)-1));
    S.dispDay = dispDay;
    duels = await q(db.from("duels").select("*").eq("league_id",lid).eq("day",dispDay));
    bets  = await q(db.from("bets").select("*").eq("league_id",lid).eq("day",dispDay));
    if(stale()) return;
    // sélection auto (IA à domicile, ou échéance de sélection dépassée) + résolution auto
    if(L.status==="running" && !S.recap && !resolving){
      if(await ensureFixtures()){ duels = await q(db.from("duels").select("*").eq("league_id",lid).eq("day",dispDay)); }
      // tous les matchs choisis → on démarre le compte à rebours des paris (max 24h / 12h fast), une seule fois
      if(!L.bet_started_at && duels.length && duels.every(d=>d.fixtures)){
        try{ const r=await q(db.from("leagues").update({bet_started_at:new Date().toISOString()}).eq("id",L.id).is("bet_started_at",null).select("bet_started_at")); if(r&&r.length){ L.bet_started_at=r[0].bet_started_at; } }catch(e){} }
      if(await ensureAiBets()){ bets = await q(db.from("bets").select("*").eq("league_id",lid).eq("day",dispDay)); }
      if(shouldAutoResolve()){ resolveDay(); return; }
      await resolveRealIfReady(); // données réelles : résout quand les vrais matchs sont terminés
    }
    if(stale()) return;
    if(chartDay!==L.current_day){ chartDay=L.current_day; chartBets=null; standDuels=null; standTrades=null; }
    if((L.status==="running"||L.status==="done") && chartBets===null && L.current_day>=1){
      chartBets = await q(db.from("bets").select("player_id,day,net,picks,card,captain,duel_id,submitted").eq("league_id",lid).not("net","is",null));
      standDuels = await q(db.from("duels").select("day,home_id,away_id,fixtures").eq("league_id",lid));
      // Rachats ACCEPTÉS : ils déplacent du capital sans être le gain de personne. Sans eux, le
      // classement historique et la courbe divergent du capital réel (écart mesuré : ±5 €).
      try{ standTrades = await q(db.from("trades").select("from_player,to_player,price,kind,day").eq("league_id",lid).eq("status","accepted")); }
      catch(e){ standTrades=[]; } }
    if(stale()) return;
    if(L.status==="done" && endStats===null){ endStats={loading:true}; loadEndStats().then(()=>{ if(!stale()) render(); }); }
    showErr(""); render(); maybeNotify(); notifyTrades(); maybeRecapModal(dispDay);
  }catch(e){ showErr("Connexion : "+e.message); }
}
// Récapitalisation : une fenêtre fermable à l'ouverture du récap concerné (un bandeau seul passait

     <div class="mini muted" style="text-align:left;margin-top:8px">${t("Ferme cette fenêtre pour continuer.")}</div>`);

async function ensureFixtures(){
  let filled=false; const dt=dayTimes(); const selPassed=dt.ok && Date.now()>=dt.sel;
  // Duels à remplir : IA à domicile (tout de suite) ou humain à domicile ayant dépassé l'échéance de sélection.
  const todo=duels.filter(d=>!d.fixtures && ((pById(d.home_id)&&pById(d.home_id).is_ai) || selPassed));
  if(!todo.length) return false;
  if(L&&L.data_mode==="real"){
    if(Date.now()-lastRealFill < 300000) return false; lastRealFill=Date.now(); // throttle quota (5 min)
    let pool=[]; try{ pool=await fetchRealPoolCached(); }catch(e){}
    if(pool.length<5) return false; // pas assez de vrais matchs → on attend (jamais de simulé en réel)
    for(const d of todo){ const cp=pool.slice(); for(let i=cp.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cp[i],cp[j]]=[cp[j],cp[i]];}
      const fx=cp.slice(0,5);
      try{ const r=await q(db.from("duels").update({fixtures:fx}).eq("id",d.id).is("fixtures",null).select()); if(r&&r.length) filled=true; }catch(e){} }
    return filled;
  }
  for(const d of todo){ try{ const r=await q(db.from("duels").update({fixtures:genPool(5,leagueFormula().bet)}).eq("id",d.id).is("fixtures",null).select()); if(r&&r.length) filled=true; }catch(e){} }
  return filled; }
// L'IA mise dès que les 5 matchs sont connus (pour que ses pronos soient visibles pendant l'attente)
async function ensureAiBets(){ let made=false;
  for(const d of duels){ if(!d.fixtures) continue;
    for(const pid of [d.home_id,d.away_id]){ const p=pById(pid); if(!p||!p.is_ai) continue;
      if(bets.find(b=>b.player_id===pid)) continue;
      const ai=aiPlay(p.capital!=null?p.capital:100, d.fixtures, p.hand||[], S.dispDay, L.num_days);
      try{ const r=await q(db.from("bets").insert({league_id:L.id,day:S.dispDay,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,card:ai.card,submitted:true}).select()); if(r&&r.length) made=true; }catch(e){} } }
  return made; }
function shouldAutoResolve(){
  const dz=duels; if(!dz.length || dz.some(d=>!d.fixtures)) return false; // sélection pas finie
  if(dz.some(d=>(d.fixtures||[]).some(f=>f&&f.evId))) return false; // matchs réels → résolution sur vrais résultats (Étape 2)
  // SOLO (vs 🤖 IA) en simulé : dès que le joueur a validé ses pronos, on résout TOUT DE SUITE — pas
  // d'attente d'échéance ni de « coup d'envoi », l'adversaire est l'IA (demandé par Hervé).
  if(isSolo() && myBet()) return true;
  // Sinon : résolution à la clôture des pronos ET une fois les matchs fictifs « joués ».
  return deadlinePassed() && simMatchesDone();
}

function myDuel(){ return duels.find(d=>d.home_id===S.myId||d.away_id===S.myId); }
function myBet(){ return bets.find(b=>b.player_id===S.myId); }

async function doSignup(){
  if(busy)return; const u=($("aUser").value||"").trim(), p=$("aPass").value||"";

let tutoStep=0, tutoPicks=[], tutoCapOn=false, tutoBids={}, tutoBidDone=false;
const TUTO_FX=[
 {home:"PSG",away:"OM",sport:"⚽",oh:1.90,od:3.40,oa:3.90,draw:true,res:"1"},
 {home:"Alcaraz",away:"Sinner",sport:"🎾",oh:2.10,oa:1.75,draw:false,res:"2"},

// montrer que 💪 x/5 varie. Les enchères de Léa (TUTO_BOTBIDS) restent cachées ; le joueur saisit les
// siennes (champs VIDES) — à lui de tomber sur le plus offrant / l'égalité.
const TUTO_STAKE=10, TUTO_BOT_PICKS=["1","1","2"], TUTO_CARDS=["tout","parachute","sangsue"], TUTO_BOTBIDS={tout:5,parachute:7,sangsue:4};

function tutoBotNet(){ let n=0; TUTO_FX.forEach((f,i)=>{ const win=TUTO_BOT_PICKS[i]===f.res; n+= win? TUTO_STAKE*(oddOf(f,TUTO_BOT_PICKS[i])-1) : -TUTO_STAKE; }); return Math.round(n*100)/100; }

  const b2=document.getElementById("tutobtn"); if(b2){ b2.disabled=over; b2.textContent= over? t("Dépasse 40 € — réduis tes mises") : t("Valider mes enchères →"); } }
