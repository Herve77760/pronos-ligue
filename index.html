<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pronos Ligue</title>
<style>
  :root{ --bg:#0b0e13; --panel:#151a22; --panel2:#1d2430; --border:#242b38; --ink:#e6e8ee;
    --muted:#8b93a3; --green:#4ade80; --red:#f87171; --gold:#fbbf24; --blue:#60a5fa; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .app{max-width:540px;margin:0 auto;padding:16px 16px 60px;}
  h1{font-size:22px;margin:0;letter-spacing:-.4px;}
  h2{font-size:16px;margin:18px 0 8px;}
  .sub{color:var(--muted);font-size:13px;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin:10px 0;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .muted{color:var(--muted);} .green{color:var(--green);} .red{color:var(--red);}
  .gold{color:var(--gold);} .blue{color:var(--blue);} .mini{font-size:12px;}
  .btn{background:var(--green);color:#07130b;font-weight:700;border:none;border-radius:12px;
    padding:13px;width:100%;font-size:15px;cursor:pointer;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--ink);}
  .btn.sm{width:auto;padding:8px 14px;font-size:13px;border-radius:10px;}
  input,select{background:var(--panel2);border:1px solid var(--border);color:var(--ink);
    border-radius:10px;padding:11px;font-size:15px;width:100%;}
  input[type=number]{width:84px;text-align:right;}
  label{font-size:13px;color:var(--muted);display:block;margin:10px 0 4px;}
  .chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted);}
  .chip.g{background:rgba(74,222,128,.14);border-color:rgba(74,222,128,.4);color:#8ff0b4;}
  .chip.b{background:rgba(96,165,250,.14);border-color:rgba(96,165,250,.4);color:#a9cbff;}
  .chip.gold{background:rgba(250,204,21,.15);border-color:rgba(250,204,21,.45);color:#fde68a;}
  .chip.red{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.4);color:#ffb4b4;}
  .sport{width:24px;height:24px;border-radius:6px;background:var(--panel2);display:inline-flex;
    align-items:center;justify-content:center;font-size:13px;flex:0 0 auto;}
  .odds{display:flex;gap:7px;margin-top:9px;}
  .odd{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:9px;
    padding:7px 2px;text-align:center;font-size:12px;cursor:pointer;line-height:1.25;}
  .odd b{display:block;font-size:13px;}
  .odd.sel{background:#123020;border-color:var(--green);color:#8ff0b4;}
  .gauge{height:8px;border-radius:6px;background:#232a35;overflow:hidden;margin-top:6px;}
  .gauge>i{display:block;height:100%;background:var(--green);}
  .gauge.over>i{background:var(--red);}
  .tog{font-size:11px;border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;color:var(--muted);}
  .tog.cap.on{background:rgba(250,204,21,.16);border-color:var(--gold);color:var(--gold);}
  .tog.tgt.on{background:rgba(96,165,250,.16);border-color:var(--blue);color:var(--blue);}
  .cards{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .cardchip{border:1px solid var(--border);background:var(--panel2);border-radius:10px;padding:8px 10px;
    font-size:12px;cursor:pointer;text-align:center;min-width:74px;}
  .cardchip.on{border-color:var(--blue);background:rgba(96,165,250,.14);color:#a9cbff;}
  .cardchip .em{font-size:18px;display:block;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:left;}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;}
  td.num{text-align:right;}
  .hide{display:none;}
  .code{font-size:30px;letter-spacing:7px;font-weight:800;color:var(--green);text-align:center;}
  .tag{font-size:10px;color:var(--muted);}
  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:22px;}
  .err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:#ffb4b4;
    border-radius:10px;padding:10px 12px;margin:10px 0;font-size:13px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:var(--panel2);
    border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:50;}
  a{color:var(--blue);}
  .big{font-size:26px;font-weight:800;letter-spacing:-.5px;}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <div><h1>🎯 Pronos Ligue</h1><div class="sub" id="subtitle">Multijoueur en ligne</div></div>
    <div style="display:flex;gap:8px;flex:0 0 auto">
      <button class="btn ghost sm" id="rulesBtn" onclick="openRules()">📖 Règles</button>
      <button class="btn ghost sm hide" id="leaveBtn" onclick="leave()">Quitter</button>
    </div>
  </div>
  <div id="err"></div>
  <div id="root"><div class="box">Chargement…</div></div>
  <div class="foot">Prototype de test · données sportives simulées · v0.5</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";
/* ============ CONFIG ============ */
const SB_URL = "https://mdqmhrorpdyrsjsbawdl.supabase.co";
const SB_KEY = "sb_publishable_1xe1X9iIPahncWpQpRkrdg_Hw49QXO0";
const db = window.supabase.createClient(SB_URL, SB_KEY);

/* ============ CONSTANTS ============ */
const EMOJIS=["👑","🦊","🐻","🦁","🐼","🐯","🦉","🐸","🐙","🦄"];
const SPORTS=[
 {ic:"⚽",draw:true, t:["PSG","OM","Lyon","Real","Barça","Bayern","Man City","Liverpool","Milan","Naples"]},
 {ic:"🎾",draw:false,t:["Alcaraz","Sinner","Djokovic","Zverev","Rune","Swiatek","Sabalenka","Gauff"]},
 {ic:"🏀",draw:false,t:["Lakers","Celtics","Warriors","Bucks","Nuggets","Heat","Suns","Mavs"]},
];
const GAGES=["Le plongeon givré 🩲","Karaoké imposé 🎤","Rando déguisé en poulet 🐔","Serveur d'un soir 🍽️","Danse TikTok publique 💃"];
const CARDS={
 assurance:{e:"🛡",n:"Assurance",t:true,  d:"Un pari choisi : s'il perd, mise remboursée."},
 double:   {e:"🚀",n:"Double Mise",t:true, d:"Un pari choisi : s'il gagne, gain doublé."},
 miroir:   {e:"🪞",n:"Miroir",t:false,     d:"Le meilleur pari gagnant des deux joueurs est échangé."},
 gourmand: {e:"🍽️",n:"Gourmand",t:false,   d:"Adversaire positif → tu récupères 20 % de son bénéfice."},
 face:     {e:"😏",n:"Dans ta face",t:false,d:"Un pari gagnant adverse (au hasard) réduit de moitié."},
 serge:    {e:"💰",n:"Serge Benamou",t:false,d:"10 % du plus gros gain du jour redistribué aux autres."},
 cadeau:   {e:"🎁",n:"Chérie c'est cadeau",t:false,d:"Un pari adverse (au hasard) est inversé."},
 sniper:   {e:"🎯",n:"Sniper",t:true,      d:"Si le pari désigné est ton meilleur gain → +10 % capital."},
 invest:   {e:"📈",n:"Investisseur",t:false,d:"Plafond de mise porté à 70 % du capital ce jour."},
 roi:      {e:"👑",n:"Roi de la cote",t:false,d:"Un pari gagné à cote > 4,00 → +5 % capital."},
 tout:     {e:"🔥",n:"Tout ou Rien",t:true, d:"Un pari choisi : gain ×3, perte ×2."},
};
const COMMON=["assurance","double"];
const RANDOM_POOL=["miroir","gourmand","face","serge","cadeau","sniper","invest","roi","tout"];
function handSize(d){ if(d>=18)return 8; if(d>=15)return 6; if(d>=12)return 5; if(d>=9)return 4; if(d>=6)return 3; return 2; }
function dealHand(nDays){ const size=handSize(nDays); const nc=Math.round(size/2); const hand=[];
  for(let i=0;i<nc;i++) hand.push(COMMON[i%COMMON.length]);
  const pool=[...RANDOM_POOL]; for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  for(let i=0;i<size-nc;i++) hand.push(pool[i%pool.length]); return hand; }
function randomCard(){ return RANDOM_POOL[Math.floor(Math.random()*RANDOM_POOL.length)]; }

/* ============ STATE ============ */
let S={ view:"home", leagueId:null, myId:null, code:null, joinCode:"", recap:false, dispDay:0 };
let L=null, players=[], duels=[], bets=[];
let poll=null, busy=false, resolving=false;

/* ============ utils ============ */
const $=id=>document.getElementById(id);
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=n=>(n>=0?"+":"")+Math.round(n);
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function showErr(m){ $("err").innerHTML = m?`<div class="err">${esc(m)}</div>`:""; }
function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function saveSession(){ localStorage.setItem("pl_session", JSON.stringify({leagueId:S.leagueId,myId:S.myId,code:S.code})); }
function loadSession(){ try{return JSON.parse(localStorage.getItem("pl_session"));}catch(e){return null;} }
function clearSession(){ localStorage.removeItem("pl_session"); }
function getSeen(){ return +(localStorage.getItem("pl_seen_"+S.leagueId)||0); }
function setSeen(v){ localStorage.setItem("pl_seen_"+S.leagueId, v); }
async function q(p){ const {data,error}=await p; if(error) throw new Error(error.message); return data; }
function genCode(){ let s=""; const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; for(let i=0;i<5;i++) s+=A[Math.floor(Math.random()*A.length)]; return s; }

/* ============ schedule ============ */
function makeSchedule(n){ let arr=[...Array(n).keys()]; const rounds=[];
  for(let r=0;r<n-1;r++){ const pairs=[];
    for(let i=0;i<n/2;i++){ let a=arr[i],b=arr[n-1-i]; if((r+i)%2===0) pairs.push([a,b]); else pairs.push([b,a]); }
    rounds.push(pairs); arr=[arr[0],arr[n-1],...arr.slice(1,n-1)]; }
  const ret=rounds.map(rd=>rd.map(p=>[p[1],p[0]])); return [...rounds,...ret]; }

/* ============ fixtures ============ */
function genFixture(){ const s=pick(SPORTS); const a=pick(s.t); let b=pick(s.t); while(b===a) b=pick(s.t);
  const f={sport:s.ic,draw:s.draw,home:a,away:b,oh:+rnd(1.4,3.2).toFixed(2),oa:+rnd(1.5,3.6).toFixed(2)};
  if(s.draw) f.od=+rnd(3.0,3.9).toFixed(2); return f; }
function genPool(k){ return Array.from({length:k},genFixture); }
function oddOf(f,sel){ return sel==="1"?f.oh:sel==="2"?f.oa:f.od; }
function simResult(f){ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]];
  const inv=outs.map(o=>1/o[1]); const sum=inv.reduce((a,b)=>a+b,0);
  let r=Math.random(); for(let i=0;i<outs.length;i++){ r-=inv[i]/sum; if(r<=0) return outs[i][0]; } return outs[outs.length-1][0]; }

/* ============ data ============ */
async function refresh(){
  if(!S.leagueId) return;
  try{
    L = await q(db.from("leagues").select("*").eq("id",S.leagueId).single());
    players = await q(db.from("players").select("*").eq("league_id",S.leagueId).order("join_order"));
    S.recap = L.status!=="lobby" && (L.current_day>getSeen()) && (L.current_day>=1);
    const dispDay = S.recap ? L.current_day-1 : Math.min(L.current_day, Math.max(0,(L.num_days||1)-1));
    S.dispDay = dispDay;
    duels = await q(db.from("duels").select("*").eq("league_id",S.leagueId).eq("day",dispDay));
    bets  = await q(db.from("bets").select("*").eq("league_id",S.leagueId).eq("day",dispDay));
    showErr(""); render();
  }catch(e){ showErr("Connexion : "+e.message); }
}
function me(){ return players.find(p=>p.id===S.myId); }
function myDuel(){ return duels.find(d=>d.home_id===S.myId||d.away_id===S.myId); }
function myBet(){ return bets.find(b=>b.player_id===S.myId); }
function pById(id){ return players.find(p=>p.id===id); }

/* ============ HOME / CREATE / JOIN ============ */
function viewHome(){
  const sess=loadSession();
  return `<div class="box"><button class="btn" onclick="go('create')">➕ Créer une ligue</button></div>
    <div class="box"><label>Rejoindre avec un code</label>
      <input id="joinCode" placeholder="Ex : 7XK2P" maxlength="5" style="text-transform:uppercase">
      <div style="height:8px"></div><button class="btn ghost" onclick="go('join')">Rejoindre →</button></div>
    ${sess?`<div class="box mini"><div class="row"><span class="muted">Reprendre ta partie (${esc(sess.code)})</span>
      <button class="btn sm" onclick="resume()">Reprendre</button></div></div>`:""}`;
}
function go(v){ if(v==="join"){ const c=($("joinCode").value||"").toUpperCase().trim(); if(c.length<3){showErr("Entre un code valide.");return;} S.joinCode=c; S.view="join"; render(); return; } S.view=v; render(); }
function resume(){ const s=loadSession(); if(!s)return; S.leagueId=s.leagueId; S.myId=s.myId; S.code=s.code; S.view="game"; startPoll(); refresh(); }
function viewCreate(){
  return `<button class="btn ghost sm" onclick="S.view='home';render()">← Retour</button>
   <div class="box"><h2 style="margin-top:0">Créer la ligue</h2>
     <label>Ton prénom</label><input id="cName" placeholder="Hervé">
     <label>Nombre de joueurs humains (toi inclus)</label>
     <select id="cN">${[2,3,4,5,6,7,8].map(n=>`<option value="${n}">${n} joueurs</option>`).join("")}</select>
     <div class="mini muted" style="margin-top:8px">Si le total est impair, un 🤖 joueur IA est ajouté (il ne subit pas le gage).</div>
     <div style="height:12px"></div><button class="btn" onclick="createLeague()">Créer et obtenir le code →</button></div>`;
}
async function createLeague(){
  if(busy)return; const name=($("cName").value||"").trim(); const nH=+$("cN").value;
  if(!name){showErr("Entre ton prénom.");return;} busy=true; showErr("");
  try{
    const nP = nH%2===1 ? nH+1 : nH; const code=genCode();
    const lg=await q(db.from("leagues").insert({code,name:"Ligue de "+name,status:"lobby",num_participants:nH,num_days:2*(nP-1),gage:pick(GAGES)}).select().single());
    const pl=await q(db.from("players").insert({league_id:lg.id,name,emoji:EMOJIS[0],is_organizer:true,join_order:0}).select().single());
    S.leagueId=lg.id; S.myId=pl.id; S.code=code; S.view="game"; saveSession(); setSeen(0);
    startPoll(); await refresh();
  }catch(e){ showErr("Création : "+e.message); } busy=false;
}
function viewJoin(){
  return `<button class="btn ghost sm" onclick="S.view='home';render()">← Retour</button>
   <div class="box"><h2 style="margin-top:0">Rejoindre une ligue</h2>
     <label>Code de la ligue</label><input id="jCode" value="${esc(S.joinCode||'')}" maxlength="5" style="text-transform:uppercase">
     <label>Ton prénom</label><input id="jName" placeholder="Marc">
     <div style="height:12px"></div><button class="btn" onclick="doJoin()">Rejoindre →</button></div>`;
}
function doJoin(){ const c=($("jCode").value||"").toUpperCase().trim(); const n=($("jName").value||"").trim();
  if(c.length<3){showErr("Code invalide.");return;} if(!n){showErr("Entre ton prénom.");return;} joinLeague(c,n); }
async function joinLeague(code,name){
  if(busy)return; const nm=(name||"").trim(); if(!nm){showErr("Entre ton prénom.");return;} busy=true; showErr("");
  try{
    const lg=await q(db.from("leagues").select("*").eq("code",code).single());
    if(lg.status!=="lobby"){ showErr("Cette ligue a déjà démarré."); busy=false; return; }
    const ps=await q(db.from("players").select("*").eq("league_id",lg.id).order("join_order"));
    const humans=ps.filter(p=>!p.is_ai);
    if(humans.length>=lg.num_participants){ showErr("La ligue est complète."); busy=false; return; }
    const ord=humans.length;
    const pl=await q(db.from("players").insert({league_id:lg.id,name:nm,emoji:EMOJIS[ord]||"🎮",join_order:ord}).select().single());
    S.leagueId=lg.id; S.myId=pl.id; S.code=code; S.view="game"; saveSession(); setSeen(0);
    startPoll(); await refresh();
  }catch(e){ showErr("Impossible de rejoindre : "+e.message); } busy=false;
}

/* ============ GAME dispatch ============ */
function viewGame(){
  if(!L) return `<div class="box">Chargement…</div>`;
  if(L.status==="lobby") return viewLobby();
  if(S.recap) return viewRecap(S.dispDay);
  if(L.status==="done") return viewEnd();
  return viewDay();
}
function viewLobby(){
  const humans=players.filter(p=>!p.is_ai); const full=humans.length>=L.num_participants; const org=me()&&me().is_organizer;
  return `<div class="box" style="text-align:center"><div class="mini muted">CODE D'INVITATION</div><div class="code">${esc(L.code)}</div>
      <div style="margin-top:8px"><button class="btn sm" onclick="copyCode()">📋 Copier le code</button></div></div>
    <h2>Joueurs · ${humans.length} / ${L.num_participants}</h2>
    ${players.map(p=>`<div class="box row"><div class="row" style="gap:9px"><span class="sport">${p.emoji}</span><b>${esc(p.name)}</b>
        ${p.is_organizer?'<span class="tag">organisateur</span>':''}${p.is_ai?'<span class="tag">IA</span>':''}${p.id===S.myId?'<span class="chip b">toi</span>':''}</div>
        <span class="chip g">Prêt</span></div>`).join("")}
    ${(L.num_participants%2===1)?`<div class="box row" style="border-style:dashed"><div class="row" style="gap:9px"><span class="sport">🤖</span><b>Joueur IA</b></div><span class="chip b">au lancement</span></div>`:""}
    <div style="height:8px"></div>
    ${org?`<button class="btn" onclick="startLeague()" ${full?'':'disabled'}>${full?'Lancer le championnat →':'En attente des joueurs ('+humans.length+'/'+L.num_participants+')'}</button>`
        :`<div class="box mini muted" style="text-align:center">En attente que l'organisateur lance le championnat…</div>`}`;
}
function copyCode(){ navigator.clipboard?.writeText(L.code); toast("Code copié : "+L.code); }
async function startLeague(){
  if(busy)return; busy=true;
  try{
    let ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    if(ps.length%2===1){ await q(db.from("players").insert({league_id:L.id,name:"Joueur IA",emoji:"🤖",is_ai:true,join_order:ps.length}));
      ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order")); }
    const n=ps.length; const sched=makeSchedule(n); const rows=[];
    sched.forEach((pairs,day)=>pairs.forEach(pr=>rows.push({league_id:L.id,day,home_id:ps[pr[0]].id,away_id:ps[pr[1]].id,fixtures:null})));
    await q(db.from("duels").insert(rows));
    for(const p of ps){ await q(db.from("players").update({hand:dealHand(sched.length)}).eq("id",p.id)); }
    await q(db.from("leagues").update({status:"running",num_days:sched.length,current_day:0}).eq("id",L.id));
    setSeen(0); await refresh();
  }catch(e){ showErr("Lancement : "+e.message); } busy=false;
}

/* ============ DAY ============ */
function viewDay(){
  const d=myDuel(); const dayLbl=`Journée ${L.current_day+1} / ${L.num_days}`;
  if(!d) return `<div class="box">${dayLbl}<br><span class="muted mini">Aucun duel (repos).</span></div>${standingsBtn()}`;
  const iAmHome=d.home_id===S.myId; const opp=pById(iAmHome?d.away_id:d.home_id);
  if(!d.fixtures){ if(iAmHome) return viewSelect(d,dayLbl,opp);
    return `<div class="box"><b>${dayLbl}</b><div class="mini muted" style="margin-top:6px">En attente que <b>${esc(opp.name)}</b> (à domicile) choisisse les 5 matchs…</div></div>${standingsBtn()}`; }
  if(!myBet()) return viewBet(d,dayLbl,opp,iAmHome);
  return viewWait(dayLbl);
}
function standingsBtn(){ return `<div style="height:8px"></div><button class="btn ghost" onclick="S.view='standings';render()">Voir le classement</button>`; }

/* --- selection --- */
let selPool=null, selChosen=[];
function viewSelect(d,dayLbl,opp){
  if(!selPool){ selPool=genPool(9); selChosen=[]; }
  return `<div class="box"><div class="row"><b>${dayLbl}</b><span class="chip b">🏠 Domicile</span></div>
     <div class="mini muted" style="margin-top:6px">Choisis 5 rencontres (${selChosen.length}/5) — imposées à ${esc(opp.name)}.</div></div>
     ${selPool.map((f,i)=>{const on=selChosen.includes(i);return `<div class="box row" onclick="toggleSel(${i})" style="cursor:pointer;${on?'border-color:var(--green)':''}">
       <div class="row" style="gap:9px"><span class="sport">${f.sport}</span><div><b>${esc(f.home)} – ${esc(f.away)}</b>

/* --- waiting / resolve --- */
function humansToSubmit(){ return players.filter(p=>!p.is_ai).filter(p=>!bets.find(b=>b.player_id===p.id)); }

/* ============ RESOLUTION (cards engine) ============ */
function aiPlay(cap,fx,hand){
  const budget=cap*0.5*rnd(0.6,1); const ws=fx.map(()=>rnd(0.5,1.5)); const sw=ws.reduce((a,b)=>a+b,0);
  const picks=fx.map((f,i)=>{ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]]; outs.sort((a,b)=>a[1]-b[1]);
    const sel=Math.random()<0.7?outs[0][0]:pick(outs)[0]; return {sel,stake:Math.round(budget*ws[i]/sw)}; });
  const captain=Math.floor(Math.random()*fx.length);
  let card=null; if(hand&&hand.length&&Math.random()<0.4){ const id=pick(hand); card={id,target:CARDS[id].t?Math.floor(Math.random()*fx.length):null}; }
  return {picks,captain,card};
}
async function resolveDay(){
  if(resolving)return; resolving=true; showErr("");
  try{
    const D=L.current_day;
    const fresh=await q(db.from("leagues").select("*").eq("id",L.id).single());
    if(fresh.current_day!==D||fresh.status!=="running"){ resolving=false; await refresh(); return; }
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const dz=await q(db.from("duels").select("*").eq("league_id",L.id).eq("day",D));
    const bz=await q(db.from("bets").select("*").eq("league_id",L.id).eq("day",D));
    const N=ps.length; const pmap={}; ps.forEach(p=>pmap[p.id]=p);
    const capStart={}; ps.forEach(p=>capStart[p.id]=p.capital);
    const PD={}; const aiInserts=[];
    for(const d of dz){ let fx=d.fixtures||genPool(5); fx.forEach(f=>{if(!f.res)f.res=simResult(f);}); d.fixtures=fx;
      for(const pid of [d.home_id,d.away_id]){ let bt=bz.find(b=>b.player_id===pid);
        if(!bt){ const ai=aiPlay(capStart[pid],fx,pmap[pid].hand||[]); bt={player_id:pid,picks:ai.picks,captain:ai.captain,card:ai.card};
          aiInserts.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,card:ai.card,submitted:true}); }
        PD[pid]={picks:bt.picks.map(x=>({...x})),captain:bt.captain,card:bt.card||null,duelId:d.id,oppId:(pid===d.home_id?d.away_id:d.home_id),fx}; } }
    // Phase 1: Chérie c'est cadeau (invert one random opponent bet)
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"){ const opp=PD[pd.oppId];
      if(opp){ const i=Math.floor(Math.random()*opp.picks.length); if(opp.picks[i].sel==="1")opp.picks[i].sel="2"; else if(opp.picks[i].sel==="2")opp.picks[i].sel="1"; } } }
    // Phase 2: settle
    const G={};
    for(const pid in PD){ const pd=PD[pid]; const perBet=[]; let net=0,bestOdd=0;
      pd.picks.forEach((b,i)=>{ const f=pd.fx[i]; const win=b.sel===f.res; const odd=oddOf(f,b.sel);
        let g=win?(+b.stake)*(odd-1):-(+b.stake); if(i===pd.captain) g*=2;
        if(pd.card&&pd.card.target===i){ if(pd.card.id==="double"&&win)g*=2; if(pd.card.id==="tout")g*=(win?3:2); if(pd.card.id==="assurance"&&!win)g=0; }
        if(win&&odd>bestOdd) bestOdd=odd; perBet.push({gain:g,win,odd}); net+=g; });
      G[pid]={perBet,net,bestOdd,bonus:0}; }
    // Phase 3: face then miroir
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="face"){ const opp=G[pd.oppId];
      if(opp){ const wi=opp.perBet.map((b,i)=>b.win?i:-1).filter(i=>i>=0);
        if(wi.length){ const k=wi[Math.floor(Math.random()*wi.length)]; const cut=opp.perBet[k].gain/2; opp.perBet[k].gain-=cut; opp.net-=cut; } } } }
    for(const d of dz){ const a=d.home_id,b=d.away_id; const useM=(PD[a].card&&PD[a].card.id==="miroir")||(PD[b].card&&PD[b].card.id==="miroir");
      if(useM){ const best=g=>{let bi=-1,bv=0; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); return {bi,bv};};
        const ba=best(G[a]), bb=best(G[b]); const va=ba.bv, vb=bb.bv;
        if(ba.bi>=0){ G[a].perBet[ba.bi].gain+=(vb-va); G[a].net+=(vb-va); }
        if(bb.bi>=0){ G[b].perBet[bb.bi].gain+=(va-vb); G[b].net+=(va-vb); } } }
    // Phase 4: sniper, roi
    for(const pid in PD){ const pd=PD[pid]; const g=G[pid];
      if(pd.card&&pd.card.id==="sniper"&&pd.card.target!=null){ let bi=-1,bv=-1e9; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); if(bi===pd.card.target&&g.perBet[bi].gain>0) g.bonus+=capStart[pid]*0.10; }
      if(pd.card&&pd.card.id==="roi"){ if(g.perBet.some(x=>x.win&&x.odd>4.0)) g.bonus+=capStart[pid]*0.05; } }
    // Phase 5: gourmand, serge
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="gourmand"){ const opp=G[pd.oppId]; if(opp){ const on=opp.net+opp.bonus; if(on>0) G[pid].bonus+=0.2*on; } } }
    { let mp=null,mv=-1e9; for(const pid in G){ const v=G[pid].net+G[pid].bonus; if(v>mv){mv=v;mp=pid;} }
      const anySerge=Object.keys(PD).some(pid=>PD[pid].card&&PD[pid].card.id==="serge");
      if(anySerge&&mv>0&&N>1){ const pot=0.1*mv; G[mp].bonus-=pot; const sh=pot/(N-1); for(const pid in G){ if(pid!==mp) G[pid].bonus+=sh; } } }
    // finalize
    const dayNet={},dayBest={}; for(const pid in G){ dayNet[pid]=G[pid].net+G[pid].bonus; dayBest[pid]=G[pid].bestOdd; }
    for(const d of dz){ await q(db.from("duels").update({fixtures:d.fixtures,resolved:true}).eq("id",d.id)); }
    if(aiInserts.length) await q(db.from("bets").upsert(aiInserts,{onConflict:"player_id,day"}));
    for(const pid in dayNet){ await q(db.from("bets").update({net:dayNet[pid]}).eq("league_id",L.id).eq("day",D).eq("player_id",pid)); }
    const order=[...ps].sort((a,b)=>(dayNet[b.id]||0)-(dayNet[a.id]||0));
    const upd={}; ps.forEach(p=>{ upd[p.id]={points:p.points,capital:Math.max(0,capStart[p.id]+(dayNet[p.id]||0)),
      streak_w:p.streak_w,streak_l:p.streak_l,duel_wins:p.duel_wins,best_day:Math.max(p.best_day,dayNet[p.id]||0),
      best_odd:Math.max(p.best_odd,dayBest[p.id]||0),hand:(p.hand||[]).slice(),cards_used:(p.cards_used||[]).slice()}; });
    order.forEach((p,i)=>{ upd[p.id].points += (N-i); });
    for(const d of dz){ const nh=dayNet[d.home_id]||0,na=dayNet[d.away_id]||0; let w=null,l=null;
      if(nh>na){w=d.home_id;l=d.away_id;} else if(na>nh){w=d.away_id;l=d.home_id;}
      if(w){ upd[w].points+=1; upd[w].duel_wins+=1; upd[w].streak_w+=1; upd[w].streak_l=0;
        if(upd[w].streak_w===3) upd[w].capital*=1.02;
        if(upd[w].streak_w===5) upd[w].hand.push(randomCard());
        upd[l].streak_l+=1; upd[l].streak_w=0; if(upd[l].streak_l===4) upd[l].hand.push("assurance"); } }
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id){ const h=upd[pid].hand; const idx=h.indexOf(pd.card.id); if(idx>=0){ h.splice(idx,1); upd[pid].cards_used.push(pd.card.id); } } }
    for(const p of ps){ const u=upd[p.id]; await q(db.from("players").update({points:u.points,capital:u.capital,streak_w:u.streak_w,streak_l:u.streak_l,duel_wins:u.duel_wins,best_day:u.best_day,best_odd:u.best_odd,hand:u.hand,cards_used:u.cards_used}).eq("id",p.id)); }
    const next=D+1; const done=next>=fresh.num_days;
    await q(db.from("leagues").update({current_day:next,status:done?"done":"running"}).eq("id",L.id));
    resolving=false; await refresh(); toast("Journée résolue ✓");
  }catch(e){ showErr("Résolution : "+e.message); resolving=false; }
}

/* ============ RECAP ============ */
function viewRecap(D){
  const netMap={},cardMap={},capMap={}; bets.forEach(b=>{netMap[b.player_id]=b.net||0; cardMap[b.player_id]=b.card;});
  const ord=[...players].sort((a,b)=>(netMap[b.id]||0)-(netMap[a.id]||0));
  const dpts={}; ord.forEach((p,i)=>dpts[p.id]=players.length-i);
  duels.forEach(d=>{ const nh=netMap[d.home_id]||0,na=netMap[d.away_id]||0; if(nh>na)dpts[d.home_id]+=1; else if(na>nh)dpts[d.away_id]+=1; });
  const meB=bets.find(b=>b.player_id===S.myId); const myD=duels.find(d=>d.home_id===S.myId||d.away_id===S.myId);

      let g=win?(+b.stake)*(odd-1):-(+b.stake); if(i===meB.captain)g*=2; const capi=(i===meB.captain);

        <b class="${g>=0?'green':'red'}">${fmt(g)} €</b></div>`; }).join(""); }
  return `<div class="box" style="background:linear-gradient(135deg,${myNet>=0?'#12251a':'#251215'},#0e1117);border-color:${won?'#2b6b45':(tie?'#3a3f4a':'#6b2b2b')}">
      <div class="row"><div><div class="mini muted">JOURNÉE ${D+1} — TON GAIN</div><div class="big ${myNet>=0?'green':'red'}">${fmt(myNet)} €</div></div>

        <div class="mini muted">Ta carte : ${cardTxt(meB&&meB.card)}</div></div></div></div>
    ${detail?`<h2>Tes 5 paris</h2>${detail}`:''}
    <h2>Résultats de la journée</h2>
    <div class="box" style="padding:4px 10px"><table><tr><th>#</th><th>Joueur</th><th style="text-align:right">Gain</th><th style="text-align:right">Pts jour</th><th>Carte</th></tr>
      ${ord.map((p,i)=>`<tr><td>${i+1}</td><td>${p.emoji} ${esc(p.name)}${p.id===S.myId?' <span class="tag">(toi)</span>':''}</td>
        <td class="num ${(netMap[p.id]||0)>=0?'green':'red'}">${fmt(netMap[p.id]||0)}€</td><td class="num"><b>${dpts[p.id]}</b></td>
        <td class="mini">${cardMap[p.id]&&cardMap[p.id].id?CARDS[cardMap[p.id].id].e:'–'}</td></tr>`).join("")}</table></div>
    <button class="btn" onclick="ackRecap()">Continuer →</button>
    <button class="btn ghost" style="margin-top:8px" onclick="S.view='standings';render()">Voir le classement général</button>`;
}

  return `<div style="text-align:center;margin:10px 0"><div style="font-size:46px">🏆</div>
     <div style="font-size:24px;font-weight:800" class="gold">${champ.emoji} ${esc(champ.name)}, Champion !</div>
     <div class="mini muted">${champ.points} pts · ${Math.round(champ.capital)} €</div></div>
   <div class="box" style="padding:4px 10px"><table><tr><th>#</th><th>Joueur</th><th style="text-align:right">Pts</th><th style="text-align:right">Capital</th></tr>
     ${ord.map((p,i)=>`<tr><td>${i+1}</td><td>${p.emoji} ${esc(p.name)}${p.is_ai?' <span class="tag">hors gage</span>':''}</td><td class="num"><b>${p.points}</b></td><td class="num muted">${Math.round(p.capital)}€</td></tr>`).join("")}</table></div>
   <div class="box" style="border-color:#5a2b2b"><div class="row"><b class="red">🎭 Gage</b><span class="chip red">${last.emoji} ${esc(last.name)}</span></div>
     <div class="mini muted" style="margin-top:6px">${esc(last.name)} doit réaliser : <b>${esc(L.gage)}</b>.</div></div>
   <button class="btn ghost" onclick="leave()">Quitter</button>`;
}

/* ============ render / poll ============ */
function render(){
  $("leaveBtn").classList.toggle("hide", S.view==="home"||S.view==="create"||S.view==="join"||S.view==="rules");
  let html="";
  if(S.view==="home") html=viewHome();
  else if(S.view==="create") html=viewCreate();
  else if(S.view==="join") html=viewJoin();
  else if(S.view==="rules") html=viewRules();
  else if(S.view==="standings") html=viewStandings();
  else html=viewGame();
  $("root").innerHTML=html;
  $("subtitle").textContent = L? (L.status==="lobby"?"Salon · "+L.code : (L.status==="done"?"Terminé":"Journée "+(L.current_day+1)+"/"+L.num_days)) : "Multijoueur en ligne";
}
// pendant la composition (choix des matchs à domicile ou saisie des pronos), on ne rafraîchit pas
// pour ne pas re-dessiner et fermer le champ en cours de saisie.
function isComposing(){
  if(S.view!=="game"||!L||L.status!=="running"||S.recap) return false;
  const d=myDuel(); if(!d) return false;
  if(!d.fixtures) return d.home_id===S.myId; // à domicile : en train de choisir les 5 matchs
  return !myBet();                            // en train de faire ses pronos/mises
}
function startPoll(){ if(poll) clearInterval(poll); poll=setInterval(()=>{ if((S.view==="game"||S.view==="standings")&&!isComposing()) refresh(); },4000); }
function openRules(){ if(S.view==="rules")return; S.prevView=S.view; S.view="rules"; render(); }
function closeRules(){ S.view=S.prevView||(S.leagueId?"game":"home"); render(); }
function viewRules(){
  const card=id=>`<div class="row" style="align-items:flex-start;margin:6px 0"><span class="sport" style="margin-right:8px">${CARDS[id].e}</span><div><b class="mini">${esc(CARDS[id].n)}</b><div class="mini muted">${esc(CARDS[id].d)}</div></div></div>`;
  return `<button class="btn ghost sm" onclick="closeRules()">← Retour</button>
   <div class="box"><h2 style="margin-top:0">📖 Règles du jeu</h2>
     <p class="mini"><b>But :</b> championnat de pronostics entre amis, sur de vrais événements et de vraies cotes, <b>sans argent réel</b>. On démarre à <b>100 € virtuels</b> ; le vainqueur est celui qui a le plus de <b>points de championnat</b>. Le dernier joueur humain fait le gage voté au départ.</p></div>
   <div class="box"><b>🗓️ Format</b>
     <div class="mini muted" style="margin-top:6px">Aller-retour entre tous (Round Robin). Si le nombre d'humains est impair, un 🤖 joueur IA complète (il ne subit pas le gage). Chaque jour = une confrontation en duel.</div></div>
   <div class="box"><b>⚽ Une journée</b>
     <ul class="mini muted" style="margin:6px 0 0;padding-left:18px">
       <li>Le joueur <b>à domicile</b> choisit les <b>5 rencontres</b> (imposées aux deux).</li>
       <li>Chacun fait ses <b>pronostics + mises</b>. Total des mises ≤ <b>50 %</b> du capital (70 % avec la carte Investisseur).</li>
       <li><b>👑 Pari du Capitaine</b> : un pari désigné secrètement — gain <b>et</b> perte <b>doublés</b>.</li>
       <li>Optionnel : <b>1 carte bonus</b> (voir plus bas), révélée à la résolution.</li>
       <li>Gain d'un pari = mise × (cote − 1) ; pari perdu = − mise. Le capital ne descend jamais sous 0.</li>
     </ul></div>
   <div class="box"><b>🏆 Points & classement</b>
     <div class="mini muted" style="margin-top:6px">Chaque journée, les joueurs sont classés au <b>gain net</b> du jour → le 1er reçoit N points (N = nb de joueurs), le dernier 1 point. Le <b>vainqueur de son duel</b> gagne <b>+1 point</b>. Départage : capital, puis victoires en duel, plus gros gain, plus grosse cote.</div></div>
   <div class="box"><b>🔥 Séries</b>
     <div class="mini muted" style="margin-top:6px">3 victoires de duel d'affilée → +2 % de capital · 5 victoires → +1 carte aléatoire · 4 défaites → carte Assurance offerte.</div></div>
   <div class="box"><b>🃏 Cartes bonus</b>
     <div class="mini muted" style="margin:6px 0">Main distribuée au lancement (2 à 8 cartes selon la durée), 1 carte max par journée, chacune utilisable une seule fois.</div>
     ${Object.keys(CARDS).map(card).join("")}</div>
   <div class="box"><b>😴 Oubli</b><div class="mini muted" style="margin-top:6px">Pas de validation à temps → paris repris de l'adversaire, pronostics inversés.</div></div>`;
}
function leave(){ if(!confirm("Quitter cette partie sur cet appareil ?"))return; if(poll)clearInterval(poll); clearSession(); S={view:"home",leagueId:null,myId:null,code:null,joinCode:"",recap:false,dispDay:0}; L=null; render(); }

/* ============ boot ============ */
(function boot(){
  if(!window.supabase){ showErr("Librairie Supabase non chargée (vérifie ta connexion Internet)."); return; }
  const s=loadSession();
  if(s&&s.leagueId){ S.leagueId=s.leagueId; S.myId=s.myId; S.code=s.code; S.view="game"; startPoll(); refresh(); }
  else { S.view="home"; render(); }
})();
</script>
</body>
</html>
