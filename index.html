<style>
  :root{ --bg:#0b0e13; --panel:#151a22; --panel2:#1d2430; --border:#242b38; --ink:#e6e8ee;
    --muted:#8b93a3; --green:#4ade80; --red:#f87171; --gold:#fbbf24; --blue:#60a5fa; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .app{max-width:540px;margin:0 auto;padding:16px 16px 60px;}
  h1{font-size:22px;margin:0;letter-spacing:-.4px;}
  h2{font-size:16px;margin:18px 0 8px;}
  .sub{color:var(--muted);font-size:13px;}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;margin:10px 0;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .muted{color:var(--muted);} .green{color:var(--green);} .red{color:var(--red);}
  .gold{color:var(--gold);} .blue{color:var(--blue);} .mini{font-size:12px;}
  .btn{background:var(--green);color:#07130b;font-weight:700;border:none;border-radius:12px;
    padding:13px;width:100%;font-size:15px;cursor:pointer;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--ink);}
  .btn.sm{width:auto;padding:8px 14px;font-size:13px;border-radius:10px;}
  input,select{background:var(--panel2);border:1px solid var(--border);color:var(--ink);
    border-radius:10px;padding:11px;font-size:15px;width:100%;}
  input[type=number]{width:84px;text-align:right;}
  label{font-size:13px;color:var(--muted);display:block;margin:10px 0 4px;}
  .chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted);}
  .chip.g{background:rgba(74,222,128,.14);border-color:rgba(74,222,128,.4);color:#8ff0b4;}
  .chip.b{background:rgba(96,165,250,.14);border-color:rgba(96,165,250,.4);color:#a9cbff;}
  .chip.gold{background:rgba(250,204,21,.15);border-color:rgba(250,204,21,.45);color:#fde68a;}
  .chip.red{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.4);color:#ffb4b4;}
  .sport{width:24px;height:24px;border-radius:6px;background:var(--panel2);display:inline-flex;
    align-items:center;justify-content:center;font-size:13px;flex:0 0 auto;}
  .odds{display:flex;gap:7px;margin-top:9px;}
  .odd{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:9px;
    padding:7px 2px;text-align:center;font-size:12px;cursor:pointer;line-height:1.25;}
  .odd b{display:block;font-size:13px;}
  .odd.sel{background:#123020;border-color:var(--green);color:#8ff0b4;}
  .gauge{height:8px;border-radius:6px;background:#232a35;overflow:hidden;margin-top:6px;}
  .gauge>i{display:block;height:100%;background:var(--green);}
  .gauge.over>i{background:var(--red);}
  .tog{font-size:11px;border:1px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;color:var(--muted);}
  .tog.cap.on{background:rgba(250,204,21,.16);border-color:var(--gold);color:var(--gold);}
  .tog.tgt.on{background:rgba(96,165,250,.16);border-color:var(--blue);color:var(--blue);}
  .cards{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}

  td.num{text-align:right;}
  .hide{display:none;}
  .code{font-size:30px;letter-spacing:7px;font-weight:800;color:var(--green);text-align:center;}

  .err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.4);color:#ffb4b4;
    border-radius:10px;padding:10px 12px;margin:10px 0;font-size:13px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:var(--panel2);

  .mbox{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:340px;width:100%;text-align:center;}

 assurance:{e:"🛡",n:"Assurance",t:true,  d:"Un pari choisi : s'il perd, mise remboursée."},

const COMMON=["assurance","double"];
const RANDOM_POOL=["miroir","gourmand","face","serge","cadeau","sniper","invest","roi","tout"];
function handSize(d){ if(d>=18)return 8; if(d>=15)return 6; if(d>=12)return 5; if(d>=9)return 4; if(d>=6)return 3; return 2; }
function dealHand(nDays){ const size=handSize(nDays); const nc=Math.round(size/2); const hand=[];
  for(let i=0;i<nc;i++) hand.push(COMMON[i%COMMON.length]);
  const pool=[...RANDOM_POOL]; for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  for(let i=0;i<size-nc;i++) hand.push(pool[i%pool.length]); return hand; }
function randomCard(){ return RANDOM_POOL[Math.floor(Math.random()*RANDOM_POOL.length)]; }
const CARD_PRICE={tout:12,sniper:10,miroir:10,double:10,gourmand:8,face:8,cadeau:8,assurance:8,invest:6,roi:6,serge:6};
const SHOP_CAP=40; // dépense max en bonus sur les 100€
// Formules de rythme : délais MAX (heures) pour choisir les matchs puis miser.
const FORMULAS={
  fast:      {n:"⚡ Fast",      sel:12, bet:12, d:"~12h pour choisir les matchs, puis ~12h pour miser (idée : de midi à minuit, puis de minuit à midi)."},
  classique: {n:"🗓️ Classique", sel:24, bet:24, d:"~24h pour choisir, puis ~24h pour miser — 48h en tout (idée : de midi au lendemain midi, deux fois)."}
};
function leagueFormula(){ return FORMULAS[(L&&L.formula)||'classique'] || FORMULAS.classique; }
// Échéances du jour courant à partir de day_started_at (si présent). sel = fin sélection, bet = clôture paris.
function dayTimes(){ const f=leagueFormula(); const t0=(L&&L.day_started_at)?new Date(L.day_started_at).getTime():0;
  if(!t0||isNaN(t0)) return {ok:false,sel:0,bet:0}; return {ok:true, sel:t0+f.sel*3600000, bet:t0+(f.sel+f.bet)*3600000}; }
function fmtWhen(ts){ if(!ts) return ""; const d=new Date(ts); const now=new Date(); const hm=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const sameDay=d.toDateString()===now.toDateString(); const tomorrow=new Date(now.getTime()+86400000).toDateString()===d.toDateString();
  return (sameDay?"aujourd'hui":(tomorrow?"demain":d.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'2-digit'})))+" "+hm; }
function selLineHTML(){ const dt=dayTimes(); return dt.ok?`<div class="mini muted" style="margin-top:4px">⏳ Choix des matchs avant <b>${fmtWhen(dt.sel)}</b> · ${leagueFormula().n}</div>`:''; }
function betLineHTML(){ const dt=dayTimes(); return dt.ok?`<div class="mini muted" style="margin-top:4px">⏳ Clôture des paris <b>${fmtWhen(dt.bet)}</b> · ${leagueFormula().n}</div>`:''; }
function aiShop(){ const ids=Object.keys(CARDS); for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
  const budget=Math.round(rnd(10,SHOP_CAP)); let spent=0; const hand=[]; for(const id of ids){ const p=CARD_PRICE[id]||8; if(spent+p<=budget){ hand.push(id); spent+=p; } } return {hand,capital:100-spent}; }

/* ============ STATE ============ */
let S={ view:"auth", leagueId:null, myId:null, code:null, recap:false, dispDay:0, prevView:"leagues" };
let AUTH=null, myLeagues=[];
let L=null, players=[], duels=[], bets=[];
let poll=null, busy=false, resolving=false, chartBets=null, chartDay=-1;
let palmares=null, adminData=null, palmOpen="";
let adminUsers=null, adminPwd="";

/* ============ utils ============ */
const $=id=>document.getElementById(id);
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const fmt=n=>(n>=0?"+":"")+Math.round(n);
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function showErr(m){ $("err").innerHTML = m?`<div class="err">${esc(m)}</div>`:""; }
function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function showCardInfo(id){ const c=CARDS[id]; if(!c)return; closeCardInfo();
  const o=document.createElement("div"); o.id="cardModal"; o.className="modal";
  o.addEventListener("click",e=>{ if(e.target===o) closeCardInfo(); });

  document.body.appendChild(o); }

/* ---- Notifications (onglet ouvert : système si en arrière-plan, sinon rappel dans l'app) ---- */
let notifKey=null;
function notifAvailable(){ return typeof window!=="undefined" && "Notification" in window; }
function askNotif(){ try{ if(notifAvailable() && Notification.permission==="default") Notification.requestPermission(); }catch(e){} }
function notify(title,body){ try{ if(notifAvailable() && Notification.permission==="granted" && document.hidden){ new Notification(title,{body}); } }catch(e){} toast(body); }
function myActionKey(){
  if(!L) return null;
  if(L.status==="prep") return (me()&&!me().shop_done)?("prep:"+L.id):null;
  if(L.status==="running"){
    if(S.recap) return "recap:"+L.id+":"+S.dispDay;
    const d=myDuel(); if(!d) return null;
    if(!d.fixtures) return (d.home_id===S.myId)?("sel:"+L.id+":"+L.current_day):null;
    if(!myBet()) return "bet:"+L.id+":"+L.current_day;
  }
  return null;
}
function notifMsg(key){
  if(key.indexOf("prep:")===0) return ["🎬 Préparation","Vote le gage et mise sur les bonus."];
  if(key.indexOf("sel:")===0)  return ["🏠 À toi de jouer !","Choisis les 5 matchs de la journée."];
  if(key.indexOf("bet:")===0)  return ["⚽ Paris ouverts","À toi de faire tes pronostics !"];
  if(key.indexOf("recap:")===0) return ["📊 Résultats dispo","Les résultats de la journée sont là."];

}

async function q(p){ const {data,error}=await p; if(error) throw new Error(error.message); return data; }

/* ============ schedule ============ */
function makeSchedule(n){ let arr=[...Array(n).keys()]; const rounds=[];
  for(let r=0;r<n-1;r++){ const pairs=[];
    for(let i=0;i<n/2;i++){ let a=arr[i],b=arr[n-1-i]; if((r+i)%2===0) pairs.push([a,b]); else pairs.push([b,a]); }
    rounds.push(pairs); arr=[arr[0],arr[n-1],...arr.slice(1,n-1)]; }
  const ret=rounds.map(rd=>rd.map(p=>[p[1],p[0]])); return [...rounds,...ret]; }

/* ============ fixtures ============ */
function genFixture(){ const s=pick(SPORTS); const a=pick(s.t); let b=pick(s.t); while(b===a) b=pick(s.t);
  const f={sport:s.ic,draw:s.draw,home:a,away:b,oh:+rnd(1.4,3.2).toFixed(2),oa:+rnd(1.5,3.6).toFixed(2)};
  if(s.draw) f.od=+rnd(3.0,3.9).toFixed(2); return f; }
function genPool(k){ return Array.from({length:k},genFixture); }
function oddOf(f,sel){ return sel==="1"?f.oh:sel==="2"?f.oa:f.od; }
function simResult(f){ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]];
  const inv=outs.map(o=>1/o[1]); const sum=inv.reduce((a,b)=>a+b,0);
  let r=Math.random(); for(let i=0;i<outs.length;i++){ r-=inv[i]/sum; if(r<=0) return outs[i][0]; } return outs[outs.length-1][0]; }

/* ============ data ============ */
async function refresh(){
  if(!S.leagueId) return;
  try{
    L = await q(db.from("leagues").select("*").eq("id",S.leagueId).single());
    players = await q(db.from("players").select("*").eq("league_id",S.leagueId).order("join_order"));
    // fin de préparation AUTOMATIQUE : dès que tous ont validé (ou délai écoulé), on démarre sans clic
    if(L.status==="prep" && !resolving){
      const humans=players.filter(p=>!p.is_ai); const allDone=humans.length>=2 && humans.every(p=>p.shop_done);
      const st=prepState(); const dlPassed=st.deadline && new Date(st.deadline).getTime()<=Date.now();
      if(allDone||dlPassed){ resolvePrep(); return; }
    }
    S.recap = L.status!=="lobby" && (L.current_day>getSeen()) && (L.current_day>=1);
    const dispDay = S.recap ? L.current_day-1 : Math.min(L.current_day, Math.max(0,(L.num_days||1)-1));
    S.dispDay = dispDay;
    duels = await q(db.from("duels").select("*").eq("league_id",S.leagueId).eq("day",dispDay));
    bets  = await q(db.from("bets").select("*").eq("league_id",S.leagueId).eq("day",dispDay));
    // sélection auto (IA à domicile, ou échéance de sélection dépassée) + résolution auto
    if(L.status==="running" && !S.recap && !resolving){
      if(await ensureFixtures()){ duels = await q(db.from("duels").select("*").eq("league_id",S.leagueId).eq("day",dispDay)); }
      if(shouldAutoResolve()){ resolveDay(); return; }
    }
    if(chartDay!==L.current_day){ chartDay=L.current_day; chartBets=null; }
    if((L.status==="running"||L.status==="done") && chartBets===null && L.current_day>=1){ chartBets = await q(db.from("bets").select("player_id,day,net").eq("league_id",S.leagueId).not("net","is",null)); }
    showErr(""); render(); maybeNotify();
  }catch(e){ showErr("Connexion : "+e.message); }
}
async function ensureFixtures(){ let filled=false; const dt=dayTimes(); const selPassed=dt.ok && Date.now()>=dt.sel;
  for(const d of duels){ if(d.fixtures) continue; const h=pById(d.home_id);
    const auto=(h&&h.is_ai) || selPassed; // IA à domicile → tout de suite ; humain à domicile → à l'échéance de sélection
    if(auto){ try{ const r=await q(db.from("duels").update({fixtures:genPool(5)}).eq("id",d.id).is("fixtures",null).select()); if(r&&r.length) filled=true; }catch(e){} } }
  return filled; }
function shouldAutoResolve(){
  const dz=duels; if(!dz.length || dz.some(d=>!d.fixtures)) return false; // sélection pas finie
  const inDay=new Set(); dz.forEach(d=>{inDay.add(d.home_id);inDay.add(d.away_id);});
  const dayHumans=players.filter(p=>!p.is_ai && inDay.has(p.id));
  const allBet = dayHumans.length>0 && dayHumans.every(p=>bets.find(b=>b.player_id===p.id));
  const dt=dayTimes(); const betPassed=dt.ok && Date.now()>=dt.bet;
  return allBet || betPassed;
}
function me(){ return players.find(p=>p.id===S.myId); }
function myDuel(){ return duels.find(d=>d.home_id===S.myId||d.away_id===S.myId); }
function myBet(){ return bets.find(b=>b.player_id===S.myId); }
function pById(id){ return players.find(p=>p.id===id); }

function prepSuperlatives(s){
  const auction=s.auction||[]; const ps=(s.players||[]);
  if(ps.length<2 || !auction.length) return '';
  const nm=pid=>{const p=ps.find(x=>x.pid===pid)||{}; return (p.emoji?p.emoji+' ':'')+esc(p.name||'?');};
  const st={}; ps.forEach(p=>st[p.pid]={bids:0,total:0,won:0,maxBid:0,maxCard:null});
  auction.forEach(a=>{ (a.bids||[]).forEach(bd=>{ const x=st[bd.pid]; if(x&&bd.amt>0){ x.bids++; x.total+=bd.amt; if(bd.amt>x.maxBid){x.maxBid=bd.amt;x.maxCard=a.card;} } }); if(st[a.winner]) st[a.winner].won++; });
  const bidders=ps.filter(p=>st[p.pid].bids>0);
  if(bidders.length<2) return '';
  const best=(arr,fn)=>arr.slice().sort(fn)[0];
  const items=[];
  const strat=best(bidders,(a,b)=> st[b.pid].won-st[a.pid].won || (st[b.pid].won/st[b.pid].bids)-(st[a.pid].won/st[a.pid].bids));
  if(strat && st[strat.pid].won>0) items.push(`🧠 <b>Le stratège :</b> ${nm(strat.pid)} — a raflé <b>${st[strat.pid].won}</b> bonus sur ${st[strat.pid].bids} visé${st[strat.pid].bids>1?'s':''}. Chirurgical.`);
  const poisse=best(bidders,(a,b)=> (st[b.pid].bids-st[b.pid].won)-(st[a.pid].bids-st[a.pid].won));
  if(poisse && (st[poisse.pid].bids-st[poisse.pid].won)>=1 && (!strat||poisse.pid!==strat.pid)) items.push(`😭 <b>La poisse :</b> ${nm(poisse.pid)} — a misé sur ${st[poisse.pid].bids} bonus, repart avec <b>${st[poisse.pid].won}</b>. Aïe aïe aïe.`);
  const radin=best(bidders,(a,b)=> st[a.pid].total-st[b.pid].total);
  if(radin) items.push(`🤏 <b>Le radin :</b> ${nm(radin.pid)} — <b>${st[radin.pid].total}€</b> lâchés en tout, pas un centime de plus.`);
  const fou=best(bidders,(a,b)=> st[b.pid].maxBid-st[a.pid].maxBid);
  if(fou && st[fou.pid].maxBid>0 && (!radin||fou.pid!==radin.pid)) items.push(`🤪 <b>Le plus fou :</b> ${nm(fou.pid)} — <b>${st[fou.pid].maxBid}€</b> d'un coup sur ${CARDS[st[fou.pid].maxCard]?CARDS[st[fou.pid].maxCard].e+' '+esc(CARDS[st[fou.pid].maxCard].n):'un bonus'}. Le poker, ça le connaît.`);
  if(!items.length) return '';
  return `<h2>🎭 Le mot des coulisses</h2><div class="box"><div class="mini" style="line-height:1.9">${items.join('<br>')}</div></div>`;
}

function aiPrep(nDays){ const ids=Object.keys(CARDS); for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
  const maxCards=Math.max(1,nDays); const nb=1+Math.floor(Math.random()*Math.min(maxCards,4)); const budget=Math.round(rnd(15,SHOP_CAP)); const bids={}; let spent=0;
  for(let k=0;k<nb && k<ids.length;k++){ const id=ids[k]; const base=CARD_PRICE[id]||8; const bid=Math.min(base+Math.round(rnd(-2,6)), budget-spent); if(bid>=1){ bids[id]=bid; spent+=bid; } }
  return {vote:Math.floor(Math.random()*4), bids}; }

  const tot=Object.values(bidL).reduce((a,b)=>a+(+b||0),0); const cnt=Object.values(bidL).filter(x=>+x>0).length; const maxCards=Math.max(1,L.num_days||1); const over=tot>SHOP_CAP,tooMany=cnt>maxCards;

async function prepVote(i){ if(busy)return; busy=true;
  try{ const fresh=await q(db.from("leagues").select("gage").eq("id",L.id).single()); let st; try{st=JSON.parse(fresh.gage);}catch(e){st=null;} if(!st||!Array.isArray(st.options)){busy=false;return;}
    st.votes=st.votes||{}; st.votes[S.myId]=i; st.voteTs=st.voteTs||{}; st.voteTs[S.myId]=Date.now(); await q(db.from("leagues").update({gage:JSON.stringify(st)}).eq("id",L.id)); await refresh();
  }catch(e){ showErr("Vote : "+e.message); } busy=false; }
async function savePrep(){ if(busy)return; const tot=Object.values(bidL).reduce((a,b)=>a+(+b||0),0); const cnt=Object.values(bidL).filter(x=>+x>0).length; const maxCards=Math.max(1,L.num_days||1);
  if(tot>SHOP_CAP||cnt>maxCards) return; busy=true;
  try{ const fresh=await q(db.from("leagues").select("gage").eq("id",L.id).single()); let st; try{st=JSON.parse(fresh.gage);}catch(e){st=null;} if(!st||!Array.isArray(st.options)){busy=false;return;}
    st.bids=st.bids||{}; st.bidTs=st.bidTs||{}; st.bids[S.myId]=Object.assign({},bidL); if(st.bidTs[S.myId]==null) st.bidTs[S.myId]=Date.now();
    await q(db.from("leagues").update({gage:JSON.stringify(st)}).eq("id",L.id));
    await q(db.from("players").update({shop_done:true}).eq("id",S.myId)); S.bidLLeague=null; await refresh();
  }catch(e){ showErr("Préparation : "+e.message); } busy=false; }
async function editPrep(){ if(busy)return; busy=true;
  try{ await q(db.from("players").update({shop_done:false}).eq("id",S.myId)); S.bidLLeague=null; await refresh(); }catch(e){ showErr(e.message); } busy=false; }
async function resolvePrep(){ if(resolving)return; resolving=true; showErr("");
  try{
    // verrou atomique : un seul client résout la préparation (évite double enchère)
    const claim=await q(db.from("leagues").update({status:"starting"}).eq("id",L.id).eq("status","prep").select("*"));
    if(!claim||!claim.length){ resolving=false; await refresh(); return; }
    const fresh=claim[0];
    let st; try{st=JSON.parse(fresh.gage);}catch(e){st=null;} const options=(st&&st.options)||[]; const votes=(st&&st.votes)||{}; const voteTs=(st&&st.voteTs)||{}; const bids=(st&&st.bids)||{}; const bidTs=(st&&st.bidTs)||{};
    // gage gagnant — égalité : le PREMIER à avoir voté l'option l'emporte
    let gage="", winIdx=-1;
    if(options.length){ const counts=options.map((_,i)=>Object.values(votes).filter(v=>v===i).length); const mx=Math.max(0,...counts);
      const tied=counts.map((c,i)=>c===mx?i:-1).filter(i=>i>=0); let bestTs=Infinity;
      for(const i of tied){ const voters=Object.keys(votes).filter(pid=>votes[pid]===i); const t=voters.length?Math.min(...voters.map(pid=>voteTs[pid]!=null?voteTs[pid]:Infinity)):Infinity; if(t<bestTs){bestTs=t;winIdx=i;} }
      if(winIdx<0) winIdx=(tied[0]!=null?tied[0]:0); const w=options[winIdx]; gage=(w&&w.t)||w||pick(GAGES).t; }
    else gage=pick(GAGES).t;
    // enchères : chaque bonus au plus offrant (égalité → premier à avoir misé) ; perdants remboursés
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const paid={},won={},auction=[]; ps.forEach(p=>{paid[p.id]=0;won[p.id]=[];});
    for(const cardId in CARDS){ const cand=ps.map(p=>({pid:p.id,amt:(bids[p.id]&&+bids[p.id][cardId])||0,ts:(bidTs[p.id]!=null?bidTs[p.id]:Infinity)})).filter(c=>c.amt>0);
      if(!cand.length) continue; cand.sort((a,b)=> (b.amt-a.amt) || (a.ts-b.ts)); const wpid=cand[0].pid; won[wpid].push(cardId); paid[wpid]+=cand[0].amt;
      auction.push({card:cardId, winner:wpid, amount:cand[0].amt, bids:cand.map(c=>({pid:c.pid,amt:c.amt}))}); }
    for(const p of ps){ await q(db.from("players").update({hand:won[p.id],capital:Math.max(0,100-paid[p.id]),shop_done:true}).eq("id",p.id)); }
    // récap de préparation (affiché avant le coup d'envoi)
    const summary={ gage,
      gageVotes: options.map((o,i)=>({t:(o&&o.t)||o, count:Object.values(votes).filter(v=>v===i).length, win:i===winIdx})),
      auction,
      players: ps.map(p=>({pid:p.id,name:p.name,emoji:p.emoji,is_ai:!!p.is_ai,spent:paid[p.id],capital:Math.max(0,100-paid[p.id]),hand:won[p.id]})) };
    await q(db.from("leagues").update({status:"running",gage,current_day:0,prep_summary:summary}).eq("id",L.id));
    try{ await q(db.from("leagues").update({day_started_at:new Date().toISOString()}).eq("id",L.id)); }catch(e){} // début J1 (défensif)
    resolving=false; setSeen(0); localStorage.removeItem("pl_preps_"+L.id); await refresh(); toast("Championnat lancé ✓");
  }catch(e){ showErr("Démarrage : "+e.message); resolving=false; } }

/* ============ RESOLUTION (cards engine) ============ */
function aiPlay(cap,fx,hand){

    const sel=Math.random()<0.7?outs[0][0]:pick(outs)[0]; return {sel,stake:Math.round(budget*ws[i]/sw)}; });

  let card=null; if(hand&&hand.length&&Math.random()<0.4){ const id=pick(hand); card={id,target:CARDS[id].t?Math.floor(Math.random()*fx.length):null}; }

// Moteur pur : calcule les gains nets du jour à partir des plays (déterministe via pd.rnd).
function runEngine(pdIn, capStart, dz, N){
  const PD=JSON.parse(JSON.stringify(pdIn));
  // Phase 1 : Chérie c'est cadeau (inverse un pari adverse)
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"){ const opp=PD[pd.oppId];
    if(opp){ const i=Math.floor((pd.rnd||0)*opp.picks.length); if(opp.picks[i].sel==="1")opp.picks[i].sel="2"; else if(opp.picks[i].sel==="2")opp.picks[i].sel="1"; } } }
  // Phase 2 : règlement pari par pari
  const G={};
  for(const pid in PD){ const pd=PD[pid]; const perBet=[]; let net=0,bestOdd=0;
    pd.picks.forEach((b,i)=>{ const f=pd.fx[i]; const win=b.sel===f.res; const odd=oddOf(f,b.sel);
      let g=win?(+b.stake)*(odd-1):-(+b.stake); if(i===pd.captain) g*=2;
      if(pd.card&&pd.card.target===i){ if(pd.card.id==="double"&&win)g*=2; if(pd.card.id==="tout")g*=(win?3:2); if(pd.card.id==="assurance"&&!win)g=0; }
      if(win&&odd>bestOdd) bestOdd=odd; perBet.push({gain:g,win,odd}); net+=g; });
    G[pid]={perBet,net,bestOdd,bonus:0}; }
  // Phase 3 : Dans ta face puis Miroir
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="face"){ const opp=G[pd.oppId];
    if(opp){ const wi=opp.perBet.map((b,i)=>b.win?i:-1).filter(i=>i>=0);
      if(wi.length){ const k=wi[Math.floor((pd.rnd||0)*wi.length)]; const cut=opp.perBet[k].gain/2; opp.perBet[k].gain-=cut; opp.net-=cut; } } } }
  for(const d of dz){ const a=d.home_id,b=d.away_id; if(!PD[a]||!PD[b])continue; const useM=(PD[a].card&&PD[a].card.id==="miroir")||(PD[b].card&&PD[b].card.id==="miroir");
    if(useM){ const best=g=>{let bi=-1,bv=0; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); return {bi,bv};};
      const ba=best(G[a]), bb=best(G[b]); const va=ba.bv, vb=bb.bv;
      if(ba.bi>=0){ G[a].perBet[ba.bi].gain+=(vb-va); G[a].net+=(vb-va); }
      if(bb.bi>=0){ G[b].perBet[bb.bi].gain+=(va-vb); G[b].net+=(va-vb); } } }
  // Phase 4 : Sniper, Roi de la cote
  for(const pid in PD){ const pd=PD[pid]; const g=G[pid];
    if(pd.card&&pd.card.id==="sniper"&&pd.card.target!=null){ let bi=-1,bv=-1e9; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); if(bi===pd.card.target&&g.perBet[bi].gain>0) g.bonus+=capStart[pid]*0.10; }
    if(pd.card&&pd.card.id==="roi"){ if(g.perBet.some(x=>x.win&&x.odd>=2.0)) g.bonus+=capStart[pid]*0.05; } }
  // Phase 5 : Gourmand, Serge Benamou
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="gourmand"){ const opp=G[pd.oppId]; if(opp){ const on=opp.net+opp.bonus; if(on>0) G[pid].bonus+=0.2*on; } } }
  { let mp=null,mv=-1e9; for(const pid in G){ const v=G[pid].net+G[pid].bonus; if(v>mv){mv=v;mp=pid;} }
    const anySerge=Object.keys(PD).some(pid=>PD[pid].card&&PD[pid].card.id==="serge");
    if(anySerge&&mv>0&&N>1){ const pot=0.1*mv; G[mp].bonus-=pot; const sh=pot/(N-1); for(const pid in G){ if(pid!==mp) G[pid].bonus+=sh; } } }
  const dayNet={},dayBest={}; for(const pid in G){ dayNet[pid]=G[pid].net+G[pid].bonus; dayBest[pid]=G[pid].bestOdd; }
  return {dayNet,dayBest};
}
async function resolveDay(){
  if(resolving)return; resolving=true; showErr("");
  try{
    const D=L.current_day;
    // verrou atomique : un seul client résout la journée (auto-avancement)
    const claim=await q(db.from("leagues").update({status:"resolving"}).eq("id",L.id).eq("status","running").eq("current_day",D).select("*"));
    if(!claim||!claim.length){ resolving=false; await refresh(); return; }
    const fresh=claim[0];
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const dz=await q(db.from("duels").select("*").eq("league_id",L.id).eq("day",D));
    const bz=await q(db.from("bets").select("*").eq("league_id",L.id).eq("day",D));
    const N=ps.length; const pmap={}; ps.forEach(p=>pmap[p.id]=p);
    const capStart={}; ps.forEach(p=>capStart[p.id]=p.capital);
    const PD={}; const aiInserts=[];
    for(const d of dz){ let fx=d.fixtures||genPool(5); fx.forEach(f=>{if(!f.res)f.res=simResult(f);}); d.fixtures=fx;
      for(const pid of [d.home_id,d.away_id]){ let bt=bz.find(b=>b.player_id===pid);
        if(!bt){ const ai=aiPlay(capStart[pid],fx,pmap[pid].hand||[]); bt={player_id:pid,picks:ai.picks,captain:ai.captain,card:ai.card};
          aiInserts.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,card:ai.card,submitted:true}); }
        PD[pid]={picks:bt.picks.map(x=>({...x})),captain:bt.captain,card:bt.card||null,duelId:d.id,oppId:(pid===d.home_id?d.away_id:d.home_id),fx,rnd:Math.random()}; } }
    // résolution déterministe (moteur en phases), + impact réel de chaque carte
    const {dayNet,dayBest}=runEngine(PD,capStart,dz,N);
    const impacts={};
    for(const pid in PD){ if(PD[pid].card&&PD[pid].card.id){ const alt=JSON.parse(JSON.stringify(PD)); alt[pid].card=null;
      const wo=runEngine(alt,capStart,dz,N).dayNet; const opp=PD[pid].oppId;
      impacts[pid]={self:Math.round((dayNet[pid]||0)-(wo[pid]||0)), opp: opp!=null?Math.round((dayNet[opp]||0)-(wo[opp]||0)):0}; } }
    for(const d of dz){ await q(db.from("duels").update({fixtures:d.fixtures,resolved:true}).eq("id",d.id)); }
    if(aiInserts.length) await q(db.from("bets").upsert(aiInserts,{onConflict:"player_id,day"}));
    // "Chérie c'est cadeau" : détermine l'inversion du pari ciblé de la victime
    const cadeauFlips={};
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"){ const vId=pd.oppId; const opp=PD[vId];
      if(opp&&opp.picks.length){ const i=Math.floor((pd.rnd||0)*opp.picks.length); const from=opp.picks[i].sel; let to=from; if(from==="1")to="2"; else if(from==="2")to="1";
        if(to!==from) cadeauFlips[pid]={victim:vId, match:i, from, to}; } } }
    for(const pid in dayNet){ const c=PD[pid].card; const u2={net:dayNet[pid]};
      if(c&&c.id){ u2.card={id:c.id,target:c.target,impact:impacts[pid]}; if(cadeauFlips[pid]) u2.card.flip=cadeauFlips[pid]; }
      await q(db.from("bets").update(u2).eq("league_id",L.id).eq("day",D).eq("player_id",pid)); }
    // persiste l'inversion sur le pari de la victime (choix initial → final visibles dans le détail)
    for(const pid in cadeauFlips){ const fl=cadeauFlips[pid]; const picks=PD[fl.victim].picks.map(x=>({...x})); picks[fl.match]={...picks[fl.match],sel:fl.to,orig:fl.from,flipBy:pid};
      await q(db.from("bets").update({picks}).eq("league_id",L.id).eq("day",D).eq("player_id",fl.victim)); }
    const upd={}; ps.forEach(p=>{ upd[p.id]={points:p.points,capital:Math.max(0,capStart[p.id]+(dayNet[p.id]||0)),
      streak_w:p.streak_w,streak_l:p.streak_l,duel_wins:p.duel_wins,best_day:Math.max(p.best_day,dayNet[p.id]||0),
      best_odd:Math.max(p.best_odd,dayBest[p.id]||0),hand:(p.hand||[]).slice(),cards_used:(p.cards_used||[]).slice()}; });
    // +1 au meilleur pronostiqueur du jour (plus gros gain parmi tous les joueurs)
    const maxNet=Math.max(...ps.map(p=>dayNet[p.id]||0));
    ps.forEach(p=>{ if((dayNet[p.id]||0)===maxNet) upd[p.id].points+=1; });
    for(const d of dz){ const nh=dayNet[d.home_id]||0,na=dayNet[d.away_id]||0; let w=null,l=null;
      if(nh>na){w=d.home_id;l=d.away_id;} else if(na>nh){w=d.away_id;l=d.home_id;}
      if(w){ upd[w].points+=3; upd[w].duel_wins+=1; upd[w].streak_w+=1; upd[w].streak_l=0;
        if(upd[w].streak_w===3) upd[w].capital*=1.02;
        if(upd[w].streak_w===5) upd[w].hand.push(randomCard());
        upd[l].streak_l+=1; upd[l].streak_w=0; if(upd[l].streak_l===4) upd[l].hand.push("assurance"); } }
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id){ const h=upd[pid].hand; const idx=h.indexOf(pd.card.id); if(idx>=0){ h.splice(idx,1); upd[pid].cards_used.push(pd.card.id); } } }
    for(const p of ps){ const u=upd[p.id]; await q(db.from("players").update({points:u.points,capital:u.capital,streak_w:u.streak_w,streak_l:u.streak_l,duel_wins:u.duel_wins,best_day:u.best_day,best_odd:u.best_odd,hand:u.hand,cards_used:u.cards_used}).eq("id",p.id)); }
    const next=D+1; const done=next>=fresh.num_days;
    await q(db.from("leagues").update({current_day:next,status:done?"done":"running"}).eq("id",L.id));
    if(!done){ try{ await q(db.from("leagues").update({day_started_at:new Date().toISOString()}).eq("id",L.id)); }catch(e){} } // début journée suivante (défensif si colonne absente)
    resolving=false; await refresh(); toast("Journée résolue ✓");
  }catch(e){ showErr("Résolution : "+e.message); resolving=false; }
}

function capChart(){
  if(!chartBets) return '';
  const N=(L.status==="done"?(L.num_days||0):(L.current_day||0)); if(N<1) return '';
  const sp=L.prep_summary||{};
  const capAfter={}; players.forEach(p=>{ const psx=(sp.players||[]).find(x=>x.pid===p.id); capAfter[p.id]= psx?psx.capital:100; });
  const netByDay={}; players.forEach(p=>netByDay[p.id]=Array(N).fill(0));
  chartBets.forEach(b=>{ if(netByDay[b.player_id]!=null && b.day<N) netByDay[b.player_id][b.day]=b.net||0; });
  const series=players.map(p=>{ let v=capAfter[p.id]; const pts=[100,v]; for(let d=0;d<N;d++){ v=Math.max(0,v+(netByDay[p.id][d]||0)); pts.push(v); } return {p,pts}; });
  const npts=N+2; const allv=series.flatMap(s=>s.pts); let mn=Math.min(...allv), mx=Math.max(...allv); if(!isFinite(mn)){mn=0;mx=100;}
  const pad=Math.max(5,(mx-mn)*0.12); const lo=Math.max(0,Math.floor((mn-pad)/10)*10), hi=Math.max(lo+10,Math.ceil((mx+pad)/10)*10);
  const W=480,H=210,PL=38,PR=10,PT=12,PB=26;
  const X=i=> PL + (W-PL-PR)*(npts<=1?0:i/(npts-1));
  const Y=v=> PT + (H-PT-PB)*(1-(v-lo)/((hi-lo)||1));
  const cols=["#4ade80","#60a5fa","#fbbf24","#f87171","#a78bfa","#f472b6","#22d3ee","#fb923c","#84cc16","#e879f9"];
  const labels=["100€","Bonus"]; for(let d=0;d<N;d++) labels.push("J"+(d+1));
  let grid=""; for(let k=0;k<=3;k++){ const gv=lo+(hi-lo)*k/3; const y=Y(gv); grid+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="#242b38"/><text x="${PL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#8b93a3">${Math.round(gv)}</text>`; }
  let xlab=""; labels.forEach((l,i)=>{ if(npts>9 && i>1 && i%2===0 && i!==npts-1) return; xlab+=`<text x="${X(i).toFixed(1)}" y="${H-PB+14}" text-anchor="middle" font-size="8.5" fill="#8b93a3">${esc(l)}</text>`; });
  const lines=series.map((s,si)=>{ const c=cols[si%cols.length]; const dpath=s.pts.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    const dots=s.pts.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2" fill="${c}"/>`).join('');
    return `<path d="${dpath}" fill="none" stroke="${c}" stroke-width="2"/>${dots}`; }).join('');
  const legend=series.map((s,si)=>`<span class="mini" style="margin-right:10px;white-space:nowrap"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${cols[si%cols.length]};vertical-align:middle"></span> ${esc(s.p.emoji)} ${esc(s.p.name)}</span>`).join('');
  return `<div class="box"><div class="mini muted" style="margin-bottom:6px">📈 Évolution du capital (départ → bonus → chaque journée)</div>
     <div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:320px;height:auto">${grid}${lines}${xlab}</svg></div>
     <div style="margin-top:6px;line-height:1.9">${legend}</div></div>`;
}
function viewEnd(){

  return `<div style="text-align:center;margin:10px 0"><div style="font-size:46px">🏆</div>

async function loadPalmares(){
  try{
    const lgs=await q(db.from("leagues").select("id,name,num_participants,status"));
    const pls=await q(db.from("players").select("id,name,emoji,league_id"));
    const bts=await q(db.from("bets").select("league_id,day,player_id,net,picks,card,captain,duel_id").not("net","is",null));
    const dls=await q(db.from("duels").select("id,fixtures"));
    const lgMap={},plMap={},dlMap={}; lgs.forEach(l=>lgMap[l.id]=l); pls.forEach(p=>plMap[p.id]=p); dls.forEach(d=>dlMap[d.id]=d);
    const oddF=(f,s)=> s==="1"?f.oh:s==="2"?f.oa:f.od; const selNm=(f,s)=> s==="1"?f.home:s==="2"?f.away:"Nul";
    const dayRecs=[], oddRecs=[];
    for(const b of bts){ const pl=plMap[b.player_id]; if(!pl||pl.is_ai||pl.name==="Joueur IA") continue; const lg=lgMap[b.league_id]||{}; const d=dlMap[b.duel_id]; const fx=(d&&d.fixtures)||[];
      const picks=b.picks||[]; const staked=picks.reduce((a,x)=>a+(+x.stake||0),0);
      const lines=picks.map((x,i)=>{ const f=fx[i]; if(!f) return null; const win=x.sel===f.res; const odd=oddF(f,x.sel); let g=win?(+x.stake)*(odd-1):-(+x.stake); if(i===b.captain)g*=2;
        if(win && +x.stake>0) oddRecs.push({odd, name:pl.name, emoji:pl.emoji, lname:lg.name, day:b.day, match:f.home+"–"+f.away, sel:selNm(f,x.sel), stake:+x.stake});
        return {m:f.home+"–"+f.away, sel:selNm(f,x.sel), win, odd, stake:+x.stake, g:+g.toFixed(2), cap:i===b.captain}; }).filter(Boolean);
      dayRecs.push({net:+(b.net||0).toFixed(2), staked, ret: staked>0?(b.net||0)/staked:0, name:pl.name, emoji:pl.emoji, lname:lg.name, np:lg.num_participants, day:b.day, cardId:b.card&&b.card.id, lines});
    }
    palmares={
      bigGain: [...dayRecs].sort((a,b)=>b.net-a.net).slice(0,5),
      bestRet: [...dayRecs].filter(r=>r.staked>=5).sort((a,b)=>b.ret-a.ret).slice(0,5),
      bestOdd: [...oddRecs].sort((a,b)=>b.odd-a.odd).slice(0,5),
      bigLoss: [...dayRecs].sort((a,b)=>a.net-b.net).slice(0,5),
      counts:{leagues:lgs.length, players:pls.filter(p=>!p.is_ai&&p.name!=="Joueur IA").length}
    };
  }catch(e){ palmares={error:e.message}; }
}
function viewPalmares(){
  const back=`<button class="btn ghost sm" onclick="S.view='leagues';render()">← Mes ligues</button>`;
  if(!palmares) return back+`<div class="box">Chargement du palmarès…</div>`;
  if(palmares.error) return back+`<div class="err">${esc(palmares.error)}</div>`;
  const medal=i=>["🥇","🥈","🥉","4ᵉ","5ᵉ"][i]||(i+1);
  const dayDetail=r=>{ const sumL=r.lines.reduce((a,l)=>a+l.g,0); const adj=+(r.net-sumL).toFixed(2);
    return `<div class="mini muted">${esc(r.lname||'?')} · J${r.day+1} · ${r.np||'?'} joueurs · misé ${Math.round(r.staked)}€${r.cardId&&CARDS[r.cardId]?' · carte '+CARDS[r.cardId].e+' '+esc(CARDS[r.cardId].n):''}</div>
     ${r.lines.map(l=>`<div class="mini" style="margin-top:3px">${esc(l.m)} — ${esc(l.sel)}${l.cap?' 👑':''} ${l.stake}€ @${l.odd} → <b class="${l.g>=0?'green':'red'}">${fmt(l.g)}€</b> ${l.win?'✓':'✗'}</div>`).join("")}
     ${Math.abs(adj)>=1?`<div class="mini" style="margin-top:4px">🃏 Bonus &amp; ajustements ${r.cardId&&CARDS[r.cardId]?'('+CARDS[r.cardId].e+' '+esc(CARDS[r.cardId].n)+', séries…)':'(séries, bonus…)'} : <b class="${adj>=0?'green':'red'}">${fmt(adj)}€</b></div>`:''}
     <div class="mini" style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px"><b>Total journée : <span class="${r.net>=0?'green':'red'}">${fmt(r.net)}€</span></b></div>`; };
  const oddDetail=r=>`<div class="mini muted">${esc(r.lname||'?')} · J${r.day+1}</div><div class="mini" style="margin-top:3px">${esc(r.match)} — <b>${esc(r.sel)}</b> · ${r.stake}€ @${r.odd} ✓ → <b class="green">+${Math.round(r.stake*(r.odd-1))}€</b></div>`;
  const sec=(title,arr,val,detail,tag,empty)=>`<h2>${title}</h2>${arr.length?arr.map((r,i)=>{const k=tag+i;const op=palmOpen===k;const v=val(r);
     return `<div class="box" style="padding:10px 12px;cursor:pointer" onclick="togglePalm('${k}')">
       <div class="row"><div class="row" style="gap:8px"><b style="min-width:22px">${medal(i)}</b><span>${r.emoji||''} ${esc(r.name)}</span></div><b class="${v.cls}">${v.txt} ${op?'▲':'▼'}</b></div>
       ${op?`<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px">${detail(r)}</div>`:''}</div>`;}).join(""):`<div class="box mini muted">${empty||'Pas encore de données.'}</div>`}`;
  return `${back}
    <div class="box"><h2 style="margin-top:0">🏆 Palmarès général</h2><div class="mini muted">Les plus grosses perfs sur <b>toutes</b> les ligues (${palmares.counts.leagues} ligues · ${palmares.counts.players} joueurs). Astuce : une grosse ligue gonfle les gains en €, donc le <b>rendement</b> et la <b>plus grosse cote</b> — indépendants du nombre de joueurs — sont les mesures les plus justes.</div></div>
    ${sec("💥 Plus gros gain sur une journée", palmares.bigGain, r=>({txt:fmt(r.net)+"€",cls:r.net>=0?'green':'red'}), dayDetail, "g")}
    ${sec("📈 Meilleur rendement d'une journée", palmares.bestRet, r=>({txt:"×"+r.ret.toFixed(2)+" la mise",cls:r.ret>=0?'green':'red'}), dayDetail, "r", "Il faut avoir misé ≥ 5€.")}
    ${sec("🎯 Plus grosse cote gagnée", palmares.bestOdd, r=>({txt:"@"+r.odd,cls:'gold'}), oddDetail, "o")}
    ${sec("💀 Pire dégringolade d'une journée", palmares.bigLoss, r=>({txt:fmt(r.net)+"€",cls:'red'}), dayDetail, "l")}`;
}

      ${a.topCards.length?a.topCards.map(([id,n],i)=>`<div class="row mini" style="margin:5px 0"><span>${i+1}. ${CARDS[id]?CARDS[id].e+' '+esc(CARDS[id].n):esc(id)}</span><b>${n}×</b></div>`).join(""):`<div class="mini muted">Aucune carte jouée pour l'instant.</div>`}</div>
    <div class="box"><div class="mini muted" style="margin-bottom:6px">👤 Comptes joueurs — identifiants & réinitialisation</div>
      ${adminUsers ? `${adminUsers.length?adminUsers.map(u=>`<div class="row mini" style="margin:6px 0"><span>${esc(u.username)}${u.id===ADMIN_ID?' <span class="tag">(toi, admin)</span>':''}</span>${u.id===ADMIN_ID?'':`<button class="btn ghost sm" onclick="adminResetPwd('${u.id}')">🔑 Réinitialiser le mot de passe</button>`}</div>`).join(""):`<div class="mini muted">Aucun autre compte pour l'instant.</div>`}
         <button class="btn ghost sm" style="margin-top:8px" onclick="adminUsers=null;render()">Masquer</button>`
        : `<div class="mini muted">Un joueur a oublié son mot de passe ? Entre ton mot de passe admin pour voir les identifiants et en réinitialiser un.</div>
           <input id="adminPwd" type="password" placeholder="Ton mot de passe admin" autocomplete="off" style="margin-top:8px" onkeydown="if(event.key==='Enter')adminLoadUsers()">
           <button class="btn ghost" style="margin-top:6px" onclick="adminLoadUsers()">Afficher les comptes</button>`}
    </div>`;
}

/* ============ render / poll ============ */
function render(){
  const inLeague=!!S.leagueId;
  $("rulesBtn").classList.toggle("hide", S.view==="auth");
  $("leaguesBtn").classList.toggle("hide", !inLeague);
  $("logoutBtn").classList.toggle("hide", S.view!=="leagues");
  $("coulissesBtn").classList.toggle("hide", !(inLeague && L && L.prep_summary && S.view==="game"));
  let html="";
  if(S.view==="auth") html=viewAuth();
  else if(S.view==="leagues") html=viewLeagues();
  else if(S.view==="rules") html=viewRules();
  else if(S.view==="standings") html=viewStandings();
  else if(S.view==="coulisses") html=viewCoulisses();
  else if(S.view==="results") html=viewResults();
  else if(S.view==="palmares") html=viewPalmares();
  else if(S.view==="admin") html=viewAdmin();
  else html=viewGame();
  $("root").innerHTML=html;
  $("subtitle").textContent = S.view==="auth"?"Connexion" : S.view==="leagues"?"Mes ligues" : (L? (L.status==="lobby"?"Salon · "+L.code : ((L.status==="prep"||L.status==="starting")?"Préparation":(L.status==="done"?"Terminé":"Journée "+(L.current_day+1)+"/"+L.num_days))) : "…");
}
// pendant la composition (choix des matchs à domicile ou saisie des pronos), on ne rafraîchit pas
// pour ne pas re-dessiner et fermer le champ en cours de saisie.
function isComposing(){
  if(S.view!=="game"||!L) return false;
  if(L.status==="prep") return !!(me() && !me().shop_done); // prépa (vote/enchères) en cours
  if(L.status!=="running"||S.recap) return false;
  const d=myDuel(); if(!d) return false;
  if(!d.fixtures) return d.home_id===S.myId; // à domicile : en train de choisir les 5 matchs
  return !myBet();                            // en train de faire ses pronos/mises
}
function startPoll(){ if(poll) clearInterval(poll); poll=setInterval(()=>{ if((S.view==="game"||S.view==="standings")&&!isComposing()) refresh(); },4000); }
function openRules(){ if(S.view==="rules")return; S.prevView=S.view; S.view="rules"; render(); }
function closeRules(){ S.view=S.prevView||(S.leagueId?"game":"leagues"); render(); }
function viewRules(){
  const card=id=>`<div style="display:flex;gap:10px;align-items:flex-start;margin:9px 0"><span class="sport" style="flex:0 0 auto">${CARDS[id].e}</span><div><b class="mini">${esc(CARDS[id].n)}</b><div class="mini muted">${esc(CARDS[id].d)}</div></div></div>`;
  return `<button class="btn ghost sm" onclick="closeRules()">← Retour</button>
   <div class="box"><h2 style="margin-top:0">📖 Règles du jeu</h2>
     <p class="mini"><b>But :</b> championnat de pronostics entre amis, sur de vrais événements et de vraies cotes, <b>sans argent réel</b>. On démarre à <b>100 € virtuels</b> ; le vainqueur est celui qui a le plus de <b>points de championnat</b>. Le dernier joueur humain fait le gage voté au départ.</p></div>
   <div class="box"><b>🗓️ Format</b>
     <div class="mini muted" style="margin-top:6px">Aller-retour entre tous (Round Robin). Si le nombre d'humains est impair, un 🤖 joueur IA complète (il ne subit pas le gage). Chaque jour = une confrontation en duel.</div></div>
   <div class="box"><b>⚽ Une journée</b>
     <ul class="mini muted" style="margin:6px 0 0;padding-left:18px">
       <li>Le joueur <b>à domicile</b> choisit les <b>5 rencontres</b> (imposées aux deux).</li>
       <li>Chacun fait ses <b>pronostics + mises</b>. Total des mises ≤ <b>50 %</b> du capital (70 % avec la carte Investisseur).</li>
       <li><b>👑 Pari du Capitaine</b> : un pari désigné secrètement — gain <b>et</b> perte <b>doublés</b>.</li>
       <li>Optionnel : <b>1 carte bonus</b> (voir plus bas), révélée à la résolution.</li>
       <li>Gain d'un pari = mise × (cote − 1) ; pari perdu = − mise. Le capital ne descend jamais sous 0.</li>
     </ul></div>
   <div class="box"><b>🏆 Points & classement</b>
     <div class="mini muted" style="margin-top:6px">Chaque journée : le <b>vainqueur de son duel</b> gagne <b>3 points</b> (comme au foot), et le <b>meilleur pronostiqueur</b> ⭐ (plus gros gain parmi <b>tous</b> les joueurs) gagne <b>+1 point</b>. Départage à égalité : capital, puis victoires en duel, plus gros gain, plus grosse cote.</div></div>
   <div class="box"><b>🔥 Séries</b>
     <div class="mini muted" style="margin-top:6px">3 victoires de duel d'affilée → +2 % de capital · 5 victoires → +1 carte aléatoire · 4 défaites → carte Assurance offerte.</div></div>
   <div class="box"><b>🃏 Cartes bonus (enchères)</b>
     <div class="mini muted" style="margin:6px 0">Au démarrage, phase de <b>préparation</b> : chacun vote pour le gage <b>et</b> mise en aveugle sur les bonus, sans attendre les autres. Chaque bonus revient au <b>plus offrant</b> (égalité → premier à avoir misé) ; les non-gagnants sont <b>remboursés</b>. Total des mises ≤ <b>${SHOP_CAP} €</b>, jusqu'à autant de bonus que de journées. Les mises gagnantes sont retirées de ton <b>capital de départ</b>. 1 carte jouée max par journée.</div>
     ${Object.keys(CARDS).map(card).join("")}</div>
   <div class="box"><b>😴 Oubli</b><div class="mini muted" style="margin-top:6px">Pas de validation à temps → paris repris de l'adversaire, pronostics inversés.</div></div>`;
}
/* ============ boot ============ */
(function boot(){
  if(!window.supabase){ showErr("Librairie Supabase non chargée (vérifie ta connexion Internet)."); return; }
  AUTH=loadAuth();
  if(!AUTH){ S.view="auth"; render(); return; }
  const last=loadLast();
  if(last&&last.leagueId){ S.leagueId=last.leagueId; S.myId=last.myId; S.view="game"; startPoll(); refresh(); }
  else { S.view="leagues"; loadMyLeagues(); }
})();
</script>
</body>
</html>
