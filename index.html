    <div class="box" style="padding:4px 10px;overflow-x:auto"><table>
      <tr><th>Jour</th><th style="text-align:right">Actifs</th><th style="text-align:right">Paris</th><th style="text-align:right">Ligues</th><th style="text-align:right">Nouveaux</th></tr>
      ${a.daily.map(r=>`<tr><td class="mini">${r.d}</td><td class="num"><b>${r.users||'–'}</b></td><td class="num muted">${r.bets||'–'}</td><td class="num muted">${r.leagues||'–'}</td><td class="num muted">${r.newp||'–'}</td></tr>`).join("")}</table></div>
    <div class="box mini muted">ℹ️ <b>Actifs</b> = personnes distinctes (1 personne = 1, même sur plusieurs ligues) ayant <b>validé un prono</b> ce jour-là. Les simples connexions ne sont pas tracées — il faudrait une table d'événements (prévu avec la Phase 2 backend). <b>Nouveaux</b> = 1ʳᵉ arrivée d'une personne dans une ligue.</div>
    ${st("🎮 Joueurs (comptes distincts ayant rejoint)", a.activeAccounts)}
    ${st("🎫 Participations (joueur × ligue)", a.participations)}
    ${st("🧾 Paris enregistrés (total)", a.totalBets)}
    ${st("🧮 Journées résolues (paris)", a.resolvedBets)}
    ${st("🃏 Cartes bonus jouées", a.cardsPlayed)}
    <div class="box"><div class="mini muted" style="margin-bottom:6px">🃏 Bonus les plus joués</div>
      ${a.topCards.length?a.topCards.map(([id,n],i)=>`<div class="row mini" style="margin:5px 0"><span>${i+1}. ${CARDS[id]?CARDS[id].e+' '+esc(CARDS[id].n):esc(id)}</span><b>${n}×</b></div>`).join(""):`<div class="mini muted">Aucune carte jouée pour l'instant.</div>`}</div>
    <div class="box"><div class="mini muted" style="margin-bottom:6px">🎭 Gages les plus choisis <span class="mini">(cumul des votes sur toutes les ligues)</span></div>
      ${(a.topGages&&a.topGages.length)?a.topGages.slice(0,10).map((g,i)=>`<div class="row mini" style="margin:5px 0"><span>${i+1}. ${esc(g.t)}</span><b>${g.votes} vote${g.votes>1?'s':''}${g.wins?` · ${g.wins}× retenu`:''}</b></div>`).join(""):`<div class="mini muted">Aucun vote de gage enregistré pour l'instant.</div>`}</div>
    <div class="box"><div class="mini muted" style="margin-bottom:6px">👤 Gestion des comptes</div>
      <div class="mini muted">Depuis le passage à <b>Supabase Auth</b>, la gestion des comptes (liste, réinitialisation d'un mot de passe) se fait dans le <b>dashboard Supabase → Authentication → Users</b>. Une gestion intégrée reviendra dans une phase ultérieure.</div></div>`;
}

/* ============ render / poll ============ */
function render(){
  const inLeague=!!S.leagueId;
  applyThemeBtn(); applyLangBtn();
  const fo=$("foot"); if(fo) fo.textContent="The Maestro League · "+t("prototype de test · données sportives simulées")+" · v4.12";
  $("rulesBtn").classList.toggle("hide", S.view==="auth");
  $("leaguesBtn").classList.toggle("hide", !inLeague);
  $("settingsBtn").classList.toggle("hide", S.view==="auth" || !AUTH);
  let html="";
  if(S.view==="auth") html=viewAuth();
  else if(S.view==="leagues") html=viewLeagues();
  else if(S.view==="rules") html=viewRules();
  else if(S.view==="standings") html=viewStandings();
  else if(S.view==="coulisses") html=viewCoulisses();
  else if(S.view==="results") html=viewResults();
  else if(S.view==="palmares") html=viewPalmares();
  else if(S.view==="admin") html=viewAdmin();
  else if(S.view==="settings") html=viewSettings();
  else html=viewGame();
  $("root").innerHTML=html;
  // Remonter en haut à chaque changement d'écran, y compris les sous-étapes d'une journée (choix des matchs → saisie → attente → résultats) — pas sur les simples rafraîchissements de polling.
  let gsub="";
  if(S.view==="game" && L){ const d=myDuel(); const mb=myBet(); gsub="|"+L.current_day+"|"+((d&&d.fixtures&&d.fixtures.length)?"F":"")+"|"+(mb?"S":"")+"|"+(S.editingBet?"E":"")+"|"+(S.dispDay||0); }
  const sig=S.view+"|"+(L?L.status:"")+"|"+(S.recap?"r":"")+"|"+(S.leagueId||"")+gsub;
  if(sig!==lastScreenSig){ lastScreenSig=sig; try{ window.scrollTo(0,0); }catch(e){} }
  $("subtitle").textContent = S.view==="auth"?t("Connexion") : S.view==="settings"?t("Paramètres") : S.view==="leagues"?t("Mes ligues") : (L? (L.status==="lobby"?t("Salon")+" · "+L.code : ((L.status==="prep"||L.status==="starting")?t("Préparation"):(L.status==="done"?t("Terminé"):t("Journée {a}/{b}",{a:L.current_day+1,b:L.num_days})))) : "…");
}
// pendant la composition (choix des matchs à domicile ou saisie des pronos), on ne rafraîchit pas
// pour ne pas re-dessiner et fermer le champ en cours de saisie.
function isComposing(){
  if(S.view!=="game"||!L) return false;
  if(L.status==="prep") return !!(me() && !me().shop_done); // prépa (vote/enchères) en cours
  if(L.status!=="running"||S.recap) return false;
  const d=myDuel(); if(!d) return false;
  if(!d.fixtures) return d.home_id===S.myId; // à domicile : en train de choisir les 5 matchs
  return !myBet();                            // en train de faire ses pronos/mises
}
function startPoll(){ if(poll) clearInterval(poll); poll=setInterval(()=>{ if((S.view==="game"||S.view==="standings")&&!isComposing()) refresh(); },4000); }
function openSettings(){ if(S.view==="settings")return; S.prevView=S.view; S.view="settings"; render(); }
function closeSettings(){ S.view=S.prevView||(S.leagueId?"game":"leagues"); render(); }

      <div class="mini muted" style="margin-top:14px">${t("🎭 Choisis ton avatar (visible dans toutes tes ligues)")}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">${EMOJIS.map(em=>`<button class="btn ghost sm" onclick="setAvatar('${em}')" style="font-size:20px;padding:6px 9px;line-height:1${em===AUTH.avatar?';border-color:var(--accent)':''}">${em}</button>`).join("")}</div>

    <button class="btn ghost" onclick="logout()">${t("Déconnexion")}</button>`;

     <ul class="mini muted" style="margin:6px 0 0;padding-left:18px">
       <li>${t("Le joueur <b>à domicile</b> choisit les <b>5 rencontres</b> (imposées aux deux).")}</li>
       <li>${t("Chacun fait ses <b>pronostics + mises</b>. Total des mises ≤ <b>50 %</b> du capital (70 % avec la carte Investisseur).")}</li>
       <li>${t("<b>👑 Pari du Capitaine</b> : un pari désigné secrètement — gain <b>et</b> perte <b>doublés</b>.")}</li>
       <li>${t("🛟 <b>Filet de sécurité</b> : la <b>perte maximale possible</b> d'une journée ne peut jamais dépasser ton capital — tu ne finiras <b>jamais dans le négatif</b> (si besoin, baisse la mise de ton Capitaine).")}</li>

     </ul></div>
   <div class="box"><b>${t("🏆 Points & classement")}</b>
     <div class="mini muted" style="margin-top:6px">${t("Chaque journée, dans ton <b>duel</b>, le <b>vainqueur</b> est celui qui a le <b>meilleur résultat net</b> (gains − mises). Égalité → on départage par le plus gros <b>gain</b>, puis la plus grosse <b>mise</b> ; si tout est identique, c'est <b>match nul</b>.")}

     <br>${t("Bonus : le <b>meilleur pronostiqueur</b> ⭐ (plus gros net parmi <b>tous</b> les joueurs) gagne <b>+1 point</b>.")}
     <br>${t("Départage au classement : capital, puis victoires en duel, plus gros gain, plus grosse cote.")}</div></div>
   <div class="box"><b>${t("🔥 Dynamique")}</b>
     <div class="mini muted" style="margin-top:6px">${t("Une 🔥 flamme signale une <b>bonne dynamique</b> (victoires de duel qui s'enchaînent), un ❄️ flocon une <b>mauvaise passe</b>. C'est <b>purement indicatif</b> (visible au classement) : aucun bonus ni malus n'y est associé.")}</div></div>
   <div class="box"><b>${t("🃏 Cartes bonus (enchères)")}</b>
     <div class="mini muted" style="margin:6px 0">${t("Au démarrage, phase de <b>préparation</b> : chacun vote pour le gage <b>et</b> mise en aveugle sur les bonus, sans attendre les autres. Chaque bonus revient au <b>plus offrant</b> (égalité → premier à avoir misé) ; les non-gagnants sont <b>remboursés</b>. Total des mises ≤ <b>{a} €</b>, jusqu'à autant de bonus que de journées. Les mises gagnantes sont retirées de ton <b>capital de départ</b>. 1 carte jouée max par journée. Certaines cartes sont <b>à cible</b> 🎯 : tu choisis toi-même le match concerné au moment de parier.",{a:SHOP_CAP})}</div>
     ${CARD_IDS.map(card).join("")}</div>
   <div class="box"><b>${t("😴 Oubli")}</b><div class="mini muted" style="margin-top:6px">${t("Pas de validation à temps → <b>aucun pari pris en compte</b> (pas de reprise des pronos adverses), <b>−2 pts</b> au classement et <b>−25 % du capital</b>.")}</div></div>`;
}
/* ============ boot ============ */
(async function boot(){
  if(!window.supabase){ showErr("Librairie Supabase non chargée (vérifie ta connexion Internet)."); return; }
  try{ const { data:{ session } } = await db.auth.getSession();
    if(session){ AUTH={ id:session.user.id, name:(session.user.user_metadata&&session.user.user_metadata.username)||"", avatar:(session.user.user_metadata&&session.user.user_metadata.avatar)||"" }; }
  }catch(e){}
  if(!AUTH){ S.view="auth"; render(); return; }
  const last=loadLast();
  if(last&&last.leagueId){ S.leagueId=last.leagueId; S.myId=last.myId; S.view="game"; startPoll(); refresh(); }
  else { S.view="leagues"; loadMyLeagues(); }
})();
