function t(s,subs){ let out=(lang==="en"&&EN[s]!=null)?EN[s]:s; if(subs){ for(const k in subs) out=out.split("{"+k+"}").join(subs[k]); } return out; }

function toggleLang(){ lang=lang==="en"?"fr":"en"; try{ localStorage.setItem("pl_lang",lang); }catch(e){} applyLangBtn(); render(); }
const rnd=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const r2=n=>Math.round((+n||0)*100)/100;                       // arrondi à 2 décimales
const fmt=n=>{ const r=r2(n); return (r>=0?"+":"")+r.toFixed(2); }; // gain signé, 2 décimales
const eur=n=>r2(n).toFixed(2);                                 // montant non signé, 2 décimales
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function toast(m){ const t=document.createElement("div"); t.className="toast"; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
function infoModal(emoji,title,bodyHTML){ closeCardInfo();
  const o=document.createElement("div"); o.id="cardModal"; o.className="modal";

  o.innerHTML=`<div class="mbox"><div style="font-size:34px">${emoji}</div><h2 style="margin:6px 0 4px">${esc(title)}</h2>${bodyHTML}<button class="btn" style="margin-top:16px" onclick="closeCardInfo()">OK 👍</button></div>`;
  document.body.appendChild(o); }

function showDuelPtsInfo(pid){

  const bareme=`<div class="mini muted" style="text-align:left">${t("Le vainqueur du duel est celui au <b>meilleur résultat net</b> (gains − mises).<br>• <b>Vainqueur</b> : <b>3 pts</b> si son net est positif, <b>1 pt</b> si négatif.<br>• <b>Perdant</b> : <b>1 pt</b> si son net est positif, <b>0 pt</b> si négatif.<br>• <b>Match nul</b> : <b>1 pt</b> chacun.")}</div>`;
  let ctx='';
  if(d){ const hb=bets.find(x=>x.player_id===d.home_id), ab=bets.find(x=>x.player_id===d.away_id);
    const H=Object.assign({net:(hb&&hb.net)||0},gainMise(hb&&hb.picks,d.fixtures));
    const A=Object.assign({net:(ab&&ab.net)||0},gainMise(ab&&ab.picks,d.fixtures));
    const r=duelPts(H,A); const iAmHome=d.home_id===pid; const pts=iAmHome?r.h:r.a; const netMe=iAmHome?H.net:A.net; const pos=netMe>0;

/* ============ schedule ============ */
function makeSchedule(n){ let arr=[...Array(n).keys()]; const rounds=[];
  for(let r=0;r<n-1;r++){ const pairs=[];
    for(let i=0;i<n/2;i++){ let a=arr[i],b=arr[n-1-i]; if((r+i)%2===0) pairs.push([a,b]); else pairs.push([b,a]); }
    rounds.push(pairs); arr=[arr[0],arr[n-1],...arr.slice(1,n-1)]; }
  const ret=rounds.map(rd=>rd.map(p=>[p[1],p[0]])); return [...rounds,...ret]; }

/* ============ fixtures ============ */
function genFixture(){ const s=pick(SPORTS); const a=pick(s.t); let b=pick(s.t); while(b===a) b=pick(s.t);
  const f={sport:s.ic,draw:s.draw,home:a,away:b,oh:+rnd(1.4,3.2).toFixed(2),oa:+rnd(1.5,3.6).toFixed(2)};
  if(s.draw) f.od=+rnd(3.0,3.9).toFixed(2); return f; }
function genPool(k){ return Array.from({length:k},genFixture); }
function oddOf(f,sel){ return sel==="1"?f.oh:sel==="2"?f.oa:f.od; }
// Cote « double chance » : combinée de deux issues couvertes pour une seule mise.
function dcOdd(o1,o2){ return +(1/(1/o1+1/o2)).toFixed(2); }
/* ---- Barème d'un duel ---- */
// gain (retour brut des paris gagnants, à la cote) et mise (total misé) d'un joueur.
function gainMise(picks,fx){ let gain=0,mise=0; (picks||[]).forEach((b,i)=>{ const st=+b.stake||0; mise+=st; const f=(fx||[])[i]; if(f&&b.sel===f.res) gain+=st*oddOf(f,b.sel); }); return {gain,mise}; }
// Nombre de paris gagnants d'un joueur (gère la Double Chance)
function winCount(bt,fx){ if(!bt||!bt.picks||!fx) return 0; const c=bt.card; let w=0; bt.picks.forEach((b,i)=>{ const f=fx[i]; if(!f)return; const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2; const win=isDC?(f.res===b.sel||f.res===c.sel2):(b.sel===f.res); if(win)w++; }); return w; }
// Compare deux joueurs {net,gain,mise} : vainqueur = meilleur net, puis gain, puis mise, sinon nul.
// Points : vainqueur 3 (net>0) ou 1 (net≤0) ; perdant 1 (net>0) ou 0 (net≤0) ; nul 1/1.
function duelPts(h,a){ const R=x=>Math.round((+x||0)*100)/100;
  const c=(R(h.net)-R(a.net)) || (R(h.gain)-R(a.gain)) || (R(h.mise)-R(a.mise));
  if(c>0) return {h:R(h.net)>0?3:1, a:R(a.net)>0?1:0, win:'h'};
  if(c<0) return {h:R(h.net)>0?1:0, a:R(a.net)>0?3:1, win:'a'};
  return {h:1,a:1,win:null}; }
// Meilleur pronostiqueur du jour (un SEUL joueur de toute la ligue) : net, puis gain, puis mise, puis 1er inscrit.
function dayStar(rows){ const R=x=>Math.round((+x||0)*100)/100; let best=null;
  for(const r of rows){ if(!best){ best=r; continue; }
    const c=(R(r.net)-R(best.net))||(R(r.gain)-R(best.gain))||(R(r.mise)-R(best.mise))||((best.order||0)-(r.order||0));
    if(c>0) best=r; }
  return best?best.id:null; }
function simResult(f){ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]];
  const inv=outs.map(o=>1/o[1]); const sum=inv.reduce((a,b)=>a+b,0);
  let r=Math.random(); for(let i=0;i<outs.length;i++){ r-=inv[i]/sum; if(r<=0) return outs[i][0]; } return outs[outs.length-1][0]; }

/* ============ data ============ */
async function refresh(){
  if(!S.leagueId) return;
  try{
    L = await q(db.from("leagues").select("*").eq("id",S.leagueId).single());
    players = await q(db.from("players").select("*").eq("league_id",S.leagueId).order("join_order"));
    // fin de préparation AUTOMATIQUE : dès que tous ont validé (ou délai écoulé), on démarre sans clic
    if(L.status==="prep" && !resolving){
      const humans=players.filter(p=>!p.is_ai); const allDone=humans.length>=2 && humans.every(p=>p.shop_done);
      const st=prepState(); const dlPassed=st.deadline && new Date(st.deadline).getTime()<=Date.now();
      if(allDone||dlPassed){ resolvePrep(); return; }
    }
    S.recap = L.status!=="lobby" && (L.current_day>getSeen()) && (L.current_day>=1);
    const dispDay = S.recap ? L.current_day-1 : Math.min(L.current_day, Math.max(0,(L.num_days||1)-1));
    S.dispDay = dispDay;
    duels = await q(db.from("duels").select("*").eq("league_id",S.leagueId).eq("day",dispDay));
    bets  = await q(db.from("bets").select("*").eq("league_id",S.leagueId).eq("day",dispDay));
    // sélection auto (IA à domicile, ou échéance de sélection dépassée) + résolution auto
    if(L.status==="running" && !S.recap && !resolving){
      if(await ensureFixtures()){ duels = await q(db.from("duels").select("*").eq("league_id",S.leagueId).eq("day",dispDay)); }
      // tous les matchs choisis → on démarre le compte à rebours des paris (max 24h / 12h fast), une seule fois
      if(!L.bet_started_at && duels.length && duels.every(d=>d.fixtures)){
        try{ const r=await q(db.from("leagues").update({bet_started_at:new Date().toISOString()}).eq("id",L.id).is("bet_started_at",null).select("bet_started_at")); if(r&&r.length){ L.bet_started_at=r[0].bet_started_at; } }catch(e){} }
      if(await ensureAiBets()){ bets = await q(db.from("bets").select("*").eq("league_id",S.leagueId).eq("day",dispDay)); }
      if(shouldAutoResolve()){ resolveDay(); return; }
    }
    if(chartDay!==L.current_day){ chartDay=L.current_day; chartBets=null; standDuels=null; }
    if((L.status==="running"||L.status==="done") && chartBets===null && L.current_day>=1){
      chartBets = await q(db.from("bets").select("player_id,day,net,picks,card,captain,duel_id").eq("league_id",S.leagueId).not("net","is",null));
      standDuels = await q(db.from("duels").select("day,home_id,away_id,fixtures").eq("league_id",S.leagueId)); }
    if(L.status==="done" && endStats===null){ endStats={loading:true}; loadEndStats().then(()=>render()); }
    showErr(""); render(); maybeNotify();
  }catch(e){ showErr("Connexion : "+e.message); }
}
async function ensureFixtures(){ let filled=false; const dt=dayTimes(); const selPassed=dt.ok && Date.now()>=dt.sel;
  for(const d of duels){ if(d.fixtures) continue; const h=pById(d.home_id);
    const auto=(h&&h.is_ai) || selPassed; // IA à domicile → tout de suite ; humain à domicile → à l'échéance de sélection
    if(auto){ try{ const r=await q(db.from("duels").update({fixtures:genPool(5)}).eq("id",d.id).is("fixtures",null).select()); if(r&&r.length) filled=true; }catch(e){} } }
  return filled; }
// L'IA mise dès que les 5 matchs sont connus (pour que ses pronos soient visibles pendant l'attente)
async function ensureAiBets(){ let made=false;
  for(const d of duels){ if(!d.fixtures) continue;
    for(const pid of [d.home_id,d.away_id]){ const p=pById(pid); if(!p||!p.is_ai) continue;
      if(bets.find(b=>b.player_id===pid)) continue;
      const ai=aiPlay(p.capital!=null?p.capital:100, d.fixtures, p.hand||[]);
      try{ const r=await q(db.from("bets").insert({league_id:L.id,day:S.dispDay,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,card:ai.card,submitted:true}).select()); if(r&&r.length) made=true; }catch(e){} } }
  return made; }
function shouldAutoResolve(){
  const dz=duels; if(!dz.length || dz.some(d=>!d.fixtures)) return false; // sélection pas finie
  const inDay=new Set(); dz.forEach(d=>{inDay.add(d.home_id);inDay.add(d.away_id);});
  const dayHumans=players.filter(p=>!p.is_ai && inDay.has(p.id));
  const allBet = dayHumans.length>0 && dayHumans.every(p=>bets.find(b=>b.player_id===p.id));
  const dt=dayTimes(); const betPassed=dt.ok && Date.now()>=dt.bet;
  return allBet || betPassed;
}

async function joinLeague(code){
  if(busy||!AUTH)return; busy=true; showErr("");
  try{
    const lg=await q(db.from("leagues").select("*").eq("code",code).single());
    const ps=await q(db.from("players").select("*").eq("league_id",lg.id).order("join_order"));
    const mine=ps.find(p=>p.user_id===AUTH.id);
    if(mine){ openLeague(lg.id, mine.id); busy=false; return; } // déjà membre → on rouvre (reconnexion)

    const pl=await q(db.from("players").insert({league_id:lg.id,name:AUTH.name,emoji:AUTH.avatar||EMOJIS[ord]||"🎮",join_order:ord,user_id:AUTH.id}).select().single());

}

function prepSuperlatives(s){
  const auction=s.auction||[]; const ps=(s.players||[]);

  const nm=pid=>{const p=ps.find(x=>x.pid===pid)||{}; return (p.emoji?p.emoji+' ':'')+esc(p.name||'?');};
  const st={}; ps.forEach(p=>st[p.pid]={bids:0,total:0,won:0,maxBid:0,maxCard:null});
  auction.forEach(a=>{ (a.bids||[]).forEach(bd=>{ const x=st[bd.pid]; if(x&&bd.amt>0){ x.bids++; x.total+=bd.amt; if(bd.amt>x.maxBid){x.maxBid=bd.amt;x.maxCard=a.card;} } }); if(st[a.winner]) st[a.winner].won++; });
  const bidders=ps.filter(p=>st[p.pid].bids>0);

  const pickV=(arr,k)=>arr[seed(k)%arr.length];
  const items=[];
  const strat=best(bidders,(a,b)=> st[b.pid].won-st[a.pid].won || (st[b.pid].won/st[b.pid].bids)-(st[a.pid].won/st[a.pid].bids));
  if(strat && st[strat.pid].won>0){ const N=nm(strat.pid), w=st[strat.pid].won, b=st[strat.pid].bids;
    items.push(pickV([
      t("🧠 <b>Le stratège :</b> {N} — a raflé <b>{w}</b> bonus sur {b} visé{s}. Chirurgical.",{N,w,b,s:b>1?'s':''}),

      t("🧠 <b>Le cerveau :</b> {N} avait tout calculé — <b>{w}</b> bonus dans la poche. Personne n'a rien vu venir.",{N,w}),
      t("♟️ <b>Le tacticien :</b> {N} place ses pions et rafle <b>{w}</b> bonus. Échec et mat.",{N,w})
    ], strat.pid+'S')); }
  const poisse=best(bidders,(a,b)=> (st[b.pid].bids-st[b.pid].won)-(st[a.pid].bids-st[a.pid].won));
  if(poisse && (st[poisse.pid].bids-st[poisse.pid].won)>=1 && (!strat||poisse.pid!==strat.pid)){ const N=nm(poisse.pid), b=st[poisse.pid].bids, w=st[poisse.pid].won;
    items.push(pickV([
      t("😭 <b>La poisse :</b> {N} — a misé sur {b} bonus, repart avec <b>{w}</b>. Aïe aïe aïe.",{N,b,w}),
      t("🍀 <b>Pas de bol :</b> {N} a tenté {b} fois, remporté <b>{w}</b>. Ce n'était pas son jour.",{N,b,w}),
      t("😩 <b>Le malchanceux :</b> {b} enchères pour seulement <b>{w}</b> bonus. Dur dur, {N}.",{N,b,w}),
      t("🎭 <b>Le déçu du soir :</b> {N} visait gros ({b} bonus)… résultat : <b>{w}</b>. La vie est cruelle.",{N,b,w})
    ], poisse.pid+'P')); }
  const radin=best(bidders,(a,b)=> st[a.pid].total-st[b.pid].total);
  if(radin){ const N=nm(radin.pid), tot=st[radin.pid].total;
    items.push(pickV([
      t("🤏 <b>Le radin :</b> {N} — <b>{tot}€</b> lâchés en tout, pas un centime de plus.",{N,tot}),
      t("💰 <b>L'économe :</b> {N} a serré les cordons — <b>{tot}€</b> dépensés, point final.",{N,tot}),
      t("🐭 <b>Le prudent :</b> <b>{tot}€</b> misés par {N}. On ne se refait pas.",{N,tot}),
      t("🧊 <b>Le pingre :</b> {N} garde son magot — à peine <b>{tot}€</b> de mises.",{N,tot})
    ], radin.pid+'R')); }
  const fou=best(bidders,(a,b)=> st[b.pid].maxBid-st[a.pid].maxBid);

      t("💸 <b>Le mégalo :</b> {N} claque <b>{mb}€</b> sur {cl}. Y'a pas de petites économies… sauf là.",{N,mb,cl})
    ], fou.pid+'F')); }
  if(!items.length) return '';
  return `<h2>${t("🎭 Le mot des coulisses")}</h2><div class="box"><div class="mini" style="line-height:1.9">${items.join('<br>')}</div></div>`;

function aiPrep(nDays){ const ids=CARD_IDS.slice(); for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
  const maxCards=Math.max(1,nDays); const nb=1+Math.floor(Math.random()*Math.min(maxCards,4)); const budget=Math.round(rnd(15,SHOP_CAP)); const bids={}; let spent=0;
  for(let k=0;k<nb && k<ids.length;k++){ const id=ids[k]; const bid=Math.min(Math.round(rnd(3,12)), budget-spent); if(bid>=1){ bids[id]=bid; spent+=bid; } }
  return {vote:Math.floor(Math.random()*4), bids}; }

async function prepVote(i){ if(busy)return; busy=true;
  try{ const fresh=await q(db.from("leagues").select("gage").eq("id",L.id).single()); let st; try{st=JSON.parse(fresh.gage);}catch(e){st=null;} if(!st||!Array.isArray(st.options)){busy=false;return;}
    st.votes=st.votes||{}; st.votes[S.myId]=i; st.voteTs=st.voteTs||{}; st.voteTs[S.myId]=Date.now(); await q(db.from("leagues").update({gage:JSON.stringify(st)}).eq("id",L.id)); await refresh();
  }catch(e){ showErr("Vote : "+e.message); } busy=false; }
async function savePrep(){ if(busy)return; const tot=Object.values(bidL).reduce((a,b)=>a+(+b||0),0); const cnt=Object.values(bidL).filter(x=>+x>0).length; const maxCards=Math.max(1,L.num_days||1);
  if(tot>SHOP_CAP||cnt>maxCards) return; busy=true;
  try{ const fresh=await q(db.from("leagues").select("gage").eq("id",L.id).single()); let st; try{st=JSON.parse(fresh.gage);}catch(e){st=null;} if(!st||!Array.isArray(st.options)){busy=false;return;}
    st.bids=st.bids||{}; st.bidTs=st.bidTs||{}; st.bids[S.myId]=Object.assign({},bidL); if(st.bidTs[S.myId]==null) st.bidTs[S.myId]=Date.now();
    await q(db.from("leagues").update({gage:JSON.stringify(st)}).eq("id",L.id));
    await q(db.from("players").update({shop_done:true}).eq("id",S.myId)); S.bidLLeague=null; await refresh();
  }catch(e){ showErr("Préparation : "+e.message); } busy=false; }
async function editPrep(){ if(busy)return; busy=true;
  try{ await q(db.from("players").update({shop_done:false}).eq("id",S.myId)); S.bidLLeague=null; await refresh(); }catch(e){ showErr(e.message); } busy=false; }
async function resolvePrep(){ if(resolving)return; resolving=true; showErr("");
  try{
    // verrou atomique : un seul client résout la préparation (évite double enchère)
    const claim=await q(db.from("leagues").update({status:"starting"}).eq("id",L.id).eq("status","prep").select("*"));
    if(!claim||!claim.length){ resolving=false; await refresh(); return; }
    const fresh=claim[0];
    let st; try{st=JSON.parse(fresh.gage);}catch(e){st=null;} const options=(st&&st.options)||[]; const votes=(st&&st.votes)||{}; const voteTs=(st&&st.voteTs)||{}; const bids=(st&&st.bids)||{}; const bidTs=(st&&st.bidTs)||{};
    // gage gagnant — égalité : le PREMIER à avoir voté l'option l'emporte
    let gage="", winIdx=-1;
    if(options.length){ const counts=options.map((_,i)=>Object.values(votes).filter(v=>v===i).length); const mx=Math.max(0,...counts);
      const tied=counts.map((c,i)=>c===mx?i:-1).filter(i=>i>=0); let bestTs=Infinity;
      for(const i of tied){ const voters=Object.keys(votes).filter(pid=>votes[pid]===i); const t=voters.length?Math.min(...voters.map(pid=>voteTs[pid]!=null?voteTs[pid]:Infinity)):Infinity; if(t<bestTs){bestTs=t;winIdx=i;} }
      if(winIdx<0) winIdx=(tied[0]!=null?tied[0]:0); const w=options[winIdx]; gage=(w&&w.t)||w||pick(GAGES).t; }
    else gage=pick(GAGES).t;
    // enchères : chaque bonus au plus offrant (égalité → premier à avoir misé) ; perdants remboursés
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const paid={},won={},auction=[]; ps.forEach(p=>{paid[p.id]=0;won[p.id]=[];});
    for(const cardId in CARDS){ const cand=ps.map(p=>({pid:p.id,amt:(bids[p.id]&&+bids[p.id][cardId])||0,ts:(bidTs[p.id]!=null?bidTs[p.id]:Infinity)})).filter(c=>c.amt>0);
      if(!cand.length) continue; cand.sort((a,b)=> (b.amt-a.amt) || (a.ts-b.ts)); const wpid=cand[0].pid; won[wpid].push(cardId); paid[wpid]+=cand[0].amt;
      auction.push({card:cardId, winner:wpid, amount:cand[0].amt, bids:cand.map(c=>({pid:c.pid,amt:c.amt}))}); }
    for(const p of ps){ await q(db.from("players").update({hand:won[p.id],capital:Math.max(0,100-paid[p.id]),shop_done:true}).eq("id",p.id)); }
    // récap de préparation (affiché avant le coup d'envoi)
    const summary={ gage, gageDesc:(options[winIdx]&&options[winIdx].d)||gageDescOf(gage),
      gageVotes: options.map((o,i)=>({t:(o&&o.t)||o, d:(o&&o.d)||'', count:Object.values(votes).filter(v=>v===i).length, win:i===winIdx})),
      auction,
      players: ps.map(p=>({pid:p.id,name:p.name,emoji:p.emoji,is_ai:!!p.is_ai,spent:paid[p.id],capital:Math.max(0,100-paid[p.id]),hand:won[p.id]})) };
    await q(db.from("leagues").update({status:"running",gage,current_day:0,prep_summary:summary}).eq("id",L.id));
    try{ await q(db.from("leagues").update({day_started_at:new Date().toISOString()}).eq("id",L.id)); }catch(e){} // début J1 (défensif)
    resolving=false; setSeen(0); localStorage.removeItem("pl_preps_"+L.id); await refresh(); toast("Championnat lancé ✓");
  }catch(e){ showErr("Démarrage : "+e.message); resolving=false; } }

    <div class="row mini" style="margin-top:6px"><span class="muted">${t("Misé")} <b id="tot">${eur(tot)}</b> € / ${eur(max)} € ${t("max")}${invest?' <span class="blue">(📈 70%)</span>':''}</span><span class="muted">${t("👑 Capitaine ×2")}</span></div>

    ${fx.map((f,i)=>{const b=bet.picks[i];
      const o=(v,l)=>`<div class="odd ${b.sel===v?'sel':''}" onclick="setSel(${i},'${v}')">${esc(l)}<b>${oddOf(f,v)}</b></div>`;
      const canTgt = targetCard && (myCard.id!=="chance" || f.draw);
      const tgt = canTgt ? `<span class="tog tgt ${myCard.target===i?'on':''}" onclick="setTarget(${i})">🎯</span>` : ((targetCard&&myCard.id==="chance") ? `<span class="tog" style="opacity:.35" title="${t("Double Chance : uniquement sur un match avec match nul (3 issues)")}">🎯</span>` : '');

  const targetCard=myCard&&CARDS[myCard.id].t; const needTarget=targetCard&&myCard.target==null;
  const needSel2=myCard&&myCard.id==="chance"&&myCard.target!=null&&!myCard.sel2;
  const conflict=targetCard&&myCard.target!=null&&myCard.target===bet.captain;
  const btn=$("betSubmit");
  if(btn){ const over=tot>max+0.001; const allMin=bet.picks.every(b=>(+b.stake||0)>=1); const ok=allMin&&!over&&bet.captain>=0&&!needTarget&&!needSel2&&!conflict; btn.disabled=!ok;
    btn.textContent = bet.captain<0?t("Choisis ton Capitaine 👑"):(over?t("Mise trop élevée"):(needTarget?t("Choisis la cible 🎯"):(needSel2?t("Choisis le 2ᵉ résultat 🎲"):(conflict?t("Capitaine et bonus sur des matchs différents"):(!allMin?t("Mise de 1 € min. sur chaque pari"):t("Valider mes pronostics →")))))); }

function setCap(i){ const on=bet.captain!==i; if(on && myCard && CARDS[myCard.id] && CARDS[myCard.id].t && myCard.target===i){ toast(t("Capitaine et bonus doivent être sur des matchs différents.")); return; } bet.captain=bet.captain===i?-1:i; render(); }

/* ============ RESOLUTION (cards engine) ============ */
function aiPlay(cap,fx,hand){
  const budget=cap*0.5*rnd(0.6,1); const ws=fx.map(()=>rnd(0.5,1.5)); const sw=ws.reduce((a,b)=>a+b,0);
  const picks=fx.map((f,i)=>{ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]]; outs.sort((a,b)=>a[1]-b[1]);
    const sel=Math.random()<0.7?outs[0][0]:pick(outs)[0]; return {sel,stake:Math.round(budget*ws[i]/sw)}; });
  const captain=Math.floor(Math.random()*fx.length);
  let card=null; if(hand&&hand.length&&Math.random()<0.4){ const id=pick(hand); card={id,target:CARDS[id].t?Math.floor(Math.random()*fx.length):null};
    if(card.id==="chance"){ const drawIdx=fx.map((f,idx)=>f.draw?idx:-1).filter(x=>x>=0); if(drawIdx.length){ card.target=pick(drawIdx); const opts=["1","N","2"].filter(v=>v!==picks[card.target].sel); card.sel2=pick(opts); } else { card=null; } } }
  return {picks,captain,card};
}
// Moteur pur : calcule les gains nets du jour à partir des plays (déterministe via pd.rnd).
function runEngine(pdIn, capStart, dz, N){
  const PD=JSON.parse(JSON.stringify(pdIn));
  // Phase 1 : Chérie c'est cadeau (inverse le pari adverse du match CIBLÉ)
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"&&pd.card.target!=null){ const opp=PD[pd.oppId]; const i=pd.card.target;
    if(opp&&opp.picks[i]){ if(opp.picks[i].sel==="1")opp.picks[i].sel="2"; else if(opp.picks[i].sel==="2")opp.picks[i].sel="1"; } } }
  // Phase 2 : règlement pari par pari
  const G={};
  for(const pid in PD){ const pd=PD[pid]; const perBet=[]; let net=0,bestOdd=0;
    pd.picks.forEach((b,i)=>{ const f=pd.fx[i]; const cc=pd.card;
      const isDC=cc&&cc.id==="chance"&&cc.target===i&&cc.sel2;
      const win = isDC ? (f.res===b.sel||f.res===cc.sel2) : (b.sel===f.res);
      const odd = isDC ? dcOdd(oddOf(f,b.sel),oddOf(f,cc.sel2)) : oddOf(f,b.sel);
      let g=win?(+b.stake)*(odd-1):-(+b.stake); if(i===pd.captain) g*=2;
      if(cc&&cc.target===i){ if(cc.id==="double"&&win)g*=2; if(cc.id==="tout")g*=(win?3:2); if(cc.id==="assurance"&&!win)g=0; if(cc.id==="joker")g*=2; }
      if(win&&odd>bestOdd) bestOdd=odd; perBet.push({gain:g,win,odd}); net+=g; });
    G[pid]={perBet,net,bestOdd,bonus:0}; }
  // Phase 3 : Dans ta face puis Miroir
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="face"&&pd.card.target!=null){ const opp=G[pd.oppId];
    if(opp && opp.perBet[pd.card.target]){ const b=opp.perBet[pd.card.target]; if(b.win && b.gain>0){ const cut=b.gain/2; b.gain-=cut; opp.net-=cut; } } } }
  for(const d of dz){ const a=d.home_id,b=d.away_id; if(!PD[a]||!PD[b])continue; const useM=(PD[a].card&&PD[a].card.id==="miroir")||(PD[b].card&&PD[b].card.id==="miroir");
    if(useM){ const best=g=>{let bi=-1,bv=0; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); return {bi,bv};};
      const ba=best(G[a]), bb=best(G[b]); const va=ba.bv, vb=bb.bv;
      if(ba.bi>=0){ G[a].perBet[ba.bi].gain+=(vb-va); G[a].net+=(vb-va); }
      if(bb.bi>=0){ G[b].perBet[bb.bi].gain+=(va-vb); G[b].net+=(va-vb); } } }
  // Phase 4 : Sniper, Roi de la cote
  for(const pid in PD){ const pd=PD[pid]; const g=G[pid];
    if(pd.card&&pd.card.id==="sniper"&&pd.card.target!=null){ let bi=-1,bv=-1e9; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); if(bi===pd.card.target&&g.perBet[bi].gain>0) g.bonus+=capStart[pid]*0.10; }
    if(pd.card&&pd.card.id==="roi"){ if(g.perBet.some(x=>x.win&&x.odd>=2.0)) g.bonus+=capStart[pid]*0.05; } }
  // Phase 5 : Gourmand, Sangsue, Serge Benamou
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="gourmand"){ const opp=G[pd.oppId]; if(opp){ const on=opp.net+opp.bonus; if(on>0) G[pid].bonus+=0.2*on; } } }
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="sangsue"){ const opp=G[pd.oppId]; if(opp){ const on=opp.net+opp.bonus; if(on>0){ const t=0.15*on; G[pid].bonus+=t; opp.bonus-=t; } } } }
  // Serge Benamou : si le joueur qui l'a jouée finit dans le vert, il partage 10 % de SON net avec tous les autres.
  // Phase 6 : Parachute (amortit 30 % de la perte nette du jour)
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="parachute"){ const cur=G[pid].net+G[pid].bonus; if(cur<0) G[pid].bonus += (-0.3*cur); } }
  const dayNet={},dayBest={},dayWins={}; for(const pid in G){ dayNet[pid]=Math.round((G[pid].net+G[pid].bonus)*100)/100; dayBest[pid]=G[pid].bestOdd; dayWins[pid]=G[pid].perBet.filter(x=>x.win).length; }
  return {dayNet,dayBest,dayWins};
}
async function resolveDay(){
  if(resolving)return; resolving=true; showErr("");
  try{
    const D=L.current_day;
    // verrou atomique : un seul client résout la journée (auto-avancement)
    const claim=await q(db.from("leagues").update({status:"resolving"}).eq("id",L.id).eq("status","running").eq("current_day",D).select("*"));
    if(!claim||!claim.length){ resolving=false; await refresh(); return; }
    const fresh=claim[0];
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const dz=await q(db.from("duels").select("*").eq("league_id",L.id).eq("day",D));
    const bz=await q(db.from("bets").select("*").eq("league_id",L.id).eq("day",D));
    const N=ps.length; const pmap={}; ps.forEach(p=>pmap[p.id]=p);
    const capStart={}; ps.forEach(p=>capStart[p.id]=p.capital);
    const PD={}; const aiInserts=[]; const forgot=new Set();
    for(const d of dz){ let fx=d.fixtures||genPool(5); fx.forEach(f=>{if(!f.res)f.res=simResult(f);}); d.fixtures=fx;
      for(const pid of [d.home_id,d.away_id]){ let bt=bz.find(b=>b.player_id===pid);
        const valid = bt && Array.isArray(bt.picks) && bt.picks.length===fx.length;
        if(!valid){
          if(pmap[pid] && pmap[pid].is_ai){
            // IA : joue toujours automatiquement (elle ne peut pas « oublier »)
            const ai=aiPlay(capStart[pid],fx,pmap[pid].hand||[]); bt={player_id:pid,picks:ai.picks,captain:ai.captain,card:ai.card};
            aiInserts.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,card:ai.card,submitted:true});
          } else {
            // Humain sans pari validé à temps : AUCUN pari pris en compte (pas de reprise adverse) → pénalités −2 pts / −25 % capital appliquées plus bas
            forgot.add(pid); bt={player_id:pid,picks:[],captain:null,card:null};
            aiInserts.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:[],captain:null,card:null,submitted:false});
          }
        }
        PD[pid]={picks:bt.picks.map(x=>({...x})),captain:bt.captain,card:bt.card||null,duelId:d.id,oppId:(pid===d.home_id?d.away_id:d.home_id),fx,rnd:Math.random()}; } }
    // résolution déterministe (moteur en phases), + impact réel de chaque carte
    const {dayNet,dayBest,dayWins}=runEngine(PD,capStart,dz,N);
    const impacts={};
    for(const pid in PD){ if(PD[pid].card&&PD[pid].card.id){ const alt=JSON.parse(JSON.stringify(PD)); alt[pid].card=null;
      const wo=runEngine(alt,capStart,dz,N).dayNet; const opp=PD[pid].oppId;
      impacts[pid]={self:Math.round(((dayNet[pid]||0)-(wo[pid]||0))*100)/100, opp: opp!=null?Math.round(((dayNet[opp]||0)-(wo[opp]||0))*100)/100:0}; } }
    for(const d of dz){ await q(db.from("duels").update({fixtures:d.fixtures,resolved:true}).eq("id",d.id)); }
    if(aiInserts.length) await q(db.from("bets").upsert(aiInserts,{onConflict:"player_id,day"}));
    // "Chérie c'est cadeau" : détermine l'inversion du pari ciblé de la victime
    const cadeauFlips={};
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"&&pd.card.target!=null){ const vId=pd.oppId; const opp=PD[vId]; const i=pd.card.target;
      if(opp&&opp.picks[i]){ const from=opp.picks[i].sel; let to=from; if(from==="1")to="2"; else if(from==="2")to="1";
        if(to!==from) cadeauFlips[pid]={victim:vId, match:i, from, to}; } } }
    for(const pid in dayNet){ const c=PD[pid].card; const u2={net:dayNet[pid]};
      if(c&&c.id){ u2.card={id:c.id,target:c.target,impact:impacts[pid]}; if(c.sel2) u2.card.sel2=c.sel2; if(cadeauFlips[pid]) u2.card.flip=cadeauFlips[pid]; }
      await q(db.from("bets").update(u2).eq("league_id",L.id).eq("day",D).eq("player_id",pid)); }
    // persiste l'inversion sur le pari de la victime (choix initial → final visibles dans le détail)
    for(const pid in cadeauFlips){ const fl=cadeauFlips[pid]; const picks=PD[fl.victim].picks.map(x=>({...x})); picks[fl.match]={...picks[fl.match],sel:fl.to,orig:fl.from,flipBy:pid};
      await q(db.from("bets").update({picks}).eq("league_id",L.id).eq("day",D).eq("player_id",fl.victim)); }
    const upd={}; ps.forEach(p=>{ upd[p.id]={points:p.points,capital:Math.max(0,Math.round((capStart[p.id]+(dayNet[p.id]||0))*100)/100),
      streak_w:p.streak_w,streak_l:p.streak_l,duel_wins:p.duel_wins,best_day:Math.max(p.best_day,dayNet[p.id]||0),
      best_odd:Math.max(p.best_odd,dayBest[p.id]||0),hand:(p.hand||[]).slice(),cards_used:(p.cards_used||[]).slice()}; });
    // Pari non validé à temps (humain) : aucun pari pris en compte → −2 pts au classement et −25 % du capital.
    forgot.forEach(pid=>{ if(upd[pid]){ upd[pid].points-=2; upd[pid].capital=Math.max(0,Math.round(upd[pid].capital*0.75*100)/100); } });
    // +1 au meilleur pronostiqueur du jour (plus gros gain parmi tous les joueurs)
    const starId=dayStar(ps.filter(p=>!forgot.has(p.id)).map(p=>{ const gm=gainMise(PD[p.id]?PD[p.id].picks:[], PD[p.id]?PD[p.id].fx:[]); return {id:p.id, net:dayNet[p.id]||0, gain:gm.gain, mise:gm.mise, order:p.join_order||0}; }));
    if(starId!=null) upd[starId].points+=1;
    // Malus : -1 point si TOUS les paris du joueur sont faux (aucun gagnant) → possible d'être en négatif.
    ps.forEach(p=>{ if(PD[p.id] && PD[p.id].picks && PD[p.id].picks.length && (dayWins[p.id]||0)===0) upd[p.id].points-=1; });
    // Duel : vainqueur = meilleur net (gain−mise), puis gain, puis mise, sinon nul.
    // Points : vainqueur 3 (net>0) ou 1 (net≤0) ; perdant 1 (net>0) ou 0 (net≤0) ; nul 1/1.
    // Les séries 🔥/❄️ ne servent que d'indicateur de dynamique (aucun avantage).
    for(const d of dz){ const hp=PD[d.home_id], ap=PD[d.away_id]; if(!hp||!ap) continue;
      const H=Object.assign({net:dayNet[d.home_id]||0}, gainMise(hp.picks,hp.fx));
      const A=Object.assign({net:dayNet[d.away_id]||0}, gainMise(ap.picks,ap.fx));
      const r=duelPts(H,A); upd[d.home_id].points+=r.h; upd[d.away_id].points+=r.a;
      if(r.win==='h'){ upd[d.home_id].duel_wins+=1; upd[d.home_id].streak_w+=1; upd[d.home_id].streak_l=0; upd[d.away_id].streak_l+=1; upd[d.away_id].streak_w=0; }
      else if(r.win==='a'){ upd[d.away_id].duel_wins+=1; upd[d.away_id].streak_w+=1; upd[d.away_id].streak_l=0; upd[d.home_id].streak_l+=1; upd[d.home_id].streak_w=0; }
      else { upd[d.home_id].streak_w=0; upd[d.home_id].streak_l=0; upd[d.away_id].streak_w=0; upd[d.away_id].streak_l=0; } }
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id){ const h=upd[pid].hand; const idx=h.indexOf(pd.card.id); if(idx>=0){ h.splice(idx,1); upd[pid].cards_used.push(pd.card.id); } } }
    // Recapitalisation solidaire : si un humain n'a plus assez pour miser (< seuil), +20€ à lui ET à tout le monde
    let recapNote=null;
    const broke=ps.filter(p=>!p.is_ai && upd[p.id].capital < RECAP_THRESHOLD);
    if(broke.length){ ps.forEach(p=>{ upd[p.id].capital += RECAP_AMOUNT; }); recapNote={day:D, amount:RECAP_AMOUNT, names:broke.map(p=>(p.emoji?p.emoji+' ':'')+p.name)}; }
    for(const p of ps){ const u=upd[p.id]; await q(db.from("players").update({points:u.points,capital:u.capital,streak_w:u.streak_w,streak_l:u.streak_l,duel_wins:u.duel_wins,best_day:u.best_day,best_odd:u.best_odd,hand:u.hand,cards_used:u.cards_used}).eq("id",p.id)); }
    try{ await q(db.from("leagues").update({recap_note:recapNote}).eq("id",L.id)); }catch(e){} // message recapitalisation (défensif si colonne absente)
    const next=D+1; const done=next>=fresh.num_days;
    await q(db.from("leagues").update({current_day:next,status:done?"done":"running"}).eq("id",L.id));
    if(!done){ try{ await q(db.from("leagues").update({day_started_at:new Date().toISOString()}).eq("id",L.id)); }catch(e){} // début journée suivante (défensif si colonne absente)
      try{ await q(db.from("leagues").update({bet_started_at:null}).eq("id",L.id)); }catch(e){} } // remise à zéro du compte à rebours des paris
    resolving=false; await refresh(); toast("Journée résolue ✓");
  }catch(e){ showErr("Résolution : "+e.message); resolving=false; }
}

/* ============ RECAP ============ */
function recapBody(D){
  const netMap={},cardMap={},capMap={}; bets.forEach(b=>{netMap[b.player_id]=b.net||0; cardMap[b.player_id]=b.card;});
  const forgot=pid=>{ const b=bets.find(x=>x.player_id===pid); return !!(b&&Array.isArray(b.picks)&&b.picks.length===0); };
  const ord=[...players].sort((a,b)=>(netMap[b.id]||0)-(netMap[a.id]||0));
  const dpts={}; players.forEach(p=>dpts[p.id]=0);
  duels.forEach(d=>{ const hb=bets.find(b=>b.player_id===d.home_id), ab=bets.find(b=>b.player_id===d.away_id);

// Fenêtre « détail du calcul » du gain net d'un joueur pour la journée affichée
function showGainDetail(pid){
  const p=pById(pid)||{}; const bt=bets.find(b=>b.player_id===pid); const d=duels.find(x=>x.home_id===pid||x.away_id===pid);
  const net=(bt&&bt.net)||0; const sel=(f,s)=> s==="1"?f.home:s==="2"?f.away:t("Nul");
  let rows='', sumG=0;
  const isForgot = bt && Array.isArray(bt.picks) && bt.picks.length===0;
  if(isForgot){ rows=`<div class="mini">${t("⏰ <b>Pari non validé à temps.</b> Aucun pari pris en compte → <b>−2 pts</b> au classement et <b>−25 %</b> du capital.")}</div>`; }
  else if(bt&&bt.picks&&d&&d.fixtures){
    const c=bt.card; const oppId=d.home_id===pid?d.away_id:d.home_id; const oppB=bets.find(b=>b.player_id===oppId); const oppCard=oppB&&oppB.card;
    rows=d.fixtures.map((f,i)=>{ const b=bt.picks[i]; if(!b) return '';
      const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2;
      const win=isDC?(f.res===b.sel||f.res===c.sel2):(b.sel===f.res);
      const odd=isDC?dcOdd(oddOf(f,b.sel),oddOf(f,c.sel2)):oddOf(f,b.sel);
      let g=win?(+b.stake)*(odd-1):-(+b.stake); const parts=[`${b.stake}€ @${odd}`];
      if(i===bt.captain){ g*=2; parts.push('👑 ×2'); }
      if(c&&c.target===i){ if(c.id==="double"&&win){g*=2;parts.push('🚀 ×2');} else if(c.id==="tout"){g*=(win?3:2);parts.push('🔥 '+(win?'×3':'×2'));} else if(c.id==="joker"){g*=2;parts.push('🃏 ×2');} else if(c.id==="assurance"&&!win){g=0;parts.push('🛡 '+t("remboursé"));} }
      if(oppCard&&oppCard.id==="face"&&oppCard.target===i&&win&&g>0){ g=g/2; parts.push('😏 ÷2'); }
      sumG+=g; const selD=isDC?`${sel(f,b.sel)}/${sel(f,c.sel2)}`:sel(f,b.sel);
      return `<div class="mini" style="margin:5px 0"><b>${esc(f.home)}–${esc(f.away)}</b> <span class="muted">(${esc(sel(f,f.res))})</span><br><span class="muted">${esc(selD)} · ${parts.join(' · ')}</span> → <b class="${g>=0?'green':'red'}">${fmt(g)}€</b> ${win?'✓':'✗'}</div>`;
    }).join('');
    const adj=net-sumG;
    if(Math.abs(adj)>=1) rows+=`<div class="mini" style="margin-top:6px;border-top:1px dashed var(--border);padding-top:6px">${t("🃏 Bonus & ajustements")}${c&&CARDS[c.id]?' ('+CARDS[c.id].e+' '+esc(t(CARDS[c.id].n))+')':''} : <b class="${adj>=0?'green':'red'}">${fmt(adj)}€</b></div>`;
  } else rows=`<div class="mini muted">${t("Pas de détail disponible pour ce joueur.")}</div>`;
  infoModal("🧮", t("Détail — {a}",{a:(p.emoji||'')+' '+(p.name||'?')}), `<div style="text-align:left">${rows}<div class="mini" style="margin-top:8px;border-top:2px solid var(--border);padding-top:6px"><b>${t("Total net :")} <span class="${net>=0?'green':'red'}">${fmt(net)}€</span></b></div></div>`);
}

function cmp(a,b){ return b.points-a.points || b.capital-a.capital || b.duel_wins-a.duel_wins || b.best_day-a.best_day || b.best_odd-a.best_odd; }
// Reconstruit l'historique du classement (état cumulé APRÈS chaque journée résolue) en rejouant les résultats stockés.
function computeStandHist(){
  if(!chartBets || !standDuels) return [];
  const N = (L.status==="done" ? (L.num_days||0) : (L.current_day||0)); // journées résolues
  if(N<1) return [];
  const sp = L.prep_summary||{};
  const st={}; players.forEach(p=>{ const psx=(sp.players||[]).find(x=>x.pid===p.id); st[p.id]={points:0, capital: psx?psx.capital:100, duel_wins:0, best_day:0, best_odd:0, streak_w:0, streak_l:0, star:0}; });
  const betAt={}; chartBets.forEach(b=>{ betAt[b.day+'|'+b.player_id]=b; });
  const duelByDay={}; standDuels.forEach(d=>{ (duelByDay[d.day]=duelByDay[d.day]||[]).push(d); });
  const snaps=[];
  for(let d=0; d<N; d++){
    const dz=duelByDay[d]||[];
    const inDay=pid=>dz.some(du=>du.home_id===pid||du.away_id===pid);
    // oubli : humain présent ce jour-là sans pari valide (picks vides ou absents)
    const forgot=new Set();
    players.forEach(p=>{ if(p.is_ai||!inDay(p.id)) return; const b=betAt[d+'|'+p.id]; if(!b||!Array.isArray(b.picks)||b.picks.length===0) forgot.add(p.id); });
    // points de duel + séries 🔥/❄️ + victoires
    dz.forEach(du=>{ const hb=betAt[d+'|'+du.home_id], ab=betAt[d+'|'+du.away_id];
      const H=Object.assign({net:(hb&&hb.net)||0}, gainMise(hb&&hb.picks, du.fixtures));
      const A=Object.assign({net:(ab&&ab.net)||0}, gainMise(ab&&ab.picks, du.fixtures));
      const r=duelPts(H,A);
      if(st[du.home_id]) st[du.home_id].points+=r.h; if(st[du.away_id]) st[du.away_id].points+=r.a;
      if(r.win==='h'){ if(st[du.home_id]){st[du.home_id].duel_wins++;st[du.home_id].streak_w++;st[du.home_id].streak_l=0;} if(st[du.away_id]){st[du.away_id].streak_l++;st[du.away_id].streak_w=0;} }
      else if(r.win==='a'){ if(st[du.away_id]){st[du.away_id].duel_wins++;st[du.away_id].streak_w++;st[du.away_id].streak_l=0;} if(st[du.home_id]){st[du.home_id].streak_l++;st[du.home_id].streak_w=0;} }
      else { if(st[du.home_id]){st[du.home_id].streak_w=0;st[du.home_id].streak_l=0;} if(st[du.away_id]){st[du.away_id].streak_w=0;st[du.away_id].streak_l=0;} } });
    // ⭐ meilleur pronostiqueur du jour (hors oubli) → +1 pt
    const rows=[]; players.forEach(p=>{ const du=dz.find(x=>x.home_id===p.id||x.away_id===p.id); if(!du||forgot.has(p.id)) return; const b=betAt[d+'|'+p.id]; const gm=gainMise(b&&b.picks, du.fixtures); rows.push({id:p.id, net:(b&&b.net)||0, gain:gm.gain, mise:gm.mise, order:p.join_order||0}); });
    const sid=dayStar(rows); if(sid!=null && st[sid]){ st[sid].points+=1; st[sid].star+=1; }
    // −1 pt si tous les paris faux (picks non vides)
    players.forEach(p=>{ const du=dz.find(x=>x.home_id===p.id||x.away_id===p.id); if(!du) return; const b=betAt[d+'|'+p.id]; if(b&&b.picks&&b.picks.length&&winCount(b,du.fixtures)===0 && st[p.id]) st[p.id].points-=1; });
    // capital (+ net), meilleure journée, meilleure cote gagnée
    players.forEach(p=>{ const du=dz.find(x=>x.home_id===p.id||x.away_id===p.id); const b=betAt[d+'|'+p.id]; const net=(b&&b.net)||0; if(st[p.id]){ st[p.id].best_day=Math.max(st[p.id].best_day,net); st[p.id].capital=Math.max(0,Math.round((st[p.id].capital+net)*100)/100); }
      if(b&&b.picks&&du&&du.fixtures){ b.picks.forEach((pk,i)=>{ const f=du.fixtures[i]; if(!f) return; const c=b.card; const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2; const win=isDC?(f.res===pk.sel||f.res===c.sel2):(pk.sel===f.res); const odd=isDC?dcOdd(oddOf(f,pk.sel),oddOf(f,c.sel2)):oddOf(f,pk.sel); if(win&&odd>st[p.id].best_odd) st[p.id].best_odd=odd; }); } });
    // pénalité oubli : −2 pts, −25 % capital
    forgot.forEach(pid=>{ if(st[pid]){ st[pid].points-=2; st[pid].capital=Math.max(0,Math.round(st[pid].capital*0.75*100)/100); } });
    // recapitalisation solidaire : si un humain < seuil → +montant à tout le monde
    const broke=players.filter(p=>!p.is_ai && st[p.id] && st[p.id].capital<RECAP_THRESHOLD);
    if(broke.length){ players.forEach(p=>{ if(st[p.id]) st[p.id].capital+=RECAP_AMOUNT; }); }
    snaps.push(players.map(p=>({ id:p.id,name:p.name,emoji:p.emoji,is_ai:p.is_ai,join_order:p.join_order,
      points:st[p.id].points, capital:st[p.id].capital, duel_wins:st[p.id].duel_wins, best_day:st[p.id].best_day, best_odd:st[p.id].best_odd, streak_w:st[p.id].streak_w, streak_l:st[p.id].streak_l, star:st[p.id].star })));
  }
  return snaps;
}

function capChart(){
  if(!chartBets) return '';
  const N=(L.status==="done"?(L.num_days||0):(L.current_day||0)); if(N<1) return '';
  const sp=L.prep_summary||{};
  const capAfter={}; players.forEach(p=>{ const psx=(sp.players||[]).find(x=>x.pid===p.id); capAfter[p.id]= psx?psx.capital:100; });
  const netByDay={}; players.forEach(p=>netByDay[p.id]=Array(N).fill(0));
  chartBets.forEach(b=>{ if(netByDay[b.player_id]!=null && b.day<N) netByDay[b.player_id][b.day]=b.net||0; });
  const series=players.map(p=>{ let v=capAfter[p.id]; const pts=[100,v]; for(let d=0;d<N;d++){ v=Math.max(0,v+(netByDay[p.id][d]||0)); pts.push(v); } return {p,pts}; });
  const npts=N+2; const allv=series.flatMap(s=>s.pts); let mn=Math.min(...allv), mx=Math.max(...allv); if(!isFinite(mn)){mn=0;mx=100;}
  const pad=Math.max(5,(mx-mn)*0.12); const lo=Math.max(0,Math.floor((mn-pad)/10)*10), hi=Math.max(lo+10,Math.ceil((mx+pad)/10)*10);
  const W=480,H=210,PL=38,PR=10,PT=12,PB=26;
  const X=i=> PL + (W-PL-PR)*(npts<=1?0:i/(npts-1));
  const Y=v=> PT + (H-PT-PB)*(1-(v-lo)/((hi-lo)||1));
  const cols=["#4ade80","#60a5fa","#fbbf24","#f87171","#a78bfa","#f472b6","#22d3ee","#fb923c","#84cc16","#e879f9"];
  const labels=["100€",t("Bonus")]; for(let d=0;d<N;d++) labels.push("J"+(d+1));
  let grid=""; for(let k=0;k<=3;k++){ const gv=lo+(hi-lo)*k/3; const y=Y(gv); grid+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="#242b38"/><text x="${PL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#8b93a3">${Math.round(gv)}</text>`; }
  let xlab=""; labels.forEach((l,i)=>{ if(npts>9 && i>1 && i%2===0 && i!==npts-1) return; xlab+=`<text x="${X(i).toFixed(1)}" y="${H-PB+14}" text-anchor="middle" font-size="8.5" fill="#8b93a3">${esc(l)}</text>`; });
  const lines=series.map((s,si)=>{ const c=cols[si%cols.length]; const dpath=s.pts.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    const dots=s.pts.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2" fill="${c}"/>`).join('');
    return `<path d="${dpath}" fill="none" stroke="${c}" stroke-width="2"/>${dots}`; }).join('');
  const legend=series.map((s,si)=>`<span class="mini" style="margin-right:10px;white-space:nowrap"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${cols[si%cols.length]};vertical-align:middle"></span> ${esc(s.p.emoji)} ${esc(s.p.name)}</span>`).join('');
  return `<div class="box"><div class="mini muted" style="margin-bottom:6px">${t("📈 Évolution du capital (départ → bonus → chaque journée)")}</div>
     <div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:320px;height:auto">${grid}${lines}${xlab}</svg></div>
     <div style="margin-top:6px;line-height:1.9">${legend}</div></div>`;
}

      const ord=[...players].sort((a,b)=>(cumPts[b.id]-cumPts[a.id])||(b.capital-a.capital)); ord.forEach((p,idx)=>rankHist[p.id][d]=idx+1); leaderByDay.push(ord[0]?ord[0].id:null);
    }
    let leadChanges=0; const daysLed={};
    leaderByDay.forEach((pid,i)=>{ if(pid) daysLed[pid]=(daysLed[pid]||0)+1; if(i>0&&pid&&pid!==leaderByDay[i-1]) leadChanges++; });
    let topLeader=null; Object.keys(daysLed).forEach(pid=>{ if(topLeader===null||daysLed[pid]>daysLed[topLeader]) topLeader=pid; });
    const finalOrd=[...players].sort(cmp); const finalRank={}; finalOrd.forEach((p,i)=>finalRank[p.id]=i+1);
    let comeback=null; players.forEach(p=>{ const rh=rankHist[p.id].filter(x=>x); if(rh.length<2)return; const worst=Math.max(...rh); const g=worst-finalRank[p.id]; if(g>0&&(comeback===null||g>comeback.g)) comeback={pid:p.id,g,worst,fin:finalRank[p.id]}; });
    const bonusImp={}; players.forEach(p=>bonusImp[p.id]=0); let cardsPlayed=0, master=null;
    bz.forEach(b=>{ if(b.card&&b.card.id){ cardsPlayed++; const self=(b.card.impact&&b.card.impact.self)||0; if(bonusImp[b.player_id]!=null)bonusImp[b.player_id]+=self; if(self>0&&(master===null||self>master.self)) master={pid:b.player_id,day:b.day,self,id:b.card.id}; } });

}

async function loadPalmares(){
  try{
    const lgs=await q(db.from("leagues").select("id,name,num_participants,status"));
    const pls=await q(db.from("players").select("id,name,emoji,league_id,is_ai,user_id"));
    const bts=await q(db.from("bets").select("league_id,day,player_id,net,picks,card,captain,duel_id").not("net","is",null));
    const dls=await q(db.from("duels").select("id,fixtures"));
    const lgMap={},plMap={},dlMap={}; lgs.forEach(l=>lgMap[l.id]=l); pls.forEach(p=>plMap[p.id]=p); dls.forEach(d=>dlMap[d.id]=d);
    const oddF=(f,s)=> s==="1"?f.oh:s==="2"?f.oa:f.od; const selNm=(f,s)=> s==="1"?f.home:s==="2"?f.away:t("Nul");
    const dayRecs=[], oddRecs=[];
    for(const b of bts){ const pl=plMap[b.player_id]; if(!pl||pl.is_ai||pl.name==="Joueur IA") continue; const lg=lgMap[b.league_id]||{}; const d=dlMap[b.duel_id]; const fx=(d&&d.fixtures)||[];
      const picks=b.picks||[]; const staked=picks.reduce((a,x)=>a+(+x.stake||0),0);
      const lines=picks.map((x,i)=>{ const f=fx[i]; if(!f) return null; const win=x.sel===f.res; const odd=oddF(f,x.sel); let g=win?(+x.stake)*(odd-1):-(+x.stake); if(i===b.captain)g*=2;
        if(win && +x.stake>0) oddRecs.push({odd, name:pl.name, emoji:pl.emoji, lname:lg.name, day:b.day, match:f.home+"–"+f.away, sel:selNm(f,x.sel), stake:+x.stake});
        return {m:f.home+"–"+f.away, sel:selNm(f,x.sel), win, odd, stake:+x.stake, g:+g.toFixed(2), cap:i===b.captain}; }).filter(Boolean);
      dayRecs.push({net:+(b.net||0).toFixed(2), staked, ret: staked>0?(b.net||0)/staked:0, name:pl.name, emoji:pl.emoji, lname:lg.name, np:lg.num_participants, day:b.day, cardId:b.card&&b.card.id, lines});
    }
    // Agrégat de PRONOSTIC PUR par personne (user_id), toutes ligues — indépendant des mises.
    const agg={};
    for(const b of bts){ const pl=plMap[b.player_id]; if(!pl||pl.is_ai||!pl.user_id||pl.name==="Joueur IA") continue;
      const d=dlMap[b.duel_id]; const fx=(d&&d.fixtures)||[]; const c=b.card;
      let a=agg[pl.user_id]; if(!a){ a=agg[pl.user_id]={uid:pl.user_id,name:pl.name,emoji:pl.emoji,picks:0,correct:0,winOddSum:0,wins:0,flat:0}; }
      a.name=pl.name; a.emoji=pl.emoji;
      (b.picks||[]).forEach((x,i)=>{ const f=fx[i]; if(!f||f.res==null) return;
        const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2;
        const win=isDC?(f.res===x.sel||f.res===c.sel2):(x.sel===f.res);
        const odd=isDC?dcOdd(oddF(f,x.sel),oddF(f,c.sel2)):oddF(f,x.sel);
        a.picks++; if(win){ a.correct++; a.wins++; a.winOddSum+=odd; a.flat+=(odd-1); } else a.flat-=1; });
    }
    const MINP=1, MINW=1; // TEMPORAIRE (aperçu test) — remonter à 5/2 avant usage réel
    const skill=Object.values(agg).filter(a=>a.picks>0).map(a=>({ uid:a.uid, name:a.name, emoji:a.emoji, picks:a.picks, correct:a.correct,
      hit:a.correct/a.picks, avgOdd:a.wins?a.winOddSum/a.wins:0, wins:a.wins, flat:a.flat/a.picks }));
    // Classement + position du joueur connecté : renvoie {top: 5 premiers, me: {rank,total,...} ou null}
    const rankMe=(arr,keyFn)=>{ const sorted=[...arr].sort((x,y)=>keyFn(y)-keyFn(x));
      const mi=AUTH?sorted.findIndex(a=>a.uid===AUTH.id):-1;
      return { top:sorted.slice(0,5), me: mi>=0?Object.assign({rank:mi+1,total:sorted.length},sorted[mi]):null }; };
    const skHit=skill.filter(a=>a.picks>=MINP), skOdd=skill.filter(a=>a.wins>=MINW);
    palmares={
      bigGain: [...dayRecs].sort((a,b)=>b.net-a.net).slice(0,5),
      bestRet: [...dayRecs].filter(r=>r.staked>=5).sort((a,b)=>b.ret-a.ret).slice(0,5),
      bestOdd: [...oddRecs].sort((a,b)=>b.odd-a.odd).slice(0,5),
      bigLoss: [...dayRecs].sort((a,b)=>a.net-b.net).slice(0,5),
      topHit: rankMe(skHit, a=>a.hit),
      worstHit: { top:[...skHit].sort((x,y)=>x.hit-y.hit).slice(0,5) },
      topAvgOdd: rankMe(skOdd, a=>a.avgOdd),
      topFlat: rankMe(skHit, a=>a.flat),
      minP: MINP
    };
  }catch(e){ palmares={error:e.message}; }
}

    // Gages les plus choisis : cumul des votes (et nombre de fois retenu) sur toutes les ligues démarrées
    const gageTally={};
    lgs.forEach(l=>{ const gv=(l.prep_summary&&l.prep_summary.gageVotes)||[]; gv.forEach(g=>{ if(!g||!g.t) return; const k=g.t;
      gageTally[k]=gageTally[k]||{votes:0,wins:0}; gageTally[k].votes+=(g.count||0); if(g.win) gageTally[k].wins++; }); });
    const topGages=Object.keys(gageTally).map(t=>({t,votes:gageTally[t].votes,wins:gageTally[t].wins})).sort((a,b)=> b.votes-a.votes || b.wins-a.wins);
    const activeAccounts=new Set(pls.filter(p=>!p.is_ai&&p.user_id).map(p=>p.user_id)); // 1 personne = 1, même sur plusieurs ligues
    adminData={ users, leagues:lgs.length,
      byStatus:{lobby:lgs.filter(l=>l.status==="lobby").length, prep:lgs.filter(l=>l.status==="prep"||l.status==="starting").length, running:lgs.filter(l=>l.status==="running").length, done:lgs.filter(l=>l.status==="done").length},
      activeAccounts:activeAccounts.size, participations:pls.filter(p=>!p.is_ai&&p.name!=="Joueur IA").length,
      resolvedBets:bts.length, cardsPlayed:withCard, topCards:Object.keys(CARDS).map(id=>[id,cardCount[id]||0]).sort((a,b)=>b[1]-a[1]), topGages };
  }catch(e){ adminData={error:e.message}; }
}
function viewAdmin(){
  const back=`<button class="btn ghost sm" onclick="S.view='leagues';render()">← Mes ligues</button>`;
  if(!(AUTH&&AUTH.id===ADMIN_ID)) return back+`<div class="box">Accès réservé à l'administrateur.</div>`;
  if(!adminData) return back+`<div class="box">Chargement des stats…</div>`;
  if(adminData.error) return back+`<div class="err">${esc(adminData.error)}</div>`;
  const a=adminData; const st=(k,v)=>`<div class="box row"><span class="muted">${k}</span><b>${v}</b></div>`;
  return `${back}
    <div class="box"><h2 style="margin-top:0">🛠 Tableau de bord admin</h2><div class="mini muted">Statistiques globales du jeu.</div></div>
    ${st("👤 Comptes créés", a.users!=null?a.users:("≈ "+a.distinct+" (joueurs uniques)"))}
    ${st("🏆 Ligues créées", a.leagues)}
    <div class="box"><div class="mini muted" style="margin-bottom:8px">Ligues par statut</div>
      <div class="row mini"><span>🕓 Salon <b>${a.byStatus.lobby}</b></span><span>🎬 Prépa <b>${a.byStatus.prep}</b></span><span>▶️ En cours <b>${a.byStatus.running}</b></span><span>🏁 Fini <b>${a.byStatus.done}</b></span></div></div>
    ${st("🎮 Joueurs (comptes distincts ayant rejoint)", a.activeAccounts)}
    ${st("🎫 Participations (joueur × ligue)", a.participations)}
    ${st("🧮 Journées résolues (paris)", a.resolvedBets)}
    ${st("🃏 Cartes bonus jouées", a.cardsPlayed)}
    <div class="box"><div class="mini muted" style="margin-bottom:6px">🃏 Bonus les plus joués</div>
      ${a.topCards.length?a.topCards.map(([id,n],i)=>`<div class="row mini" style="margin:5px 0"><span>${i+1}. ${CARDS[id]?CARDS[id].e+' '+esc(CARDS[id].n):esc(id)}</span><b>${n}×</b></div>`).join(""):`<div class="mini muted">Aucune carte jouée pour l'instant.</div>`}</div>
    <div class="box"><div class="mini muted" style="margin-bottom:6px">🎭 Gages les plus choisis <span class="mini">(cumul des votes sur toutes les ligues)</span></div>
      ${(a.topGages&&a.topGages.length)?a.topGages.slice(0,10).map((g,i)=>`<div class="row mini" style="margin:5px 0"><span>${i+1}. ${esc(g.t)}</span><b>${g.votes} vote${g.votes>1?'s':''}${g.wins?` · ${g.wins}× retenu`:''}</b></div>`).join(""):`<div class="mini muted">Aucun vote de gage enregistré pour l'instant.</div>`}</div>
    <div class="box"><div class="mini muted" style="margin-bottom:6px">👤 Comptes joueurs — identifiants & réinitialisation</div>
      ${adminUsers ? `${adminUsers.length?adminUsers.map(u=>`<div class="row mini" style="margin:6px 0"><span>${esc(u.username)}${u.id===ADMIN_ID?' <span class="tag">(toi, admin)</span>':''}</span>${u.id===ADMIN_ID?'':`<button class="btn ghost sm" onclick="adminResetPwd('${u.id}')">🔑 Réinitialiser le mot de passe</button>`}</div>`).join(""):`<div class="mini muted">Aucun autre compte pour l'instant.</div>`}
         <button class="btn ghost sm" style="margin-top:8px" onclick="adminUsers=null;render()">Masquer</button>`
        : `<div class="mini muted">Un joueur a oublié son mot de passe ? Entre ton mot de passe admin pour voir les identifiants et en réinitialiser un.</div>
           <input id="adminPwd" type="password" placeholder="Ton mot de passe admin" autocomplete="off" style="margin-top:8px" onkeydown="if(event.key==='Enter')adminLoadUsers()">
           <button class="btn ghost" style="margin-top:6px" onclick="adminLoadUsers()">Afficher les comptes</button>`}
    </div>`;
}

/* ============ render / poll ============ */
function render(){
  const inLeague=!!S.leagueId;
  applyThemeBtn(); applyLangBtn();
  const fo=$("foot"); if(fo) fo.textContent="Bankroll Bet Battle · "+t("prototype de test · données sportives simulées")+" · v3.57";
  $("rulesBtn").classList.toggle("hide", S.view==="auth");
  $("leaguesBtn").classList.toggle("hide", !inLeague);
  $("settingsBtn").classList.toggle("hide", S.view==="auth" || !AUTH);
  let html="";
  if(S.view==="auth") html=viewAuth();
  else if(S.view==="leagues") html=viewLeagues();
  else if(S.view==="rules") html=viewRules();
  else if(S.view==="standings") html=viewStandings();
  else if(S.view==="coulisses") html=viewCoulisses();
  else if(S.view==="results") html=viewResults();
  else if(S.view==="palmares") html=viewPalmares();
  else if(S.view==="admin") html=viewAdmin();
  else if(S.view==="settings") html=viewSettings();
  else html=viewGame();
  $("root").innerHTML=html;
  $("subtitle").textContent = S.view==="auth"?t("Connexion") : S.view==="settings"?t("Paramètres") : S.view==="leagues"?t("Mes ligues") : (L? (L.status==="lobby"?t("Salon")+" · "+L.code : ((L.status==="prep"||L.status==="starting")?t("Préparation"):(L.status==="done"?t("Terminé"):t("Journée {a}/{b}",{a:L.current_day+1,b:L.num_days})))) : "…");
}
// pendant la composition (choix des matchs à domicile ou saisie des pronos), on ne rafraîchit pas
// pour ne pas re-dessiner et fermer le champ en cours de saisie.
function isComposing(){
  if(S.view!=="game"||!L) return false;
  if(L.status==="prep") return !!(me() && !me().shop_done); // prépa (vote/enchères) en cours
  if(L.status!=="running"||S.recap) return false;
  const d=myDuel(); if(!d) return false;
  if(!d.fixtures) return d.home_id===S.myId; // à domicile : en train de choisir les 5 matchs
  return !myBet();                            // en train de faire ses pronos/mises
}
function startPoll(){ if(poll) clearInterval(poll); poll=setInterval(()=>{ if((S.view==="game"||S.view==="standings")&&!isComposing()) refresh(); },4000); }
function openSettings(){ if(S.view==="settings")return; S.prevView=S.view; S.view="settings"; render(); }
function closeSettings(){ S.view=S.prevView||(S.leagueId?"game":"leagues"); render(); }
function viewSettings(){
  return `<button class="btn ghost sm" onclick="closeSettings()">${t("← Retour")}</button>
    <div class="box"><h2 style="margin-top:0">${t("⚙️ Paramètres du compte")}</h2>
      <div class="row" style="justify-content:space-between;align-items:center;gap:10px"><b>${esc(AUTH.name)}</b><span style="font-size:34px;line-height:1">${AUTH.avatar||'🎮'}</span></div>
      <div class="mini muted" style="margin-top:14px">${t("🎭 Choisis ton avatar (visible dans toutes tes ligues)")}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">${EMOJIS.map(em=>`<button class="btn ghost sm" onclick="setAvatar('${em}')" style="font-size:20px;padding:6px 9px;line-height:1${em===AUTH.avatar?';border-color:var(--accent)':''}">${em}</button>`).join("")}</div>
    </div>
    <button class="btn ghost" onclick="logout()">${t("Déconnexion")}</button>`;
}
function openRules(){ if(S.view==="rules")return; S.prevView=S.view; S.view="rules"; render(); }
function closeRules(){ S.view=S.prevView||(S.leagueId?"game":"leagues"); render(); }
function viewRules(){
  const card=id=>`<div style="display:flex;gap:10px;align-items:flex-start;margin:9px 0"><span class="sport" style="flex:0 0 auto">${CARDS[id].e}</span><div><b class="mini">${esc(t(CARDS[id].n))}</b><div class="mini muted">${esc(t(CARDS[id].d))}</div></div></div>`;
  return `<button class="btn ghost sm" onclick="closeRules()">${t("← Retour")}</button>
   <div class="box"><h2 style="margin-top:0">${t("📖 Règles du jeu")}</h2>
     <p class="mini">${t("<b>But :</b> championnat de pronostics entre amis, sur de vrais événements et de vraies cotes, <b>sans argent réel</b>. On démarre à <b>100 € virtuels</b> ; le vainqueur est celui qui a le plus de <b>points de championnat</b>. Le dernier joueur humain fait le gage voté au départ.")}</p></div>
   <div class="box"><b>${t("🗓️ Format")}</b>
     <div class="mini muted" style="margin-top:6px">${t("Aller-retour entre tous (Round Robin). Si le nombre d'humains est impair, un 🤖 joueur IA complète (il ne subit pas le gage). Chaque jour = une confrontation en duel.")}</div></div>
   <div class="box"><b>${t("⚽ Une journée")}</b>
     <ul class="mini muted" style="margin:6px 0 0;padding-left:18px">
       <li>${t("Le joueur <b>à domicile</b> choisit les <b>5 rencontres</b> (imposées aux deux).")}</li>
       <li>${t("Chacun fait ses <b>pronostics + mises</b>. Total des mises ≤ <b>50 %</b> du capital (70 % avec la carte Investisseur).")}</li>
       <li>${t("<b>👑 Pari du Capitaine</b> : un pari désigné secrètement — gain <b>et</b> perte <b>doublés</b>.")}</li>
       <li>${t("Optionnel : <b>1 carte bonus</b> (voir plus bas), révélée à la résolution.")}</li>
       <li>${t("Gain d'un pari = mise × (cote − 1) ; pari perdu = − mise. Le capital ne descend jamais sous 0.")}</li>
     </ul></div>
   <div class="box"><b>${t("🏆 Points & classement")}</b>
     <div class="mini muted" style="margin-top:6px">${t("Chaque journée, dans ton <b>duel</b>, le <b>vainqueur</b> est celui qui a le <b>meilleur résultat net</b> (gains − mises). Égalité → on départage par le plus gros <b>gain</b>, puis la plus grosse <b>mise</b> ; si tout est identique, c'est <b>match nul</b>.")}
     <br>${t("Points : <b>vainqueur</b> = <b>3 pts</b> si son net est positif, <b>1 pt</b> si son net est négatif ; <b>perdant</b> = <b>1 pt</b> si son net est positif, <b>0 pt</b> si son net est négatif ; <b>match nul</b> = <b>1 pt</b> chacun.")}
     <br>${t("<b>Malus</b> : <b>−1 pt</b> si <b>tous</b> tes paris du jour sont perdants (le total au classement peut donc devenir négatif).")}
     <br>${t("Bonus : le <b>meilleur pronostiqueur</b> ⭐ (plus gros net parmi <b>tous</b> les joueurs) gagne <b>+1 point</b>.")}
     <br>${t("Départage au classement : capital, puis victoires en duel, plus gros gain, plus grosse cote.")}</div></div>
   <div class="box"><b>${t("🔥 Dynamique")}</b>
     <div class="mini muted" style="margin-top:6px">${t("Une 🔥 flamme signale une <b>bonne dynamique</b> (victoires de duel qui s'enchaînent), un ❄️ flocon une <b>mauvaise passe</b>. C'est <b>purement indicatif</b> (visible au classement) : aucun bonus ni malus n'y est associé.")}</div></div>
   <div class="box"><b>${t("🃏 Cartes bonus (enchères)")}</b>
     <div class="mini muted" style="margin:6px 0">${t("Au démarrage, phase de <b>préparation</b> : chacun vote pour le gage <b>et</b> mise en aveugle sur les bonus, sans attendre les autres. Chaque bonus revient au <b>plus offrant</b> (égalité → premier à avoir misé) ; les non-gagnants sont <b>remboursés</b>. Total des mises ≤ <b>{a} €</b>, jusqu'à autant de bonus que de journées. Les mises gagnantes sont retirées de ton <b>capital de départ</b>. 1 carte jouée max par journée. Certaines cartes sont <b>à cible</b> 🎯 : tu choisis toi-même le match concerné au moment de parier.",{a:SHOP_CAP})}</div>
     ${CARD_IDS.map(card).join("")}</div>
   <div class="box"><b>${t("😴 Oubli")}</b><div class="mini muted" style="margin-top:6px">${t("Pas de validation à temps → <b>aucun pari pris en compte</b> (pas de reprise des pronos adverses), <b>−2 pts</b> au classement et <b>−25 % du capital</b>.")}</div></div>`;
}
/* ============ boot ============ */
(async function boot(){
  if(!window.supabase){ showErr("Librairie Supabase non chargée (vérifie ta connexion Internet)."); return; }
  try{ const { data:{ session } } = await db.auth.getSession();
    if(session){ AUTH={ id:session.user.id, name:(session.user.user_metadata&&session.user.user_metadata.username)||"", avatar:(session.user.user_metadata&&session.user.user_metadata.avatar)||"" }; }
  }catch(e){}
  if(!AUTH){ S.view="auth"; render(); return; }
  const last=loadLast();
  if(last&&last.leagueId){ S.leagueId=last.leagueId; S.myId=last.myId; S.view="game"; startPoll(); refresh(); }
  else { S.view="leagues"; loadMyLeagues(); }
})();
</script>
