<style>

    --accent:#19c58c; --accent-ink:#052a1e;
    --green:#4bd07f; --red:#f36a60; --gold:#f2c451; --blue:#67a6f2;
    --r:16px; --shadow:0 1px 2px rgba(0,0,0,.28),0 8px 24px rgba(0,0,0,.30);
  }
  :root[data-theme="light"]{
    --bg:#eef1f6; --panel:#ffffff; --panel2:#f4f6fa; --border:#e3e8f1;
    --ink:#161d2b; --muted:#69748c; --faint:#9aa4b8;
    --accent:#0e9e70; --accent-ink:#ffffff;

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);

    -webkit-font-smoothing:antialiased;overflow-x:hidden;}
  .num,td.num,.big,.code{font-variant-numeric:tabular-nums;}
  .app{max-width:540px;margin:0 auto;padding:20px 16px 64px;}
  h1{font-size:21px;margin:0;letter-spacing:-.4px;font-weight:800;}
  h2{font-size:15px;margin:22px 4px 10px;letter-spacing:.01em;}
  .sub{color:var(--muted);font-size:12.5px;}
  .bar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .topbtns{display:flex;gap:8px;width:100%;margin-top:2px;}
  .topbtns .btn{flex:1 1 0;min-width:0;padding-left:0;padding-right:0;text-align:center;}
  .box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:12px 0;box-shadow:var(--shadow);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .muted{color:var(--muted);} .green{color:var(--green);} .red{color:var(--red);}
  .gold{color:var(--gold);} .blue{color:var(--blue);} .mini{font-size:12px;}
  .btn{background:var(--accent);color:var(--accent-ink);font-weight:700;border:none;border-radius:12px;
    padding:14px;width:100%;font-size:15px;cursor:pointer;transition:opacity .15s,transform .05s;}
  .btn:active{transform:scale(.99);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--ink);}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;border-radius:10px;}
  input,select{background:var(--panel2);border:1px solid var(--border);color:var(--ink);
    border-radius:10px;padding:12px;font-size:15px;width:100%;}
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  input[type=number]{width:84px;text-align:right;}
  label{font-size:13px;color:var(--muted);display:block;margin:10px 0 4px;}
  .chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted);white-space:nowrap;}
  .chip.g{background:color-mix(in srgb,var(--green) 15%,transparent);border-color:color-mix(in srgb,var(--green) 42%,transparent);color:var(--green);}
  .chip.b{background:color-mix(in srgb,var(--blue) 15%,transparent);border-color:color-mix(in srgb,var(--blue) 42%,transparent);color:var(--blue);}
  .chip.gold{background:color-mix(in srgb,var(--gold) 17%,transparent);border-color:color-mix(in srgb,var(--gold) 45%,transparent);color:var(--gold);}
  .chip.red{background:color-mix(in srgb,var(--red) 15%,transparent);border-color:color-mix(in srgb,var(--red) 42%,transparent);color:var(--red);}
  .ptpill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;
    background:color-mix(in srgb,var(--gold) 16%,transparent);color:var(--gold);}
  .ptpill.zero{background:color-mix(in srgb,var(--muted) 14%,transparent);color:var(--muted);}
  .sport{width:26px;height:26px;border-radius:8px;background:var(--panel2);display:inline-flex;
    align-items:center;justify-content:center;font-size:14px;flex:0 0 auto;}
  .odds{display:flex;gap:7px;margin-top:10px;}
  .odd{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:10px;
    padding:8px 2px;text-align:center;font-size:12px;cursor:pointer;line-height:1.3;}
  .odd b{display:block;font-size:13px;}
  .odd.sel{background:color-mix(in srgb,var(--green) 14%,transparent);border-color:var(--green);color:var(--green);}
  .gauge{height:8px;border-radius:6px;background:var(--panel2);overflow:hidden;margin-top:8px;}
  .gauge>i{display:block;height:100%;background:var(--green);}
  .gauge.over>i{background:var(--red);}

  .cards{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .cardchip{border:1px solid var(--border);background:var(--panel2);border-radius:12px;padding:9px 11px;
    font-size:12px;cursor:pointer;text-align:center;min-width:76px;}
  .cardchip.on{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);color:var(--blue);}
  .cardchip .em{font-size:19px;display:block;margin-bottom:2px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:9px 6px;border-bottom:1px solid var(--border);text-align:left;}
  tr:last-child td{border-bottom:none;}
  th{color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;}
  td.num{text-align:right;}
  .hide{display:none;}
  .code{font-size:30px;letter-spacing:7px;font-weight:800;color:var(--accent);text-align:center;}
  .tag{font-size:10px;color:var(--muted);}
  .foot{color:var(--faint);font-size:11px;text-align:center;margin-top:24px;}
  .err{background:color-mix(in srgb,var(--red) 12%,transparent);border:1px solid color-mix(in srgb,var(--red) 40%,transparent);
    color:var(--red);border-radius:10px;padding:10px 12px;margin:10px 0;font-size:13px;}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;background:var(--panel2);
    border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:50;box-shadow:var(--shadow);color:var(--ink);}
  a{color:var(--blue);}
  .big{font-size:30px;font-weight:800;letter-spacing:-.5px;}
  .recaphero{border-radius:var(--r);padding:18px;border:1px solid var(--border);background:var(--panel);box-shadow:var(--shadow);margin:12px 0;}
  .recaphero.win{background:color-mix(in srgb,var(--green) 9%,var(--panel));border-color:color-mix(in srgb,var(--green) 45%,var(--border));}
  .recaphero.loss{background:color-mix(in srgb,var(--red) 9%,var(--panel));border-color:color-mix(in srgb,var(--red) 45%,var(--border));}
  .qbar{display:flex;gap:10px;overflow-x:auto;padding:2px 0 8px;margin:8px 0 2px;-webkit-overflow-scrolling:touch;}
  .qbtn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px;width:64px;background:none;border:none;padding:0;cursor:pointer;}
  .qbtn .ic{width:52px;height:52px;border-radius:16px;background:var(--panel);border:1px solid var(--border);display:grid;place-items:center;font-size:22px;box-shadow:var(--shadow);}
  .qbtn .lb{font-size:11px;color:var(--muted);font-weight:600;text-align:center;line-height:1.15;}
  .qbtn:active .ic{transform:scale(.96);}
  .qbtn.on .ic{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,var(--panel));}
  .qbtn.on .lb{color:var(--ink);}
  .modal{position:fixed;inset:0;background:rgba(4,6,12,.62);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .mbox{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:22px;max-width:340px;width:100%;text-align:center;box-shadow:var(--shadow);}
  .clik{cursor:pointer;}
  .bem{font-size:1.35em;line-height:1;vertical-align:-2px;}
</style>
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('pl_theme')||'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}</script>

async function fetchRealPool(){

  const active=sports.filter(s=>REAL_GROUPS.includes(s.group)&&!s.has_outrights);

  // — Phase 4d : règles du jeu —
  "← Retour":"← Back", "📖 Règles du jeu":"📖 Game rules",
  "<b>But :</b> championnat de pronostics entre amis, sur de vrais événements et de vraies cotes, <b>sans argent réel</b>. On démarre à <b>100 € virtuels</b> ; le vainqueur est celui qui a le plus de <b>points de championnat</b>. Le dernier joueur humain fait le gage voté au départ.":"<b>Goal:</b> a prediction championship among friends, on real events and real odds, <b>no real money</b>. Everyone starts with <b>100 virtual €</b>; the winner is whoever has the most <b>championship points</b>. The last human player does the forfeit voted at the start.",
  "🗓️ Format":"🗓️ Format",
  "Aller-retour entre tous (Round Robin). Si le nombre d'humains est impair, un 🤖 joueur IA complète (il ne subit pas le gage). Chaque jour = une confrontation en duel.":"Home-and-away against everyone (round robin). If the number of humans is odd, a 🤖 AI player fills in (it isn't subject to the forfeit). Each day = one head-to-head duel.",
  "⚽ Une journée":"⚽ A matchday",
  "Le joueur <b>à domicile</b> choisit les <b>5 rencontres</b> (imposées aux deux).":"The <b>home</b> player picks the <b>5 fixtures</b> (imposed on both).",
  "Chacun fait ses <b>pronostics + mises</b>. Total des mises ≤ <b>50 %</b> du capital (70 % avec la carte Investisseur).":"Each makes their <b>predictions + stakes</b>. Total stakes ≤ <b>50%</b> of capital (70% with the Investor card).",
  "<b>👑 Pari du Capitaine</b> : un pari désigné secrètement — gain <b>et</b> perte <b>doublés</b>.":"<b>👑 Captain bet</b>: a secretly chosen bet — gain <b>and</b> loss <b>doubled</b>.",
  "Optionnel : <b>1 carte bonus</b> (voir plus bas), révélée à la résolution.":"Optional: <b>1 bonus card</b> (see below), revealed at settlement.",
  "Gain d'un pari = mise × (cote − 1) ; pari perdu = − mise. Le capital ne descend jamais sous 0.":"Bet gain = stake × (odds − 1); lost bet = − stake. Capital never drops below 0.",
  "🏆 Points & classement":"🏆 Points & standings",
  "Chaque journée, dans ton <b>duel</b>, le <b>vainqueur</b> est celui qui a le <b>meilleur résultat net</b> (gains − mises). Égalité → on départage par le plus gros <b>gain</b>, puis la plus grosse <b>mise</b> ; si tout est identique, c'est <b>match nul</b>.":"Each day, in your <b>duel</b>, the <b>winner</b> is whoever has the <b>best net result</b> (gains − stakes). Tie → broken by the biggest <b>gain</b>, then the biggest <b>stake</b>; if everything is identical, it's a <b>draw</b>.",
  "Points : <b>vainqueur</b> = <b>3 pts</b> si son net est positif, <b>1 pt</b> si son net est négatif ; <b>perdant</b> = <b>1 pt</b> si son net est positif, <b>0 pt</b> si son net est négatif ; <b>match nul</b> = <b>1 pt</b> chacun.":"Points: <b>winner</b> = <b>3 pts</b> if their net is positive, <b>1 pt</b> if negative; <b>loser</b> = <b>1 pt</b> if their net is positive, <b>0 pt</b> if negative; <b>draw</b> = <b>1 pt</b> each.",
  "<b>Malus</b> : <b>−1 pt</b> si <b>tous</b> tes paris du jour sont perdants (le total au classement peut donc devenir négatif).":"<b>Penalty</b>: <b>−1 pt</b> if <b>all</b> your bets that day lose (so your standings total can go negative).",
  "Bonus : le <b>meilleur pronostiqueur</b> ⭐ (plus gros net parmi <b>tous</b> les joueurs) gagne <b>+1 point</b>.":"Bonus: the <b>best forecaster</b> ⭐ (biggest net among <b>all</b> players) earns <b>+1 point</b>.",
  "Départage au classement : capital, puis victoires en duel, plus gros gain, plus grosse cote.":"Standings tiebreakers: capital, then duel wins, biggest gain, biggest odds.",
  "🔥 Dynamique":"🔥 Momentum",
  "Une 🔥 flamme signale une <b>bonne dynamique</b> (victoires de duel qui s'enchaînent), un ❄️ flocon une <b>mauvaise passe</b>. C'est <b>purement indicatif</b> (visible au classement) : aucun bonus ni malus n'y est associé.":"A 🔥 flame marks a <b>good run</b> (consecutive duel wins), a ❄️ snowflake a <b>rough patch</b>. It's <b>purely indicative</b> (shown in the standings): no bonus or penalty attached.",
  "🃏 Cartes bonus (enchères)":"🃏 Bonus cards (auction)",
  "Au démarrage, phase de <b>préparation</b> : chacun vote pour le gage <b>et</b> mise en aveugle sur les bonus, sans attendre les autres. Chaque bonus revient au <b>plus offrant</b> (égalité → premier à avoir misé) ; les non-gagnants sont <b>remboursés</b>. Total des mises ≤ <b>{a} €</b>, jusqu'à autant de bonus que de journées. Les mises gagnantes sont retirées de ton <b>capital de départ</b>. 1 carte jouée max par journée. Certaines cartes sont <b>à cible</b> 🎯 : tu choisis toi-même le match concerné au moment de parier.":"At the start, a <b>preparation</b> phase: everyone votes for the forfeit <b>and</b> bids blind on the bonuses, without waiting for the others. Each bonus goes to the <b>highest bidder</b> (tie → first to bid); non-winners are <b>refunded</b>. Total bids ≤ <b>{a} €</b>, up to as many bonuses as there are matchdays. Winning bids are deducted from your <b>starting capital</b>. Max 1 card played per matchday. Some cards are <b>targeted</b> 🎯: you choose the match yourself when betting.",
  "😴 Oubli":"😴 Forgetting",
  "Pas de validation à temps → <b>aucun pari pris en compte</b> (pas de reprise des pronos adverses), <b>−2 pts</b> au classement et <b>−25 % du capital</b>.":"No validation in time → <b>no bet counted</b> (opponent's picks are not copied), <b>−2 pts</b> in the standings and <b>−25% of capital</b>.",

/* ============ schedule ============ */
function makeSchedule(n){ let arr=[...Array(n).keys()]; const rounds=[];
  for(let r=0;r<n-1;r++){ const pairs=[];
    for(let i=0;i<n/2;i++){ let a=arr[i],b=arr[n-1-i]; if((r+i)%2===0) pairs.push([a,b]); else pairs.push([b,a]); }
    rounds.push(pairs); arr=[arr[0],arr[n-1],...arr.slice(1,n-1)]; }
  const ret=rounds.map(rd=>rd.map(p=>[p[1],p[0]])); return [...rounds,...ret]; }

/* ============ fixtures ============ */
function genFixture(maxKo){ const s=pick(SPORTS); const a=pick(s.t); let b=pick(s.t); while(b===a) b=pick(s.t);
  // Cotes COHÉRENTES : on part de probabilités qui somment à 100 %, + une marge bookmaker (~5-9 %), puis cote = 1/(p×marge).
  const M=rnd(1.05,1.09); const odd=p=>Math.max(1.05,+(1/(p*M)).toFixed(2));
  // Horaire FICTIF : décalage (heures) après la clôture des paris. Comme en réel, le match se joue APRÈS la deadline
  // et dans le créneau de la formule (maxKo = 12h Fast / 24h Classique) → tous les matchs du jour sont groupés.
  const ko=+rnd(0.75,Math.max(2,(maxKo||24)-1)).toFixed(2);
  if(s.draw){ const pd=rnd(0.22,0.30); let ph=rnd(0.22,0.55); let pa=1-ph-pd; if(pa<0.12){pa=0.12;ph=1-pd-pa;} if(ph<0.12){ph=0.12;pa=1-pd-ph;}
    return {sport:s.ic,draw:true,home:a,away:b,oh:odd(ph),od:odd(pd),oa:odd(pa),ko}; }
  const ph=rnd(0.30,0.70); return {sport:s.ic,draw:false,home:a,away:b,oh:odd(ph),oa:odd(1-ph),ko}; }
function genPool(k,maxKo){ return Array.from({length:k},()=>genFixture(maxKo)); }
function oddOf(f,sel){ return sel==="1"?f.oh:sel==="2"?f.oa:f.od; }
// Cote « double chance » : combinée de deux issues couvertes pour une seule mise.
function dcOdd(o1,o2){ return +(1/(1/o1+1/o2)).toFixed(2); } // (cote combinée « pondérée » — conservée pour référence, plus utilisée pour le gain)
// Double Chance : on gagne à la cote INITIALE du résultat qui sort (pas de cote combinée pondérée).
function dcWinOdd(f,sel,sel2){ return (f.res===sel||f.res===sel2) ? oddOf(f,f.res) : oddOf(f,sel); }
/* ---- Barème d'un duel ---- */
// gain (retour brut des paris gagnants, à la cote) et mise (total misé) d'un joueur.
function gainMise(picks,fx){ let gain=0,mise=0; (picks||[]).forEach((b,i)=>{ const st=+b.stake||0; mise+=st; const f=(fx||[])[i]; if(f&&b.sel===f.res) gain+=st*oddOf(f,b.sel); }); return {gain,mise}; }
// Nombre de paris gagnants d'un joueur (gère la Double Chance)
function winCount(bt,fx){ if(!bt||!bt.picks||!fx) return 0; const c=bt.card; let w=0; bt.picks.forEach((b,i)=>{ const f=fx[i]; if(!f)return; const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2; const win=isDC?(f.res===b.sel||f.res===c.sel2):(b.sel===f.res); if(win)w++; }); return w; }
// Compare deux joueurs {net,gain,mise} : vainqueur = meilleur net, puis gain, puis mise, sinon nul.
// Points : vainqueur 3 (net>0) ou 1 (net≤0) ; perdant 1 (net>0) ou 0 (net≤0) ; nul 1/1.
function duelPts(h,a){ const R=x=>Math.round((+x||0)*100)/100;
  const c=(R(h.net)-R(a.net)) || (R(h.gain)-R(a.gain)) || (R(h.mise)-R(a.mise));
  if(c>0) return {h:R(h.net)>0?3:1, a:R(a.net)>0?1:0, win:'h'};
  if(c<0) return {h:R(h.net)>0?1:0, a:R(a.net)>0?3:1, win:'a'};
  return {h:1,a:1,win:null}; }
// Duel avec FORFAIT : un joueur qui n'a pas validé ses pronos à temps ne marque AUCUN point de duel
// (sinon son net de 0 lui ferait « battre » un adversaire négatif) ; l'adversaire gagne le duel d'office.
// Barème du vainqueur inchangé : 3 pts si son net est positif, 1 pt sinon.
function duelPtsF(H,A,hForgot,aForgot){
  if(hForgot&&aForgot) return {h:0,a:0,win:null};
  if(hForgot) return {h:0, a:((+A.net||0)>0?3:1), win:'a'};
  if(aForgot) return {h:((+H.net||0)>0?3:1), a:0, win:'h'};
  return duelPts(H,A); }
// Meilleur pronostiqueur du jour (un SEUL joueur de toute la ligue) : net, puis gain, puis mise, puis 1er inscrit.
function dayStar(rows){ const R=x=>Math.round((+x||0)*100)/100; let best=null;
  for(const r of rows){ if(!best){ best=r; continue; }
    const c=(R(r.net)-R(best.net))||(R(r.gain)-R(best.gain))||(R(r.mise)-R(best.mise))||((best.order||0)-(r.order||0));
    if(c>0) best=r; }
  return best?best.id:null; }
function simResult(f){ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]];
  const inv=outs.map(o=>1/o[1]); const sum=inv.reduce((a,b)=>a+b,0);
  let r=Math.random(); for(let i=0;i<outs.length;i++){ r-=inv[i]/sum; if(r<=0) return outs[i][0]; } return outs[outs.length-1][0]; }

    players = await q(db.from("players").select("*").eq("league_id",S.leagueId).order("join_order"));
    // fin de préparation AUTOMATIQUE : dès que tous ont validé (ou délai écoulé), on démarre sans clic
    if(L.status==="prep" && !resolving){
      const humans=players.filter(p=>!p.is_ai); const allDone=humans.length>=2 && humans.every(p=>p.shop_done);
      const st=prepState(); const dlPassed=st.deadline && new Date(st.deadline).getTime()<=Date.now();
      if(allDone||dlPassed){ resolvePrep(); return; }
    }
    S.recap = L.status!=="lobby" && (L.current_day>getSeen()) && (L.current_day>=1);
    const dispDay = S.recap ? L.current_day-1 : Math.min(L.current_day, Math.max(0,(L.num_days||1)-1));
    S.dispDay = dispDay;
    duels = await q(db.from("duels").select("*").eq("league_id",S.leagueId).eq("day",dispDay));
    bets  = await q(db.from("bets").select("*").eq("league_id",S.leagueId).eq("day",dispDay));
    // sélection auto (IA à domicile, ou échéance de sélection dépassée) + résolution auto
    if(L.status==="running" && !S.recap && !resolving){
      if(await ensureFixtures()){ duels = await q(db.from("duels").select("*").eq("league_id",S.leagueId).eq("day",dispDay)); }
      // tous les matchs choisis → on démarre le compte à rebours des paris (max 24h / 12h fast), une seule fois
      if(!L.bet_started_at && duels.length && duels.every(d=>d.fixtures)){
        try{ const r=await q(db.from("leagues").update({bet_started_at:new Date().toISOString()}).eq("id",L.id).is("bet_started_at",null).select("bet_started_at")); if(r&&r.length){ L.bet_started_at=r[0].bet_started_at; } }catch(e){} }
      if(await ensureAiBets()){ bets = await q(db.from("bets").select("*").eq("league_id",S.leagueId).eq("day",dispDay)); }
      if(shouldAutoResolve()){ resolveDay(); return; }
      await resolveRealIfReady(); // données réelles : résout quand les vrais matchs sont terminés
    }
    if(chartDay!==L.current_day){ chartDay=L.current_day; chartBets=null; standDuels=null; }
    if((L.status==="running"||L.status==="done") && chartBets===null && L.current_day>=1){
      chartBets = await q(db.from("bets").select("player_id,day,net,picks,card,captain,duel_id").eq("league_id",S.leagueId).not("net","is",null));
      standDuels = await q(db.from("duels").select("day,home_id,away_id,fixtures").eq("league_id",S.leagueId)); }
    if(L.status==="done" && endStats===null){ endStats={loading:true}; loadEndStats().then(()=>render()); }
    showErr(""); render(); maybeNotify();
  }catch(e){ showErr("Connexion : "+e.message); }
}
async function ensureFixtures(){
  let filled=false; const dt=dayTimes(); const selPassed=dt.ok && Date.now()>=dt.sel;
  // Duels à remplir : IA à domicile (tout de suite) ou humain à domicile ayant dépassé l'échéance de sélection.
  const todo=duels.filter(d=>!d.fixtures && ((pById(d.home_id)&&pById(d.home_id).is_ai) || selPassed));
  if(!todo.length) return false;
  if(L&&L.data_mode==="real"){
    if(Date.now()-lastRealFill < 300000) return false; lastRealFill=Date.now(); // throttle quota (5 min)
    let pool=[]; try{ pool=await fetchRealPool(); }catch(e){}
    if(pool.length<5) return false; // pas assez de vrais matchs → on attend (jamais de simulé en réel)
    for(const d of todo){ const cp=pool.slice(); for(let i=cp.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cp[i],cp[j]]=[cp[j],cp[i]];}
      const fx=cp.slice(0,5);
      try{ const r=await q(db.from("duels").update({fixtures:fx}).eq("id",d.id).is("fixtures",null).select()); if(r&&r.length) filled=true; }catch(e){} }
    return filled;
  }
  for(const d of todo){ try{ const r=await q(db.from("duels").update({fixtures:genPool(5,leagueFormula().bet)}).eq("id",d.id).is("fixtures",null).select()); if(r&&r.length) filled=true; }catch(e){} }
  return filled; }
// L'IA mise dès que les 5 matchs sont connus (pour que ses pronos soient visibles pendant l'attente)
async function ensureAiBets(){ let made=false;
  for(const d of duels){ if(!d.fixtures) continue;
    for(const pid of [d.home_id,d.away_id]){ const p=pById(pid); if(!p||!p.is_ai) continue;
      if(bets.find(b=>b.player_id===pid)) continue;
      const ai=aiPlay(p.capital!=null?p.capital:100, d.fixtures, p.hand||[]);
      try{ const r=await q(db.from("bets").insert({league_id:L.id,day:S.dispDay,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,card:ai.card,submitted:true}).select()); if(r&&r.length) made=true; }catch(e){} } }
  return made; }
function shouldAutoResolve(){
  const dz=duels; if(!dz.length || dz.some(d=>!d.fixtures)) return false; // sélection pas finie
  if(dz.some(d=>(d.fixtures||[]).some(f=>f&&f.evId))) return false; // matchs réels → résolution sur vrais résultats (Étape 2)
  // Résolution UNIQUEMENT à la clôture des pronos (les joueurs peuvent modifier jusque-là ; les pronos adverses restent cachés avant)
  // ET une fois les matchs fictifs « joués » — même déroulé qu'en réel (l'organisateur peut publier tout de suite si besoin).
  return deadlinePassed() && simMatchesDone();
}

async function joinLeague(code){
  if(busy||!AUTH)return; busy=true; showErr("");
  try{
    const found=await q(db.from("leagues").select("*").eq("code",code));
    const lg=Array.isArray(found)?found[0]:found;
    if(!lg){ showErr(t("Code de ligue introuvable — vérifie le code saisi.")); busy=false; return; }
    const ps=await q(db.from("players").select("*").eq("league_id",lg.id).order("join_order"));
    const mine=ps.find(p=>p.user_id===AUTH.id);
    if(mine){ openLeague(lg.id, mine.id); busy=false; return; } // déjà membre → on rouvre (reconnexion)
    if(lg.status!=="lobby"){ showErr("Cette ligue a déjà démarré, tu ne peux plus la rejoindre."); busy=false; return; }
    const humans=ps.filter(p=>!p.is_ai);
    if(humans.length>=lg.num_participants){ showErr("La ligue est complète."); busy=false; return; }
    const ord=humans.length;
    const pl=await q(db.from("players").insert({league_id:lg.id,name:AUTH.name,emoji:AUTH.avatar||EMOJIS[ord]||"🎮",join_order:ord,user_id:AUTH.id}).select().single());
    openLeague(lg.id, pl.id, true);
  }catch(e){ showErr("Impossible de rejoindre : "+e.message); } busy=false;
}

function prepSuperlatives(s){
  const auction=s.auction||[]; const ps=(s.players||[]);
  if(ps.length<2 || !auction.length) return '';
  const nm=pid=>{const p=ps.find(x=>x.pid===pid)||{}; return (p.emoji?p.emoji+' ':'')+esc(p.name||'?');};
  const st={}; ps.forEach(p=>st[p.pid]={bids:0,total:0,won:0,maxBid:0,maxCard:null});
  auction.forEach(a=>{ (a.bids||[]).forEach(bd=>{ const x=st[bd.pid]; if(x&&bd.amt>0){ x.bids++; x.total+=bd.amt; if(bd.amt>x.maxBid){x.maxBid=bd.amt;x.maxCard=a.card;} } }); if(st[a.winner]) st[a.winner].won++; });
  const bidders=ps.filter(p=>st[p.pid].bids>0);
  if(bidders.length<2) return '';
  const best=(arr,fn)=>arr.slice().sort(fn)[0];
  // choix d'une formulation stable par ligue (varie d'une ligue à l'autre, fixe quand on rouvre les coulisses)
  const seed=k=>{ let h=0; const s=((L&&L.id)||'')+k; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h; };
  const pickV=(arr,k)=>arr[seed(k)%arr.length];
  const items=[];
  const strat=best(bidders,(a,b)=> st[b.pid].won-st[a.pid].won || (st[b.pid].won/st[b.pid].bids)-(st[a.pid].won/st[a.pid].bids));
  if(strat && st[strat.pid].won>0){ const N=nm(strat.pid), w=st[strat.pid].won, b=st[strat.pid].bids;
    items.push(pickV([
      t("🧠 <b>Le stratège :</b> {N} — a raflé <b>{w}</b> bonus sur {b} visé{s}. Chirurgical.",{N,w,b,s:b>1?'s':''}),
      t("🎯 <b>Le sniper des enchères :</b> {N} — {w} bonus décroché{w1} sur {b} tenté{s}. Redoutable.",{N,w,b,w1:w>1?'s':'',s:b>1?'s':''}),
      t("🧠 <b>Le cerveau :</b> {N} avait tout calculé — <b>{w}</b> bonus dans la poche. Personne n'a rien vu venir.",{N,w}),
      t("♟️ <b>Le tacticien :</b> {N} place ses pions et rafle <b>{w}</b> bonus. Échec et mat.",{N,w}),
      t("🎼 <b>Le maestro :</b> {N} a orchestré ses enchères — <b>{w}</b> bonus au tableau. Du grand art.",{N,w}),
      t("🕵️ <b>L'opportuniste :</b> {N} a flairé les bons coups : <b>{w}</b> bonus sur {b} tenté{s}.",{N,w,b,s:b>1?'s':''}),
      t("🎓 <b>Le calculateur :</b> {b} enchère{s}, <b>{w}</b> réussite{w1}. {N} a fait ses devoirs.",{N,w,b,s:b>1?'s':'',w1:w>1?'s':''}),
      t("🦈 <b>Le requin :</b> {N} a mordu <b>{w}</b> fois sur {b}. Les autres ont suivi le sang.",{N,w,b})
    ], strat.pid+'S')); }
  const poisse=best(bidders,(a,b)=> (st[b.pid].bids-st[b.pid].won)-(st[a.pid].bids-st[a.pid].won));
  if(poisse && (st[poisse.pid].bids-st[poisse.pid].won)>=1 && (!strat||poisse.pid!==strat.pid)){ const N=nm(poisse.pid), b=st[poisse.pid].bids, w=st[poisse.pid].won;
    items.push(pickV([
      t("😭 <b>La poisse :</b> {N} — a misé sur {b} bonus, repart avec <b>{w}</b>. Aïe aïe aïe.",{N,b,w}),
      t("🍀 <b>Pas de bol :</b> {N} a tenté {b} fois, remporté <b>{w}</b>. Ce n'était pas son jour.",{N,b,w}),
      t("😩 <b>Le malchanceux :</b> {b} enchères pour seulement <b>{w}</b> bonus. Dur dur, {N}.",{N,b,w}),
      t("🎭 <b>Le déçu du soir :</b> {N} visait gros ({b} bonus)… résultat : <b>{w}</b>. La vie est cruelle.",{N,b,w}),
      t("🌧️ <b>La guigne :</b> {N} — {b} tentatives, <b>{w}</b> bonus. Le ciel lui est tombé dessus.",{N,b,w}),
      t("👻 <b>Le fantôme des enchères :</b> {N} était partout — {b} mises — et repart avec <b>{w}</b>.",{N,b,w}),
      t("🙃 <b>Le mal inspiré :</b> {b} enchères, <b>{w}</b> bonus. {N} révisera ses calculs.",{N,b,w}),
      t("🥀 <b>Le perdant magnifique :</b> {N} a tout donné sur {b} bonus. Butin : <b>{w}</b>.",{N,b,w})
    ], poisse.pid+'P')); }
  const radin=best(bidders,(a,b)=> st[a.pid].total-st[b.pid].total);
  if(radin){ const N=nm(radin.pid), tot=st[radin.pid].total;
    items.push(pickV([
      t("🤏 <b>Le radin :</b> {N} — <b>{tot}€</b> lâchés en tout, pas un centime de plus.",{N,tot}),
      t("💰 <b>L'économe :</b> {N} a serré les cordons — <b>{tot}€</b> dépensés, point final.",{N,tot}),

function aiPrep(nDays, mode, optCount){ const ids=modeCards(mode||"complet").slice(); for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}
  const maxCards=Math.max(1,nDays); const nb=1+Math.floor(Math.random()*Math.min(maxCards,4)); const budget=Math.round(rnd(15,SHOP_CAP)); const bids={}; let spent=0;
  for(let k=0;k<nb && k<ids.length;k++){ const id=ids[k]; const bid=Math.min(Math.round(rnd(3,12)), budget-spent); if(bid>=1){ bids[id]=bid; spent+=bid; } }
  return {vote:Math.floor(Math.random()*(optCount||4)), bids}; }

async function resolvePrep(){ if(resolving)return; resolving=true; showErr("");
  try{
    // verrou atomique : un seul client résout la préparation (évite double enchère)
    const claim=await q(db.from("leagues").update({status:"starting"}).eq("id",L.id).eq("status","prep").select("*"));
    if(!claim||!claim.length){ resolving=false; await refresh(); return; }
    const fresh=claim[0];
    let st; try{st=JSON.parse(fresh.gage);}catch(e){st=null;} const options=(st&&st.options)||[]; const votes=(st&&st.votes)||{}; const voteTs=(st&&st.voteTs)||{}; const bids=(st&&st.bids)||{}; const bidTs=(st&&st.bidTs)||{}; const enjeu=(st&&st.enjeu)||"gage"; const POOL=(enjeu==="reward")?REWARDS:GAGES; const customs=(st&&st.customs)||{};
    // gage gagnant — égalité : le PREMIER à avoir voté l'option l'emporte
    let gage="", winIdx=-1;
    if(options.length){ const counts=options.map((_,i)=>Object.values(votes).filter(v=>v===i).length); const mx=Math.max(0,...counts);
      const tied=counts.map((c,i)=>c===mx?i:-1).filter(i=>i>=0); let bestTs=Infinity;
      for(const i of tied){ const voters=Object.keys(votes).filter(pid=>votes[pid]===i); const t=voters.length?Math.min(...voters.map(pid=>voteTs[pid]!=null?voteTs[pid]:Infinity)):Infinity; if(t<bestTs){bestTs=t;winIdx=i;} }
      if(winIdx<0) winIdx=(tied[0]!=null?tied[0]:0); const w=options[winIdx]; gage=(w&&w.t)||w||pick(POOL).t; }
    else gage=pick(POOL).t;
    // enchères : chaque bonus au plus offrant (égalité → premier à avoir misé) ; perdants remboursés
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const paid={},won={},auction=[]; ps.forEach(p=>{paid[p.id]=0;won[p.id]=[];});
    for(const cardId in CARDS){ const cand=ps.map(p=>({pid:p.id,amt:(bids[p.id]&&+bids[p.id][cardId])||0,ts:(bidTs[p.id]!=null?bidTs[p.id]:Infinity)})).filter(c=>c.amt>0);
      if(!cand.length) continue; cand.sort((a,b)=> (b.amt-a.amt) || (a.ts-b.ts)); const wpid=cand[0].pid; won[wpid].push(cardId); paid[wpid]+=cand[0].amt;
      auction.push({card:cardId, winner:wpid, amount:cand[0].amt, bids:cand.map(c=>({pid:c.pid,amt:c.amt}))}); }
    for(const p of ps){ await q(db.from("players").update({hand:won[p.id],capital:Math.max(0,100-paid[p.id]),shop_done:true}).eq("id",p.id)); }
    // récap de préparation (affiché avant le coup d'envoi)
    const summary={ gage, enjeu, gageDesc:(options[winIdx]&&options[winIdx].d)||gageDescOf(gage),
      options: options.map(o=>({t:(o&&o.t)||o, d:(o&&o.d)||''})), voteMap: votes, customs, // pour l'enjeu « façon championnat » (choix du 1er appliqué à la fin) + gages perso de chacun
      gageVotes: options.map((o,i)=>({t:(o&&o.t)||o, d:(o&&o.d)||'', count:Object.values(votes).filter(v=>v===i).length, win:i===winIdx})),
      auction,
      players: ps.map(p=>({pid:p.id,name:p.name,emoji:p.emoji,is_ai:!!p.is_ai,spent:paid[p.id],capital:Math.max(0,100-paid[p.id]),hand:won[p.id]})) };
    await q(db.from("leagues").update({status:"running",gage,current_day:0,prep_summary:summary}).eq("id",L.id));
    try{ await q(db.from("leagues").update({day_started_at:new Date().toISOString()}).eq("id",L.id)); }catch(e){} // début J1 (défensif)
    resolving=false; setSeen(0); localStorage.removeItem("pl_preps_"+L.id); await refresh(); toast("Championnat lancé ✓");
  }catch(e){ showErr("Démarrage : "+e.message); resolving=false; } }

let bet={picks:null,captain:-1}, myCard=null;
// Règle A : la perte maximale possible du jour ne peut pas dépasser le capital (→ jamais de capital négatif).
// Multiplicateur de PERTE par match : Capitaine ×2 · Joker/Tout ou rien ×2 · Assurance ×0 (remboursée) · sinon ×1.
// (Capitaine et bonus ciblé sont toujours sur des matchs différents, donc pas de cumul ×4.)
function lossMult(i,captainIdx,card){ if(i===captainIdx) return 2;
  if(card&&card.target===i){ if(card.id==="assurance") return 0; if(card.id==="tout"||card.id==="joker") return 2; } return 1; }
function worstLoss(picks,captainIdx,card){ return (picks||[]).reduce((s,b,i)=>s+(+b.stake||0)*lossMult(i,captainIdx,card),0); }
function viewBet(d,dayLbl,opp,iAmHome){
  const fx=d.fixtures;
  if(!bet.picks || bet.picks.length!==fx.length){ bet={picks:fx.map(()=>({sel:"1",stake:0})),captain:-1}; myCard=null; }
  const meP=me(); const invest=myCard&&myCard.id==="invest"; const cap=meP.capital, max=Math.floor(cap*(invest?0.7:0.5)*100)/100;
  const tot=bet.picks.reduce((a,b)=>a+(+b.stake||0),0); const pct=Math.min(100,max>0?tot/max*100:0); const over=tot>max+0.001;
  const targetCard = myCard && CARDS[myCard.id] && CARDS[myCard.id].t;
  const twoCard = myCard && CARDS[myCard.id] && CARDS[myCard.id].two; // Coup Double : 2 cibles
  const oppCard = myCard && CARDS[myCard.id] && CARDS[myCard.id].oppT; // vise le pari ADVERSE → aucun cumul avec ton Capitaine

function setSel(i,v){ bet.picks[i].sel=v; if(myCard&&myCard.id==="chance"&&myCard.target===i&&myCard.sel2===v) myCard.sel2=null; render(); }
function setStake(i,v){ bet.picks[i].stake=Math.max(0,+v||0);
  const meP=me(); const invest=myCard&&myCard.id==="invest"; const max=Math.floor(meP.capital*(invest?0.7:0.5)*100)/100;
  const tot=bet.picks.reduce((a,b)=>a+(+b.stake||0),0); const totEl=$("tot"); if(totEl){totEl.textContent=eur(tot); // ⚠️ ne pas nommer cette variable `t` : ça masquerait la fonction de traduction t() utilisée plus bas
    const g=document.querySelector(".gauge"); if(g){g.querySelector("i").style.width=Math.min(100,max>0?tot/max*100:0)+"%"; g.classList.toggle("over",tot>max+0.001);} }
  const targetCard=myCard&&CARDS[myCard.id].t; const twoCard=myCard&&CARDS[myCard.id].two; const oppCard=myCard&&CARDS[myCard.id].oppT;
  const needTarget=targetCard&&(myCard.target==null||(twoCard&&myCard.target2==null));
  const needSel2=myCard&&myCard.id==="chance"&&myCard.target!=null&&!myCard.sel2;
  const conflict=targetCard&&!twoCard&&!oppCard&&myCard.target!=null&&myCard.target===bet.captain;
  const btn=$("betSubmit");
  if(btn){ const over=tot>max+0.001; const allMin=bet.picks.every(b=>(+b.stake||0)>=1); const risky=bet.captain>=0&&worstLoss(bet.picks,bet.captain,myCard)>(meP.capital)+0.001; const ok=allMin&&!over&&!risky&&bet.captain>=0&&!needTarget&&!needSel2&&!conflict; btn.disabled=!ok;
    btn.textContent = bet.captain<0?t("Choisis ton Capitaine 👑"):(over?t("Mise trop élevée"):(risky?t("⚠️ Trop risqué — baisse la mise du Capitaine"):(needTarget?t("Choisis la cible 🎯"):(needSel2?t("Choisis le 2ᵉ résultat 🎲"):(conflict?t("Capitaine et bonus sur des matchs différents"):(!allMin?t("Mise de 1 € min. sur chaque pari"):t("Valider mes pronostics →"))))))); }

function setCap(i){ const C=(myCard&&CARDS[myCard.id])||{}; const on=bet.captain!==i;
  if(on && myCard && C.t && !C.two && !C.oppT && myCard.target===i){ toast(t("Capitaine et bonus doivent être sur des matchs différents.")); return; }
  bet.captain=bet.captain===i?-1:i; render(); }
function setTarget(i){ if(!myCard) return;

    if(myCard.target===i){ myCard.target=(myCard.target2!=null?myCard.target2:null); myCard.target2=null; }
    else if(myCard.target2===i){ myCard.target2=null; }

    else if(myCard.target2==null){ myCard.target2=i; }

  if(bet.captain===i && !(CARDS[myCard.id]&&CARDS[myCard.id].oppT)){ toast(t("Capitaine et bonus doivent être sur des matchs différents.")); return; } // les cartes qui visent l'adversaire peuvent partager le match du Capitaine
  if(myCard.id==="chance"){ const d=myDuel(); const f=d&&d.fixtures&&d.fixtures[i]; if(!f||!f.draw) return; } myCard.target=i; if(myCard.id==="chance") myCard.sel2=null; render(); }
function setSel2(i,v){ if(!myCard||myCard.id!=="chance"||myCard.target!==i) return; if(bet.picks[i].sel===v) return; myCard.sel2=v; render(); }
function selCard(id){ if(myCard&&myCard.id===id){ myCard=null; } else { myCard={id, target:null}; } render(); }
async function submitBet(){

  busy=true;
  try{ const d=myDuel();
    await q(db.from("bets").upsert({league_id:L.id,day:L.current_day,player_id:S.myId,duel_id:d.id,
      picks:bet.picks,captain:bet.captain,card:myCard,submitted:true},{onConflict:"player_id,day"}));

}

// Organisateur : clôturer les pronos immédiatement (recule la deadline dans le passé) → verrouillage + révélation + résolution.
async function forceCloseBets(){ if(!(me()&&me().is_organizer)||busy)return;
  if(!confirm(t("Clôturer les pronos maintenant ? Plus personne ne pourra modifier et les pronos de tout le monde seront révélés. Les résultats viendront ensuite (tu pourras les publier toi-même).")))return; busy=true;

// Organisateur (simulé) : publier les résultats sans attendre la fin des matchs fictifs.

      if(bt&&bt.picks&&bt.picks.length&&bt.picks[i]) return `<div${al}><b>${esc(selLabel(f,bt.picks[i].sel))}</b> · ${bt.picks[i].stake}€</div>`;
      const pp=pById(pid)||{}; return `<div${al}>${pp.is_ai?'<i>'+t("caché (IA)")+'</i>':'<i class="red">'+t("⏰ pronos non faits")+'</i>'}</div>`; };
    return `<div class="box"${mien?' style="border-color:var(--accent)"':''}>
      ${mien?`<div style="margin-bottom:6px"><span class="chip b">${t("ton duel")}</span></div>`:''}
      <div class="mini" style="${GRID};padding-bottom:6px;border-bottom:1px solid var(--border)">
        <div><div class="muted">${t("🏠 domicile")}</div><b>${nm(d.home_id)}</b></div>
        <div style="text-align:right"><div class="muted">${t("extérieur ✈️")}</div><b>${nm(d.away_id)}</b></div></div>
      ${fx.map((f,i)=>`<div class="mini" style="margin:8px 0"><div class="row" style="gap:8px;justify-content:space-between"><div class="row" style="gap:8px"><span class="sport">${f.sport}</span><b>${esc(f.home)} – ${esc(f.away)}</b></div>${koLabel(f)}</div>
        <div class="muted" style="${GRID};margin-top:3px">${cell(parts[0][0],parts[0][1],f,i,false)}${cell(parts[1][0],parts[1][1],f,i,true)}</div></div>`).join("")}
      </div>`;
  }).join("");
}

/* ============ RESOLUTION (cards engine) ============ */
function aiPlay(cap,fx,hand){
  const budget=cap*0.5*rnd(0.6,1); const ws=fx.map(()=>rnd(0.5,1.5)); const sw=ws.reduce((a,b)=>a+b,0);
  const picks=fx.map((f,i)=>{ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]]; outs.sort((a,b)=>a[1]-b[1]);
    const sel=Math.random()<0.7?outs[0][0]:pick(outs)[0]; return {sel,stake:Math.round(budget*ws[i]/sw)}; });
  const captain=Math.floor(Math.random()*fx.length);
  let card=null; if(hand&&hand.length&&Math.random()<0.4){ const id=pick(hand); card={id,target:CARDS[id].t?Math.floor(Math.random()*fx.length):null};
    if(card.id==="chance"){ const drawIdx=fx.map((f,idx)=>f.draw?idx:-1).filter(x=>x>=0); if(drawIdx.length){ card.target=pick(drawIdx); const opts=["1","N","2"].filter(v=>v!==picks[card.target].sel); card.sel2=pick(opts); } else { card=null; } }
    else if(card.id==="dbl"){ const idxs=fx.map((f,idx)=>idx); for(let k=idxs.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[idxs[k],idxs[j]]=[idxs[j],idxs[k]];} if(idxs.length>=2){card.target=idxs[0];card.target2=idxs[1];} else card=null; } }
  return {picks,captain,card};
}
// Moteur pur : calcule les gains nets du jour à partir des plays (déterministe via pd.rnd).
function runEngine(pdIn, capStart, dz, N){
  const PD=JSON.parse(JSON.stringify(pdIn));
  // Phase 1 : Chérie c'est cadeau (inverse le pari adverse du match CIBLÉ)
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"&&pd.card.target!=null){ const opp=PD[pd.oppId]; const i=pd.card.target;
    if(opp&&opp.picks[i]){ if(opp.picks[i].sel==="1")opp.picks[i].sel="2"; else if(opp.picks[i].sel==="2")opp.picks[i].sel="1"; } } }
  // Phase 2 : règlement pari par pari
  const G={};
  for(const pid in PD){ const pd=PD[pid]; const perBet=[]; let net=0,bestOdd=0;
    pd.picks.forEach((b,i)=>{ const f=pd.fx[i]; const cc=pd.card;
      const isDC=cc&&cc.id==="chance"&&cc.target===i&&cc.sel2;
      const win = isDC ? (f.res===b.sel||f.res===cc.sel2) : (b.sel===f.res);
      const odd = isDC ? dcWinOdd(f,b.sel,cc.sel2) : oddOf(f,b.sel);
      let g=win?(+b.stake)*(odd-1):-(+b.stake); if(i===pd.captain) g*=2;
      if(cc&&cc.target===i){ if(cc.id==="double"&&win)g*=2; if(cc.id==="tout")g*=(win?3:2); if(cc.id==="assurance"&&!win)g=0; if(cc.id==="joker")g*=2; }
      if(win&&odd>bestOdd) bestOdd=odd; perBet.push({gain:g,win,odd}); net+=g; });
    G[pid]={perBet,net,bestOdd,bonus:0}; }
  // Phase 2b : Coup Double — combiné GRATUIT et SANS RISQUE sur 2 matchs (Capitaine autorisé). Bonus purement additif :
  // si les 2 pronos passent, on ajoute (mise moyenne × DBL_FACTOR) × (cote combinée − 1). Sinon rien. Les 2 matchs gardent leur règlement individuel normal.
  for(const pid in PD){ const pd=PD[pid]; const c=pd.card;
    if(c&&c.id==="dbl"&&c.target!=null&&c.target2!=null&&c.target!==c.target2){ const g=G[pid]; const bi=g.perBet[c.target], bj=g.perBet[c.target2];
      if(bi&&bj&&bi.win&&bj.win){ const sI=+pd.picks[c.target].stake||0, sJ=+pd.picks[c.target2].stake||0; const sAvg=(sI+sJ)/2*DBL_FACTOR; const O=bi.odd*bj.odd;
        g.bonus += sAvg*(O-1); if(O>g.bestOdd) g.bestOdd=O; } } }
  // Phase 3 : Dans ta face puis Miroir
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="face"&&pd.card.target!=null){ const opp=G[pd.oppId];
    if(opp && opp.perBet[pd.card.target]){ const b=opp.perBet[pd.card.target]; if(b.win && b.gain>0){ const cut=b.gain/2; b.gain-=cut; opp.net-=cut; } } } }
  for(const d of dz){ const a=d.home_id,b=d.away_id; if(!PD[a]||!PD[b])continue; const useM=(PD[a].card&&PD[a].card.id==="miroir")||(PD[b].card&&PD[b].card.id==="miroir");
    if(useM){ const best=g=>{let bi=-1,bv=0; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); return {bi,bv};};
      const ba=best(G[a]), bb=best(G[b]);
      // GARDE-FOU : l'échange n'a de sens que si les DEUX joueurs ont un pari gagnant.
      // Sinon (adversaire absent, ou qui rate TOUS ses pronos) il n'existe aucune case où
      // déposer le gain de l'autre : l'ancien code appliquait quand même le `-va` au joueur
      // et sautait le `+va` de l'adversaire (bi=-1) → le joueur perdait son meilleur pari et
      // l'argent s'ÉVAPORAIT au lieu d'être échangé. Mesuré : −24 € face à un absent.
      // Désormais : carte gâchée mais inoffensive, comme les autres cartes anti-adversaire.
      // Le pari du joueur reste entier : « mon adversaire va-t-il gagner plus que moi ? »
      if(ba.bi>=0 && bb.bi>=0){ const va=ba.bv, vb=bb.bv;
        G[a].perBet[ba.bi].gain+=(vb-va); G[a].net+=(vb-va);
        G[b].perBet[bb.bi].gain+=(va-vb); G[b].net+=(va-vb); } } }
  // Phase 4 : Sniper, Roi de la cote
  for(const pid in PD){ const pd=PD[pid]; const g=G[pid];
    if(pd.card&&pd.card.id==="sniper"&&pd.card.target!=null){ let bi=-1,bv=-1e9; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); if(bi===pd.card.target&&g.perBet[bi].gain>0) g.bonus+=capStart[pid]*0.10; }
    if(pd.card&&pd.card.id==="roi"){ if(g.perBet.some(x=>x.win&&x.odd>=2.0)) g.bonus+=capStart[pid]*0.05; } }
  // Phase 5 : Gourmand, Sangsue, Serge Benamou
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="gourmand"){ const opp=G[pd.oppId]; if(opp){ const on=opp.net+opp.bonus; if(on>0) G[pid].bonus+=0.2*on; } } }
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="sangsue"){ const opp=G[pd.oppId]; if(opp){ const on=opp.net+opp.bonus; if(on>0){ const t=0.15*on; G[pid].bonus+=t; opp.bonus-=t; } } } }
  // Serge Benamou : si le joueur qui l'a jouée finit dans le vert, il partage 10 % de SON net avec tous les autres.
  // Phase 6 : Parachute (amortit 30 % de la perte nette du jour)
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="parachute"){ const cur=G[pid].net+G[pid].bonus; if(cur<0) G[pid].bonus += (-0.3*cur); } }
  const dayNet={},dayBest={},dayWins={}; for(const pid in G){ dayNet[pid]=Math.round((G[pid].net+G[pid].bonus)*100)/100; dayBest[pid]=G[pid].bestOdd; dayWins[pid]=G[pid].perBet.filter(x=>x.win).length; }
  return {dayNet,dayBest,dayWins};
}
async function resolveDay(){
  if(resolving)return; resolving=true; showErr("");
  try{
    const D=L.current_day;
    // verrou atomique : un seul client résout la journée (auto-avancement)
    const claim=await q(db.from("leagues").update({status:"resolving"}).eq("id",L.id).eq("status","running").eq("current_day",D).select("*"));
    if(!claim||!claim.length){ resolving=false; await refresh(); return; }
    const fresh=claim[0];
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const dz=await q(db.from("duels").select("*").eq("league_id",L.id).eq("day",D));
    const bz=await q(db.from("bets").select("*").eq("league_id",L.id).eq("day",D));
    const N=ps.length; const pmap={}; ps.forEach(p=>pmap[p.id]=p);
    const capStart={}; ps.forEach(p=>capStart[p.id]=p.capital);
    const PD={}; const aiInserts=[]; const forgot=new Set();
    for(const d of dz){ let fx=d.fixtures||(fresh.data_mode==="real"?[]:genPool(5,leagueFormula().bet)); fx.forEach(f=>{if(!f.res&&!f.evId)f.res=simResult(f);}); d.fixtures=fx;
      for(const pid of [d.home_id,d.away_id]){ let bt=bz.find(b=>b.player_id===pid);
        const valid = bt && Array.isArray(bt.picks) && bt.picks.length===fx.length;
        if(!valid){
          if(pmap[pid] && pmap[pid].is_ai){
            // IA : joue toujours automatiquement (elle ne peut pas « oublier »)
            const ai=aiPlay(capStart[pid],fx,pmap[pid].hand||[]); bt={player_id:pid,picks:ai.picks,captain:ai.captain,card:ai.card};
            aiInserts.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,card:ai.card,submitted:true});
          } else {
            // Humain sans pari validé à temps : AUCUN pari pris en compte (pas de reprise adverse) → pénalités −2 pts / −25 % capital appliquées plus bas
            forgot.add(pid); bt={player_id:pid,picks:[],captain:null,card:null};
            aiInserts.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:[],captain:null,card:null,submitted:false});
          }
        }
        PD[pid]={picks:bt.picks.map(x=>({...x})),captain:bt.captain,card:bt.card||null,duelId:d.id,oppId:(pid===d.home_id?d.away_id:d.home_id),fx,rnd:Math.random()}; } }
    // résolution déterministe (moteur en phases), + impact réel de chaque carte
    const {dayNet,dayBest,dayWins}=runEngine(PD,capStart,dz,N);
    // Pari non validé à temps : la sanction −25 % du capital EST la variation de capital du jour.
    // On l'inscrit donc dans `net` (au lieu de l'appliquer à part sur le capital) → elle apparaît dans
    // les résultats de la journée et dans la courbe de capital. Le capital reste identique :
    // capStart + net = capStart − 25 % = capStart × 0,75.
    const penOubli = pid => -Math.round((capStart[pid]||0)*0.25*100)/100;
    forgot.forEach(pid=>{ dayNet[pid] = penOubli(pid); });
    // Impact réel de chaque carte = écart entre le net RÉEL et le net d'un monde SANS cette carte.
    // Le contrefactuel `wo` sort brut de runEngine : il ignore la pénalité d'oubli, qui est injectée
    // après coup (juste au-dessus). Il faut donc l'y refléter à l'identique, sinon la soustraction
    // dayNet − wo impute la pénalité de l'adversaire à la CARTE (« impact adversaire −25 € » alors
    // qu'elle n'y est pour rien). Les deux mondes doivent différer PAR LA SEULE carte.
    const impacts={};
    for(const pid in PD){ if(PD[pid].card&&PD[pid].card.id){ const alt=JSON.parse(JSON.stringify(PD)); alt[pid].card=null;
      const wo=runEngine(alt,capStart,dz,N).dayNet; forgot.forEach(fp=>{ wo[fp]=penOubli(fp); });
      const opp=PD[pid].oppId;
      impacts[pid]={self:Math.round(((dayNet[pid]||0)-(wo[pid]||0))*100)/100, opp: opp!=null?Math.round(((dayNet[opp]||0)-(wo[opp]||0))*100)/100:0}; } }
    for(const d of dz){ await q(db.from("duels").update({fixtures:d.fixtures,resolved:true}).eq("id",d.id)); }
    if(aiInserts.length) await q(db.from("bets").upsert(aiInserts,{onConflict:"player_id,day"}));
    // "Chérie c'est cadeau" : détermine l'inversion du pari ciblé de la victime
    const cadeauFlips={};
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"&&pd.card.target!=null){ const vId=pd.oppId; const opp=PD[vId]; const i=pd.card.target;
      if(opp&&opp.picks[i]){ const from=opp.picks[i].sel; let to=from; if(from==="1")to="2"; else if(from==="2")to="1";
        if(to!==from) cadeauFlips[pid]={victim:vId, match:i, from, to}; } } }
    // On CONSERVE la carte telle que le joueur l'a jouée (on ne la reconstruit surtout pas champ par
    // champ : `target2` du Coup Double avait été oublié → 2ᵉ match perdu à la résolution). On retire
    // juste les champs calculés d'une résolution précédente, puis on les recalcule.
    for(const pid in dayNet){ const c=PD[pid].card; const u2={net:dayNet[pid]};
      if(c&&c.id){ const {impact,flip,...joue}=c; u2.card={...joue, impact:impacts[pid]}; if(cadeauFlips[pid]) u2.card.flip=cadeauFlips[pid]; }
      await q(db.from("bets").update(u2).eq("league_id",L.id).eq("day",D).eq("player_id",pid)); }
    // persiste l'inversion sur le pari de la victime (choix initial → final visibles dans le détail)
    for(const pid in cadeauFlips){ const fl=cadeauFlips[pid]; const picks=PD[fl.victim].picks.map(x=>({...x})); picks[fl.match]={...picks[fl.match],sel:fl.to,orig:fl.from,flipBy:pid};
      await q(db.from("bets").update({picks}).eq("league_id",L.id).eq("day",D).eq("player_id",fl.victim)); }
    const upd={}; ps.forEach(p=>{ upd[p.id]={points:p.points,capital:Math.max(0,Math.round((capStart[p.id]+(dayNet[p.id]||0))*100)/100),
      streak_w:p.streak_w,streak_l:p.streak_l,duel_wins:p.duel_wins,best_day:Math.max(p.best_day,dayNet[p.id]||0),
      best_odd:Math.max(p.best_odd,dayBest[p.id]||0),hand:(p.hand||[]).slice(),cards_used:(p.cards_used||[]).slice()}; });
    // Pari non validé à temps (humain) : −2 pts au classement. Le −25 % de capital est DÉJÀ dans `net`
    // (voir plus haut) → surtout ne pas le réappliquer ici, ce serait une double peine.
    forgot.forEach(pid=>{ if(upd[pid]){ upd[pid].points-=2; } });
    // +1 au meilleur pronostiqueur du jour (plus gros gain parmi tous les joueurs)
    const starId=dayStar(ps.filter(p=>!forgot.has(p.id)).map(p=>{ const gm=gainMise(PD[p.id]?PD[p.id].picks:[], PD[p.id]?PD[p.id].fx:[]); return {id:p.id, net:dayNet[p.id]||0, gain:gm.gain, mise:gm.mise, order:p.join_order||0}; }));
    if(starId!=null) upd[starId].points+=1;
    // Malus : -1 point si TOUS les paris du joueur sont faux (aucun gagnant) → possible d'être en négatif.
    ps.forEach(p=>{ if(PD[p.id] && PD[p.id].picks && PD[p.id].picks.length && (dayWins[p.id]||0)===0) upd[p.id].points-=1; });
    // Duel : vainqueur = meilleur net (gain−mise), puis gain, puis mise, sinon nul.
    // Points : vainqueur 3 (net>0) ou 1 (net≤0) ; perdant 1 (net>0) ou 0 (net≤0) ; nul 1/1.
    // Les séries 🔥/❄️ ne servent que d'indicateur de dynamique (aucun avantage).
    for(const d of dz){ const hp=PD[d.home_id], ap=PD[d.away_id]; if(!hp||!ap) continue;
      const H=Object.assign({net:dayNet[d.home_id]||0}, gainMise(hp.picks,hp.fx));
      const A=Object.assign({net:dayNet[d.away_id]||0}, gainMise(ap.picks,ap.fx));
      const r=duelPtsF(H,A,forgot.has(d.home_id),forgot.has(d.away_id)); upd[d.home_id].points+=r.h; upd[d.away_id].points+=r.a;
      if(r.win==='h'){ upd[d.home_id].duel_wins+=1; upd[d.home_id].streak_w+=1; upd[d.home_id].streak_l=0; upd[d.away_id].streak_l+=1; upd[d.away_id].streak_w=0; }
      else if(r.win==='a'){ upd[d.away_id].duel_wins+=1; upd[d.away_id].streak_w+=1; upd[d.away_id].streak_l=0; upd[d.home_id].streak_l+=1; upd[d.home_id].streak_w=0; }
      else { upd[d.home_id].streak_w=0; upd[d.home_id].streak_l=0; upd[d.away_id].streak_w=0; upd[d.away_id].streak_l=0; } }
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id){ const h=upd[pid].hand; const idx=h.indexOf(pd.card.id); if(idx>=0){ h.splice(idx,1); upd[pid].cards_used.push(pd.card.id); } } }
    // Recapitalisation solidaire : si un humain n'a plus assez pour miser (< seuil), +20€ à lui ET à tout le monde
    let recapNote=null;
    const broke=ps.filter(p=>!p.is_ai && upd[p.id].capital < RECAP_THRESHOLD);
    if(broke.length){ ps.forEach(p=>{ upd[p.id].capital += RECAP_AMOUNT; }); recapNote={day:D, amount:RECAP_AMOUNT, names:broke.map(p=>(p.emoji?p.emoji+' ':'')+p.name)}; }
    for(const p of ps){ const u=upd[p.id]; await q(db.from("players").update({points:u.points,capital:u.capital,streak_w:u.streak_w,streak_l:u.streak_l,duel_wins:u.duel_wins,best_day:u.best_day,best_odd:u.best_odd,hand:u.hand,cards_used:u.cards_used}).eq("id",p.id)); }
    try{ await q(db.from("leagues").update({recap_note:recapNote}).eq("id",L.id)); }catch(e){} // message recapitalisation (défensif si colonne absente)
    const next=D+1; const done=next>=fresh.num_days;
    await q(db.from("leagues").update({current_day:next,status:done?"done":"running"}).eq("id",L.id));
    if(!done){ try{ await q(db.from("leagues").update({day_started_at:new Date().toISOString()}).eq("id",L.id)); }catch(e){} // début journée suivante (défensif si colonne absente)
      try{ await q(db.from("leagues").update({bet_started_at:null}).eq("id",L.id)); }catch(e){} } // remise à zéro du compte à rebours des paris
    resolving=false; await refresh(); toast("Journée résolue ✓");
  }catch(e){ showErr("Résolution : "+e.message); resolving=false; }
}

/* ============ RECAP ============ */
function recapBody(D){
  const netMap={},cardMap={},capMap={}; bets.forEach(b=>{netMap[b.player_id]=b.net||0; cardMap[b.player_id]=b.card;});
  const forgot=pid=>{ const b=bets.find(x=>x.player_id===pid); return !!(b&&Array.isArray(b.picks)&&b.picks.length===0); };
  const dpts={}; players.forEach(p=>dpts[p.id]=0);
  duels.forEach(d=>{ const hb=bets.find(b=>b.player_id===d.home_id), ab=bets.find(b=>b.player_id===d.away_id);
    const H=Object.assign({net:netMap[d.home_id]||0}, gainMise(hb&&hb.picks, d.fixtures));
    const A=Object.assign({net:netMap[d.away_id]||0}, gainMise(ab&&ab.picks, d.fixtures));
    const r=duelPtsF(H,A,forgot(d.home_id),forgot(d.away_id)); dpts[d.home_id]+=r.h; dpts[d.away_id]+=r.a;
    [d.home_id,d.away_id].forEach(pid=>{ const bb=bets.find(x=>x.player_id===pid); if(bb&&bb.picks&&bb.picks.length&&winCount(bb,d.fixtures)===0) dpts[pid]-=1; }); });
  const starId=dayStar(players.filter(p=>!forgot(p.id)).map(p=>{ const b=bets.find(x=>x.player_id===p.id); const d=duels.find(x=>x.home_id===p.id||x.away_id===p.id); const gm=gainMise(b&&b.picks, d&&d.fixtures); return {id:p.id, net:netMap[p.id]||0, gain:gm.gain, mise:gm.mise, order:p.join_order||0}; }));
  if(starId!=null) dpts[starId]+=1;
  players.forEach(p=>{ if(forgot(p.id)) dpts[p.id]-=2; }); // pénalité d'oubli : −2 pts (alignée sur resolveDay/classement)
  // Classement de la journée : d'abord les POINTS du jour (duel + ⭐ − malus), puis le gain en cas d'égalité.
  // (Calculé ici, une fois dpts complet — c'est ce qui compte pour le championnat, pas la cagnotte seule.)
  const ord=[...players].sort((a,b)=>((dpts[b.id]||0)-(dpts[a.id]||0)) || ((netMap[b.id]||0)-(netMap[a.id]||0)));
  const fp=(recapFocus && players.find(p=>p.id===recapFocus))?recapFocus:S.myId; const isMe=fp===S.myId;
  const fpP=pById(fp)||{}; const fpName=isMe?"Toi":(fpP.name||"?");
  const meB=bets.find(b=>b.player_id===fp); const myD=duels.find(d=>d.home_id===fp||d.away_id===fp);

    rows=d.fixtures.map((f,i)=>{ const b=bt.picks[i]; if(!b) return '';
      const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2;
      const win=isDC?(f.res===b.sel||f.res===c.sel2):(b.sel===f.res);
      const odd=isDC?dcWinOdd(f,b.sel,c.sel2):oddOf(f,b.sel);
      let g=win?(+b.stake)*(odd-1):-(+b.stake); const parts=[`${b.stake}€ @${odd}`];
      if(i===bt.captain){ g*=2; parts.push('👑 ×2'); }
      if(c&&c.target===i){ if(c.id==="double"&&win){g*=2;parts.push('🚀 ×2');} else if(c.id==="tout"){g*=(win?3:2);parts.push('🔥 '+(win?'×3':'×2'));} else if(c.id==="joker"){g*=2;parts.push('🃏 ×2');} else if(c.id==="assurance"&&!win){g=0;parts.push('🛡 '+t("remboursé"));} }
      if(oppCard&&oppCard.id==="face"&&oppCard.target===i&&win&&g>0){ g=g/2; parts.push('😏 ÷2'); }
      sumG+=g; const selD=isDC?`${sel(f,b.sel)}/${sel(f,c.sel2)}`:sel(f,b.sel);
      return `<div class="mini" style="margin:5px 0"><b>${esc(f.home)}–${esc(f.away)}</b> <span class="muted">(${esc(sel(f,f.res))})</span><br><span class="muted">${esc(selD)} · ${parts.join(' · ')}</span> → <b class="${g>=0?'green':'red'}">${fmt(g)}€</b> ${win?'✓':'✗'}</div>`;
    }).join('');
    const adj=net-sumG;
    if(Math.abs(adj)>=1) rows+=`<div class="mini" style="margin-top:6px;border-top:1px dashed var(--border);padding-top:6px">${t("🃏 Bonus & ajustements")}${c&&CARDS[c.id]?' ('+CARDS[c.id].e+' '+esc(t(CARDS[c.id].n))+')':''} : <b class="${adj>=0?'green':'red'}">${fmt(adj)}€</b></div>`;
  } else rows=`<div class="mini muted">${t("Pas de détail disponible pour ce joueur.")}</div>`;
  infoModal("🧮", t("Détail — {a}",{a:(p.emoji||'')+' '+(p.name||'?')}), `<div style="text-align:left">${rows}<div class="mini" style="margin-top:8px;border-top:2px solid var(--border);padding-top:6px"><b>${t("Total net :")} <span class="${net>=0?'green':'red'}">${fmt(net)}€</span></b></div></div>`);
}

function cmp(a,b){ return b.points-a.points || b.capital-a.capital || b.duel_wins-a.duel_wins || b.best_day-a.best_day || b.best_odd-a.best_odd; }
// Reconstruit l'historique du classement (état cumulé APRÈS chaque journée résolue) en rejouant les résultats stockés.
function computeStandHist(){
  if(!chartBets || !standDuels) return [];
  const N = (L.status==="done" ? (L.num_days||0) : (L.current_day||0)); // journées résolues
  if(N<1) return [];
  const sp = L.prep_summary||{};
  const st={}; players.forEach(p=>{ const psx=(sp.players||[]).find(x=>x.pid===p.id); st[p.id]={points:0, capital: psx?psx.capital:100, duel_wins:0, best_day:0, best_odd:0, streak_w:0, streak_l:0, star:0}; });
  const betAt={}; chartBets.forEach(b=>{ betAt[b.day+'|'+b.player_id]=b; });
  const duelByDay={}; standDuels.forEach(d=>{ (duelByDay[d.day]=duelByDay[d.day]||[]).push(d); });
  const snaps=[];
  for(let d=0; d<N; d++){
    const dz=duelByDay[d]||[];
    const inDay=pid=>dz.some(du=>du.home_id===pid||du.away_id===pid);
    // oubli : humain présent ce jour-là sans pari valide (picks vides ou absents)
    const forgot=new Set();
    players.forEach(p=>{ if(p.is_ai||!inDay(p.id)) return; const b=betAt[d+'|'+p.id]; if(!b||!Array.isArray(b.picks)||b.picks.length===0) forgot.add(p.id); });
    // points de duel + séries 🔥/❄️ + victoires
    dz.forEach(du=>{ const hb=betAt[d+'|'+du.home_id], ab=betAt[d+'|'+du.away_id];
      const H=Object.assign({net:(hb&&hb.net)||0}, gainMise(hb&&hb.picks, du.fixtures));
      const A=Object.assign({net:(ab&&ab.net)||0}, gainMise(ab&&ab.picks, du.fixtures));
      const r=duelPtsF(H,A,forgot.has(du.home_id),forgot.has(du.away_id));
      if(st[du.home_id]) st[du.home_id].points+=r.h; if(st[du.away_id]) st[du.away_id].points+=r.a;
      if(r.win==='h'){ if(st[du.home_id]){st[du.home_id].duel_wins++;st[du.home_id].streak_w++;st[du.home_id].streak_l=0;} if(st[du.away_id]){st[du.away_id].streak_l++;st[du.away_id].streak_w=0;} }
      else if(r.win==='a'){ if(st[du.away_id]){st[du.away_id].duel_wins++;st[du.away_id].streak_w++;st[du.away_id].streak_l=0;} if(st[du.home_id]){st[du.home_id].streak_l++;st[du.home_id].streak_w=0;} }
      else { if(st[du.home_id]){st[du.home_id].streak_w=0;st[du.home_id].streak_l=0;} if(st[du.away_id]){st[du.away_id].streak_w=0;st[du.away_id].streak_l=0;} } });
    // ⭐ meilleur pronostiqueur du jour (hors oubli) → +1 pt
    const rows=[]; players.forEach(p=>{ const du=dz.find(x=>x.home_id===p.id||x.away_id===p.id); if(!du||forgot.has(p.id)) return; const b=betAt[d+'|'+p.id]; const gm=gainMise(b&&b.picks, du.fixtures); rows.push({id:p.id, net:(b&&b.net)||0, gain:gm.gain, mise:gm.mise, order:p.join_order||0}); });
    const sid=dayStar(rows); if(sid!=null && st[sid]){ st[sid].points+=1; st[sid].star+=1; }
    // −1 pt si tous les paris faux (picks non vides)
    players.forEach(p=>{ const du=dz.find(x=>x.home_id===p.id||x.away_id===p.id); if(!du) return; const b=betAt[d+'|'+p.id]; if(b&&b.picks&&b.picks.length&&winCount(b,du.fixtures)===0 && st[p.id]) st[p.id].points-=1; });
    // capital (+ net), meilleure journée, meilleure cote gagnée
    players.forEach(p=>{ const du=dz.find(x=>x.home_id===p.id||x.away_id===p.id); const b=betAt[d+'|'+p.id]; const net=(b&&b.net)||0; if(st[p.id]){ st[p.id].best_day=Math.max(st[p.id].best_day,net); st[p.id].capital=Math.max(0,Math.round((st[p.id].capital+net)*100)/100); }
      if(b&&b.picks&&du&&du.fixtures){ b.picks.forEach((pk,i)=>{ const f=du.fixtures[i]; if(!f) return; const c=b.card; const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2; const win=isDC?(f.res===pk.sel||f.res===c.sel2):(pk.sel===f.res); const odd=isDC?dcWinOdd(f,pk.sel,c.sel2):oddOf(f,pk.sel); if(win&&odd>st[p.id].best_odd) st[p.id].best_odd=odd; }); } });
    // pénalité oubli : −2 pts. Le −25 % de capital est inclus dans `net` depuis la v4.03 (déjà appliqué
    // par `capital += net` juste au-dessus) → on ne le réapplique QUE pour les anciennes journées (net=0),
    // sinon ce serait une double peine à chaque rejeu de l'historique.
    forgot.forEach(pid=>{ if(!st[pid]) return; st[pid].points-=2;
      const bb=betAt[d+'|'+pid]; const penInNet=!!(bb && (bb.net||0)<0);
      if(!penInNet) st[pid].capital=Math.max(0,Math.round(st[pid].capital*0.75*100)/100); });
    // recapitalisation solidaire : si un humain < seuil → +montant à tout le monde
    const broke=players.filter(p=>!p.is_ai && st[p.id] && st[p.id].capital<RECAP_THRESHOLD);
    if(broke.length){ players.forEach(p=>{ if(st[p.id]) st[p.id].capital+=RECAP_AMOUNT; }); }
    snaps.push(players.map(p=>({ id:p.id,name:p.name,emoji:p.emoji,is_ai:p.is_ai,join_order:p.join_order,
      points:st[p.id].points, capital:st[p.id].capital, duel_wins:st[p.id].duel_wins, best_day:st[p.id].best_day, best_odd:st[p.id].best_odd, streak_w:st[p.id].streak_w, streak_l:st[p.id].streak_l, star:st[p.id].star })));
  }
  return snaps;
}

function capChart(){
  if(!chartBets) return '';
  const N=(L.status==="done"?(L.num_days||0):(L.current_day||0)); if(N<1) return '';
  const sp=L.prep_summary||{};
  const capAfter={}; players.forEach(p=>{ const psx=(sp.players||[]).find(x=>x.pid===p.id); capAfter[p.id]= psx?psx.capital:100; });
  const netByDay={}, legacyPen={};
  players.forEach(p=>{ netByDay[p.id]=Array(N).fill(0); legacyPen[p.id]=Array(N).fill(false); });
  // Oubli « ancienne donnée » (journée résolue avant la v4.03) : la pénalité −25 % n'est PAS dans `net`
  // → sans ça la courbe reste à plat alors que le capital a bien chuté. Depuis la v4.03, net la contient déjà.
  chartBets.forEach(b=>{ if(netByDay[b.player_id]==null || b.day>=N) return;
    netByDay[b.player_id][b.day]=b.net||0;
    legacyPen[b.player_id][b.day]=!!(Array.isArray(b.picks) && b.picks.length===0 && (b.net||0)===0); });
  const series=players.map(p=>{ let v=capAfter[p.id]; const pts=[100,v];
    for(let d=0;d<N;d++){ v=Math.max(0,v+(netByDay[p.id][d]||0));
      if(legacyPen[p.id][d]) v=Math.max(0,Math.round(v*0.75*100)/100);
      pts.push(v); } return {p,pts}; });
  const allv=series.flatMap(s=>s.pts); let mn=Math.min(...allv), mx=Math.max(...allv); if(!isFinite(mn)){mn=0;mx=100;}
  const pad=Math.max(5,(mx-mn)*0.12); const lo=Math.max(0,Math.floor((mn-pad)/10)*10), hi=Math.max(lo+10,Math.ceil((mx+pad)/10)*10);
  const labels=["100€",t("Bonus")]; for(let d=0;d<N;d++) labels.push("J"+(d+1));
  return lineChart(series, labels, t("📈 Évolution du capital (départ → bonus → chaque journée)"), lo, hi);
}
// Évolution des POINTS (le classement) — les points font le championnat, le capital n'est qu'un moyen.
// S'appuie sur les snapshots par journée de computeStandHist (mêmes règles que le classement : duel, ⭐, malus, oubli).
function ptsChart(){
  const snaps=computeStandHist(); if(!snaps.length) return '';
  const N=snaps.length;
  const series=players.map(p=>{ const pts=[0];
    for(let d=0;d<N;d++){ const s=snaps[d].find(x=>x.id===p.id); pts.push(s?s.points:0); } return {p,pts}; });
  const labels=[t("Départ")]; for(let d=0;d<N;d++) labels.push("J"+(d+1));
  const allv=series.flatMap(s=>s.pts);
  const lo=Math.floor(Math.min(0,...allv))-1, hi=Math.ceil(Math.max(1,...allv))+1; // les points peuvent être négatifs
  return lineChart(series, labels, t("📊 Évolution des points (classement)"), lo, hi);
}
// Rendu commun des courbes (capital / points). L'échelle (lo/hi) est fournie par l'appelant :
// le capital s'arrondit à la dizaine, les points sont des entiers pouvant être négatifs.
function lineChart(series, labels, title, lo, hi){
  const npts=labels.length;
  const W=480,H=210,PL=38,PR=10,PT=12,PB=26;
  const X=i=> PL + (W-PL-PR)*(npts<=1?0:i/(npts-1));
  const Y=v=> PT + (H-PT-PB)*(1-(v-lo)/((hi-lo)||1));
  const cols=["#4ade80","#60a5fa","#fbbf24","#f87171","#a78bfa","#f472b6","#22d3ee","#fb923c","#84cc16","#e879f9"];
  let grid=""; for(let k=0;k<=3;k++){ const gv=lo+(hi-lo)*k/3; const y=Y(gv); grid+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="#242b38"/><text x="${PL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#8b93a3">${Math.round(gv)}</text>`; }
  let xlab=""; labels.forEach((l,i)=>{ if(npts>9 && i>1 && i%2===0 && i!==npts-1) return; xlab+=`<text x="${X(i).toFixed(1)}" y="${H-PB+14}" text-anchor="middle" font-size="8.5" fill="#8b93a3">${esc(l)}</text>`; });
  const lines=series.map((s,si)=>{ const c=cols[si%cols.length]; const dpath=s.pts.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    const dots=s.pts.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2" fill="${c}"/>`).join('');
    return `<path d="${dpath}" fill="none" stroke="${c}" stroke-width="2"/>${dots}`; }).join('');
  const legend=series.map((s,si)=>`<span class="mini" style="margin-right:10px;white-space:nowrap"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${cols[si%cols.length]};vertical-align:middle"></span> ${esc(s.p.emoji)} ${esc(s.p.name)}</span>`).join('');
  return `<div class="box"><div class="mini muted" style="margin-bottom:6px">${title}</div>
     <div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:320px;height:auto">${grid}${lines}${xlab}</svg></div>
     <div style="margin-top:6px;line-height:1.9">${legend}</div></div>`;
}

    let topLeader=null; Object.keys(daysLed).forEach(pid=>{ if(topLeader===null||daysLed[pid]>daysLed[topLeader]) topLeader=pid; });
    const finalOrd=[...players].sort(cmp); const finalRank={}; finalOrd.forEach((p,i)=>finalRank[p.id]=i+1);

    const bonusImp={}; players.forEach(p=>bonusImp[p.id]=0); let cardsPlayed=0, master=null;
    bz.forEach(b=>{ if(b.card&&b.card.id){ cardsPlayed++; const self=(b.card.impact&&b.card.impact.self)||0; if(bonusImp[b.player_id]!=null)bonusImp[b.player_id]+=self; if(self>0&&(master===null||self>master.self)) master={pid:b.player_id,day:b.day,self,id:b.card.id}; } });

async function loadPalmares(){

    const pls=await q(db.from("players").select("id,name,emoji,league_id,is_ai,user_id"));
    const bts=await q(db.from("bets").select("league_id,day,player_id,net,picks,card,captain,duel_id").not("net","is",null));
    const dls=await q(db.from("duels").select("id,fixtures"));

    const oddF=(f,s)=> s==="1"?f.oh:s==="2"?f.oa:f.od; const selNm=(f,s)=> s==="1"?f.home:s==="2"?f.away:t("Nul");

      const picks=b.picks||[]; const staked=picks.reduce((a,x)=>a+(+x.stake||0),0);
      const lines=picks.map((x,i)=>{ const f=fx[i]; if(!f) return null; const win=x.sel===f.res; const odd=oddF(f,x.sel); let g=win?(+x.stake)*(odd-1):-(+x.stake); if(i===b.captain)g*=2;
        if(win && +x.stake>0) oddRecs.push({odd, name:pl.name, emoji:pl.emoji, lname:lg.name, day:b.day, match:f.home+"–"+f.away, sel:selNm(f,x.sel), stake:+x.stake});
        return {m:f.home+"–"+f.away, sel:selNm(f,x.sel), win, odd, stake:+x.stake, g:+g.toFixed(2), cap:i===b.captain}; }).filter(Boolean);
      dayRecs.push({net:+(b.net||0).toFixed(2), staked, ret: staked>0?(b.net||0)/staked:0, name:pl.name, emoji:pl.emoji, lname:lg.name, np:lg.num_participants, day:b.day, cardId:b.card&&b.card.id, lines});
    }
    // Agrégat de PRONOSTIC PUR par personne (user_id), toutes ligues — indépendant des mises.
    const agg={};
    for(const b of bts){ const pl=plMap[b.player_id]; if(!pl||pl.is_ai||!pl.user_id||pl.name==="Joueur IA") continue;
      const d=dlMap[b.duel_id]; const fx=(d&&d.fixtures)||[]; const c=b.card;
      let a=agg[pl.user_id]; if(!a){ a=agg[pl.user_id]={uid:pl.user_id,name:pl.name,emoji:pl.emoji,picks:0,correct:0,winOddSum:0,wins:0,flat:0}; }
      a.name=pl.name; a.emoji=pl.emoji;

    const rankMe=(arr,keyFn)=>{ const sorted=[...arr].sort((x,y)=>keyFn(y)-keyFn(x));

      return { top:sorted.slice(0,5), me: mi>=0?Object.assign({rank:mi+1,total:sorted.length},sorted[mi]):null }; };
    const skHit=skill.filter(a=>a.picks>=MINP), skOdd=skill.filter(a=>a.wins>=MINW);
    palmares={
      bigGain: [...dayRecs].sort((a,b)=>b.net-a.net).slice(0,5),
      bestRet: [...dayRecs].filter(r=>r.staked>=5).sort((a,b)=>b.ret-a.ret).slice(0,5),
      bestOdd: [...oddRecs].sort((a,b)=>b.odd-a.odd).slice(0,5),

      return `<div class="box" style="padding:10px 12px;cursor:pointer${meRow?';border-color:var(--accent)':''}" onclick="togglePalm('${k}')">
        <div class="row"><div class="row" style="gap:8px"><b style="min-width:22px">${medal(i)}</b><span>${r.emoji||''} ${esc(r.name)}${meRow?' <span class="tag">'+t("(toi)")+'</span>':''}</span></div><b class="${v.cls}">${v.txt} ${op?'▲':'▼'}</b></div>
        ${op?`<div style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px">${detail(r)}</div>`:''}</div>`;}).join("");
    if(data.me && data.me.rank>5){ const r=data.me; const v=val(r);
      rows+=`<div class="box" style="padding:10px 12px;border-color:var(--accent)">
        <div class="row"><div class="row" style="gap:8px"><b style="min-width:22px">${r.rank}ᵉ</b><span>${r.emoji||''} ${esc(r.name)} <span class="tag">${t("(toi)")}</span></span></div><b class="${v.cls}">${v.txt}</b></div>
        <div class="mini muted" style="margin-top:4px">${t("Ta position, sur {a} pronostiqueurs classés",{a:r.total})}</div></div>`; }
    return `<h2>${title}</h2>${rows}`; };
  return `${back}
    <div class="box" style="border-left:3px solid var(--accent)"><h2 style="margin-top:0">${t("🧠 Classement des pronostiqueurs")}</h2><div class="mini muted">${t("Compétence de <b>pronostic pur</b> (bons pronos & cotes), <b>indépendante des mises</b>, toutes ligues confondues. Minimum <b>{a} pronostics</b> pour figurer. Touche un joueur pour son profil complet.",{a:palmares.minP})}</div></div>
    ${secMe(t("🎯 Meilleurs pronostiqueurs — % de réussite"), palmares.topHit, r=>({txt:(r.hit*100).toFixed(1)+"%",cls:'gold'}), statDetail, "ph", t("Pas encore assez de pronostics (min {a}).",{a:palmares.minP}))}
    ${secMe(t("📈 Meilleure cote moyenne gagnante"), palmares.topAvgOdd, r=>({txt:'@'+r.avgOdd.toFixed(2),cls:'gold'}), statDetail, "pa", t("Pas encore assez de pronostics gagnants."))}
    ${secMe(t("💎 Meilleur rendement à mise fixe (bat les cotes)"), palmares.topFlat, r=>({txt:(r.flat>=0?'+':'')+(r.flat*100).toFixed(0)+"%",cls:r.flat>=0?'green':'red'}), statDetail, "pf", t("Pas encore assez de pronostics (min {a}).",{a:palmares.minP}))}
    ${secMe(t("💩 Pires pronostiqueurs — % de réussite"), palmares.worstHit, r=>({txt:(r.hit*100).toFixed(1)+"%",cls:'red'}), statDetail, "pw", t("Pas encore assez de pronostics (min {a}).",{a:palmares.minP}))}
    <div class="box"><h2 style="margin-top:0">${t("🏆 Autres records (en €)")}</h2><div class="mini muted">${t("Les plus grosses perfs par journée, toutes ligues confondues.")}</div></div>
    ${sec(t("💥 Plus gros gain sur une journée"), palmares.bigGain, r=>({txt:fmt(r.net)+"€",cls:r.net>=0?'green':'red'}), dayDetail, "g")}
    ${sec(t("📈 Meilleur rendement d'une journée"), palmares.bestRet, r=>({txt:t("×{r} la mise",{r:r.ret.toFixed(2)}),cls:r.ret>=0?'green':'red'}), dayDetail, "r", t("Il faut avoir misé ≥ 5€."))}
    ${sec(t("🎯 Plus grosse cote gagnée"), palmares.bestOdd, r=>({txt:"@"+r.odd,cls:'gold'}), oddDetail, "o")}
    ${sec(t("💀 Pire dégringolade d'une journée"), palmares.bigLoss, r=>({txt:fmt(r.net)+"€",cls:'red'}), dayDetail, "l")}`;
}
async function loadAdmin(){
  try{
    const lgs=await q(db.from("leagues").select("id,status,gage,prep_summary,created_at"));
    const pls=await q(db.from("players").select("id,name,is_ai,user_id,created_at"));
    const allBts=await q(db.from("bets").select("card,net,created_at,player_id"));
    const bts=allBts.filter(b=>b.net!=null); // paris résolus (stats de jeu)
    const cardCount={}; let withCard=0;
    bts.forEach(b=>{ if(b.card&&b.card.id){ cardCount[b.card.id]=(cardCount[b.card.id]||0)+1; withCard++; } });
    /* ---- Activité par jour ----
       « Joueur actif » = PERSONNE distincte (user_id) ayant validé au moins un prono ce jour-là.
       On mappe player_id → user_id car une personne a un `player` par ligue. Les connexions
       simples ne sont pas tracées (il faudrait une table d'événements — cf. Phase 2). */
    const p2u={}; pls.forEach(p=>{ if(!p.is_ai && p.user_id) p2u[p.id]=p.user_id; });
    const dayKey=ts=>{ const d=new Date(ts); if(isNaN(d)) return null;
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
    const dailyMap={};
    const slot=k=>{ dailyMap[k]=dailyMap[k]||{users:new Set(),bets:0,leagues:0,newp:new Set()}; return dailyMap[k]; };
    allBts.forEach(b=>{ const k=dayKey(b.created_at); if(!k) return; const s=slot(k); s.bets++; const u=p2u[b.player_id]; if(u) s.users.add(u); });
    lgs.forEach(l=>{ const k=dayKey(l.created_at); if(!k) return; slot(k).leagues++; });
    // Nouveaux joueurs = 1re apparition d'un user_id (plus ancienne ligne `players`)
    const firstSeen={}; pls.forEach(p=>{ if(p.is_ai||!p.user_id||!p.created_at) return; const tt=new Date(p.created_at).getTime();
      if(isNaN(tt)) return; if(firstSeen[p.user_id]==null||tt<firstSeen[p.user_id]) firstSeen[p.user_id]=tt; });
    Object.keys(firstSeen).forEach(u=>{ const k=dayKey(firstSeen[u]); if(k) slot(k).newp.add(u); });
    const now=Date.now(); const daily=[];
    for(let i=0;i<14;i++){ const k=dayKey(new Date(now-i*86400000)); const s=dailyMap[k];
      daily.push({d:k, users:s?s.users.size:0, bets:s?s.bets:0, leagues:s?s.leagues:0, newp:s?s.newp.size:0}); }
    const activeSince=days=>{ const cut=now-days*86400000; const set=new Set();
      allBts.forEach(b=>{ const tt=new Date(b.created_at).getTime(); if(!isNaN(tt)&&tt>=cut){ const u=p2u[b.player_id]; if(u) set.add(u); } }); return set.size; };
    const active7=activeSince(7), active30=activeSince(30), everActive=activeSince(36500);
    // Gages les plus choisis : cumul des votes (et nombre de fois retenu) sur toutes les ligues démarrées
    const gageTally={};
    lgs.forEach(l=>{ const gv=(l.prep_summary&&l.prep_summary.gageVotes)||[]; gv.forEach(g=>{ if(!g||!g.t) return; const k=g.t;
      gageTally[k]=gageTally[k]||{votes:0,wins:0}; gageTally[k].votes+=(g.count||0); if(g.win) gageTally[k].wins++; }); });
    const topGages=Object.keys(gageTally).map(t=>({t,votes:gageTally[t].votes,wins:gageTally[t].wins})).sort((a,b)=> b.votes-a.votes || b.wins-a.wins);
    const activeAccounts=new Set(pls.filter(p=>!p.is_ai&&p.user_id).map(p=>p.user_id)); // 1 personne = 1, même sur plusieurs ligues
    adminData={ leagues:lgs.length,
      byStatus:{lobby:lgs.filter(l=>l.status==="lobby").length, prep:lgs.filter(l=>l.status==="prep"||l.status==="starting").length, running:lgs.filter(l=>l.status==="running").length, done:lgs.filter(l=>l.status==="done").length},
      activeAccounts:activeAccounts.size, participations:pls.filter(p=>!p.is_ai&&p.name!=="Joueur IA").length,
      resolvedBets:bts.length, cardsPlayed:withCard, topCards:Object.keys(CARDS).map(id=>[id,cardCount[id]||0]).sort((a,b)=>b[1]-a[1]), topGages,
      daily, active7, active30, everActive, totalBets:allBts.length };
  }catch(e){ adminData={error:e.message}; }
}

  const a=adminData; const st=(k,v)=>`<div class="box row"><span class="muted">${k}</span><b>${v}</b></div>`;
  return `${back}
    <div class="box"><h2 style="margin-top:0">🛠 Tableau de bord admin</h2><div class="mini muted">Statistiques globales du jeu.</div></div>

    <div class="box"><div class="mini muted" style="margin-bottom:8px">Ligues par statut</div>
      <div class="row mini"><span>🕓 Salon <b>${a.byStatus.lobby}</b></span><span>🎬 Prépa <b>${a.byStatus.prep}</b></span><span>▶️ En cours <b>${a.byStatus.running}</b></span><span>🏁 Fini <b>${a.byStatus.done}</b></span></div></div>
