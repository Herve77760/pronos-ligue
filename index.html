/* ============ PARTIE D'ESSAI — mini-saison LOCALE de 2 journées, résultats immédiats ============
   Ordre RÉEL du jeu : prépa (gage + enchères bonus) → paris J1 → résultats → sélection matchs J2 →
   paris J2 → résultats → classement final + gage. 100 % local (aucune base, aucune IA payante).
   Des annotations « ℹ️ Dans le vrai jeu » signalent les simplifications (3 matchs vs 5, etc.). */
let essaiStep=0, essaiGage=0, essaiBids={}, essaiPicks=[[],[]], essaiStakes=[[],[]], essaiCap=[-1,-1], essaiCard=[null,null], essaiCardTgt=[-1,-1], essaiSel=[];
// Bonus de FORCES DIFFÉRENTES (4/3/2). Pré-remplissage : tout 9>6 (gagné), parachute 8=8 (égalité →
// rapidité), sangsue non misé (Léa l'emporte). Le joueur remporte donc 🔥 Tout ou Rien et 🪂 Parachute.
const ESSAI_STAKE=10, ESSAI_CARDS=["tout","parachute","sangsue"];
// Ligue de DÉMO à 4 joueurs : chaque journée tu affrontes un adversaire DIFFÉRENT (comme en vrai).
const ESSAI_PLAYERS=[{id:"me",n:"Toi",e:"👑"},{id:"lea",n:"Léa",e:"🦊"},{id:"marco",n:"Marco",e:"🐼"},{id:"nina",n:"Nina",e:"🦉"}];
function essaiOpp(d){ return d===0?{id:"lea",n:"Léa",e:"🦊"}:{id:"marco",n:"Marco",e:"🐼"}; }
// Enchères des 3 AUTRES joueurs sur les 3 bonus (montants FIXES). Miser est FACULTATIF. Cas illustrés :
// tout → Marco 8 (forte, dure à battre) · parachute → Léa 5 = Marco 5 (ÉGALITÉ) · sangsue → Nina 7.
// À égalité, le plus RAPIDE gagne : ordre de rapidité ci-dessous (toi le plus rapide).
const ESSAI_ORDER=["me","lea","marco","nina"];
// Nombre de miseurs VARIABLE : « tout » convoité par tous (4), « parachute » par 2 adversaires (égalité
// Léa=Marco), « sangsue » par la seule Nina → montre que certains bonus intéressent plus que d'autres.
const ESSAI_AUCTION={tout:{lea:6,marco:8,nina:3},parachute:{lea:5,marco:5,nina:0},sangsue:{lea:0,marco:0,nina:7}};
function essaiBotBid(id){ const a=ESSAI_AUCTION[id]||{}; return Math.max(a.lea||0,a.marco||0,a.nina||0); }
// Qui remporte l'enchère d'un bonus (toi inclus) : plus haute mise, égalité au plus rapide (ESSAI_ORDER).
function essaiAuctionResult(id){ const a=ESSAI_AUCTION[id]||{}; const bids={me:essaiBids[id]||0,lea:a.lea||0,marco:a.marco||0,nina:a.nina||0};
  let win=null,best=-1; ESSAI_ORDER.forEach(k=>{ if(bids[k]>best){ best=bids[k]; win=k; } });
  if(best<=0) win=null; const tie=win!=null && ESSAI_ORDER.filter(k=>bids[k]===best).length>1;
  return {bids,win,best,tie}; }
// Résultat de l'AUTRE duel de la journée (celui que tu ne joues pas) — nets fixes, classement réaliste.
// La plus forte valeur sert de « barre » pour l'⭐ meilleur pronostiqueur : ~20 € en J1, ~40 € en J2.
// J1 : Marco 20 bat Nina −3 · J2 : Léa 40 bat Nina 2.
const ESSAI_SHADOW=[{marco:20,nina:-3},{lea:40,nina:2}];
// Classement FINAL fictif « comme après une vraie saison de 6 journées » (points & cagnottes réalistes).
const ESSAI_FINAL=[{id:"me",pts:14,cap:212.50},{id:"lea",pts:12,cap:168.00},{id:"marco",pts:9,cap:143.75},{id:"nina",pts:6,cap:96.25}];
const ESSAI_GAGES=["Chanter au bar 🎤","Payer la prochaine tournée 🍻","Payer un shot à chacun 🥃"];
const ESSAI_D1=[
 {home:"PSG",away:"OM",sport:"⚽",oh:1.85,od:3.4,oa:4.0,draw:true,res:"1",botSel:"1"},
 {home:"Real",away:"Barça",sport:"⚽",oh:2.3,od:3.3,oa:2.9,draw:true,res:"1",botSel:"2"},
 {home:"Nadal",away:"Federer",sport:"🎾",oh:1.7,oa:2.1,draw:false,res:"1",botSel:"1"}];
const ESSAI_POOL=[
 {home:"Man City",away:"Chelsea",sport:"⚽",oh:1.55,od:4.2,oa:6.0,draw:true,res:"1",botSel:"1"},
 {home:"Bayern",away:"Dortmund",sport:"⚽",oh:1.6,od:4.0,oa:5.0,draw:true,res:"1",botSel:"2"},
 {home:"Djokovic",away:"Alcaraz",sport:"🎾",oh:1.95,oa:1.85,draw:false,res:"2",botSel:"1"},
 {home:"Lakers",away:"Celtics",sport:"🏀",oh:2.0,oa:1.8,draw:false,res:"2",botSel:"2"},
 {home:"Juve",away:"Milan",sport:"⚽",oh:2.2,od:3.1,oa:3.3,draw:true,res:"1",botSel:"1"}];
function essaiFav(f){ return oddOf(f,"1")<=oddOf(f,"2")?"1":"2"; }
// Enchères PRÉ-REMPLIES pour l'exemple (éditables) : tout 9 → tu bats Marco (8) ; parachute 5 → ÉGALITÉ
// avec Léa & Marco (tu gagnes par la rapidité) ; sangsue 3 → Nina (7) l'emporte. → les 3 cas de figure.
function startEssai(){ essaiStep=0; essaiGage=0; essaiBids={tout:9,parachute:5,sangsue:3}; essaiSel=[];   // accessible AVANT connexion (100 % local)
  essaiPicks=[ESSAI_D1.map(essaiFav),[]]; essaiStakes=[[],[]]; essaiCap=[-1,-1]; essaiCard=[null,null]; essaiCardTgt=[-1,-1]; navRoot(); S.view="essai"; render(); }
function essaiGo(n){ essaiStep=n; render(); try{window.scrollTo(0,0);}catch(e){} }
function essaiSetBid(id,v){ const x=Math.max(0,Math.min(40,Math.round(+v||0))); if(x>0) essaiBids[id]=x; else delete essaiBids[id];
  const tot=Object.values(essaiBids).reduce((a,b)=>a+(+b||0),0); const over=tot>40;   // miser est FACULTATIF
  const bt=document.getElementById("essaibt"); if(bt){ bt.textContent=tot; bt.parentNode.className=over?'red':''; }
  const b2=document.getElementById("essaibidbtn"); if(b2){ b2.disabled=over; b2.textContent= over? t("Dépasse 40 € — réduis tes mises") : t("Valider ma prépa →"); } }
// Bonus REMPORTÉS par toi (plus haute enchère, égalité au plus rapide) → dépense = leur total.
function essaiWon(){ return ESSAI_CARDS.filter(id=>essaiAuctionResult(id).win==="me"); }
function essaiSpent(){ return essaiWon().reduce((a,id)=>a+(essaiBids[id]||0),0); }
// Capital dispo pour parier : 100 − enchères gagnées, + le net de la J1 quand on aborde la J2.
function essaiCapital(d){ let c=100-essaiSpent(); if(d>=1) c+=essaiMeNet(0,ESSAI_D1); return Math.round(c*100)/100; }
// Dépense d'enchères de CHAQUE joueur (le gagnant paie sa mise) → pour afficher les cagnottes.
function essaiSpendBy(){ const sp={me:0,lea:0,marco:0,nina:0}; ESSAI_CARDS.forEach(id=>{ const r=essaiAuctionResult(id); if(r.win) sp[r.win]+=r.best; }); return sp; }
// Cagnotte des 4 joueurs après la journée `upto` : 100 − enchères + nets cumulés.
function essaiCapitals(upto,fx2){ const sp=essaiSpendBy(); const cap={}; ESSAI_ORDER.forEach(k=>cap[k]=100-sp[k]);
  for(let d=0;d<=upto;d++){ const nets=essaiDayNets(d,d===0?ESSAI_D1:fx2); ESSAI_ORDER.forEach(k=>cap[k]+=(nets[k]||0)); }
  ESSAI_ORDER.forEach(k=>cap[k]=Math.round(cap[k]*100)/100); return cap; }
function essaiSetPick(d,i,v){ essaiPicks[d][i]=v; render(); }
function essaiSetCap(d,i){ essaiCap[d]=(essaiCap[d]===i?-1:i); if(essaiCap[d]===i&&essaiCardTgt[d]===i) essaiCardTgt[d]=-1; render(); }
function essaiSetCard(d,id){ essaiCard[d]=(essaiCard[d]===id?null:id); if(essaiCard[d]!=="tout") essaiCardTgt[d]=-1; render(); }
function essaiSetTgt(d,i){ if(essaiCard[d]!=="tout") return; essaiCardTgt[d]=(essaiCardTgt[d]===i?-1:i); if(essaiCardTgt[d]===i&&essaiCap[d]===i) essaiCap[d]=-1; render(); }
function essaiSetStake(d,i,v){ essaiStakes[d][i]=Math.max(0,Math.round(+v||0));
  const tot=(essaiStakes[d]||[]).reduce((a,b)=>a+(+b||0),0), max=Math.floor(essaiCapital(d)*0.5), over=tot>max;
  const fx=(d===0)?ESSAI_D1:essaiFxD2(); const allMin=fx.every((f,i2)=>(+essaiStakes[d][i2]||0)>=1);
  const capOk=essaiCap[d]>=0, tgtOk=essaiCard[d]!=="tout"||essaiCardTgt[d]>=0, ok=allMin&&!over&&capOk&&tgtOk;
  const el=document.getElementById("essaist"); if(el){ el.textContent=tot; el.parentNode.className=over?'red':''; }
  const g=document.getElementById("essaigauge"); if(g){ g.querySelector("i").style.width=(max>0?Math.min(100,Math.round(tot/max*100)):0)+"%"; g.classList.toggle("over",over); }
  const b=document.getElementById("essaibetbtn"); if(b){ b.disabled=!ok; b.textContent= over? t("Mise trop élevée") : (!allMin? t("Mise de 1 € min. par pari") : (!capOk? t("Choisis ton Capitaine 👑") : (!tgtOk? t("Choisis la cible 🎯 du bonus") : t("Valider mes pronos →")))); } }
function essaiToggleSel(k){ const j=essaiSel.indexOf(k); if(j>=0) essaiSel.splice(j,1); else if(essaiSel.length<3) essaiSel.push(k); render(); }
function essaiFxD2(){ return essaiSel.map(k=>ESSAI_POOL[k]); }
// L'adversaire mise comme le joueur (même mise par match) → évite les nuls. Il a AUSSI un Capitaine
// (match essaiBotCap) doublé, pour illustrer que son net se lit comme le nôtre.
function essaiBotCap(d){ return d===0?2:0; }   // match du capitaine adverse (J1 : Nadal gagnant · J2 : 1er match)
function essaiBotNet(fx,stakes,capIdx){ if(capIdx==null) capIdx=-1; let n=0; fx.forEach((f,i)=>{ const st=(stakes&&(+stakes[i]))?+stakes[i]:ESSAI_STAKE; const win=f.botSel===f.res; let g=win?st*(oddOf(f,f.botSel)-1):-st; if(i===capIdx) g*=2; n+=g; }); return Math.round(n*100)/100; }
function essaiMeNet(d,fx){ const picks=essaiPicks[d]||[], stakes=essaiStakes[d]||[], cap=essaiCap[d], card=essaiCard[d], tgt=essaiCardTgt[d];
  let n=0; fx.forEach((f,i)=>{ if(picks[i]==null) return; const st=+stakes[i]||0; const win=picks[i]===f.res; const base= win? st*(oddOf(f,picks[i])-1) : -st;
    let g=base; if(card==="tout"&&i===tgt){ g= win? base*3 : base*2; } else if(i===cap){ g=base*2; } n+=g; });
  n=Math.round(n*100)/100; const bn=essaiBotNet(fx,stakes,essaiBotCap(d));
  if(card==="parachute"&&n<0) n=Math.round(n*0.7*100)/100;          // 30 % de la perte amortie
  if(card==="sangsue"&&bn>0) n=Math.round((n+0.15*bn)*100)/100;     // 15 % du bénéfice de Léa siphonné
  return n; }
function essaiDuel(d,fx){ const me=essaiMeNet(d,fx), bot=essaiBotNet(fx,essaiStakes[d]); const won=me>bot, tie=me===bot;
  const pts=tie?1:(won?(me>0?3:2):(me>0?1:0)), bpts=tie?1:(!won?(bot>0?3:2):(bot>0?1:0)); return {me,bot,won,tie,pts,bpts}; }
// Nets des 4 joueurs pour la journée d : toi (réel), ton adversaire du jour (réel), les 2 autres (fixes).
function essaiDayNets(d,fx){ const nets={me:essaiMeNet(d,fx)}; nets[essaiOpp(d).id]=essaiBotNet(fx,essaiStakes[d],essaiBotCap(d));
  const sh=ESSAI_SHADOW[d]; for(const k in sh) if(!(k in nets)) nets[k]=sh[k]; return nets; }
// Barème RÉEL (v2) : duel gagné 2 / nul 1 / perdu 0, +1 si net positif, +1 au ⭐ meilleur prono du jour.
function essaiDayPts(d,fx){ const nets=essaiDayNets(d,fx); const pairs=d===0?[["me","lea"],["marco","nina"]]:[["me","marco"],["lea","nina"]];

const LEAGUE_NAME_MAX=30;
async function createLeague(){
  if(busy||!AUTH)return;
  const def=t("Ligue de {a}",{a:AUTH.name});
  let nm=prompt(t("Donne un nom à ta ligue (tu en seras l'organisateur). {a} caractères max :",{a:LEAGUE_NAME_MAX}), def);
  if(nm===null) return;                                  // annulé
  nm=(nm||"").trim().replace(/\s+/g," ").slice(0,LEAGUE_NAME_MAX); if(!nm) nm=def;
  busy=true; showErr("");
  try{
    const code=genCode();
    const lg=await q(db.from("leagues").insert({code,name:nm,status:"lobby",num_participants:MAX_PLAYERS,num_days:0,gage:null}).select().single());
    const pl=await q(db.from("players").insert({league_id:lg.id,name:AUTH.name,emoji:AUTH.avatar||EMOJIS[0],is_organizer:true,join_order:0,user_id:AUTH.id}).select().single());
    openLeague(lg.id, pl.id, true); leagueCreatedModal(code);
  }catch(e){ showErr("Création : "+e.message); } busy=false;
}
async function joinLeague(code){
  if(busy||!AUTH)return; busy=true; showErr("");
  try{
    const found=await q(db.from("leagues").select("*").eq("code",code));
    const lg=Array.isArray(found)?found[0]:found;
    if(!lg){ showErr(t("Code de ligue introuvable — vérifie le code saisi.")); busy=false; return; }
    const ps=await q(db.from("players").select("*").eq("league_id",lg.id).order("join_order"));
    const mine=ps.find(p=>p.user_id===AUTH.id);
    if(mine){ openLeague(lg.id, mine.id); busy=false; return; } // déjà membre → on rouvre (reconnexion)
    if(lg.status!=="lobby"){ showErr("Cette ligue a déjà démarré, tu ne peux plus la rejoindre."); busy=false; return; }
    const humans=ps.filter(p=>!p.is_ai);
    if(humans.length>=lg.num_participants){ showErr("La ligue est complète."); busy=false; return; }
    const ord=humans.length;
    const pl=await q(db.from("players").insert({league_id:lg.id,name:AUTH.name,emoji:AUTH.avatar||EMOJIS[ord]||"🎮",join_order:ord,user_id:AUTH.id}).select().single());
    openLeague(lg.id, pl.id, true);
  }catch(e){ showErr("Impossible de rejoindre : "+e.message); } busy=false;
}

/* ============ GAME dispatch ============ */
function viewGame(){
  if(!L) return `<div class="box">Chargement…</div>`;
  if(L.status==="lobby") return viewLobby();
  if(L.status==="prep") return viewPrep();
  if(L.status==="starting") return `<div class="box" style="text-align:center"><div style="font-size:30px">🚀</div><b>Démarrage du championnat…</b><div class="mini muted" style="margin-top:6px">Attribution des bonus et lancement.</div></div>`;
  if(L.status==="resolving") return `<div class="box" style="text-align:center"><div style="font-size:30px">⚙️</div><b>Résolution de la journée…</b><div class="mini muted" style="margin-top:6px">Calcul des gains en cours.</div></div>`;
  // Ligue terminée : on montre D'ABORD le récap de la DERNIÈRE journée (si pas encore vu), puis le
  // classement final. Avant, on arrivait direct sur le classement final sans voir la dernière journée
  // (signalé par Hervé). « Continuer → » du récap acquitte (setSeen) et bascule vers viewEnd.
  if(L.status==="done"){ if(S.recap) return viewRecap(S.dispDay); return viewEnd(); }
  if(L.prep_summary && !prepSeen()) return viewPrepSummary();
  if(S.recap) return viewRecap(S.dispDay);
  return viewDay();
}
function prepSeen(){ return localStorage.getItem("pl_preps_"+S.leagueId)==="1"; }
function ackPrep(){ localStorage.setItem("pl_preps_"+S.leagueId,"1"); render(); }
function prepSuperlatives(s){
  const auction=s.auction||[]; const ps=(s.players||[]);
  if(ps.length<2 || !auction.length) return '';
  const nm=pid=>{const p=ps.find(x=>x.pid===pid)||{}; return (p.emoji?p.emoji+' ':'')+esc(p.name||'?');};
  const st={}; ps.forEach(p=>st[p.pid]={bids:0,total:0,won:0,maxBid:0,maxCard:null});
  auction.forEach(a=>{ (a.bids||[]).forEach(bd=>{ const x=st[bd.pid]; if(x&&bd.amt>0){ x.bids++; x.total+=bd.amt; if(bd.amt>x.maxBid){x.maxBid=bd.amt;x.maxCard=a.card;} } }); if(st[a.winner]) st[a.winner].won++; });
  const bidders=ps.filter(p=>st[p.pid].bids>0);
  if(bidders.length<2) return '';
  const best=(arr,fn)=>arr.slice().sort(fn)[0];
  // choix d'une formulation stable par ligue (varie d'une ligue à l'autre, fixe quand on rouvre les coulisses)
  const seed=k=>{ let h=0; const s=((L&&L.id)||'')+k; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h; };
  const pickV=(arr,k)=>arr[seed(k)%arr.length];
  const items=[];
  const strat=best(bidders,(a,b)=> st[b.pid].won-st[a.pid].won || (st[b.pid].won/st[b.pid].bids)-(st[a.pid].won/st[a.pid].bids));
  if(strat && st[strat.pid].won>0){ const N=nm(strat.pid), w=st[strat.pid].won, b=st[strat.pid].bids;
    items.push(pickV([
      t("🧠 <b>Le stratège :</b> {N} — a raflé <b>{w}</b> bonus sur {b} visé{s}. Chirurgical.",{N,w,b,s:b>1?'s':''}),
      t("🎯 <b>Le sniper des enchères :</b> {N} — {w} bonus décroché{w1} sur {b} tenté{s}. Redoutable.",{N,w,b,w1:w>1?'s':'',s:b>1?'s':''}),
      t("🧠 <b>Le cerveau :</b> {N} avait tout calculé — <b>{w}</b> bonus dans la poche. Personne n'a rien vu venir.",{N,w}),
      t("♟️ <b>Le tacticien :</b> {N} place ses pions et rafle <b>{w}</b> bonus. Échec et mat.",{N,w}),
      t("🎼 <b>Le maestro :</b> {N} a orchestré ses enchères — <b>{w}</b> bonus au tableau. Du grand art.",{N,w}),
      t("🕵️ <b>L'opportuniste :</b> {N} a flairé les bons coups : <b>{w}</b> bonus sur {b} tenté{s}.",{N,w,b,s:b>1?'s':''}),
      t("🎓 <b>Le calculateur :</b> {b} enchère{s}, <b>{w}</b> réussite{w1}. {N} a fait ses devoirs.",{N,w,b,s:b>1?'s':'',w1:w>1?'s':''}),
      t("🦈 <b>Le requin :</b> {N} a mordu <b>{w}</b> fois sur {b}. Les autres ont suivi le sang.",{N,w,b})
    ], strat.pid+'S')); }
  const poisse=best(bidders,(a,b)=> (st[b.pid].bids-st[b.pid].won)-(st[a.pid].bids-st[a.pid].won));
  if(poisse && (st[poisse.pid].bids-st[poisse.pid].won)>=1 && (!strat||poisse.pid!==strat.pid)){ const N=nm(poisse.pid), b=st[poisse.pid].bids, w=st[poisse.pid].won;
    items.push(pickV([
      t("😭 <b>La poisse :</b> {N} — a misé sur {b} bonus, repart avec <b>{w}</b>. Aïe aïe aïe.",{N,b,w}),
      t("🍀 <b>Pas de bol :</b> {N} a tenté {b} fois, remporté <b>{w}</b>. Ce n'était pas son jour.",{N,b,w}),
      t("😩 <b>Le malchanceux :</b> {b} enchères pour seulement <b>{w}</b> bonus. Dur dur, {N}.",{N,b,w}),
      t("🎭 <b>Le déçu du soir :</b> {N} visait gros ({b} bonus)… résultat : <b>{w}</b>. La vie est cruelle.",{N,b,w}),
      t("🌧️ <b>La guigne :</b> {N} — {b} tentatives, <b>{w}</b> bonus. Le ciel lui est tombé dessus.",{N,b,w}),
      t("👻 <b>Le fantôme des enchères :</b> {N} était partout — {b} mises — et repart avec <b>{w}</b>.",{N,b,w}),
      t("🙃 <b>Le mal inspiré :</b> {b} enchères, <b>{w}</b> bonus. {N} révisera ses calculs.",{N,b,w}),
      t("🥀 <b>Le perdant magnifique :</b> {N} a tout donné sur {b} bonus. Butin : <b>{w}</b>.",{N,b,w})
    ], poisse.pid+'P')); }
  const radin=best(bidders,(a,b)=> st[a.pid].total-st[b.pid].total);
  if(radin){ const N=nm(radin.pid), tot=st[radin.pid].total;
    items.push(pickV([
      t("🤏 <b>Le radin :</b> {N} — <b>{tot}€</b> lâchés en tout, pas un centime de plus.",{N,tot}),
      t("💰 <b>L'économe :</b> {N} a serré les cordons — <b>{tot}€</b> dépensés, point final.",{N,tot}),
      t("🐭 <b>Le prudent :</b> <b>{tot}€</b> misés par {N}. On ne se refait pas.",{N,tot}),
      t("🧊 <b>Le pingre :</b> {N} garde son magot — à peine <b>{tot}€</b> de mises.",{N,tot}),
      t("🔒 <b>Le coffre-fort :</b> {N} n'a lâché que <b>{tot}€</b>. Bien joué… ou pas.",{N,tot}),
      t("🐢 <b>Le frileux :</b> <b>{tot}€</b> au total pour {N}. La prudence a un prix.",{N,tot}),
      t("🧮 <b>Le comptable :</b> {N} a compté chaque euro — <b>{tot}€</b>, pas un de plus.",{N,tot}),
      t("🪙 <b>Le grippe-sou :</b> <b>{tot}€</b> de mises pour {N}. Le magot est intact.",{N,tot})
    ], radin.pid+'R')); }
  const fou=best(bidders,(a,b)=> st[b.pid].maxBid-st[a.pid].maxBid);
  if(fou && st[fou.pid].maxBid>0 && (!radin||fou.pid!==radin.pid)){ const N=nm(fou.pid), mb=st[fou.pid].maxBid, cl=CARDS[st[fou.pid].maxCard]?CARDS[st[fou.pid].maxCard].e+' '+esc(t(CARDS[st[fou.pid].maxCard].n)):t("un bonus");
    items.push(pickV([
      t("🤪 <b>Le plus fou :</b> {N} — <b>{mb}€</b> d'un coup sur {cl}. Le poker, ça le connaît.",{N,mb,cl}),
      t("🔥 <b>Le flambeur :</b> {N} a balancé <b>{mb}€</b> sur {cl}. Tout ou rien !",{N,mb,cl}),
      t("🎰 <b>Le parieur fou :</b> <b>{mb}€</b> d'un seul coup sur {cl} pour {N}. Respect (ou pas).",{N,mb,cl}),
      t("💸 <b>Le mégalo :</b> {N} claque <b>{mb}€</b> sur {cl}. Y'a pas de petites économies… sauf là.",{N,mb,cl}),
      t("🚀 <b>Le kamikaze :</b> {N} envoie <b>{mb}€</b> sur {cl}. Sans trembler.",{N,mb,cl}),
      t("🎪 <b>Le showman :</b> <b>{mb}€</b> sur {cl} — {N} aime le spectacle.",{N,mb,cl}),
      t("💥 <b>Le va-tout :</b> {N} pose <b>{mb}€</b> sur {cl}. On respire fort.",{N,mb,cl}),
      t("🐋 <b>La baleine :</b> {N} — <b>{mb}€</b> sur {cl}. Le marché a tremblé.",{N,mb,cl})
    ], fou.pid+'F')); }
  // Joueur(s) n'ayant misé sur AUCUN bonus (demandé par Hervé). Formulation neutre (ni « il » ni « elle »).
  const zero=ps.filter(p=>st[p.pid].bids===0);
  if(zero.length){ const noms=zero.map(p=>nm(p.pid));
    const N=(noms.length===1)?noms[0]:(noms.slice(0,-1).join(', ')+t(" et ")+noms[noms.length-1]);
    items.push(pickV((zero.length===1)?[
      t("🙈 <b>L'abstentionniste :</b> {N} n'a misé sur aucun bonus — pari sur le talent pur !",{N}),
      t("🧘 <b>Le zen :</b> {N} a snobé les enchères. Zéro bonus, 100 € intacts.",{N}),
      t("🎭 <b>Le puriste :</b> pas un euro de bonus pour {N} — rien que du flair.",{N}),
      t("🪙 <b>Le thésauriseur :</b> {N} garde ses 100 € : aucun bonus acheté.",{N})
    ]:[
      t("🙈 <b>Les abstentionnistes :</b> {N} n'ont misé sur aucun bonus — 100 € intacts pour chacun.",{N}),
      t("🧘 <b>Les zen :</b> {N} ont snobé les enchères. Pari sur le talent pur !",{N}),
      t("🪙 <b>Les prudents :</b> {N} gardent leurs 100 € — aucun bonus acheté.",{N})
    ],'Z'+zero.length)); }
  if(!items.length) return '';
  return `<h2>${t("🎭 Le mot des coulisses")}</h2><div class="box"><div class="mini" style="line-height:1.9">${items.join('<br>')}</div></div>`;
}
// Un tableau « si X gagne → tel gage » (ou « si X finit dernier → telle récompense »).
// `r` = true → la RÉCOMPENSE (bloc R) ; false → le bloc principal (le gage en mode "both").
function enjeuTableHTML(r){
  const s=L.prep_summary||{}; const both=(s.enjeu==="both");
  const rew = r ? true : (both ? false : (s.enjeu==="reward"));
  const opts  = (both&&r) ? (s.optionsR||[]) : (s.options||[]);
  const votes = (both&&r) ? (s.votesR||{})   : (s.voteMap||{});
  const custs = (both&&r) ? (s.customsR||{}) : (s.customs||{});
  const hs=(s.players||[]).filter(p=>!p.is_ai);
  const gOf=p=>{ const v=votes[p.pid]; if(v==="c") return {txt:custs[p.pid]||null, perso:true};
    const o=opts[v]; return {txt:o?((o.t)||o):null, perso:false}; };
  // NB : le texte perso d'un joueur ne passe PAS par t() — c'est du texte libre, pas une clé de traduction.
  const lbl=g=>`${g.txt?'<b>'+esc(g.perso?g.txt:t(g.txt))+'</b>':'<span class="muted">'+t("(pas de vote)")+'</span>'}${g.perso?' <span class="tag">'+t("perso")+'</span>':''}`;
  // Personne n'a voté à temps (ni gage, ni récompense selon le bloc) → pas d'enjeu : on ne promet pas
  // un gage/une récompense qui n'existent pas (signalé par Hervé, ligue 33K2E).
  const anyVote = hs.some(p=>gOf(p).txt!=null);
  if(!anyVote) return `<div class="box"><div class="mini muted">${rew
    ? t("🏆 <b>Récompense :</b> personne n'a voté de récompense à temps — il n'y en aura pas cette saison. On joue pour la gloire du classement !")
    : t("🎭 <b>Gage :</b> personne n'a voté de gage à temps — pas de gage cette saison. On joue pour l'honneur… et la <b>première place</b> !")}</div></div>`;
  // Tableau compact QUEL QUE SOIT l'effectif (choix d'Hervé après l'avoir vu à 8 joueurs). Il y
  // avait auparavant deux présentations — blocs empilés jusqu'à 5 joueurs, tableau au-delà — mais
  // le tableau se lit mieux dans tous les cas, et une seule mise en page vaut mieux que deux à
  // maintenir : la variante « blocs » n'était de fait jamais relue ni testée.
  const corps = `<div style="overflow-x:auto;margin-top:8px"><table>
        <tr><th>${rew?t("Si… finit dernier"):t("Si… gagne")}</th><th>${rew?t("Récompense qu'il offre au champion"):t("Gage infligé au dernier")}</th></tr>
        ${hs.map(p=>`<tr><td class="mini">${p.emoji} ${esc(p.name)}</td><td class="mini">${lbl(gOf(p))}</td></tr>`).join("")}</table></div>`;
  return `<div class="box"><div class="mini muted">${rew?t("La <b>récompense</b> remise au champion est celle votée par le <b>dernier</b> 🥄 — celui qui choisit n'est jamais celui qui reçoit. Selon qui finit dernier :"):t("Le <b>gage</b> infligé au dernier est celui voté par le <b>vainqueur</b> 🏆 — celui qui choisit n'est jamais celui qui subit. Selon qui gagne :")}</div>
     ${corps}
     <div class="mini" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">${rew?t("🏆 <b>Motivation express :</b> le champion repart avec la récompense votée par le dernier — une excellente raison de viser la <b>première</b> place !"):t("😅 Vise la victoire… ou prépare-toi à faire le gage du gagnant si tu finis dernier !")}</div></div>`;
}
function prepSummaryBody(){
  const s=L.prep_summary||{}; const both=(s.enjeu==="both");
  const pName=pid=>{const p=(s.players||[]).find(x=>x.pid===pid)||{};return (p.emoji?p.emoji+' ':'')+esc(p.name||'?');};
  // Règle du pôle opposé : même présentation « si X … → … » dans tous les modes. En mode "both" on
  // affiche les DEUX tableaux (gage puis récompense). (L'ancien histogramme des votes du mode
  // récompense reste retiré : la majorité ne décide plus, l'afficher laisserait croire le contraire.)
  return `${isSolo()?'':`<h2>${t("🎭 L'enjeu du tournoi")}</h2>
   ${enjeuTableHTML(false)}${both?enjeuTableHTML(true):''}`}
   <h2>${t("🃏 Enchères — bonus attribués")}</h2>
   ${(s.auction||[]).length? (s.auction||[]).map(a=>`<div class="box"><div class="row"><div class="row" style="gap:10px"><span class="sport" title="${esc(t(CARDS[a.card].d))}">${CARDS[a.card].e}</span>
        <div><b title="${esc(t(CARDS[a.card].d))}">${esc(t(CARDS[a.card].n))}</b><div class="mini muted">${esc(t(CARDS[a.card].d))}</div></div></div>
        <div style="text-align:right;flex:0 0 auto"><div class="mini">→ <b>${pName(a.winner)}</b></div><div class="mini gold">${a.amount} €</div></div></div>
      <div class="mini muted" style="margin-top:7px;border-top:1px solid var(--border);padding-top:6px">${t("Enchères :")} ${a.bids.map(bd=>`${pName(bd.pid)} <b>${bd.amt}€</b> ${bd.pid===a.winner?(t("✅ gagnée")+((a.bids.length>1&&a.bids[0].amt===a.bids[1].amt)?t(" ⚡ le + rapide"):'')):t("↩︎ remboursée")}`).join(' &nbsp;·&nbsp; ')}${(a.bids.length>1&&a.bids[0].amt===a.bids[1].amt)?`<br><span class="gold">${t("🏁 Égalité à {a}€ → départagé par la rapidité : le premier à avoir misé ce montant l'emporte.",{a:a.amount})}</span>`:''}</div></div>`).join("")
     : `<div class="box mini muted">${t("Personne n'a misé sur les bonus — tout le monde démarre à 100 €.")}</div>`}
   <h2>${t("💰 Capital de départ")}</h2>
   <div class="box" style="padding:4px 10px;overflow-x:auto"><table><tr><th>${t("Joueur")}</th><th style="text-align:right">${t("Dépensé")}</th><th style="text-align:right">${t("Capital")}</th><th>${t("Bonus")}</th></tr>
     ${(s.players||[]).map(p=>`<tr><td>${esc(p.emoji||'')} ${esc(p.name)}${p.pid===S.myId?' <span class="tag">'+t("(toi)")+'</span>':''}${p.is_ai?' <span class="tag">'+t("IA")+'</span>':''}</td>
        <td class="num muted">${p.spent}€</td><td class="num"><b>${eur(p.capital)}€</b></td>
        <td class="mini">${(p.hand||[]).length?(p.hand||[]).map(id=>`<span class="clik" onclick="showCardInfo('${id}')" title="${esc(t(CARDS[id].n))}">${CARDS[id].e}</span>`).join(' '):'–'}</td></tr>`).join("")}</table></div>
   ${prepSuperlatives(s)}`;
}

/* ============ SIGNALEMENT DE BUG ============
 * Le testeur copie un rapport et le colle où il veut (WhatsApp, SMS, mail). Choix d'Hervé
 * (2026-07-16) : PAS de mailto: — une adresse de destination serait écrite en dur dans index.html,
 * fichier PUBLIC sur GitHub → adresse perso exposée aux robots à spam. Et pas de capture d'écran
 * non plus : sur mobile c'est pénible, et le CONTEXTE TECHNIQUE vaut mieux qu'une image — c'est lui
 * qui permet d'aller lire la donnée réelle en base.
 */
// Le contexte technique de l'écran courant. C'est ça, la valeur du bouton.
function bugContext(kind){
  const idea=(kind==="idea");
  const l=[];
  l.push(idea ? "--- The Maestro League — idée / avis ---" : "--- The Maestro League — rapport de bug ---");
  l.push("Version : "+APP_VERSION);
  l.push("Quand   : "+new Date().toISOString());
  if(AUTH) l.push("Joueur  : "+(AUTH.name||"?")+"  (uid "+String(AUTH.id||"?").slice(0,8)+"…)");
  l.push("Écran   : "+(S.view||"?")+(S.editingBet?" (édition des pronos)":"")+(S.recap?" (récap)":""));
  // --- Diagnostic de MISE EN PAGE ---------------------------------------------------------
  // Un débordement horizontal signalé sur iPhone n'a jamais pu être reproduit sous Chrome. Sans
  // mesure, « ça déborde » n'est pas exploitable : ces lignes donnent la largeur réelle, le ZOOM
  // Safari (un pincement suffit à créer un défilement latéral) et l'élément fautif s'il y en a un.
  try{
    const de=document.documentElement;
    l.push("Fenêtre : "+window.innerWidth+"×"+window.innerHeight+" css · dpr "+(window.devicePixelRatio||1));
    const vv=window.visualViewport;
    if(vv) l.push("Zoom    : ×"+(Math.round((vv.scale||1)*100)/100)+" · zone visible "+Math.round(vv.width)+"px"+((vv.scale||1)>1.01?"  ⚠️ page zoomée":""));
    const trop=de.scrollWidth-de.clientWidth;
    l.push("Largeur : contenu "+de.scrollWidth+"px / fenêtre "+de.clientWidth+"px"+(trop>0?("  ⚠️ déborde de "+trop+"px"):"  (ok)"));
    if(trop>0){
      let pire=null, px=0;
      document.querySelectorAll(".app *").forEach(el=>{ const r=el.getBoundingClientRect();
        if(r.right>de.clientWidth+0.5 && r.right>px){ px=r.right; pire=el; } });
      if(pire) l.push("Coupable: <"+pire.tagName.toLowerCase()+" class=\""+(pire.className||"—")+"\"> va jusqu'à "+Math.round(px)+"px · « "+(pire.textContent||"").trim().slice(0,40).replace(/\s+/g," ")+" »");
    }
  }catch(e){ l.push("Largeur : (mesure impossible : "+e.message+")"); }
  // ---------------------------------------------------------------------------------------
  if(L){
    l.push("Ligue   : "+(L.name||"?")+"  · code "+(L.code||"?"));
    l.push("Statut  : "+(L.status||"?")+"  · journée "+((L.current_day|0)+1)+"/"+(L.num_days||"?"));
    l.push("Options : mode="+getMode()+" · enjeu="+getEnjeu()+" · données="+(L.data_mode||"sim")+" · formule="+(L.formula||"classique"));
    if(S.myId) l.push("player_id : "+S.myId);
    const d=(typeof myDuel==="function")?myDuel():null;

function aiPrep(nDays, mode, optCount, optCountR){ const ids=modeCards(mode||"complet").slice(); for(let i=ids.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ids[i],ids[j]]=[ids[j],ids[i]];}

  // la vente aux enchères paraît morte (avant : souvent 1 seul petit bonus → IA passives, signalé par
  // Hervé). ~15 % d'IA « prudentes » ne misent presque rien, pour garder de la variété.
  const maxCards=Math.max(1,nDays);
  const frileux=Math.random()<0.12;                                   // minorité qui thésaurise
  const nb=Math.min(maxCards, ids.length, frileux?(1+Math.floor(Math.random()*2)) : (3+Math.floor(Math.random()*4))); // frileux 1-2, sinon 3-6
  const budget=Math.round(frileux?rnd(6,16):rnd(26,SHOP_CAP));        // budget total engagé

  return {vote:Math.floor(Math.random()*(optCount||4)), voteR:Math.floor(Math.random()*(optCountR||optCount||4)), bids}; }

async function resolvePrep(){ if(resolving)return; resolving=true; showErr("");
  try{
    // verrou atomique : un seul client résout la préparation (évite double enchère)
    const claim=await q(db.from("leagues").update({status:"starting"}).eq("id",L.id).eq("status","prep").select("*"));
    if(!claim||!claim.length){ resolving=false; await refresh(); return; }
    const fresh=claim[0];
    let st; try{st=JSON.parse(fresh.gage);}catch(e){st=null;} const options=(st&&st.options)||[]; const votes=(st&&st.votes)||{}; const voteTs=(st&&st.voteTs)||{}; const bids=(st&&st.bids)||{}; const bidTs=(st&&st.bidTs)||{}; const enjeu=(st&&st.enjeu)||"gage"; const both=(enjeu==="both"); const POOL=(enjeu==="reward")?REWARDS:GAGES; const customs=(st&&st.customs)||{};

    let gage="", winIdx=-1;

      const tied=counts.map((c,i)=>c===mx?i:-1).filter(i=>i>=0); let bestTs=Infinity;
      for(const i of tied){ const voters=Object.keys(votes).filter(pid=>votes[pid]===i); const t=voters.length?Math.min(...voters.map(pid=>voteTs[pid]!=null?voteTs[pid]:Infinity)):Infinity; if(t<bestTs){bestTs=t;winIdx=i;} }
      if(winIdx<0) winIdx=(tied[0]!=null?tied[0]:0); const w=options[winIdx]; gage=(w&&w.t)||w||pick(POOL).t; }

      if(!cand.length) continue; cand.sort((a,b)=> (b.amt-a.amt) || (a.ts-b.ts)); const wpid=cand[0].pid; won[wpid].push(cardId); paid[wpid]+=cand[0].amt;

    // récap de préparation (affiché avant le coup d'envoi)
    const summary={ gage, enjeu, gageDesc:(options[winIdx]&&options[winIdx].d)||gageDescOf(gage),

      gageVotes: options.map((o,i)=>({t:(o&&o.t)||o, d:(o&&o.d)||'', count:Object.values(votes).filter(v=>v===i).length, win:i===winIdx})),
      auction,
      players: ps.map(p=>({pid:p.id,name:p.name,emoji:p.emoji,is_ai:!!p.is_ai,spent:paid[p.id],capital:Math.max(0,100-paid[p.id]),hand:won[p.id]})) };
    // Bloc R : ajouté UNIQUEMENT en mode "both" → une ligue simple garde exactement l'ancienne forme.
    if(both){ summary.optionsR=optionsR.map(o=>({t:(o&&o.t)||o, d:(o&&o.d)||''})); summary.votesR=votesR; summary.customsR=customsR; }
    await q(db.from("leagues").update({status:"running",gage,current_day:0,prep_summary:summary}).eq("id",L.id));
    try{ await q(db.from("leagues").update({day_started_at:new Date().toISOString()}).eq("id",L.id)); }catch(e){} // début J1 (défensif)
    resolving=false; setSeen(0); localStorage.removeItem("pl_preps_"+L.id); await refresh(); infoWin(t("🚀 Le championnat est lancé ! Bonne chance."),"🚀");
  }catch(e){ showErr("Démarrage : "+e.message); resolving=false; } }

/* --- betting --- */
let bet={picks:null,captain:-1}, myCard=null;
// Règle A : la perte maximale possible du jour ne peut pas dépasser le capital (→ jamais de capital négatif).
// Multiplicateur de PERTE par match : Capitaine ×2 · Joker/Tout ou rien ×2 · Assurance ×0 (remboursée) · sinon ×1.
// (Capitaine et bonus ciblé sont toujours sur des matchs différents, donc pas de cumul ×4.)
function lossMult(i,captainIdx,card){ if(i===captainIdx) return 2;
  if(card&&card.target===i){ if(card.id==="assurance") return 0; if(card.id==="tout"||card.id==="joker") return 2; } return 1; }
function worstLoss(picks,captainIdx,card){ return (picks||[]).reduce((s,b,i)=>s+(+b.stake||0)*lossMult(i,captainIdx,card),0); }
function viewBet(d,dayLbl,opp,iAmHome){
  const fx=d.fixtures;
  if(!bet.picks || bet.picks.length!==fx.length){ bet={picks:fx.map(()=>({sel:"1",stake:0})),captain:-1}; myCard=null; }
  const meP=me(); const invest=myCard&&myCard.id==="invest"; const cap=meP.capital, max=Math.floor(cap*stakeCapOf(myCard)*100)/100;
  const tot=bet.picks.reduce((a,b)=>a+(+b.stake||0),0); const pct=Math.min(100,max>0?tot/max*100:0); const over=tot>max+0.001;
  const targetCard = myCard && CARDS[myCard.id] && CARDS[myCard.id].t;
  const twoCard = myCard && CARDS[myCard.id] && CARDS[myCard.id].two; // Coup Double : 2 cibles
  const oppCard = myCard && CARDS[myCard.id] && CARDS[myCard.id].oppT; // vise le pari ADVERSE → aucun cumul avec ton Capitaine
  const needTarget = targetCard && (myCard.target==null || (twoCard && myCard.target2==null));
  const needSel2 = myCard && myCard.id==="chance" && myCard.target!=null && !myCard.sel2;
  const conflict = targetCard && !twoCard && !oppCard && myCard.target!=null && myCard.target===bet.captain; // Coup Double / cartes anti-adversaire : Capitaine autorisé
  const allMin = bet.picks.every(b=>(+b.stake||0)>=1);
  const risky = bet.captain>=0 && worstLoss(bet.picks,bet.captain,myCard) > cap+0.001; // règle A
  const ok = allMin && !over && !risky && bet.captain>=0 && !needTarget && !needSel2 && !conflict;

function setSel(i,v){ bet.picks[i].sel=v; if(myCard&&myCard.id==="chance"&&myCard.target===i&&myCard.sel2===v) myCard.sel2=null; render(); }

  const tot=bet.picks.reduce((a,b)=>a+(+b.stake||0),0); const totEl=$("tot"); if(totEl){totEl.textContent=eur(tot); // ⚠️ ne pas nommer cette variable `t` : ça masquerait la fonction de traduction t() utilisée plus bas

  const needSel2=myCard&&myCard.id==="chance"&&myCard.target!=null&&!myCard.sel2;
  const conflict=targetCard&&!twoCard&&!oppCard&&myCard.target!=null&&myCard.target===bet.captain;
  const btn=$("betSubmit");
  if(btn){ const over=tot>max+0.001; const allMin=bet.picks.every(b=>(+b.stake||0)>=1); const risky=bet.captain>=0&&worstLoss(bet.picks,bet.captain,myCard)>(meP.capital)+0.001; const ok=allMin&&!over&&!risky&&bet.captain>=0&&!needTarget&&!needSel2&&!conflict; btn.disabled=!ok;

function setCap(i){ const C=(myCard&&CARDS[myCard.id])||{}; const on=bet.captain!==i;
  if(on && myCard && C.t && !C.two && !C.oppT && myCard.target===i){ infoWin(t("Capitaine et bonus doivent être sur des matchs différents."),"⚠️"); return; }

function setTarget(i){ if(!myCard) return;

    if(myCard.target===i){ myCard.target=(myCard.target2!=null?myCard.target2:null); myCard.target2=null; }
    else if(myCard.target2===i){ myCard.target2=null; }

/* ============ RESOLUTION (cards engine) ============ */
function aiPlay(cap,fx,hand,day,numDays){
  const budget=cap*0.5*rnd(0.6,1); const ws=fx.map(()=>rnd(0.5,1.5)); const sw=ws.reduce((a,b)=>a+b,0);
  const picks=fx.map((f,i)=>{ const outs=f.draw?[["1",f.oh],["N",f.od],["2",f.oa]]:[["1",f.oh],["2",f.oa]]; outs.sort((a,b)=>a[1]-b[1]);
    // Souvent le favori (~70 %), mais pas toujours : sinon un OUTSIDER explicite (evite le « toujours favori »).
    const nonFav=outs.slice(1); const sel=(Math.random()<0.7||!nonFav.length)?outs[0][0]:pick(nonFav)[0]; return {sel,stake:Math.round(budget*ws[i]/sw)}; });
  const captain=Math.floor(Math.random()*fx.length);
  // Rythme des bonus : proba de jouer une carte ce jour ≈ cartes en main / journées restantes.
  // Une proba fixe (0,4) vidait la main dès le début (signalé par Hervé) : un lot de cartes partait
  // sur les premières journées. Ici l'usage s'étale — 3 cartes sur 14 journées ≈ une toutes les ~5.
  // À la DERNIÈRE journée, 🥷 Voleur / 🧬 Clone sont inutiles (aucune journée suivante pour jouer la prise) :
  // l'IA ne les joue pas — sinon elle « vole » une carte qu'elle ne pourra jamais utiliser (signalé par Hervé).
  const isLast=(day||0)>=((numDays||1)-1);
  const playable=isLast? (hand||[]).filter(id=>id!=="voleur"&&id!=="clone") : (hand||[]);
  const nCards=playable.length;
  const remain=Math.max(1,((numDays||1)-(day||0)));   // journée en cours incluse (day est 0-indexé)
  const pPlay=nCards>0?Math.min(0.9,nCards/remain):0;  // plafond 0,9 : garde un grain d'aléa
  let card=null; if(nCards&&Math.random()<pPlay){ const id=pick(playable); card={id,target:CARDS[id].t?Math.floor(Math.random()*fx.length):null};
    if(card.id==="chance"){ const drawIdx=fx.map((f,idx)=>f.draw?idx:-1).filter(x=>x>=0); if(drawIdx.length){ card.target=pick(drawIdx); const opts=["1","N","2"].filter(v=>v!==picks[card.target].sel); card.sel2=pick(opts); } else { card=null; } }
    else if(card.id==="dbl"){ const idxs=fx.map((f,idx)=>idx); for(let k=idxs.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[idxs[k],idxs[j]]=[idxs[j],idxs[k]];} if(idxs.length>=2){card.target=idxs[0];card.target2=idxs[1];} else card=null; } }
  return {picks,captain,card};
}
// Moteur pur : calcule les gains nets du jour à partir des plays (déterministe via pd.rnd).
function runEngine(pdIn, capStart, dz, N){
  const PD=JSON.parse(JSON.stringify(pdIn));
  // Phase 0 : 🥷 Voleur puis 🧬 Clone — les deux seules cartes qui agissent sur la CARTE adverse
  // et non sur ses paris. L'ordre est imposé : le vol fait DISPARAÎTRE la carte, le clone ne lit
  // ensuite que ce qui a survécu (il se retrouve donc face à rien si sa carte source a été volée).
  const stolen={}, cloned={};
  for(const pid in PD){ const pd=PD[pid];
    if(!(pd.card&&pd.card.id==="voleur")) continue;
    const opp=PD[pd.oppId]; if(!(opp&&opp.card&&opp.card.id)) continue;
    // Carte visant un match ANNULÉ : la règle existante la REND à son propriétaire (elle reste en
    // main). On ne peut donc pas la voler, sinon elle existerait en double — dans sa main ET dans
    // celle du voleur — ce qui casserait l'unicité d'un bonus dans la ligue.
    const ofx=opp.fx||[]; const annule=i=>(i!=null&&ofx[i]&&ofx[i].canceled);
    if(annule(opp.card.target)||annule(opp.card.target2)) continue;
    stolen[pid]=opp.card.id; opp.card=null; }
  for(const pid in PD){ const pd=PD[pid];
    if(!(pd.card&&pd.card.id==="clone")) continue;
    const src=PD[pd.oppId]&&PD[pd.oppId].card;
    // Un clone ne copie jamais un vol (règle : sinon aller-retour de cartes illisible au récap).
    // Ni un clone — impossible de toute façon, chaque bonus étant UNIQUE dans une ligue : filet.
    if(src&&src.id&&src.id!=="voleur"&&src.id!=="clone"){ const {impact,flip,...c}=src; pd.card={...c}; cloned[pid]=src.id; }
    // sinon : clone gâché, sa carte reste "clone" — aucune phase ne réagit à cet id.
  }
  // Phase 1 : Chérie c'est cadeau (inverse le pari adverse du match CIBLÉ)
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"&&pd.card.target!=null){ const opp=PD[pd.oppId]; const i=pd.card.target;
    if(opp&&opp.picks[i]){ if(opp.picks[i].sel==="1")opp.picks[i].sel="2"; else if(opp.picks[i].sel==="2")opp.picks[i].sel="1"; } } }
  // Phase 2 : règlement pari par pari
  const G={};
  for(const pid in PD){ const pd=PD[pid]; const perBet=[]; let net=0,bestOdd=0;
    pd.picks.forEach((b,i)=>{ const f=pd.fx[i]; const cc=pd.card;
      // Match ANNULÉ : mise rendue → gain 0, pas de perte, aucun effet de carte ni de Capitaine.
      // On empile quand même une entrée pour garder l'alignement des index (Coup Double, Miroir…).
      if(f&&f.canceled){ perBet.push({gain:0,win:false,odd:1,canceled:true}); return; }
      const isDC=cc&&cc.id==="chance"&&cc.target===i&&cc.sel2;
      const win = isDC ? (f.res===b.sel||f.res===cc.sel2) : (b.sel===f.res);
      const odd = isDC ? dcWinOdd(f,b.sel,cc.sel2) : oddOf(f,b.sel);
      let g=win?(+b.stake)*(odd-1):-(+b.stake); if(i===pd.captain) g*=2;
      if(cc&&cc.target===i){ if(cc.id==="double"&&win)g*=2; if(cc.id==="tout")g*=(win?3:2); if(cc.id==="assurance"&&!win)g=0; if(cc.id==="joker")g*=2; }
      if(win&&odd>bestOdd) bestOdd=odd; perBet.push({gain:g,win,odd}); net+=g; });
    G[pid]={perBet,net,bestOdd,bonus:0}; }
  // Phase 2b : Coup Double — combiné GRATUIT et SANS RISQUE sur 2 matchs (Capitaine autorisé). Bonus purement additif :
  // si les 2 pronos passent, on ajoute (mise moyenne × DBL_FACTOR) × (cote combinée − 1). Sinon rien. Les 2 matchs gardent leur règlement individuel normal.
  for(const pid in PD){ const pd=PD[pid]; const c=pd.card;
    if(c&&c.id==="dbl"&&c.target!=null&&c.target2!=null&&c.target!==c.target2){ const g=G[pid]; const bi=g.perBet[c.target], bj=g.perBet[c.target2];
      if(bi&&bj&&bi.win&&bj.win){ const sI=+pd.picks[c.target].stake||0, sJ=+pd.picks[c.target2].stake||0; const sAvg=(sI+sJ)/2*DBL_FACTOR; const O=bi.odd*bj.odd;
        g.bonus += sAvg*(O-1); if(O>g.bestOdd) g.bestOdd=O; } } }
  // Phase 3 : Dans ta face puis Miroir
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="face"&&pd.card.target!=null){ const opp=G[pd.oppId];
    if(opp && opp.perBet[pd.card.target]){ const b=opp.perBet[pd.card.target]; if(b.win && b.gain>0){ const cut=b.gain/2; b.gain-=cut; opp.net-=cut; } } } }
  for(const d of dz){ const a=d.home_id,b=d.away_id; if(!PD[a]||!PD[b])continue; const useM=(PD[a].card&&PD[a].card.id==="miroir")||(PD[b].card&&PD[b].card.id==="miroir");
    if(useM){ const best=g=>{let bi=-1,bv=0; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); return {bi,bv};};
      const ba=best(G[a]), bb=best(G[b]);
      // GARDE-FOU : l'échange n'a de sens que si les DEUX joueurs ont un pari gagnant.
      // Sinon (adversaire absent, ou qui rate TOUS ses pronos) il n'existe aucune case où
      // déposer le gain de l'autre : l'ancien code appliquait quand même le `-va` au joueur
      // et sautait le `+va` de l'adversaire (bi=-1) → le joueur perdait son meilleur pari et
      // l'argent s'ÉVAPORAIT au lieu d'être échangé. Mesuré : −24 € face à un absent.
      // Désormais : carte gâchée mais inoffensive, comme les autres cartes anti-adversaire.
      // Le pari du joueur reste entier : « mon adversaire va-t-il gagner plus que moi ? »
      if(ba.bi>=0 && bb.bi>=0){ const va=ba.bv, vb=bb.bv;
        G[a].perBet[ba.bi].gain+=(vb-va); G[a].net+=(vb-va);
        G[b].perBet[bb.bi].gain+=(va-vb); G[b].net+=(va-vb); } } }
  // Phase 4 : Sniper, Roi de la cote
  for(const pid in PD){ const pd=PD[pid]; const g=G[pid];
    if(pd.card&&pd.card.id==="sniper"&&pd.card.target!=null){ let bi=-1,bv=-1e9; g.perBet.forEach((x,i)=>{if(x.gain>bv){bv=x.gain;bi=i;}}); if(bi===pd.card.target&&g.perBet[bi].gain>0) g.bonus+=capStart[pid]*0.10; }
    if(pd.card&&pd.card.id==="roi"){ if(g.perBet.some(x=>x.win&&x.odd>=2.0)) g.bonus+=capStart[pid]*0.10; } }
  // Phase 5 : Gourmand, Sangsue, Serge Benamou
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="gourmand"){ const opp=G[pd.oppId]; if(opp){ const on=opp.net+opp.bonus; if(on>0) G[pid].bonus+=0.2*on; } } }
  // 🩸 Sangsue — les DEUX ponctions se calculent sur les nets de DÉPART, puis s'appliquent ensemble.
  // Deux Sangsue peuvent désormais se croiser (via 🧬 Clone). En siphonnant au fil de la boucle, le
  // second prenait 15 % d'un net déjà amputé ET GONFLÉ du butin du premier — l'argent volé était volé
  // une seconde fois — et le résultat dépendait de l'ordre des clés de l'objet, un hasard technique :
  // deux joueurs à +100 € finissaient 97,75 / 102,25 selon qui passait en premier, au lieu de 100/100.
  const leech=[];
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="sangsue"){ const opp=G[pd.oppId];
    if(opp){ const on=opp.net+opp.bonus; if(on>0) leech.push({pid, oppId:pd.oppId, amt:0.15*on}); } } }
  leech.forEach(x=>{ G[x.pid].bonus+=x.amt; G[x.oppId].bonus-=x.amt; });
  // Serge Benamou : si le joueur qui l'a jouée finit dans le vert, il partage 10 % de SON net avec tous les autres.
  // Phase 6 : Parachute (amortit 30 % de la perte nette du jour)
  for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="parachute"){ const cur=G[pid].net+G[pid].bonus; if(cur<0) G[pid].bonus += (-0.3*cur); } }
  const dayNet={},dayBest={},dayWins={}; for(const pid in G){ dayNet[pid]=Math.round((G[pid].net+G[pid].bonus)*100)/100; dayBest[pid]=G[pid].bestOdd; dayWins[pid]=G[pid].perBet.filter(x=>x.win).length; }
  return {dayNet,dayBest,dayWins,stolen,cloned};
}
async function resolveDay(){
  if(resolving)return; resolving=true; showErr("");
  try{
    const D=L.current_day;
    // verrou atomique : un seul client résout la journée (auto-avancement)
    const claim=await q(db.from("leagues").update({status:"resolving"}).eq("id",L.id).eq("status","running").eq("current_day",D).select("*"));
    if(!claim||!claim.length){ resolving=false; await refresh(); return; }
    const fresh=claim[0];
    const ps=await q(db.from("players").select("*").eq("league_id",L.id).order("join_order"));
    const dz=await q(db.from("duels").select("*").eq("league_id",L.id).eq("day",D));
    const bz=await q(db.from("bets").select("*").eq("league_id",L.id).eq("day",D));
    const N=ps.length; const pmap={}; ps.forEach(p=>pmap[p.id]=p);
    const capStart={}; ps.forEach(p=>capStart[p.id]=p.capital);
    const PD={}; const aiInserts=[]; const forgot=new Set();
    for(const d of dz){ let fx=d.fixtures||(fresh.data_mode==="real"?[]:genPool(5,leagueFormula().bet)); fx.forEach(f=>{if(!f.res&&!f.evId)f.res=simResult(f);}); d.fixtures=fx;
      for(const pid of [d.home_id,d.away_id]){ let bt=bz.find(b=>b.player_id===pid);
        const valid = bt && Array.isArray(bt.picks) && bt.picks.length===fx.length;
        if(!valid){
          if(pmap[pid] && pmap[pid].is_ai){
            // IA : joue toujours automatiquement (elle ne peut pas « oublier »)
            const ai=aiPlay(capStart[pid],fx,pmap[pid].hand||[],D,fresh.num_days); bt={player_id:pid,picks:ai.picks,captain:ai.captain,card:ai.card};
            aiInserts.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:ai.picks,captain:ai.captain,card:ai.card,submitted:true});
          } else {
            // Humain sans pari validé à temps : AUCUN pari pris en compte (pas de reprise adverse) → pénalités −2 pts / −25 % capital appliquées plus bas
            forgot.add(pid); bt={player_id:pid,picks:[],captain:null,card:null};
            aiInserts.push({league_id:L.id,day:D,player_id:pid,duel_id:d.id,picks:[],captain:null,card:null,submitted:false});
          }
        }
        PD[pid]={picks:bt.picks.map(x=>({...x})),captain:bt.captain,card:bt.card||null,duelId:d.id,oppId:(pid===d.home_id?d.away_id:d.home_id),fx,rnd:Math.random()}; } }
    // résolution déterministe (moteur en phases), + impact réel de chaque carte
    const {dayNet,dayBest,dayWins,stolen,cloned}=runEngine(PD,capStart,dz,N);
    // Pari non validé à temps : la sanction −25 % du capital EST la variation de capital du jour.
    // On l'inscrit donc dans `net` (au lieu de l'appliquer à part sur le capital) → elle apparaît dans
    // les résultats de la journée et dans la courbe de capital. Le capital reste identique :
    // capStart + net = capStart − 25 % = capStart × 0,75.
    const penOubli = pid => -Math.round((capStart[pid]||0)*forgotPenOf()*100)/100;
    forgot.forEach(pid=>{ dayNet[pid] = penOubli(pid); });
    // Impact réel de chaque carte = écart entre le net RÉEL et le net d'un monde SANS cette carte.
    // Le contrefactuel `wo` sort brut de runEngine : il ignore la pénalité d'oubli, qui est injectée
    // après coup (juste au-dessus). Il faut donc l'y refléter à l'identique, sinon la soustraction
    // dayNet − wo impute la pénalité de l'adversaire à la CARTE (« impact adversaire −25 € » alors
    // qu'elle n'y est pour rien). Les deux mondes doivent différer PAR LA SEULE carte.
    const impacts={};
    for(const pid in PD){ if(PD[pid].card&&PD[pid].card.id){ const alt=JSON.parse(JSON.stringify(PD)); alt[pid].card=null;
      const wo=runEngine(alt,capStart,dz,N).dayNet; forgot.forEach(fp=>{ wo[fp]=penOubli(fp); });
      const opp=PD[pid].oppId;
      impacts[pid]={self:Math.round(((dayNet[pid]||0)-(wo[pid]||0))*100)/100, opp: opp!=null?Math.round(((dayNet[opp]||0)-(wo[opp]||0))*100)/100:0}; } }
    for(const d of dz){ await q(db.from("duels").update({fixtures:d.fixtures,resolved:true}).eq("id",d.id)); }
    if(aiInserts.length) await q(db.from("bets").upsert(aiInserts,{onConflict:"player_id,day"}));
    // "Chérie c'est cadeau" : détermine l'inversion du pari ciblé de la victime
    const cadeauFlips={};
    for(const pid in PD){ const pd=PD[pid]; if(pd.card&&pd.card.id==="cadeau"&&pd.card.target!=null){ const vId=pd.oppId; const opp=PD[vId]; const i=pd.card.target;
      if(opp&&opp.picks[i]){ const from=opp.picks[i].sel; let to=from; if(from==="1")to="2"; else if(from==="2")to="1";
        if(to!==from) cadeauFlips[pid]={victim:vId, match:i, from, to}; } } }
    // Table inverse du vol : victime → voleur, pour afficher « ton bonus t'a été pris » côté victime.
    const volePar={}; for(const pid in stolen){ const v=PD[pid].oppId; if(v!=null) volePar[v]=pid; }
    // On CONSERVE la carte telle que le joueur l'a jouée (on ne la reconstruit surtout pas champ par
    // champ : `target2` du Coup Double avait été oublié → 2ᵉ match perdu à la résolution). On retire
    // juste les champs calculés d'une résolution précédente, puis on les recalcule.
    for(const pid in dayNet){ const c=PD[pid].card; const u2={net:dayNet[pid]};

/* ============ STANDINGS ============ */
// Comparateur du classement. v2 (demande d'Hervé) : points → cagnotte → [confrontations directes,
// appliquées à part, voir classe()] → plus gros gain → plus grosse cote. Le total des victoires en
// duel a été retiré du départage. Les ligues antérieures gardent leur ordre d'origine.
function cmpV(v2){ return (a,b)=> b.points-a.points || b.capital-a.capital
  || (v2?0:(b.duel_wins-a.duel_wins)) || b.best_day-a.best_day || b.best_odd-a.best_odd; }
function cmp(a,b){ return cmpV(isScoring2())(a,b); }
// Classement complet. Les confrontations directes ne sont VOLONTAIREMENT pas dans le comparateur :
// elles ne sont pas transitives (A bat B, B bat C, C bat A) et Array.sort avec un comparateur
// incohérent peut renvoyer un ordre arbitraire — y compris pour des joueurs qui n'étaient pas à
// égalité. On trie donc avec un comparateur sûr, puis on réordonne CHAQUE groupe à égalité de
// points ET de cagnotte par un mini-championnat entre ses membres (points marqués dans leurs
// face-à-face). Un cycle A>B>C>A donne des scores égaux et retombe sur le plus gros gain.
function classe(arr,lg){
  const v2=isScoring2(lg);
  const out=[...arr].sort(cmpV(v2));
  const lid=lg?lg.id:(L?L.id:null);
  const h=(v2 && STAND_H2H && STAND_H2H_LG && STAND_H2H_LG===lid) ? STAND_H2H : null;
  if(!h) return out; // pas d'historique chargé → on s'en tient au tri sûr
  const res=[];
  for(let i=0;i<out.length;){
    let j=i;
    while(j+1<out.length && out[j+1].points===out[i].points && out[j+1].capital===out[i].capital) j++;
    if(j>i){
      const grp=out.slice(i,j+1); const sc={};
      grp.forEach(p=>{ sc[p.id]=0; grp.forEach(q=>{ if(q.id!==p.id) sc[p.id]+=(h[p.id+'|'+q.id]||0); }); });
      grp.sort((a,b)=> (sc[b.id]-sc[a.id]) || (b.best_day-a.best_day) || (b.best_odd-a.best_odd));
      res.push(...grp);
    } else res.push(out[i]);
    i=j+1;
  }
  return res;
}
// Reconstruit l'historique du classement (état cumulé APRÈS chaque journée résolue) en rejouant les résultats stockés.
function computeStandHist(){
  if(!chartBets || !standDuels) return [];
  const N = (L.status==="done" ? (L.num_days||0) : (L.current_day||0)); // journées résolues
  if(N<1) return [];
  const sp = L.prep_summary||{};
  const st={}; players.forEach(p=>{ const psx=(sp.players||[]).find(x=>x.pid===p.id); st[p.id]={points:0, capital: psx?psx.capital:100, duel_wins:0, best_day:0, best_odd:0, streak_w:0, streak_l:0, star:0}; });
  const betAt={}; chartBets.forEach(b=>{ betAt[b.day+'|'+b.player_id]=b; });
  const duelByDay={}; standDuels.forEach(d=>{ (duelByDay[d.day]=duelByDay[d.day]||[]).push(d); });
  const h2h={}; // confrontations directes, remplies au fil des duels ci-dessous
  // Rachats de bonus : le capital change de mains SANS être le gain de personne. Sans ce report,
  // la reconstruction diverge du capital réel. On range chaque transfert à la journée où il a été
  // accepté ; `day` absent (rachat antérieur à MIGRATION-trades-day.sql) → journée 0, ce qui garde
  // le TOTAL exact même si le point de départ sur la courbe est approximatif.
  const troc={}; // troc[jour][playerId] = variation de capital
  (standTrades||[]).forEach(tr=>{ const j=(tr.day!=null)?tr.day:0; const p=+tr.price||0; if(!p) return;
    // `kind` décide qui reçoit : à l'achat, la carte vient du destinataire, donc l'argent va à LUI.
    const recoit=(tr.kind==="sell")?tr.from_player:tr.to_player;
    const paye  =(tr.kind==="sell")?tr.to_player  :tr.from_player;
    troc[j]=troc[j]||{}; troc[j][recoit]=(troc[j][recoit]||0)+p; troc[j][paye]=(troc[j][paye]||0)-p; });
  const snaps=[];
  for(let d=0; d<N; d++){
    // AVANT les gains du jour : l'échange a lieu entre deux journées, donc il fait partie du
    // capital avec lequel on aborde celle-ci.
    if(troc[d]) Object.keys(troc[d]).forEach(pid=>{ if(st[pid]) st[pid].capital=Math.max(0,Math.round((st[pid].capital+troc[d][pid])*100)/100); });
    const dz=duelByDay[d]||[];
    const inDay=pid=>dz.some(du=>du.home_id===pid||du.away_id===pid);
    // oubli : humain présent ce jour-là sans pari valide (picks vides ou absents)
    const forgot=new Set();
    // L'oubli se LIT dans la donnée, il ne se déduit pas de l'état courant du joueur.
    // `submitted:false` est la marque écrite par resolveDay au moment de la résolution : c'est la
    // seule source fidèle. L'ancien test s'appuyait sur `p.is_ai` d'AUJOURD'HUI — or l'historique
    // est rejoué bien plus tard : si le statut d'un joueur change, tout le passé se réécrit
    // faussement (constaté sur VOTE8 : 3 duels et 12 points d'écart avec la base).
    // Le repli sur les pronos vides couvre les journées antérieures à la colonne `submitted`.
    players.forEach(p=>{ if(!inDay(p.id)) return; const b=betAt[d+'|'+p.id];
      if(b && b.submitted===false){ forgot.add(p.id); return; }
      if(p.is_ai) return;                       // repli : une IA jouée automatiquement n'oublie pas
      if(!b||!Array.isArray(b.picks)||b.picks.length===0) forgot.add(p.id); });
    // points de duel + séries 🔥/❄️ + victoires
    dz.forEach(du=>{ const hb=betAt[d+'|'+du.home_id], ab=betAt[d+'|'+du.away_id];
      const H=Object.assign({net:(hb&&hb.net)||0}, gainMise(hb&&hb.picks, du.fixtures));
      const A=Object.assign({net:(ab&&ab.net)||0}, gainMise(ab&&ab.picks, du.fixtures));
      const r=duelPtsF(H,A,forgot.has(du.home_id),forgot.has(du.away_id),isScoring2());
      // confrontations directes : points marqués par chacun DANS CE FACE-À-FACE
      h2h[du.home_id+'|'+du.away_id]=(h2h[du.home_id+'|'+du.away_id]||0)+r.h;
      h2h[du.away_id+'|'+du.home_id]=(h2h[du.away_id+'|'+du.home_id]||0)+r.a;
      if(st[du.home_id]) st[du.home_id].points+=r.h; if(st[du.away_id]) st[du.away_id].points+=r.a;
      if(r.win==='h'){ if(st[du.home_id]){st[du.home_id].duel_wins++;st[du.home_id].streak_w++;st[du.home_id].streak_l=0;} if(st[du.away_id]){st[du.away_id].streak_l++;st[du.away_id].streak_w=0;} }
      else if(r.win==='a'){ if(st[du.away_id]){st[du.away_id].duel_wins++;st[du.away_id].streak_w++;st[du.away_id].streak_l=0;} if(st[du.home_id]){st[du.home_id].streak_l++;st[du.home_id].streak_w=0;} }
      else { if(st[du.home_id]){st[du.home_id].streak_w=0;st[du.home_id].streak_l=0;} if(st[du.away_id]){st[du.away_id].streak_w=0;st[du.away_id].streak_l=0;} } });
    // ⭐ meilleur pronostiqueur du jour (hors oubli) → +1 pt
    const rows=[]; players.forEach(p=>{ const du=dz.find(x=>x.home_id===p.id||x.away_id===p.id); if(!du||forgot.has(p.id)) return; const b=betAt[d+'|'+p.id]; const gm=gainMise(b&&b.picks, du.fixtures);
      if(gm.mise<=0) return; // tous ses paris annulés → net 0 artificiel, pas éligible à l'étoile (idem resolveDay)
      rows.push({id:p.id, net:(b&&b.net)||0, gain:gm.gain, mise:gm.mise, order:p.join_order||0}); });
    const sid=dayStar(rows,isScoring2()); if(sid!=null && st[sid]){ st[sid].points+=1; st[sid].star+=1; }
    // (v4.13 — le malus « −1 pt si tous les paris faux » est supprimé, cf. resolveDay. ⚠️ Cette fonction
    // REJOUE tout l'historique : ne pas le retirer ici aurait fait diverger le classement affiché des
    // points réellement écrits en base par resolveDay.)
    // capital (+ net), meilleure journée, meilleure cote gagnée
    players.forEach(p=>{ const du=dz.find(x=>x.home_id===p.id||x.away_id===p.id); const b=betAt[d+'|'+p.id]; const net=(b&&b.net)||0; if(st[p.id]){ st[p.id].best_day=Math.max(st[p.id].best_day,net); st[p.id].capital=Math.max(0,Math.round((st[p.id].capital+net)*100)/100); }
      if(b&&b.picks&&du&&du.fixtures){ b.picks.forEach((pk,i)=>{ const f=du.fixtures[i]; if(!f) return; const c=b.card; const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2; const win=isDC?(f.res===pk.sel||f.res===c.sel2):(pk.sel===f.res); const odd=isDC?dcWinOdd(f,pk.sel,c.sel2):oddOf(f,pk.sel); if(win&&odd>st[p.id].best_odd) st[p.id].best_odd=odd; }); } });
    // pénalité oubli : −2 pts. Le −25 % de capital est inclus dans `net` depuis la v4.03 (déjà appliqué
    // par `capital += net` juste au-dessus) → on ne le réapplique QUE pour les anciennes journées (net=0),
    // sinon ce serait une double peine à chaque rejeu de l'historique.
    forgot.forEach(pid=>{ if(!st[pid]) return; st[pid].points+=forgotPtsOf();
      const bb=betAt[d+'|'+pid]; const penInNet=!!(bb && (bb.net||0)<0);
      if(!penInNet) st[pid].capital=Math.max(0,Math.round(st[pid].capital*(1-forgotPenOf())*100)/100); });
    // recapitalisation solidaire : si un humain < seuil → +montant à tout le monde
    const broke=players.filter(p=>!p.is_ai && st[p.id] && st[p.id].capital<RECAP_THRESHOLD);
    // Miroir de resolveDay : +20 € à tous, −1 pt au(x) joueur(s) renfloué(s). Les deux doivent rester
    // synchrones, sinon les points recalculés ici divergeraient de ceux écrits en base.
    if(broke.length){ players.forEach(p=>{ if(st[p.id]) st[p.id].capital+=RECAP_AMOUNT; }); broke.forEach(p=>{ if(st[p.id]) st[p.id].points-=1; }); }
    snaps.push(players.map(p=>({ id:p.id,name:p.name,emoji:p.emoji,is_ai:p.is_ai,join_order:p.join_order,
      points:st[p.id].points, capital:st[p.id].capital, duel_wins:st[p.id].duel_wins, best_day:st[p.id].best_day, best_odd:st[p.id].best_odd, streak_w:st[p.id].streak_w, streak_l:st[p.id].streak_l, star:st[p.id].star })));
  }
  STAND_H2H=h2h; STAND_H2H_LG=L?L.id:null; // dispo pour le départage du classement
  return snaps;
}
// ✨ FICHE STATS PERSO (premium, offert en test) — calculée depuis chartBets + standDuels (données déjà chargées).
function myStats(){
  const my=(chartBets||[]).filter(b=>b.player_id===S.myId && Array.isArray(b.picks));
  const duelOf=day=>(standDuels||[]).find(d=>d.day===day && (d.home_id===S.myId||d.away_id===S.myId));
  const fg=b=>!!(b&&Array.isArray(b.picks)&&b.picks.length===0);
  let days=0,picks=0,won=0,staked=0,net=0,bestOdd=0;
  let best={net:-1e9,day:-1}, worst={net:1e9,day:-1};
  const cardCount={}, h2h={};
  my.forEach(b=>{ const d=duelOf(b.day); const fx=d&&d.fixtures; days++;
    if(fx){ picks+=b.picks.length; won+=winCount(b,fx);
      b.picks.forEach((p,i)=>{ const f=fx[i]; if(f&&p.sel===f.res){ const o=oddOf(f,p.sel); if(o>bestOdd)bestOdd=o; } }); }
    staked+=gainMise(b.picks,fx).mise;
    const n=(b.net!=null)?b.net:0; net+=n;
    if(n>best.net) best={net:n,day:b.day}; if(n<worst.net) worst={net:n,day:b.day};
    if(b.card&&b.card.id) cardCount[b.card.id]=(cardCount[b.card.id]||0)+1;
    if(d){ const oppId=d.home_id===S.myId?d.away_id:d.home_id;
      const ob=(chartBets||[]).find(x=>x.player_id===oppId && x.day===b.day);
      const H=Object.assign({net:n},gainMise(b.picks,fx));
      const A=Object.assign({net:(ob&&ob.net!=null)?ob.net:0},gainMise(ob&&ob.picks,fx));
      const r=duelPtsF(H,A,fg(b),fg(ob),isScoring2()); h2h[oppId]=h2h[oppId]||{w:0,l:0,d:0};
      if(r.win==='h') h2h[oppId].w++; else if(r.win==='a') h2h[oppId].l++; else h2h[oppId].d++; } });
  const favCard=Object.keys(cardCount).sort((a,b)=>cardCount[b]-cardCount[a])[0]||null;
  return {days,picks,won,staked:Math.round(staked),net,bestOdd,best,worst,favCard,h2h,
          hit:picks?Math.round(won/picks*100):0, roi:staked?Math.round(net/staked*100):0}; }

      myBets.forEach(b=>{ const d=dlById[b.duel_id]; const fx=d&&d.fixtures; days++;
        if(fx){ picks+=b.picks.length; won+=winCount(b,fx);
          b.picks.forEach((p,i)=>{ const f=fx[i]; if(f&&p.sel===f.res){ const o=oddOf(f,p.sel); if(o>bestOdd)bestOdd=o; if(o>gBestOdd)gBestOdd=o; } }); }
        staked+=gainMise(b.picks,fx).mise; const n=(b.net!=null)?b.net:0; net+=n;
        if(n>best.net) best={net:n,day:b.day}; if(n<worst.net) worst={net:n,day:b.day};
        if(n>gBest.net) gBest={net:n,lg:lg.name};
        if(b.card&&b.card.id) cc[b.card.id]=(cc[b.card.id]||0)+1;
        if(d){ const oppId=d.home_id===mp?d.away_id:d.home_id; const opp=plMap[oppId];
          if(opp&&!opp.is_ai){ const ob=(betsByLg[lid]||[]).find(x=>x.player_id===oppId&&x.day===b.day);
            const H=Object.assign({net:n},gainMise(b.picks,fx)); const A=Object.assign({net:(ob&&ob.net!=null)?ob.net:0},gainMise(ob&&ob.picks,fx));
            const r=duelPtsF(H,A,fg(b),fg(ob),isScoring2(lg)); const key=opp.user_id||opp.name;
            h2h[key]=h2h[key]||{name:opp.name,emoji:opp.emoji,w:0,l:0,d:0};

function capChart(){
  if(!chartBets) return '';
  const N=(L.status==="done"?(L.num_days||0):(L.current_day||0)); if(N<1) return '';
  const sp=L.prep_summary||{};
  const capAfter={}; players.forEach(p=>{ const psx=(sp.players||[]).find(x=>x.pid===p.id); capAfter[p.id]= psx?psx.capital:100; });
  const netByDay={}, legacyPen={};
  players.forEach(p=>{ netByDay[p.id]=Array(N).fill(0); legacyPen[p.id]=Array(N).fill(false); });
  // Oubli « ancienne donnée » (journée résolue avant la v4.03) : la pénalité −25 % n'est PAS dans `net`
  // → sans ça la courbe reste à plat alors que le capital a bien chuté. Depuis la v4.03, net la contient déjà.
  chartBets.forEach(b=>{ if(netByDay[b.player_id]==null || b.day>=N) return;
    netByDay[b.player_id][b.day]=b.net||0;
    legacyPen[b.player_id][b.day]=!!(Array.isArray(b.picks) && b.picks.length===0 && (b.net||0)===0); });
  // Rachats de bonus : capital déplacé sans être le gain de personne. Même report que dans
  // computeStandHist, sinon la courbe se termine sur un capital différent de celui affiché au
  // classement (écart constaté : ±5 €). `day` absent → journée 0 (rachat d'avant la migration).
  const trocC={};
  (standTrades||[]).forEach(tr=>{ const j=(tr.day!=null)?tr.day:0; const pr=+tr.price||0; if(!pr) return;
    const recoit=(tr.kind==="sell")?tr.from_player:tr.to_player;
    const paye  =(tr.kind==="sell")?tr.to_player  :tr.from_player;
    trocC[j]=trocC[j]||{}; trocC[j][recoit]=(trocC[j][recoit]||0)+pr; trocC[j][paye]=(trocC[j][paye]||0)-pr; });
  const series=players.map(p=>{ let v=capAfter[p.id]; const pts=[100,v];
    for(let d=0;d<N;d++){
      if(trocC[d]&&trocC[d][p.id]) v=Math.max(0,Math.round((v+trocC[d][p.id])*100)/100); // avant les gains du jour
      v=Math.max(0,v+(netByDay[p.id][d]||0));
      if(legacyPen[p.id][d]) v=Math.max(0,Math.round(v*(1-FORGOT_PENALTY)*100)/100);
      pts.push(v); } return {p,pts}; });
  const allv=series.flatMap(s=>s.pts); let mn=Math.min(...allv), mx=Math.max(...allv); if(!isFinite(mn)){mn=0;mx=100;}
  const pad=Math.max(5,(mx-mn)*0.12); const lo=Math.max(0,Math.floor((mn-pad)/10)*10), hi=Math.max(lo+10,Math.ceil((mx+pad)/10)*10);
  const labels=["100€",t("Bonus")]; for(let d=0;d<N;d++) labels.push("J"+(d+1));
  return lineChart(series, labels, t("📈 Évolution du capital (départ → bonus → chaque journée)"), lo, hi);
}
// Évolution des POINTS (le classement) — les points font le championnat, le capital n'est qu'un moyen.
// S'appuie sur les snapshots par journée de computeStandHist (mêmes règles que le classement : duel, ⭐, malus, oubli).
function ptsChart(){
  const snaps=computeStandHist(); if(!snaps.length) return '';
  const N=snaps.length;
  const series=players.map(p=>{ const pts=[0];
    for(let d=0;d<N;d++){ const s=snaps[d].find(x=>x.id===p.id); pts.push(s?s.points:0); } return {p,pts}; });
  const labels=[t("Départ")]; for(let d=0;d<N;d++) labels.push("J"+(d+1));
  const allv=series.flatMap(s=>s.pts);
  const lo=Math.floor(Math.min(0,...allv))-1, hi=Math.ceil(Math.max(1,...allv))+1; // les points peuvent être négatifs
  return lineChart(series, labels, t("📊 Évolution des points (classement)"), lo, hi);
}
// Rendu commun des courbes (capital / points). L'échelle (lo/hi) est fournie par l'appelant :
// le capital s'arrondit à la dizaine, les points sont des entiers pouvant être négatifs.
function lineChart(series, labels, title, lo, hi){
  const npts=labels.length;
  const W=480,H=210,PL=38,PR=10,PT=12,PB=26;
  const X=i=> PL + (W-PL-PR)*(npts<=1?0:i/(npts-1));
  const Y=v=> PT + (H-PT-PB)*(1-(v-lo)/((hi-lo)||1));
  const cols=["#4ade80","#60a5fa","#fbbf24","#f87171","#a78bfa","#f472b6","#22d3ee","#fb923c","#84cc16","#e879f9"];
  let grid=""; for(let k=0;k<=3;k++){ const gv=lo+(hi-lo)*k/3; const y=Y(gv); grid+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="#242b38"/><text x="${PL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="#8b93a3">${Math.round(gv)}</text>`; }
  let xlab=""; labels.forEach((l,i)=>{ if(npts>9 && i>1 && i%2===0 && i!==npts-1) return; xlab+=`<text x="${X(i).toFixed(1)}" y="${H-PB+14}" text-anchor="middle" font-size="8.5" fill="#8b93a3">${esc(l)}</text>`; });
  const lines=series.map((s,si)=>{ const c=cols[si%cols.length]; const dpath=s.pts.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    const dots=s.pts.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2" fill="${c}"/>`).join('');
    return `<path d="${dpath}" fill="none" stroke="${c}" stroke-width="2"/>${dots}`; }).join('');
  const legend=series.map((s,si)=>`<span class="mini" style="margin-right:10px;white-space:nowrap"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${cols[si%cols.length]};vertical-align:middle"></span> ${esc(s.p.emoji)} ${esc(s.p.name)}</span>`).join('');
  return `<div class="box"><div class="mini muted" style="margin-bottom:6px">${title}</div>
     <div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:320px;height:auto">${grid}${lines}${xlab}</svg></div>
     <div style="margin-top:6px;line-height:1.9">${legend}</div></div>`;
}
async function loadEndStats(){
  try{
    const bz=await q(db.from("bets").select("day,player_id,net,card,picks").eq("league_id",L.id));
    const dz=await q(db.from("duels").select("day,home_id,away_id,fixtures").eq("league_id",L.id));
    const N=L.num_days||0; const pmap={}; players.forEach(p=>pmap[p.id]=p);
    const nm=pid=>{const p=pmap[pid]||{};return (p.emoji?p.emoji+' ':'')+esc(p.name||'?');};
    const betAt={}; bz.forEach(b=>{ betAt[b.day+'|'+b.player_id]=b; });
    const duelByDay={}; dz.forEach(d=>{ (duelByDay[d.day]=duelByDay[d.day]||[]).push(d); });
    let bigDay=null, worstDay=null;
    bz.forEach(b=>{ const v=b.net||0; if(bigDay===null||v>bigDay.net) bigDay={pid:b.player_id,day:b.day,net:v}; if(worstDay===null||v<worstDay.net) worstDay={pid:b.player_id,day:b.day,net:v}; });
    const cumPts={}; players.forEach(p=>cumPts[p.id]=0);
    const rankHist={}; players.forEach(p=>rankHist[p.id]=[]); const leaderByDay=[];
    for(let d=0;d<N;d++){
      (duelByDay[d]||[]).forEach(du=>{ const hb=betAt[d+'|'+du.home_id], ab=betAt[d+'|'+du.away_id];
        const H=Object.assign({net:(hb&&hb.net)||0}, gainMise(hb&&hb.picks, du.fixtures));
        const A=Object.assign({net:(ab&&ab.net)||0}, gainMise(ab&&ab.picks, du.fixtures));
        const fg=b=>!!(b&&Array.isArray(b.picks)&&b.picks.length===0); // forfait (pronos non validés)
        const r=duelPtsF(H,A,fg(hb),fg(ab),isScoring2()); if(cumPts[du.home_id]!=null)cumPts[du.home_id]+=r.h; if(cumPts[du.away_id]!=null)cumPts[du.away_id]+=r.a; });
      const rows=players.map(p=>{ const b=betAt[d+'|'+p.id]; const du=(duelByDay[d]||[]).find(x=>x.home_id===p.id||x.away_id===p.id); const gm=gainMise(b&&b.picks, du&&du.fixtures); return {id:p.id, net:(b&&b.net)||0, gain:gm.gain, mise:gm.mise, order:p.join_order||0}; });
      const sid=dayStar(rows,isScoring2()); if(sid!=null&&cumPts[sid]!=null)cumPts[sid]+=1;
      const ord=[...players].sort((a,b)=>(cumPts[b.id]-cumPts[a.id])||(b.capital-a.capital)); ord.forEach((p,idx)=>rankHist[p.id][d]=idx+1); leaderByDay.push(ord[0]?ord[0].id:null);
    }
    let leadChanges=0; const daysLed={};
    leaderByDay.forEach((pid,i)=>{ if(pid) daysLed[pid]=(daysLed[pid]||0)+1; if(i>0&&pid&&pid!==leaderByDay[i-1]) leadChanges++; });
    let topLeader=null; Object.keys(daysLed).forEach(pid=>{ if(topLeader===null||daysLed[pid]>daysLed[topLeader]) topLeader=pid; });
    const finalOrd=classe(players); const finalRank={}; finalOrd.forEach((p,i)=>finalRank[p.id]=i+1);
    let comeback=null; players.forEach(p=>{ const rh=rankHist[p.id].filter(x=>x); if(rh.length<2)return; const worst=Math.max(...rh); const g=worst-finalRank[p.id]; if(g>0&&(comeback===null||g>comeback.g)) comeback={pid:p.id,g,worst,fin:finalRank[p.id]}; });
    const bonusImp={}; players.forEach(p=>bonusImp[p.id]=0); let cardsPlayed=0, master=null;
    bz.forEach(b=>{ if(b.card&&b.card.id){ cardsPlayed++; const self=(b.card.impact&&b.card.impact.self)||0; if(bonusImp[b.player_id]!=null)bonusImp[b.player_id]+=self; if(self>0&&(master===null||self>master.self)) master={pid:b.player_id,day:b.day,self,id:b.card.id}; } });
    let bestBonus=null; players.forEach(p=>{ if(bonusImp[p.id]>0&&(bestBonus===null||bonusImp[p.id]>bestBonus.tot)) bestBonus={pid:p.id,tot:bonusImp[p.id]}; });
    endStats={ nm, bigDay, worstDay, leadChanges, topLeader, daysLed, comeback, bestBonus, master, cardsPlayed };
  }catch(e){ endStats={error:e.message}; }
}

async function loadPalmares(){
  try{
    const lgs=await q(db.from("leagues").select("id,name,num_participants,status"));
    const pls=await q(db.from("players").select("id,name,emoji,league_id,is_ai,user_id"));
    const bts=await q(db.from("bets").select("league_id,day,player_id,net,picks,card,captain,duel_id").not("net","is",null));
    const dls=await q(db.from("duels").select("id,fixtures"));
    const lgMap={},plMap={},dlMap={}; lgs.forEach(l=>lgMap[l.id]=l); pls.forEach(p=>plMap[p.id]=p); dls.forEach(d=>dlMap[d.id]=d);
    const oddF=(f,s)=> s==="1"?f.oh:s==="2"?f.oa:f.od; const selNm=(f,s)=> s==="1"?f.home:s==="2"?f.away:t("Nul");
    const dayRecs=[], oddRecs=[];
    for(const b of bts){ const pl=plMap[b.player_id]; if(!pl||pl.is_ai||pl.name==="Joueur IA") continue; const lg=lgMap[b.league_id]||{}; const d=dlMap[b.duel_id]; const fx=(d&&d.fixtures)||[];
      const picks=b.picks||[]; const staked=picks.reduce((a,x)=>a+(+x.stake||0),0);
      const lines=picks.map((x,i)=>{ const f=fx[i]; if(!f) return null; const win=x.sel===f.res; const odd=oddF(f,x.sel); let g=win?(+x.stake)*(odd-1):-(+x.stake); if(i===b.captain)g*=2;
        if(win && +x.stake>0) oddRecs.push({odd, name:pl.name, emoji:pl.emoji, lname:lg.name, day:b.day, match:f.home+"–"+f.away, sel:selNm(f,x.sel), stake:+x.stake});
        return {m:f.home+"–"+f.away, sel:selNm(f,x.sel), win, odd, stake:+x.stake, g:+g.toFixed(2), cap:i===b.captain}; }).filter(Boolean);
      dayRecs.push({net:+(b.net||0).toFixed(2), staked, ret: staked>0?(b.net||0)/staked:0, name:pl.name, emoji:pl.emoji, lname:lg.name, np:lg.num_participants, day:b.day, cardId:b.card&&b.card.id, lines});
    }
    // Agrégat de PRONOSTIC PUR par personne (user_id), toutes ligues — indépendant des mises.
    const agg={};
    for(const b of bts){ const pl=plMap[b.player_id]; if(!pl||pl.is_ai||!pl.user_id||pl.name==="Joueur IA") continue;
      const d=dlMap[b.duel_id]; const fx=(d&&d.fixtures)||[]; const c=b.card;
      let a=agg[pl.user_id]; if(!a){ a=agg[pl.user_id]={uid:pl.user_id,name:pl.name,emoji:pl.emoji,picks:0,correct:0,winOddSum:0,wins:0,flat:0}; }
      a.name=pl.name; a.emoji=pl.emoji;
      (b.picks||[]).forEach((x,i)=>{ const f=fx[i]; if(!f||f.res==null) return;
        const isDC=c&&c.id==="chance"&&c.target===i&&c.sel2;
        const win=isDC?(f.res===x.sel||f.res===c.sel2):(x.sel===f.res);
        const odd=isDC?(win?oddF(f,f.res):oddF(f,x.sel)):oddF(f,x.sel); // Double Chance : cote initiale du résultat sorti
        a.picks++; if(win){ a.correct++; a.wins++; a.winOddSum+=odd; a.flat+=(odd-1); } else a.flat-=1; });
    }
    const MINP=5, MINW=2; // min. de pronostics pour figurer au classement des pronostiqueurs
    const skill=Object.values(agg).filter(a=>a.picks>0).map(a=>({ uid:a.uid, name:a.name, emoji:a.emoji, picks:a.picks, correct:a.correct,
      hit:a.correct/a.picks, avgOdd:a.wins?a.winOddSum/a.wins:0, wins:a.wins, flat:a.flat/a.picks }));
    // Classement + position du joueur connecté : renvoie {top: 5 premiers, me: {rank,total,...} ou null}
    const rankMe=(arr,keyFn)=>{ const sorted=[...arr].sort((x,y)=>keyFn(y)-keyFn(x));
      const mi=AUTH?sorted.findIndex(a=>a.uid===AUTH.id):-1;
      return { top:sorted.slice(0,5), me: mi>=0?Object.assign({rank:mi+1,total:sorted.length},sorted[mi]):null }; };
    const skHit=skill.filter(a=>a.picks>=MINP), skOdd=skill.filter(a=>a.wins>=MINW);
    palmares={
      bigGain: [...dayRecs].sort((a,b)=>b.net-a.net).slice(0,5),
      bestRet: [...dayRecs].filter(r=>r.staked>=5).sort((a,b)=>b.ret-a.ret).slice(0,5),
      bestOdd: [...oddRecs].sort((a,b)=>b.odd-a.odd).slice(0,5),
      bigLoss: [...dayRecs].sort((a,b)=>a.net-b.net).slice(0,5),
      topHit: rankMe(skHit, a=>a.hit),
      worstHit: { top:[...skHit].sort((x,y)=>x.hit-y.hit).slice(0,5) },
      topAvgOdd: rankMe(skOdd, a=>a.avgOdd),
      topFlat: rankMe(skHit, a=>a.flat),
      minP: MINP
    };
  }catch(e){ palmares={error:e.message}; }
}

  const sec=(title,arr,val,detail,tag,empty)=>`<h2>${title}</h2>${arr.length?arr.map((r,i)=>{const k=tag+i;const op=palmOpen===k;const v=val(r);
