    // Joueurs HUMAINS (le 🤖 joueur IA parie automatiquement : ses paris ne sont pas de l'usage).
    const humain={}; pls.forEach(p=>{ if(!p.is_ai && p.user_id) humain[p.id]=true; });
    // Base commune à TOUS les compteurs de paris : humain ET prono réellement validé.
    // `submitted:false` = ligne vide créée par resolveDay pour un oubli — ce n'est pas un pari.
    const btsH=allBts.filter(b=>humain[b.player_id] && b.submitted!==false);
    const bts=btsH.filter(b=>b.net!=null); // paris humains résolus (stats de jeu)
    const cardCount={}; let withCard=0;
    bts.forEach(b=>{ if(b.card&&b.card.id){ cardCount[b.card.id]=(cardCount[b.card.id]||0)+1; withCard++; } });
    /* ---- Activité par jour ----
       « Joueur actif » = PERSONNE distincte (user_id) ayant fait au moins UNE ACTION DATÉE ce
       jour-là : prono validé, arrivée en ligue, rachat proposé ou répondu, enchère/vote de prépa.
       On mappe player_id → user_id car une personne a un `player` par ligue. Les connexions
       simples ne sont pas tracées (il faudrait une table d'événements — cf. Phase 2). */
    const p2u={}; pls.forEach(p=>{ if(!p.is_ai && p.user_id) p2u[p.id]=p.user_id; });
    const u2name={}; pls.forEach(p=>{ if(!p.is_ai && p.user_id && p.name && u2name[p.user_id]==null) u2name[p.user_id]=p.name; }); // user_id → nom (pour afficher QUI est actif)
    const dayKey=ts=>{ const d=new Date(ts); if(isNaN(d)) return null;
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
    const dailyMap={};
    const slot=k=>{ dailyMap[k]=dailyMap[k]||{users:new Set(),bets:0,leagues:0,newp:new Set()}; return dailyMap[k]; };
    // Enregistre une ACTION HUMAINE datée : c'est la seule chose qui rend quelqu'un « actif ».
    const actes=[]; // {ts, uid} — sert aussi aux cumuls 7 / 30 jours, pour qu'ils disent la même chose
    const acte=(ts,pid)=>{ const u=p2u[pid]; if(!u||ts==null) return; const tt=new Date(ts).getTime(); if(isNaN(tt)) return;
      const k=dayKey(tt); if(k) slot(k).users.add(u); actes.push({tt,u}); };
    // 1) Pronos VALIDÉS. `submitted:false` = ligne vide créée par resolveDay pour un joueur qui a
    //    OUBLIÉ : la compter revient à déclarer actif quelqu'un qui n'a précisément rien fait.
    btsH.forEach(b=>{ const k=dayKey(b.created_at); if(!k) return;
      slot(k).bets++; acte(b.created_at,b.player_id); });
    // 2) Arrivée dans une ligue (couvre aussi la création : l'organisateur y a sa ligne `players`).
    pls.forEach(p=>{ if(p.is_ai) return; acte(p.created_at,p.id); });
    // 3) Rachats de bonus : `created_at` = celui qui propose, `resolved_at` = celui qui répond.
    trs.forEach(tr=>{ acte(tr.created_at,tr.from_player); if(tr.resolved_at) acte(tr.resolved_at,tr.to_player); });
    // 4) Préparation : horodatages des enchères et des votes, rangés dans `leagues.gage` (JSON).
    //    ⚠️ Visible seulement PENDANT la prépa : au démarrage, `gage` est remplacé par le texte du
    //    gage retenu, et ces dates sont perdues. Rien à en tirer rétroactivement.
    lgs.forEach(l=>{ let stp=null; try{ stp=JSON.parse(l.gage); }catch(e){ return; }
      if(!stp||typeof stp!=="object") return;
      ["bidTs","voteTs","voteTsR"].forEach(cle=>{ const m=stp[cle]; if(!m||typeof m!=="object") return;
        Object.keys(m).forEach(pid=>acte(m[pid],pid)); }); });
    lgs.forEach(l=>{ const k=dayKey(l.created_at); if(!k) return; slot(k).leagues++; });
    // Nouveaux joueurs = 1re apparition d'un user_id (plus ancienne ligne `players`)
    const firstSeen={}; pls.forEach(p=>{ if(p.is_ai||!p.user_id||!p.created_at) return; const tt=new Date(p.created_at).getTime();
      if(isNaN(tt)) return; if(firstSeen[p.user_id]==null||tt<firstSeen[p.user_id]) firstSeen[p.user_id]=tt; });
    Object.keys(firstSeen).forEach(u=>{ const k=dayKey(firstSeen[u]); if(k) slot(k).newp.add(u); });
    const now=Date.now(); const daily=[];
    for(let i=0;i<14;i++){ const k=dayKey(new Date(now-i*86400000)); const s=dailyMap[k];
      const names=s?[...s.users].map(u=>u2name[u]||('#'+String(u).slice(0,6))).sort((a,b)=>a.localeCompare(b)):[];
      daily.push({d:k, users:s?s.users.size:0, names, bets:s?s.bets:0, leagues:s?s.leagues:0, newp:s?s.newp.size:0}); }
    // Mêmes actes que le tableau jour par jour : les cumuls ne peuvent donc pas le contredire.
    const activeSince=days=>{ const cut=now-days*86400000; const set=new Set();
      actes.forEach(a=>{ if(a.tt>=cut) set.add(a.u); }); return set.size; };
    const active7=activeSince(7), active30=activeSince(30), everActive=activeSince(36500);
    // Gages les plus choisis : cumul des votes (et nombre de fois retenu) sur toutes les ligues démarrées
    const gageTally={};
    lgs.forEach(l=>{ const gv=(l.prep_summary&&l.prep_summary.gageVotes)||[]; gv.forEach(g=>{ if(!g||!g.t) return; const k=g.t;
      gageTally[k]=gageTally[k]||{votes:0,wins:0}; gageTally[k].votes+=(g.count||0); if(g.win) gageTally[k].wins++; }); });
    const topGages=Object.keys(gageTally).map(t=>({t,votes:gageTally[t].votes,wins:gageTally[t].wins})).sort((a,b)=> b.votes-a.votes || b.wins-a.wins);
    const activeAccounts=new Set(pls.filter(p=>!p.is_ai&&p.user_id).map(p=>p.user_id)); // 1 personne = 1, même sur plusieurs ligues
    adminData={ leagues:lgs.length,
      byStatus:{lobby:lgs.filter(l=>l.status==="lobby").length, prep:lgs.filter(l=>l.status==="prep"||l.status==="starting").length, running:lgs.filter(l=>l.status==="running").length, done:lgs.filter(l=>l.status==="done").length},
      activeAccounts:activeAccounts.size, participations:pls.filter(p=>!p.is_ai&&p.name!=="Joueur IA").length,
      resolvedBets:bts.length, cardsPlayed:withCard, topCards:Object.keys(CARDS).map(id=>[id,cardCount[id]||0]).sort((a,b)=>b[1]-a[1]), topGages,
      daily, active7, active30, everActive, totalBets:btsH.length };
  }catch(e){ adminData={error:e.message}; }
}
// Admin : clic sur le nombre d'actifs d'un jour → la liste des noms (voir qui fait quoi).
function showActiveNames(d){
  const row=((adminData&&adminData.daily)||[]).find(x=>x.d===d); if(!row) return;

    : `<div class="mini muted">Personne ce jour-là.</div>`;
  infoModal("📈", "Actifs — "+d, body);
}

  applyThemeBtn(); applyLangBtn();
  const fo=$("foot"); if(fo) fo.textContent="The Maestro League · "+t("prototype de test · données sportives simulées")+" · "+APP_VERSION;
  $("rulesBtn").classList.remove("hide"); // 📖 visible même AVANT connexion (découvrir le jeu)
  // 🛒 et 🐛 : conditionnés à la SESSION, pas à l'écran affiché. Tester `S.view==="auth"` ne
  // suffisait pas — un visiteur non connecté ouvrant les 📖 règles depuis l'écran de connexion
  // quittait la vue "auth" et voyait donc réapparaître la boutique (signalé par Hervé).
  $("shopBtn").classList.toggle("hide", !AUTH);
  $("bugBtn").classList.toggle("hide", !AUTH);
  // 🤝 rachat de bonus : visible en cours de championnat ; pastille = nb d'offres reçues à traiter.
  const canTrade = !!(L && L.status==="running" && inLeague);
  $("tradeBtn").classList.toggle("hide", !canTrade);
  if(canTrade){ const n=myPendingIn().length + myResolvedUnseen().length; $("tradeBtn").innerHTML = n>0 ? `🤝<span class="tradebadge">${n}</span>` : "🤝"; }
  $("leaguesBtn").classList.toggle("hide", !inLeague);
  $("settingsBtn").classList.toggle("hide", S.view==="auth" || !AUTH);
  let html="";
  if(S.view==="auth") html=viewAuth();
  else if(S.view==="leagues") html=viewLeagues();
  else if(S.view==="rules") html=viewRules();
  else if(S.view==="rulesfull") html=viewRulesFull();
  else if(S.view==="standings") html=viewStandings();
  else if(S.view==="coulisses") html=viewCoulisses();
  else if(S.view==="results") html=viewResults();
  else if(S.view==="palmares") html=viewPalmares();
  else if(S.view==="admin") html=viewAdmin();
  else if(S.view==="settings") html=viewSettings();
  else if(S.view==="trade") html=viewTrade();
  else if(S.view==="stats") html=viewStats();
  else if(S.view==="leaguestats") html=viewLeagueStats();
  else if(S.view==="tuto") html=viewTutorial();
  else if(S.view==="essai") html=viewEssai();
  else if(S.view==="shop") html=viewShop();
  else html=viewGame();
  $("root").innerHTML=html;
  // Remonter en haut à chaque changement d'écran, y compris les sous-étapes d'une journée (choix des matchs → saisie → attente → résultats) — pas sur les simples rafraîchissements de polling.
  let gsub="";
  if(S.view==="game" && L){ const d=myDuel(); const mb=myBet(); gsub="|"+L.current_day+"|"+((d&&d.fixtures&&d.fixtures.length)?"F":"")+"|"+(mb?"S":"")+"|"+(S.editingBet?"E":"")+"|"+(S.dispDay||0); }
  // Les étapes de la préparation comptent comme des changements d'écran → remontée en haut (sinon on
  // arrive au milieu de l'étape suivante). Sans impact sur les rafraîchissements du polling : l'étape
  // ne bouge pas toute seule.
  if(S.view==="game" && L && L.status==="prep") gsub+="|p"+prepStep;
  const sig=S.view+"|"+(L?L.status:"")+"|"+(S.recap?"r":"")+"|"+(S.leagueId||"")+gsub;
  if(sig!==lastScreenSig){ lastScreenSig=sig; try{ window.scrollTo(0,0); }catch(e){} }
  $("subtitle").textContent = S.view==="auth"?t("Connexion") : S.view==="rulesfull"?t("📚 Règles détaillées") : S.view==="settings"?t("Paramètres") : S.view==="leagues"?t("Mes ligues") : S.view==="tuto"?t("🎓 Découverte") : S.view==="essai"?t("▶️ Partie d'essai") : (L? (L.status==="lobby"?t("Salon")+" · "+L.code : ((L.status==="prep"||L.status==="starting")?t("Préparation"):(L.status==="done"?t("Terminé"):t("Journée {a}/{b}",{a:L.current_day+1,b:L.num_days})))) : "…");
}
// pendant la composition (choix des matchs à domicile ou saisie des pronos), on ne rafraîchit pas
// pour ne pas re-dessiner et fermer le champ en cours de saisie.
function isComposing(){
  if(S.view!=="game"||!L) return false;
  if(L.status==="prep") return !!(me() && !me().shop_done); // prépa (vote/enchères) en cours
  if(L.status!=="running"||S.recap) return false;
  const d=myDuel(); if(!d) return false;
  if(!d.fixtures) return d.home_id===S.myId; // à domicile : en train de choisir les 5 matchs
  return !myBet();                            // en train de faire ses pronos/mises
}
function startPoll(){ if(poll) clearInterval(poll); poll=setInterval(()=>{ if((S.view==="game"||S.view==="standings")&&!isComposing()) refresh(); },4000); }
// === NAVIGATION — une pile, PAS une case unique =======================================
// v4.19. Avant : S.prevView, UNE seule case partagée par rules/rulesfull/settings/coulisses.
// accueil → règles → paramètres écrasait "leagues" par "rules" → le retour des paramètres
// ramenait aux règles, dont le retour relisait "rules"… et bouclait À L'INFINI (bug d'Hervé,
// 2026-07-17). Une pile est le seul modèle correct : chaque ouverture EMPILE l'écran quitté.
// navRoot() vide la pile : on change de racine (ligue / liste), l'historique d'avant n'a plus
// de sens — un retour vers "game" après avoir quitté la ligue afficherait une ligue nulle.
function navOpen(v){ if(S.view===v) return; S.nav.push(S.view); if(S.nav.length>12) S.nav.shift(); S.view=v; render(); }
// ⚠️ « auth » n'est une entrée invalide QUE si l'on est connecté (on ne revient pas au login après
// s'être connecté). Non connecté, c'est au contraire la seule destination valide : depuis la v4.50 on
// peut lire les règles AVANT de créer un compte — le retour doit ramener à l'écran de connexion.
function navHome(){ return !AUTH ? "auth" : (S.leagueId ? "game" : "leagues"); }
function navBack(){ let v=S.nav.pop();
  while((v==="auth" && AUTH) || (v==="game" && !S.leagueId)) v=S.nav.pop();   // entrées devenues invalides
  S.view = v || navHome(); render(); }

// === RACHAT DE BONUS (point 4) — échange de capital VIRTUEL contre une carte =============
// Un ACHETEUR propose une somme à un VENDEUR pour lui racheter une carte encore EN MAIN ;
// le vendeur accepte ou refuse. Même modèle de confiance que tout le jeu : le client écrit
// (resolveDay réécrit déjà le capital de tous) → sera porté en RPC serveur en Phase 2.
// Règles (IDEES-V5 point 4) : seulement en cours de championnat · uniquement des cartes
// LIBRES (en main) · l'acheteur ne doit pas avoir de pari validé pour la journée en cours
// (sinon on casse worstLoss ≤ capital) · après paiement l'acheteur garde ≥ TRADE_MIN_CAP.
// L'option est PAYANTE par joueur (le proposeur) → péage branché en Phase 4 ; ouvert à tous
// pour l'instant (tests). Le montant n'ajoute pas de capital : il est TRANSFÉRÉ au vendeur.
const TRADE_MIN_CAP = RECAP_THRESHOLD;   // 10 € : plancher pour pouvoir encore miser
function tr2(x){ return Math.round(x*100)/100; }
function tradeRunning(){ return !!(L && L.status==="running"); }
function humanOpponents(){ return players.filter(p=>!p.is_ai && p.id!==S.myId); }
function myPendingIn(){  return trades.filter(x=>x.to_player===S.myId   && x.status==="pending"); }
function myPendingOut(){ return trades.filter(x=>x.from_player===S.myId && x.status==="pending"); }
// Refus d'un échange parce que la fenêtre est fermée. Volontairement une MODALE et non un toast :
// le message disparaissait avant d'être lu (signalé par Hervé), et surtout il ne disait pas QUAND
// l'échange redeviendrait possible — l'utilisateur restait sans rien à faire de l'information.
function tradeBloque(raison){
  const j=((L&&L.current_day)||0)+1;
  const dt=dayTimes();
  let quand="";
  if(L&&L.data_mode==="real") quand=t("Elle se résout une fois <b>tous les matchs réellement joués</b>.");
  else if(dt.ok&&dt.bet) quand=t("Clôture des pronos : <b>{a}</b>.",{a:fmtWhen(dt.bet)});
  infoModal("⏳", t("Échange impossible pour l'instant"),
    `<div class="mini" style="text-align:left">${raison}</div>
     <div class="mini muted" style="text-align:left;margin-top:10px">${t("Un échange n'est possible qu'<b>entre deux journées</b> : tant qu'un pari du jour est validé, la carte pourrait encore être jouée le même jour — elle serait alors utilisée deux fois.")}</div>
     <div class="mini" style="text-align:left;margin-top:10px">${t("➡️ Ce sera de nouveau possible dès que la <b>journée {j}</b> sera résolue.",{j:j})} ${quand}</div>`);
}
// Même garde que openShop : le rachat déplace du capital et des cartes. Le bouton est déjà masqué
// hors ligue (canTrade), mais on ne s'appuie pas sur l'affichage pour protéger une transaction.
function openTrade(){ if(!AUTH || !S.leagueId) return; tradeAckAll(); navOpen("trade"); }  // ouvrir l'écran = « j'ai vu les réponses » → éteint le badge
// Réponses à mes offres que je n'ai pas encore vues (pastille côté acheteur + toasts).
function tradeAckKey(){ return "pl_tradeack_"+S.leagueId; }
function tradeAck(){ try{ return new Set(JSON.parse(localStorage.getItem(tradeAckKey())||"[]")); }catch(e){ return new Set(); } }
function tradeAckAll(){ const s=tradeAck(); myResolvedOut.forEach(o=>s.add(o.id)); try{ localStorage.setItem(tradeAckKey(),JSON.stringify([...s])); }catch(e){} }
function myResolvedUnseen(){ const s=tradeAck(); return myResolvedOut.filter(o=>!s.has(o.id)); }
function notifyTrades(){ const nm=p=>((p&&p.emoji)||'')+' '+((p&&p.name)||'?');
  myResolvedUnseen().forEach(o=>{ if(tradeToasted.has(o.id)) return; tradeToasted.add(o.id);
    const cn=CARDS[o.card_id]?t(CARDS[o.card_id].n):o.card_id; const other=pById(o.to_player); let body;
    if(o.status==="accepted") body = o.kind==="sell" ? t("{a} a accepté : {c} vendue (+{b} €).",{a:nm(other),b:Math.round(o.price),c:cn})
                                                      : t("{a} a accepté : {c} est à toi (−{b} €).",{a:nm(other),b:Math.round(o.price),c:cn});
    else body = t("{a} a refusé ton offre pour {c}.",{a:nm(other),c:cn});
    if(o.reply) body += " 💬 "+o.reply;
    notify(t("Rachat 🤝"), body); }); }
// Lecture FRAÎCHE : l'acheteur a-t-il un pari verrouillé pour la journée passée en argument ?
async function hasBetForDay(pid, day){
  try{ const r=await q(db.from("bets").select("id").eq("league_id",L.id).eq("day",day).eq("player_id",pid).limit(1)); return !!(r&&r.length); }catch(e){ return false; } }
// `jour` n'est renseigné qu'à l'ACCEPTATION : c'est le seul cas où du capital change de mains, et
// c'est ce qui permet de replacer le transfert au bon point du classement historique et de la
// courbe (cf. MIGRATION-trades-day.sql). Si la colonne n'existe pas encore en base, l'update
// échouerait en bloc → on retente sans, pour ne pas perdre le changement de statut.
async function markTrade(id,st,reply,jour){ const u={status:st,resolved_at:new Date().toISOString()}; if(reply) u.reply=reply;
  try{ const uu=(jour!=null)?Object.assign({day:jour},u):u; await q(db.from("trades").update(uu).eq("id",id)); }
  catch(e){ try{ await q(db.from("trades").update(u).eq("id",id)); }catch(e2){} } }
function journeesRestantes(){ return Math.max(0,((L&&L.num_days)||0)-((L&&L.current_day)||0)); }
function cardEngaged(cardId){ return trades.some(x=>x.status==="pending" && x.card_id===cardId); } // UI : carte déjà dans une offre en attente
async function cardHasPendingTrade(cardId){ try{ const r=await q(db.from("trades").select("id").eq("league_id",L.id).eq("card_id",cardId).eq("status","pending").limit(1)); return !!(r&&r.length); }catch(e){ return false; } }

function viewTrade(){
  const inOff=myPendingIn(), outOff=myPendingOut();
  const nm=p=>p?esc((p.emoji||'')+' '+(p.name||'?')):'?';
  const clbl=id=>CARDS[id]?`<span class="clik" onclick="showCardInfo('${id}')">${CARDS[id].e} ${esc(t(CARDS[id].n))}</span>`:esc(id);
  const meP=me(); const cap=meP?(meP.capital||0):0;
  let h=`<button class="btn ghost sm" onclick="navBack()">${t("← Retour")}</button>
    <div class="box"><h2 style="margin-top:0">🤝 ${t("Rachat de bonus")} ${premBadge('rachat')}</h2>
      <div class="mini muted">${t("Rachète une carte à un adversaire, ou vends une des tiennes pour te refaire du capital. L'autre reste libre d'accepter ou de refuser.")}</div>
      <div class="mini" style="margin-top:6px;color:var(--blue)">ℹ️ ${t("Le rachat/vente n'est possible qu'entre <b>joueurs réels</b> — pas avec le 🤖 joueur IA.")}</div>
      <div class="mini muted" style="margin-top:6px">🗓️ ${t("Journées restantes : {a}",{a:journeesRestantes()})} · ${t("touche une carte pour voir son effet.")}</div></div>`;
  // Réponses à MES offres
  if(myResolvedOut.length){ h+=`<div class="box"><b class="mini">📨 ${t("Réponses à tes offres")}</b>`;
    myResolvedOut.slice(0,6).forEach(o=>{ const other=pById(o.to_player); const acc=o.status==="accepted";
      h+=`<div class="mini${acc?'':' muted'}" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">${acc?'✅':'✖️'} ${t("{a} a {s} ton offre ({c} · {b} €).",{a:nm(other),s:acc?t("accepté"):t("refusé"),c:clbl(o.card_id),b:Math.round(o.price)})}${o.reply?`<div class="mini muted" style="margin-top:2px">💬 ${esc(o.reply)}</div>`:''}</div>`; });
    h+=`</div>`; }
  // Offres reçues — j'accepte ou refuse (avec un petit mot)
  h+=`<div class="box"><b class="mini">📥 ${t("Offres reçues")}</b>`;
  if(!inOff.length) h+=`<div class="mini muted" style="margin-top:6px">${t("Aucune offre en attente.")}</div>`;
  else inOff.forEach(o=>{ const other=pById(o.from_player); const sell=(o.kind==="sell");
    const line=sell ? t("{a} te vend sa carte {c} pour <b>{b} €</b>.",{a:nm(other),c:clbl(o.card_id),b:Math.round(o.price)})
                    : t("{a} veut racheter ta carte {c} pour <b>{b} €</b>.",{a:nm(other),c:clbl(o.card_id),b:Math.round(o.price)});
    h+=`<div style="margin-top:9px;border-top:1px solid var(--border);padding-top:9px"><div class="mini">${line}</div>
      ${o.msg?`<div class="mini muted" style="margin-top:2px">💬 ${esc(o.msg)}</div>`:''}
      <input id="rp_${o.id}" maxlength="140" placeholder="${t("un petit mot (optionnel)")}" style="width:100%;box-sizing:border-box;padding:8px;margin-top:6px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:inherit">
      <div class="row" style="gap:6px;margin-top:6px"><button class="btn sm" style="flex:1" onclick="acceptTrade('${o.id}')">${t("Accepter")}</button>
      <button class="btn ghost sm" style="flex:1" onclick="refuseTrade('${o.id}')">${t("Refuser")}</button></div></div>`; });
  h+=`</div>`;
  // Offres envoyées — j'annule
  h+=`<div class="box"><b class="mini">📤 ${t("Offres envoyées")}</b>`;
  if(!outOff.length) h+=`<div class="mini muted" style="margin-top:6px">${t("Aucune offre en attente.")}</div>`;
  else outOff.forEach(o=>{ const other=pById(o.to_player); const sell=(o.kind==="sell");
    const line=sell ? t("Tu vends {c} à {a} pour <b>{b} €</b>.",{a:nm(other),c:clbl(o.card_id),b:Math.round(o.price)})
                    : t("Tu proposes <b>{b} €</b> à {a} pour {c}.",{a:nm(other),c:clbl(o.card_id),b:Math.round(o.price)});
    h+=`<div class="row" style="justify-content:space-between;align-items:center;gap:8px;margin-top:9px;border-top:1px solid var(--border);padding-top:9px"><div class="mini">${line}${o.msg?`<div class="mini muted" style="margin-top:2px">💬 ${esc(o.msg)}</div>`:''}</div><button class="btn ghost sm" style="flex:0 0 auto" onclick="cancelTrade('${o.id}')">${t("Annuler")}</button></div>`; });
  h+=`</div>`;
  if(!tradeRunning()){ h+=`<div class="box mini muted">${t("Le rachat n'est possible qu'en cours de championnat.")}</div>`; return h; }
  // --- RACHETER (j'achète la carte d'un autre) ---
  h+=`<div class="box"><b class="mini">🛒 ${t("Racheter une carte")}</b>`;
  if(!S.recap && myBet()) h+=`<div class="mini muted" style="margin-top:6px">${t("Tu ne peux pas racheter tant que ton pari du jour est validé — attends la résolution de la journée.")}</div>`;
  else if(cap < TRADE_MIN_CAP+1) h+=`<div class="mini muted" style="margin-top:6px">${t("Ton capital est trop faible : il faut pouvoir garder au moins {a} € après le rachat.",{a:TRADE_MIN_CAP})}</div>`;
  else { const opps=humanOpponents();
    if(!opps.some(p=>(p.hand||[]).length)) h+=`<div class="mini muted" style="margin-top:6px">${t("Aucune carte à racheter pour le moment — les autres joueurs ont déjà joué leurs bonus (ou n'en ont pas en main).")}</div>`;
    else { h+=`<div class="mini muted" style="margin-top:4px">${t("Ton capital : <b>{a} €</b> — jusqu'à <b>{b} €</b> dépensables (garder {c} €).",{a:Math.round(cap),b:Math.round(cap-TRADE_MIN_CAP),c:TRADE_MIN_CAP})}</div>`;
      opps.forEach(p=>{ const hand=(p.hand||[]); if(!hand.length) return;
        h+=`<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px"><div class="mini"><b>${nm(p)}</b> <span class="muted">· 💰 ${eur(p.capital||0)} €</span></div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${hand.map(id=>{ const eng=cardEngaged(id);
          return `<button class="btn ghost sm" ${eng?'disabled style="opacity:.5"':''} onclick="proposeBuy('${p.id}','${id}')">${CARDS[id]?CARDS[id].e:'?'} ${esc(t(CARDS[id]?CARDS[id].n:id))}${eng?' ⏳':''}</button>`; }).join("")}</div></div>`; }); } }
  h+=`</div>`;
  // --- VENDRE (je propose une de MES cartes) ---
  h+=`<div class="box"><b class="mini">💰 ${t("Vendre une de mes cartes")}</b>`;
  const myHand=(meP&&meP.hand)||[];
  if(!S.recap && myBet()) h+=`<div class="mini muted" style="margin-top:6px">${t("Tu ne peux pas vendre tant que ton pari du jour est validé — attends la résolution de la journée.")}</div>`;
  else if(!humanOpponents().length) h+=`<div class="mini muted" style="margin-top:6px">${t("Aucun adversaire pour l'instant.")}</div>`;
  else if(!myHand.length) h+=`<div class="mini muted" style="margin-top:6px">${t("Tu n'as aucune carte en main à vendre.")}</div>`;
  else { h+=`<div class="mini muted" style="margin-top:4px">${t("Choisis une carte à proposer aux autres (leur cagnotte est indiquée).")}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${myHand.map(id=>{ const eng=cardEngaged(id);
      return `<button class="btn ghost sm" ${eng?'disabled style="opacity:.5"':''} onclick="proposeSell('${id}')">${CARDS[id]?CARDS[id].e:'?'} ${esc(t(CARDS[id]?CARDS[id].n:id))}${eng?' ⏳':''}</button>`; }).join("")}</div>`; }
  h+=`</div>`;
  return h;
}

// mbox commune (achat/vente) : champ prix + petit mot
function tradeModal(emoji,titleHTML,subHTML,bodyHTML,onSend){
  closeCardInfo();
  const o=document.createElement("div"); o.id="cardModal"; o.className="modal";
  o.addEventListener("click",e=>{ if(e.target===o) closeCardInfo(); });
  o.innerHTML=`<div class="mbox"><div style="font-size:34px">${emoji}</div>
    <h2 style="margin:6px 0 4px">${titleHTML}</h2>${subHTML}${bodyHTML}
    <input id="tradeMsg" maxlength="140" placeholder="${t("un petit mot (optionnel)")}" style="width:100%;box-sizing:border-box;padding:10px;margin-top:8px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:inherit;font-size:16px">
    <div class="row" style="gap:8px;margin-top:14px"><button class="btn" style="flex:1" onclick="${onSend}">${t("Envoyer l'offre")}</button>
    <button class="btn ghost" style="flex:1" onclick="closeCardInfo()">${t("Annuler")}</button></div></div>`;
  document.body.appendChild(o);
}
function priceInput(mx){ return `<input id="tradePrice" type="number" inputmode="numeric" min="1" ${mx?`max="${mx}"`:''} placeholder="${t("ex : {a} €",{a:mx?Math.min(10,mx):5})}" style="width:100%;box-sizing:border-box;padding:10px;margin-top:6px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:inherit;font-size:16px">`; }
// RACHETER : j'achète la carte d'un adversaire
function proposeBuy(sellerId, cardId){
  const meP=me(); if(!meP) return; const seller=pById(sellerId); const C=CARDS[cardId];
  const maxP=Math.round((meP.capital||0)-TRADE_MIN_CAP);
  if(maxP<1){ toast(t("Ton capital est trop faible pour proposer un rachat.")); return; }
  tradeModal(C?C.e:'🤝', t("Racheter {c}",{c:esc(t(C?C.n:cardId))}),
    `<div class="mini muted">${t("à {a}",{a:esc(((seller&&seller.emoji)||'')+' '+((seller&&seller.name)||'?'))})}</div>${C?`<div class="mini muted" style="margin:8px 0;text-align:left">${esc(t(C.d))}</div>`:''}`,
    `<div class="mini" style="margin-top:8px;text-align:left">${t("Prix proposé (€) — entre 1 et {a} :",{a:maxP})}</div>${priceInput(maxP)}`,
    `submitBuy('${sellerId}','${cardId}',${maxP})`);
}
async function submitBuy(sellerId, cardId, maxP){
  const price=Math.round(+((document.getElementById("tradePrice")||{}).value||0));
  const msg=((document.getElementById("tradeMsg")||{}).value||"").slice(0,140);
  if(!(price>=1)){ toast(t("Entre un prix valide.")); return; }
  if(price>maxP){ toast(t("Prix trop élevé : il te resterait moins de {a} €.",{a:TRADE_MIN_CAP})); return; }
  closeCardInfo();
  try{
    const meP=me(); if(!meP) return;
    if((meP.capital||0)-price < TRADE_MIN_CAP){ toast(t("Prix trop élevé : il te resterait moins de {a} €.",{a:TRADE_MIN_CAP})); return; }
    if(await hasBetForDay(S.myId, L.current_day)){ tradeBloque(t("<b>Ton pari du jour est déjà validé.</b> Tu ne peux donc pas proposer un rachat maintenant.")); return; }
    const seller=await q(db.from("players").select("hand").eq("id",sellerId).single());
    if(!seller || !(seller.hand||[]).includes(cardId)){ toast(t("Cette carte n'est plus disponible.")); await refresh(); return; }
    if(await cardHasPendingTrade(cardId)){ toast(t("Cette carte fait déjà l'objet d'une offre en attente.")); await refresh(); return; }
    await q(db.from("trades").insert({league_id:L.id, kind:"buy", from_player:S.myId, to_player:sellerId, card_id:cardId, price:price, msg:msg||null}));
    infoWin(t("Offre envoyée.")); await refresh();
  }catch(e){ infoWin(t("⚠️ Une erreur est survenue")+" : "+esc(e.message),"⚠️"); }
}
// VENDRE : je propose une de MES cartes à un joueur (il paie, il la reçoit)
function proposeSell(cardId){
  const meP=me(); if(!meP) return; const C=CARDS[cardId]; const opps=humanOpponents();
  if(!opps.length){ toast(t("Aucun adversaire pour l'instant.")); return; }
  tradeModal(C?C.e:'💰', t("Vendre {c}",{c:esc(t(C?C.n:cardId))}),
    `${C?`<div class="mini muted" style="margin:8px 0;text-align:left">${esc(t(C.d))}</div>`:''}<div class="mini" style="text-align:left">${t("À qui ?")}</div>
     <select id="sellTarget" style="width:100%;box-sizing:border-box;padding:10px;margin-top:6px;border-radius:10px;border:1px solid var(--border);background:var(--panel2);color:inherit;font-size:16px">${opps.map(p=>`<option value="${p.id}">${esc((p.emoji||'')+' '+(p.name||'?'))} · 💰 ${eur(p.capital||0)} €</option>`).join("")}</select>`,
    `<div class="mini" style="margin-top:10px;text-align:left">${t("Prix (€) :")}</div>${priceInput(0)}`,
    `submitSell('${cardId}')`);
}
async function submitSell(cardId){
  const target=(document.getElementById("sellTarget")||{}).value;
  const price=Math.round(+((document.getElementById("tradePrice")||{}).value||0));
  const msg=((document.getElementById("tradeMsg")||{}).value||"").slice(0,140);
  if(!target){ toast(t("Choisis un joueur.")); return; }
  if(!(price>=1)){ toast(t("Entre un prix valide.")); return; }
  closeCardInfo();
  try{
    const meP=me(); if(!meP || !((meP.hand||[]).includes(cardId))){ toast(t("Tu ne détiens plus cette carte.")); await refresh(); return; }
    if(await hasBetForDay(S.myId, L.current_day)){ tradeBloque(t("<b>Ton pari du jour est déjà validé.</b> Tu ne peux donc pas mettre une carte en vente maintenant.")); return; }
    if(await cardHasPendingTrade(cardId)){ toast(t("Cette carte fait déjà l'objet d'une offre en attente.")); await refresh(); return; }
    await q(db.from("trades").insert({league_id:L.id, kind:"sell", from_player:S.myId, to_player:target, card_id:cardId, price:price, msg:msg||null}));
    infoWin(t("Offre envoyée.")); await refresh();
  }catch(e){ infoWin(t("⚠️ Une erreur est survenue")+" : "+esc(e.message),"⚠️"); }
}

function tradeReply(id){ return (((document.getElementById("rp_"+id)||{}).value||"").slice(0,140))||null; }
async function acceptTrade(id){
  const o=trades.find(x=>x.id===id); if(!o){ await refresh(); return; } const price=Math.round(o.price); const reply=tradeReply(id);
  // owner = celui qui DONNE la carte ; buyer = celui qui PAIE et la reçoit. Dépend du sens.
  const ownerId = o.kind==="sell" ? o.from_player : o.to_player;
  const buyerId = o.kind==="sell" ? o.to_player   : o.from_player;
  try{
    const owner=await q(db.from("players").select("id,capital,hand").eq("id",ownerId).single());
    const buyer=await q(db.from("players").select("id,capital,hand").eq("id",buyerId).single());
    if(!owner||!buyer){ toast(t("Offre introuvable.")); await refresh(); return; }
    if(!(owner.hand||[]).includes(o.card_id)){ toast(t("La carte n'est plus disponible.")); await markTrade(id,"cancelled",reply); await refresh(); return; }
    if((buyer.capital||0)-price < TRADE_MIN_CAP){ toast(t("Capital insuffisant pour cet achat — offre annulée.")); await markTrade(id,"cancelled",reply); await refresh(); return; }
    if(await hasBetForDay(ownerId, L.current_day)){ tradeBloque(t("<b>Le détenteur de la carte a déjà validé son pari du jour.</b> Il pourrait encore la jouer aujourd'hui, l'échange est donc bloqué.")); return; }
    if(await hasBetForDay(buyerId, L.current_day)){ tradeBloque(t("<b>L'acheteur a déjà validé son pari du jour.</b> L'échange est donc bloqué jusqu'à la résolution.")); return; }
    const oHand=(owner.hand||[]).filter(x=>x!==o.card_id); const bHand=[...(buyer.hand||[]), o.card_id];
    await q(db.from("players").update({hand:oHand, capital:tr2((owner.capital||0)+price)}).eq("id",ownerId));
    await q(db.from("players").update({hand:bHand, capital:tr2((buyer.capital||0)-price)}).eq("id",buyerId));
    await markTrade(id,"accepted",reply,(L&&L.current_day)||0);
    infoWin(o.kind==="sell" ? t("Acheté ! {c} est à toi (−{b} €).",{c:t(CARDS[o.card_id]?CARDS[o.card_id].n:o.card_id),b:price}) : t("Vendu ! +{b} € reçus.",{b:price}), "🤝");
    await refresh();
  }catch(e){ infoWin(t("⚠️ Une erreur est survenue")+" : "+esc(e.message),"⚠️"); }
}
async function refuseTrade(id){ const reply=tradeReply(id); await markTrade(id,"refused",reply); infoWin(t("Offre refusée.")); await refresh(); }
async function cancelTrade(id){ await markTrade(id,"cancelled",null); infoWin(t("Offre annulée.")); await refresh(); }

/* ============ RÈGLES DÉTAILLÉES ============
 * ⚠️ À LIRE AVANT DE MODIFIER UNE RÈGLE DU JEU.
 * Cet écran est la référence complète. Il est écrit pour ne PAS pouvoir mentir sur ce qui est
 * calculable : toutes les valeurs chiffrées sont INJECTÉES depuis les constantes du moteur

 * des phases. C'est exactement là qu'ont eu lieu toutes les dérives constatées le 2026-07-16
 * (« le gage voté au départ » = règle d'avant la v4.09 ; « le dernier fait le gage » affiché même

/* ============ boot ============ */
// === ANTI-CACHE — détecte une version plus récente en ligne et propose de recharger ===========
// Problème : les navigateurs (surtout iPhone) gardent l'ancien index.html en cache → le joueur
// reste sur une vieille version. Solution : au démarrage (et au retour d'onglet), on re-télécharge
// SA PROPRE page en `no-store` (même origine, donc pas de CORS), on lit l'APP_VERSION servie, et si
// elle est plus récente que celle en cours d'exécution, on affiche un bandeau « Recharger ».
function verNum(v){ const p=String(v||"").replace(/^v/,'').split('.').map(n=>parseInt(n,10)||0); return (p[0]||0)*100000+(p[1]||0); }
let updBannerShown=false;
async function checkForUpdate(){
  try{
    const r=await fetch(location.pathname+"?v="+Date.now(), {cache:"no-store"}); if(!r.ok) return;
    const txt=await r.text(); const m=txt.match(/APP_VERSION\s*=\s*"(v[\d.]+)"/);
    if(m && verNum(m[1])>verNum(APP_VERSION)) showUpdateBanner();
  }catch(e){}
}
function showUpdateBanner(){
  if(updBannerShown || document.getElementById("updBanner")) return; updBannerShown=true;
  const b=document.createElement("div"); b.id="updBanner";
  b.style.cssText="position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--accent);color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:13px;box-shadow:0 -2px 12px rgba(0,0,0,.35)";
  b.innerHTML=`<span>${t("🔄 Nouvelle version disponible.")}</span><button class="btn" style="background:#fff;color:var(--accent);flex:0 0 auto;padding:6px 12px" onclick="location.replace(location.pathname+'?v='+Date.now())">${t("Recharger")}</button>`;
  document.body.appendChild(b);
}
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) checkForUpdate(); });
(async function boot(){
  if(!window.supabase){ showErr("Librairie Supabase non chargée (vérifie ta connexion Internet)."); return; }
  checkForUpdate();
  try{ const { data:{ session } } = await db.auth.getSession();
    if(session){ AUTH={ id:session.user.id, name:(session.user.user_metadata&&session.user.user_metadata.username)||"", avatar:(session.user.user_metadata&&session.user.user_metadata.avatar)||"" }; }
  }catch(e){}
  if(!AUTH){ S.view="auth"; render(); return; }
  const last=loadLast();
  if(last&&last.leagueId){ S.leagueId=last.leagueId; S.myId=last.myId; S.view="game"; startPoll(); refresh(); }
  else { S.view="leagues"; loadMyLeagues(); }
})();
</script>
